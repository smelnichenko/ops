services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: monitor-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (volatile cache)
  redis:
    image: redis:latest
    container_name: monitor-redis
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible object storage for email attachments)
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: monitor-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka (KRaft mode, for chat messaging)
  kafka:
    image: apache/kafka:3.9.0
    container_name: monitor-kafka
    hostname: kafka
    environment:
      CLUSTER_ID: local-dev-cluster-id-000
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:19092:19092"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./infra/kafka/server.properties:/mnt/shared/config/server.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ScyllaDB (chat message storage)
  scylla:
    image: scylladb/scylla:6.2
    container_name: monitor-scylla
    command: ["--smp=1", "--memory=512M", "--developer-mode=1", "--overprovisioned=1"]
    ports:
      - "127.0.0.1:9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ScyllaDB schema init
  scylla-init:
    image: scylladb/scylla:6.2
    container_name: monitor-scylla-init
    depends_on:
      scylla:
        condition: service_healthy
    restart: "no"
    entrypoint: ["cqlsh", "scylla", "-f", "/schema.cql"]
    volumes:
      - ./infra/scylla/schema.cql:/schema.cql:ro

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitor-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-monitor}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCYLLA_CONTACT_POINTS: scylla
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-please-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
        BUILD_TIME: ${BUILD_TIME:-}
    container_name: monitor-frontend
    environment:
      API_BACKEND_HOST: backend
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

  # Prometheus (optional - for metrics)
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: monitor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - backend
    profiles:
      - monitoring

  # Grafana (optional - for dashboards)
  grafana:
    image: grafana/grafana:12.4.0
    container_name: monitor-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
  scylla_data:
  prometheus_data:
  grafana_data:
