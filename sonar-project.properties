sonar.projectKey=schnappy-ops
sonar.projectName=Schnappy Ops
sonar.sources=deploy/ansible,tests/ansible,scripts
sonar.exclusions=**/*.md,**/vars/vault-*.yml,**/venv/**
sonar.sourceEncoding=UTF-8

# Ansible playbooks, shell scripts and test fixtures carry no executable unit
# coverage, so coverage is not a meaningful gate here. Excluding everything from
# coverage makes new_coverage N/A (the gate skips it) while still enforcing the
# violations, duplication and security-hotspot conditions, which do apply.
sonar.coverage.exclusions=**/*
