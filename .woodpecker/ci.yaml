# CI: Lint and analyze on push

when:
  - event: push
  - event: pull_request

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 100

steps:
  - name: ansible-lint
    image: python:3.13-slim
    commands:
      - pip install --quiet ansible-lint
      - ansible-lint deploy/ansible/playbooks/*.yml --exclude deploy/ansible/roles/ || true
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits: { cpu: 1000m, memory: 512Mi }

  - name: sonar
    image: node:22-bookworm-slim
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - |
        for i in $(seq 1 30); do
          wget -q --spider --timeout=2 "$SONAR_HOST_URL/api/system/status" 2>/dev/null && break
          sleep 1
        done
      - npx sonarqube-scanner -Dsonar.qualitygate.wait=false
    depends_on: [ansible-lint]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
