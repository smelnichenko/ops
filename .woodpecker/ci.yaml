# CI: Lint and analyze on push

when:
  - event: push
  - event: pull_request

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      netrc_machine: git.pmon.dev
      netrc_username: forgejo_admin
      netrc_password:
        from_secret: clone_token
      partial: false
      depth: 100

steps:
  - name: ansible-lint
    image: python:3.13-slim
    commands:
      - pip install --quiet ansible-lint
      - ansible-lint deploy/ansible/playbooks/*.yml --exclude deploy/ansible/roles/
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits: { cpu: 1000m, memory: 512Mi }

  - name: sonar
    image: git.pmon.dev/schnappy/sonar-scanner:latest
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - sonar-scanner -Dsonar.qualitygate.wait=false
    depends_on: [ansible-lint]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
