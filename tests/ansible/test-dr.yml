---
# Disaster Recovery Tests
#
# Tests pod recovery (individual + all-at-once), full namespace
# restore from Velero backup, and offsite restore from 3rd copy.
#
# Prerequisites:
#   - vagrant up (kubeadm + pi1 + pi2 VMs)
#   - App accessible at http://localhost (Traefik)
#
# Usage:
#   ansible-playbook -i inventory/vagrant.yml playbooks/test-dr.yml
#
# Suite 1: Pod recovery (kill individual/all pods, verify data)
# Suite 2: Velero backup + namespace destroy + restore
# Suite 3: Offsite restore (rsync to vault-pi, wipe primary, rsync back, restore)

# ─── Play 0: Prepare pi1 (offsite backup target) + fetch Pi Vault token ────
- name: Prepare pi1 for offsite backup tests + fetch Vault token
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Wait for pi1 SSH
      ansible.builtin.wait_for_connection:
        delay: 2
        timeout: 60

    - name: Install rsync on pi1
      ansible.builtin.apt:
        name: rsync
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure offsite backup directory exists
      ansible.builtin.file:
        path: /mnt/backups/velero
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: Ensure vagrant user has authorized_keys for root SSH from kubeadm
      ansible.builtin.file:
        path: /home/vagrant/.ssh
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0700'

    - ansible.builtin.import_tasks: tasks/fetch-pi-vault-token.yml

# ─── Play 1: DR Tests on the kubeadm cluster ────────────────────────────────
- name: Disaster Recovery Tests
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    app_hostname: "schnappy-app.vagrant.test"
    test_password: dr-test-pass-12345
    test_email: dr-test@test.com
    test_monitor_name: dr-test-page
    # keycloak_admin_password comes from inventory; keycloak-auth.yml refers to
    # the same value under the name kc_admin_password.
    kc_admin_password: "{{ keycloak_admin_password }}"
    velero_ns: velero
    velero_chart_version: "11.4.0"
    minio_image: "quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z"
    offsite_host: 192.168.56.20
    offsite_user: vagrant
    offsite_path: /mnt/backups/velero

  tasks:
    # ================================================================
    # Prerequisites: Deploy the app
    # ================================================================

    - name: Verify k8s is running
      kubernetes.core.k8s_info:
        kind: Node
      register: _nodes_check
      failed_when: (_nodes_check.resources | default([]) | length) == 0

    - ansible.builtin.import_tasks: tasks/setup-istio-gateway.yml

    - name: Compose app_url via Istio gateway NodePort
      ansible.builtin.set_fact:
        app_url: "http://{{ app_hostname }}:{{ istio_gateway_nodeport }}"

    - name: Ensure schnappy namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    - name: Build monitor (app) container image
      # Multi-stage Dockerfile in /vagrant-monitor builds the JAR + runtime
      # in one shot; no pre-staging needed.
      ansible.builtin.shell: |
        cd /vagrant-monitor
        nerdctl -n k8s.io build -t monitor:local .
      changed_when: true
      timeout: 900

    - name: Build site (frontend) container image
      ansible.builtin.shell: |
        cd /vagrant-site
        nerdctl -n k8s.io build \
          --build-arg GIT_HASH=dr-test \
          --build-arg BUILD_TIME="2026-01-01T00:00:00Z" \
          -t monitor-frontend:local .
      changed_when: true
      timeout: 900

    - name: Write Helm values for DR test
      ansible.builtin.copy:
        dest: /tmp/schnappy-dr-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
          networkPolicies:
            enabled: false
          site:
            dnsResolver: "10.43.0.10"
            enabled: true
            image:
              repository: monitor-frontend
              tag: local
              pullPolicy: Never
          app:
            replicas: 1
            image:
              repository: monitor
              tag: local
              pullPolicy: Never
            # ingress disabled — HTTPRoute attaches directly to the monitor service
            ingress:
              enabled: false
          postgres:
            enabled: true
            existingSecret: "schnappy-postgres"
            image: postgres:17-alpine
            storage:
              storageClass: "local-path"
          valkey:
            enabled: true
            image: valkey/valkey:8.1-alpine
          keycloak:
            enabled: true
            existingSecret: "schnappy-keycloak"
            image: quay.io/keycloak/keycloak:26.5.6
            hostname: localhost
            # B-era in-app JWT validation: the monitor verifies the token
            # signature against JWKS, so point key-fetching at the in-cluster
            # Keycloak service the pod can reach (public hostname=localhost is
            # not resolvable from inside the pod). iss still validates against
            # the hostname-derived issuer.
            jwksUri: "http://schnappy-keycloak:8080/realms/schnappy/protocol/openid-connect/certs"
            # KC issues an http://localhost issuer in the test; the monitor's
            # default issuer-uri is https://localhost → mismatch. Validate the
            # signature only (the token is genuinely KC-signed).
            issuerUri: "none"
            mail:
              from: "test@example.com"
            clients:
              app:
                enabled: true
                redirectUri: "http://localhost/auth/callback"
              forgejo:
                enabled: false
                redirectUri: ""
              grafana:
                enabled: false
                redirectUri: ""
            resources:
              requests: { cpu: 200m, memory: 512Mi }
              limits: { cpu: 1000m, memory: 1Gi }
            ingress:
              enabled: false
          aptCache:
            enabled: false
          captcha:
            enabled: false
          elk:
            enabled: false
          ai:
            enabled: false
          mail:
            enabled: false
          webhook:
            enabled: false
          minio:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false
          kafka:
            enabled: false
          scylla:
            enabled: false
          # Chart defaults smokeTest on; rendered as a one-shot Job it runs
          # immediately, fails on the empty DR baseUrl, and its failing pods
          # get swept into the Velero backup. Keep the DR run clean.
          smokeTest:
            enabled: false
          loadTest:
            enabled: false
          hyperfoil:
            enabled: false

    - name: Configure ESO ClusterSecretStore → Pi Vault
      ansible.builtin.import_tasks: tasks/setup-eso-vault-backend.yml

    - name: Seed postgres secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/postgres
        secret_data:
          database: monitor
          username: postgres
          password: vagrant-test-pw

    - name: Seed keycloak secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/keycloak
        secret_data:
          admin_password: "{{ keycloak_admin_password }}"
          db_password: vagrant-test-kc-db
          forgejo_client_secret: not-used


    - name: Deploy schnappy-mesh (ServiceAccounts)
      ansible.builtin.import_tasks: tasks/deploy-schnappy-mesh.yml

    # Test MinIO must be up before the CNPG cluster: the cluster's barman
    # object store writes backups here, and the bucket must already exist.
    - ansible.builtin.import_tasks: tasks/setup-test-minio.yml

    - name: CNPG barman backup credentials Secret (schnappy-postgres-minio-backup)
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata: { name: schnappy-postgres-minio-backup, namespace: "{{ ns }}" }
          type: Opaque
          stringData:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin

    - name: Stand up in-cluster test postgres + per-service DB Secrets
      ansible.builtin.import_tasks: tasks/setup-test-postgres.yml

    - name: Stand up in-cluster test valkey
      ansible.builtin.import_tasks: tasks/setup-test-valkey.yml

    # Keycloak lives in the separate schnappy-auth chart (not the app chart).
    # It authenticates to the CNPG `postgres` superuser against the `keycloak`
    # database (created in setup-test-postgres postInitSQL) via a Secret named
    # schnappy-postgres with POSTGRES_USER/POSTGRES_PASSWORD keys. Deployed as
    # its own release with fullnameOverride=schnappy so the Deployment renders
    # as `schnappy-keycloak` (the proven tasks/deploy-app.yml 3-chart pattern).
    - name: Keycloak DB-credentials Secret (schnappy-postgres)
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata: { name: schnappy-postgres, namespace: "{{ ns }}" }
          type: Opaque
          stringData:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: vagrant

    - name: Deploy schnappy-auth (Keycloak) for DR test
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy-auth
        chart_ref: /vagrant-platform/helm/schnappy-auth
        release_namespace: "{{ ns }}"
        create_namespace: true
        values:
          fullnameOverride: schnappy
        values_files:
          - /tmp/schnappy-dr-test-values.yml
        # KC bootstrap + first ExternalSecret sync can exceed 15m under vagrant;
        # the readiness gate before SEED is the real success check.
        wait: false

    - name: Deploy chart for DR test
      kubernetes.core.helm:
        name: schnappy
        chart_ref: /vagrant-platform/helm/schnappy
        release_namespace: "{{ ns }}"
        create_namespace: true
        values_files:
          - /tmp/schnappy-dr-test-values.yml
        timeout: 300s
        kubeconfig: /etc/kubernetes/admin.conf

    - name: Attach HTTPRoute schnappy-app → vagrant-gateway
      ansible.builtin.include_tasks: tasks/create-httproute.yml
      vars:
        route_name: schnappy-app
        route_ns: "{{ ns }}"
        route_host: "{{ app_hostname }}"
        route_service: schnappy-monitor
        route_port: 8080

    - name: Wait for app to be ready
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          READY=$(kubectl get pods -n {{ ns }} -l app.kubernetes.io/component=monitor \
            -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null)
          if [ "$READY" = "true" ]; then
            echo "OK: App pod ready"
            exit 0
          fi
          echo "Waiting... ready=$READY (attempt $i/60)"
          sleep 10
        done
        echo "FAIL: app not ready after 10 minutes"
        kubectl get pods -n {{ ns }} -o wide
        kubectl logs -l app.kubernetes.io/component=monitor -n {{ ns }} --tail=20
        exit 1
      register: app_readiness
      changed_when: false
      timeout: 660

    - name: Wait for app to be healthy
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health
      retries: 30
      delay: 10
      until: health.status == 200 and health.json.status == "UP"

    - name: Display initial health
      ansible.builtin.debug:
        msg: "App healthy: {{ health.json.status }}"

    # Keycloak (deployed earlier, bootstrapping in parallel with the app) must
    # be ready before SEED mints a token against it.
    - name: "KEYCLOAK: Wait for ExternalSecret schnappy-keycloak synced"
      ansible.builtin.shell: |
        kubectl get externalsecret schnappy-keycloak -n {{ ns }} \
          -o jsonpath='{.status.conditions[0].reason}'
      register: dr_kc_secret_sync
      retries: 60
      delay: 5
      until: dr_kc_secret_sync.stdout == "SecretSynced"
      changed_when: false

    - name: "KEYCLOAK: Wait for deployment rollout"
      ansible.builtin.shell: |
        kubectl rollout status deploy/schnappy-keycloak -n {{ ns }} --timeout=1200s
      changed_when: false

    - name: "KEYCLOAK: Wait for readiness probe"
      ansible.builtin.shell: |
        kubectl get pod -n {{ ns }} -l app.kubernetes.io/component=keycloak \
          -o jsonpath='{.items[0].status.containerStatuses[?(@.name=="keycloak")].ready}'
      register: dr_kc_ready
      retries: 60
      delay: 10
      until: dr_kc_ready.stdout == "true"
      changed_when: false

    # ================================================================
    # Suite 1: Seed Test Data
    # ================================================================

    - name: "SEED: Create test user and get token"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "SEED: Create page monitor"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/config"
        method: POST
        body_format: json
        headers:
          Authorization: "Bearer {{ auth_token }}"
        body:
          name: "{{ test_monitor_name }}"
          url: "https://example.com"
          pattern: "<title>(.*?)</title>"
          cron: "0 0 * * * *"
          enabled: true
        status_code: [200, 201, 400]
      register: create_monitor
      ignore_errors: true

    - name: "SEED-DIAG: dump monitor auth rejection (only on failure)"
      when: create_monitor is failed
      ansible.builtin.shell: |
        echo "=== token iss ==="
        echo '{{ auth_token | default("") }}' | cut -d. -f2 | python3 -c "import base64,json,sys; t=sys.stdin.read().strip(); print(json.loads(base64.urlsafe_b64decode(t+'='*(-len(t)%4))).get('iss','?'))" 2>/dev/null || echo "(decode failed)"
        echo "=== monitor auth logs ==="
        kubectl logs -n {{ ns }} -l app.kubernetes.io/component=monitor --tail=80 2>/dev/null | grep -iE 'jwt|jwk|issuer|token|401|Unauthor|GatewayAuthFilter|Bearer' || echo "(no auth-related logs)"
        echo "=== monitor rendered jwt config ==="
        kubectl get cm -n {{ ns }} -o yaml 2>/dev/null | grep -iE 'issuer-uri|jwk-set-uri' || true
      register: _seed_diag
      changed_when: false

    - ansible.builtin.debug:
        var: _seed_diag.stdout_lines
      when: create_monitor is failed

    - name: "SEED: Fail if monitor creation rejected"
      ansible.builtin.fail:
        msg: "SEED monitor creation failed (HTTP {{ create_monitor.status | default('?') }}) — see DIAG above"
      when: create_monitor is failed

    - name: "SEED: Trigger manual check"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/check/{{ test_monitor_name }}"
        method: POST
        headers:
          Authorization: "Bearer {{ auth_token }}"
        status_code: [200, 201]
      register: check_result
      # May fail if external URL unreachable in Vagrant — that's ok for DR test
      failed_when: false

    - name: "SEED: Verify monitors list"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_before

    - name: Display seed data
      ansible.builtin.debug:
        msg: "Seeded: user={{ test_email }}, monitors={{ pages_before.json | length }}"

    # ================================================================
    # Suite 1: Pod Recovery Tests
    # ================================================================

    # ── Test 1: Kill app pod ──

    - name: "POD-RECOVERY: Delete app pod"
      kubernetes.core.k8s:
        api_version: v1
        kind: Pod
        namespace: "{{ ns }}"
        label_selectors:
          - "app.kubernetes.io/name=schnappy"
          - "app.kubernetes.io/component=monitor"
        state: absent
        wait: false

    - name: "POD-RECOVERY: Wait for app deployment rollout"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: schnappy-monitor
        namespace: "{{ ns }}"
      register: _rollout_app
      retries: 60
      delay: 2
      until: >-
        (_rollout_app.resources | default([]) | length > 0) and
        (_rollout_app.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_app.resources[0].status.replicas | default(-1)) and
        (_rollout_app.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_app.resources[0].status.replicas | default(-1))

    - name: "POD-RECOVERY: Verify app health after restart"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health_after_app
      retries: 30
      delay: 5
      until: health_after_app.status == 200 and health_after_app.json.status == "UP"

    - name: "POD-RECOVERY: Re-authenticate after app restart"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "POD-RECOVERY: Verify data after app restart"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_after_app

    - name: "POD-RECOVERY: Assert data intact after app kill"
      ansible.builtin.assert:
        that:
          - pages_after_app.json | length == pages_before.json | length
        fail_msg: "Data lost after app pod kill! Before: {{ pages_before.json | length }}, After: {{ pages_after_app.json | length }}"
        success_msg: "PASS: App pod recovery — data intact ({{ pages_after_app.json | length }} monitors)"

    # ── Test 2: Kill postgres pod ──

    - name: "POD-RECOVERY: Delete postgres pod"
      kubernetes.core.k8s:
        api_version: v1
        kind: Pod
        namespace: "{{ ns }}"
        label_selectors:
          - "app.kubernetes.io/name=schnappy"
          - "app.kubernetes.io/component=postgres"
        state: absent
        wait: false

    - name: "POD-RECOVERY: Wait for postgres cluster Ready"
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        name: schnappy-postgres
        namespace: "{{ ns }}"
      register: _rollout_pg
      retries: 90
      delay: 2
      until: >-
        (_rollout_pg.resources | default([]) | length > 0) and
        ((_rollout_pg.resources[0].status.conditions | default([]) |
          selectattr('type', 'equalto', 'Ready') | list | first | default({})).status
          | default('')) == "True"

    - name: "POD-RECOVERY: Wait for app to reconnect to postgres"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health_after_pg
      retries: 30
      delay: 5
      until: health_after_pg.status == 200 and health_after_pg.json.status == "UP"

    - name: "POD-RECOVERY: Re-authenticate after postgres restart"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "POD-RECOVERY: Verify data after postgres restart"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_after_pg

    - name: "POD-RECOVERY: Assert data intact after postgres kill"
      ansible.builtin.assert:
        that:
          - pages_after_pg.json | length == pages_before.json | length
        fail_msg: "Data lost after postgres pod kill!"
        success_msg: "PASS: Postgres pod recovery — data intact ({{ pages_after_pg.json | length }} monitors)"

    # ── Test 3: Kill valkey pod ──

    - name: "POD-RECOVERY: Delete valkey pod"
      kubernetes.core.k8s:
        api_version: v1
        kind: Pod
        namespace: "{{ ns }}"
        label_selectors:
          - "app.kubernetes.io/name=schnappy"
          - "app.kubernetes.io/component=valkey"
        state: absent
        wait: false

    - name: "POD-RECOVERY: Wait for valkey deployment rollout"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: schnappy-valkey
        namespace: "{{ ns }}"
      register: _rollout_valkey
      retries: 30
      delay: 2
      until: >-
        (_rollout_valkey.resources | default([]) | length > 0) and
        (_rollout_valkey.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_valkey.resources[0].status.replicas | default(-1)) and
        (_rollout_valkey.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_valkey.resources[0].status.replicas | default(-1))

    - name: "POD-RECOVERY: Verify app health after valkey restart"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health_after_valkey
      retries: 20
      delay: 5
      until: health_after_valkey.status == 200 and health_after_valkey.json.status == "UP"

    - name: "POD-RECOVERY: Assert app healthy after valkey kill"
      ansible.builtin.assert:
        that:
          - health_after_valkey.json.status == "UP"
        success_msg: "PASS: Valkey pod recovery — app healthy"

    # ── Test 4: Kill frontend pod ──

    - name: "POD-RECOVERY: Delete frontend pod"
      kubernetes.core.k8s:
        api_version: v1
        kind: Pod
        namespace: "{{ ns }}"
        label_selectors:
          - "app.kubernetes.io/name=schnappy"
          - "app.kubernetes.io/component=site"
        state: absent
        wait: false

    - name: "POD-RECOVERY: Wait for frontend deployment rollout"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: schnappy-site
        namespace: "{{ ns }}"
      register: _rollout_site
      retries: 30
      delay: 2
      until: >-
        (_rollout_site.resources | default([]) | length > 0) and
        (_rollout_site.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_site.resources[0].status.replicas | default(-1)) and
        (_rollout_site.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_site.resources[0].status.replicas | default(-1))

    - name: "POD-RECOVERY: Verify frontend serves pages"
      ansible.builtin.uri:
        url: "{{ app_url }}/"
        return_content: false
      register: frontend_after
      retries: 15
      delay: 5
      until: frontend_after.status == 200

    - name: "POD-RECOVERY: Assert frontend recovered"
      ansible.builtin.assert:
        that:
          - frontend_after.status == 200
        success_msg: "PASS: Frontend pod recovery — serving pages"

    # ── Test 5: Kill ALL pods simultaneously ──

    - name: "POD-RECOVERY: Delete ALL pods in namespace"
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: absent
        api_version: v1
        kind: Pod
        name: "--all"
        namespace: "{{ ns }}"

    - name: "POD-RECOVERY: Wait for postgres cluster Ready (full restart)"
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        name: schnappy-postgres
        namespace: "{{ ns }}"
      register: _rollout_all_pg
      retries: 90
      delay: 2
      until: >-
        (_rollout_all_pg.resources | default([]) | length > 0) and
        ((_rollout_all_pg.resources[0].status.conditions | default([]) |
          selectattr('type', 'equalto', 'Ready') | list | first | default({})).status
          | default('')) == "True"

    - name: "POD-RECOVERY: Wait for all deployments to roll out"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item }}"
        namespace: "{{ ns }}"
      loop:
        - schnappy-monitor
        - schnappy-valkey
        - schnappy-site
        - schnappy-keycloak
      register: _rollout_all
      retries: 90
      delay: 2
      until: >-
        (_rollout_all.resources | default([]) | length > 0) and
        (_rollout_all.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_all.resources[0].status.replicas | default(-1)) and
        (_rollout_all.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_all.resources[0].status.replicas | default(-1))

    - name: "POD-RECOVERY: Wait for app health after full restart"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health_after_all
      retries: 30
      delay: 10
      until: health_after_all.status == 200 and health_after_all.json.status == "UP"

    - name: "POD-RECOVERY: Re-authenticate after full restart"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "POD-RECOVERY: Verify data after killing all pods"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_after_all

    - name: "POD-RECOVERY: Assert data intact after killing all pods"
      ansible.builtin.assert:
        that:
          - pages_after_all.json | length == pages_before.json | length
        fail_msg: "Data lost after killing all pods!"
        success_msg: "PASS: Full pod recovery — all data intact ({{ pages_after_all.json | length }} monitors)"

    - name: "=== Suite 1 Complete ==="
      ansible.builtin.debug:
        msg: "All pod recovery tests passed"

    # ================================================================
    # Suite 2: Full Disaster Recovery (Velero Backup/Restore)
    # ================================================================

    # ── Step 1: Deploy Velero (test MinIO already up from setup-test-minio) ──

    - name: "DR: Add vmware-tanzu Helm repo"
      kubernetes.core.helm_repository:
        name: vmware-tanzu
        repo_url: https://vmware-tanzu.github.io/helm-charts

    - name: "DR: Create Velero credentials"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: velero-credentials
            namespace: "{{ velero_ns }}"
          type: Opaque
          stringData:
            cloud: |
              [default]
              aws_access_key_id=minioadmin
              aws_secret_access_key=minioadmin

    - name: "DR: Install Velero CRDs"
      ansible.builtin.shell: |
        kubectl apply --server-side \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/backups.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/backupstoragelocations.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/deletebackuprequests.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/downloadrequests.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/podvolumebackups.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/podvolumerestores.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/restores.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/schedules.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/serverstatusrequests.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/volumesnapshotlocations.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/datadownloads.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/datauploads.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/backuprepositories.yaml
      changed_when: false

    - name: "DR: Deploy Velero"
      kubernetes.core.helm:
        name: velero
        chart_ref: vmware-tanzu/velero
        chart_version: "{{ velero_chart_version }}"
        release_namespace: "{{ velero_ns }}"
        skip_crds: true
        disable_hook: true
        kubeconfig: /etc/kubernetes/admin.conf
        values:
          initContainers:
            - name: velero-plugin-for-aws
              # Match the Velero server (chart 11.4.0 → appVersion 1.17.x);
              # plugin v1.11.x targets 1.15.x and risks BSL never going Available.
              image: velero/velero-plugin-for-aws:v1.13.2
              volumeMounts:
                - name: plugins
                  mountPath: /target
          credentials:
            useSecret: true
            existingSecret: velero-credentials
          configuration:
            backupStorageLocation:
              - name: default
                provider: aws
                bucket: velero
                config:
                  region: us-east-1
                  s3ForcePathStyle: "true"
                  s3Url: "http://minio-test.{{ velero_ns }}.svc:9000"
            volumeSnapshotLocation: []
            defaultVolumesToFsBackup: true
            features: ""
          deployNodeAgent: true
          snapshotsEnabled: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi

    - name: "DR: Wait for Velero"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: velero
        namespace: "{{ velero_ns }}"
      register: _rollout_velero
      retries: 60
      delay: 2
      until: >-
        (_rollout_velero.resources | default([]) | length > 0) and
        (_rollout_velero.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_velero.resources[0].status.replicas | default(-1)) and
        (_rollout_velero.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_velero.resources[0].status.replicas | default(-1))

    - name: "DR: Wait for node-agent DaemonSet"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: DaemonSet
        name: node-agent
        namespace: "{{ velero_ns }}"
      register: _rollout_node_agent
      retries: 60
      delay: 2
      until: >-
        (_rollout_node_agent.resources | default([]) | length > 0) and
        (_rollout_node_agent.resources[0].status.numberReady | default(0)) ==
        (_rollout_node_agent.resources[0].status.desiredNumberScheduled | default(-1)) and
        (_rollout_node_agent.resources[0].status.desiredNumberScheduled | default(0)) > 0

    - name: "DR: Wait for BSL to be available"
      kubernetes.core.k8s_info:
        api_version: velero.io/v1
        kind: BackupStorageLocation
        name: default
        namespace: "{{ velero_ns }}"
      register: bsl_status
      retries: 30
      delay: 10
      until: >-
        (bsl_status.resources | default([]) | length > 0) and
        (bsl_status.resources[0].status.phase | default('')) == "Available"

    - name: "DR: Velero ready"
      ansible.builtin.debug:
        msg: "Velero deployed, BSL status: {{ bsl_status.resources[0].status.phase }}"

    # ── Step 2: Verify seed data still present ──

    - name: "DR: Re-authenticate before backup"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "DR: Verify monitors before backup"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_pre_backup

    - name: "DR: Record pre-backup state"
      ansible.builtin.set_fact:
        monitor_count_before: "{{ pages_pre_backup.json | length }}"

    - name: "DR: Pre-backup state"
      ansible.builtin.debug:
        msg: "Pre-backup: {{ monitor_count_before }} monitors"

    # ── Step 3: Create Velero backup ──

    # Postgres is backed up the production way: a CNPG barman Backup to the
    # test MinIO `postgres-backups` bucket. The CNPG Cluster + PVCs are
    # excluded from the Velero backup (Velero-restoring a CNPG cluster is
    # broken upstream — CNPG issue #5912); Postgres is recovered later by a
    # fresh Cluster with bootstrap.recovery from this barman backup.
    - name: "DR: Trigger CNPG barman backup"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: postgresql.cnpg.io/v1
          kind: Backup
          metadata:
            name: dr-pg-backup
            namespace: "{{ ns }}"
          spec:
            method: barmanObjectStore
            cluster:
              name: schnappy-postgres
      register: pg_backup_result

    - name: "DR: Wait for CNPG barman backup to finish"
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Backup
        name: dr-pg-backup
        namespace: "{{ ns }}"
      register: pg_backup_status
      retries: 60
      delay: 10
      until: >-
        (pg_backup_status.resources | default([]) | length > 0) and
        (pg_backup_status.resources[0].status.phase | default('')) in ["completed", "failed"]

    - name: "DR: Assert CNPG barman backup completed"
      ansible.builtin.assert:
        that:
          - pg_backup_status.resources[0].status.phase == "completed"
        fail_msg: "CNPG barman backup failed: {{ pg_backup_status.resources[0].status.phase | default('unknown') }}"
        success_msg: "PASS: CNPG barman backup completed"

    - name: "DR: Create Velero backup"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: velero.io/v1
          kind: Backup
          metadata:
            name: dr-test
            namespace: "{{ velero_ns }}"
          spec:
            includedNamespaces:
              - "{{ ns }}"
            excludedResources:
              - clusters.postgresql.cnpg.io
              - backups.postgresql.cnpg.io
              - scheduledbackups.postgresql.cnpg.io
            labelSelector:
              matchExpressions:
                - key: cnpg.io/cluster
                  operator: DoesNotExist
            defaultVolumesToFsBackup: true
            ttl: 1h0m0s
      register: backup_result

    - name: "DR: Wait for backup to complete"
      kubernetes.core.k8s_info:
        api_version: velero.io/v1
        kind: Backup
        name: dr-test
        namespace: "{{ velero_ns }}"
      register: backup_status
      retries: 60
      delay: 10
      until: >-
        (backup_status.resources | default([]) | length > 0) and
        (backup_status.resources[0].status.phase | default('')) in ["Completed", "Failed", "PartiallyFailed"]

    - name: "DR: Assert backup succeeded"
      ansible.builtin.assert:
        that:
          - backup_status.resources[0].status.phase == "Completed"
        fail_msg: "Backup failed: {{ backup_status.resources[0].status.phase | default('unknown') }}"
        success_msg: "PASS: Velero backup completed"

    # ── Step 4: Destroy schnappy namespace ──

    - name: "DR: !! DESTROYING schnappy namespace !!"
      ansible.builtin.debug:
        msg: "Deleting namespace {{ ns }} — simulating disaster"

    - name: "DR: Delete schnappy namespace"
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
        state: absent
        wait: true
        wait_timeout: 120
      register: delete_ns

    - name: "DR: Verify namespace is gone"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
      register: ns_check
      failed_when: (ns_check.resources | default([]) | length) > 0

    - name: "DR: Namespace destroyed"
      ansible.builtin.debug:
        msg: "Namespace {{ ns }} deleted successfully"

    # ── Step 5: Restore from backup ──

    - name: "DR: Restore from Velero backup"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: velero.io/v1
          kind: Restore
          metadata:
            name: dr-test-restore
            namespace: "{{ velero_ns }}"
          spec:
            backupName: dr-test
      register: restore_result

    - name: "DR: Wait for restore to complete"
      kubernetes.core.k8s_info:
        api_version: velero.io/v1
        kind: Restore
        name: dr-test-restore
        namespace: "{{ velero_ns }}"
      register: restore_status
      retries: 60
      delay: 10
      until: >-
        (restore_status.resources | default([]) | length > 0) and
        (restore_status.resources[0].status.phase | default('')) in ["Completed", "Failed", "PartiallyFailed"]

    - name: "DR: Assert restore succeeded"
      ansible.builtin.assert:
        that:
          - restore_status.resources[0].status.phase in ["Completed", "PartiallyFailed"]
        fail_msg: "Restore failed: {{ restore_status.resources[0].status.phase | default('unknown') }}"
        success_msg: "PASS: Velero restore {{ restore_status.resources[0].status.phase }}"

    # ── Step 5b: Recover Postgres from the CNPG barman backup ──
    #
    # The CNPG Cluster + PVCs were excluded from the Velero backup (restoring
    # them is broken upstream — CNPG issue #5912). Recover Postgres the
    # production way: a fresh Cluster that bootstraps via barman recovery from
    # the dr-pg-backup written to the test MinIO `postgres-backups` bucket.

    - name: "DR: Re-create CNPG barman backup credentials Secret"
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata: { name: schnappy-postgres-minio-backup, namespace: "{{ ns }}" }
          type: Opaque
          stringData:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin

    - name: "DR: Recover Postgres via CNPG bootstrap.recovery"
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: schnappy-postgres
            namespace: "{{ ns }}"
          spec:
            instances: 1
            imageName: ghcr.io/cloudnative-pg/postgresql:17
            enableSuperuserAccess: true
            superuserSecret:
              name: schnappy-postgres-superuser
            inheritedMetadata:
              annotations:
                traffic.sidecar.istio.io/excludeOutboundPorts: "9000"
            storage:
              size: 100Mi
            bootstrap:
              recovery:
                source: backup-source
            externalClusters:
              - name: backup-source
                barmanObjectStore:
                  destinationPath: s3://postgres-backups/
                  endpointURL: http://minio-test.velero.svc:9000
                  serverName: schnappy-postgres
                  s3Credentials:
                    accessKeyId:
                      name: schnappy-postgres-minio-backup
                      key: MINIO_ROOT_USER
                    secretAccessKey:
                      name: schnappy-postgres-minio-backup
                      key: MINIO_ROOT_PASSWORD
                  wal:
                    maxParallel: 4

    # ── Step 6: Wait for pods to recover ──

    - name: "DR: Wait for postgres cluster Ready after restore"
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        name: schnappy-postgres
        namespace: "{{ ns }}"
      register: _rollout_pg_after_restore
      retries: 120
      delay: 5
      until: >-
        (_rollout_pg_after_restore.resources | default([]) | length > 0) and
        ((_rollout_pg_after_restore.resources[0].status.conditions | default([]) |
          selectattr('type', 'equalto', 'Ready') | list | first | default({})).status
          | default('')) == "True"

    - name: "DR: Wait for all deployments after restore"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item }}"
        namespace: "{{ ns }}"
      loop:
        - schnappy-monitor
        - schnappy-valkey
        - schnappy-site
        - schnappy-keycloak
      register: _rollout_after_restore
      retries: 150
      delay: 2
      until: >-
        (_rollout_after_restore.resources | default([]) | length > 0) and
        (_rollout_after_restore.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_after_restore.resources[0].status.replicas | default(-1)) and
        (_rollout_after_restore.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_after_restore.resources[0].status.replicas | default(-1))

    - name: "DR: Wait for app health after restore"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health_after_restore
      retries: 60
      delay: 10
      until: health_after_restore.status == 200 and health_after_restore.json.status == "UP"

    - name: "DR: App healthy after restore"
      ansible.builtin.debug:
        msg: "App health: {{ health_after_restore.json.status }}"

    # ── Step 7: Verify data integrity ──

    - name: "DR: Re-authenticate after restore"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "DR: Verify monitors after restore"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_after_restore

    - name: "DR: Assert data intact after restore"
      ansible.builtin.assert:
        that:
          - pages_after_restore.json | length == monitor_count_before | int
        fail_msg: "Data lost! Before: {{ monitor_count_before }}, After: {{ pages_after_restore.json | length }}"
        success_msg: "PASS: Data intact after restore — {{ pages_after_restore.json | length }} monitors"

    - name: "DR: Verify monitor config preserved"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/config"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: config_after_restore

    - name: "DR: Assert monitor config preserved"
      ansible.builtin.assert:
        that:
          - config_after_restore.json | selectattr('name', 'equalto', test_monitor_name) | list | length > 0
        fail_msg: "Monitor config '{{ test_monitor_name }}' not found after restore!"
        success_msg: "PASS: Monitor config '{{ test_monitor_name }}' preserved after restore"

    # ── Step 8: Verify app is functional post-restore ──

    - name: "DR: Trigger manual check after restore"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/check/{{ test_monitor_name }}"
        method: POST
        headers:
          Authorization: "Bearer {{ auth_token }}"
        status_code: [200, 201]
      register: check_after_restore
      failed_when: false

    - name: "DR: App functional post-restore"
      ansible.builtin.debug:
        msg: "Post-restore check triggered (status: {{ check_after_restore.status | default('N/A') }})"

    # ── Suite 2 cleanup (keep dr-test backup for Suite 3) ──

    - name: "DR: Delete restore object (keep backup for Suite 3)"
      kubernetes.core.k8s:
        api_version: velero.io/v1
        kind: Restore
        name: dr-test-restore
        namespace: "{{ velero_ns }}"
        state: absent
      failed_when: false

    - name: "=== Suite 2 Complete ==="
      ansible.builtin.debug:
        msg: "All Velero DR tests passed"

    # ================================================================
    # Suite 3: Offsite Restore (3rd copy on vault-pi)
    #
    # Simulates: primary backup storage (SATA SSD) is lost.
    # 1. Rsync MinIO data → vault-pi (offsite copy)
    # 2. Wipe MinIO data on kubeadm + destroy schnappy namespace
    # 3. Rsync back from pi1 → kubeadm
    # 4. Restart MinIO, Velero restore
    # 5. Verify data integrity
    # ================================================================

    # ── Setup SSH from kubeadm → vault-pi ──

    - name: "OFFSITE: Install rsync"
      ansible.builtin.apt:
        name: rsync
        state: present

    - name: "OFFSITE: Generate temporary SSH key for rsync"
      ansible.builtin.shell: |
        rm -f /root/.ssh/offsite_key /root/.ssh/offsite_key.pub
        ssh-keygen -t ed25519 -f /root/.ssh/offsite_key -N "" -q
      args:
        creates: /root/.ssh/offsite_key

    - name: "OFFSITE: Read public key"
      ansible.builtin.command: cat /root/.ssh/offsite_key.pub
      register: offsite_pubkey
      changed_when: false

    - name: "OFFSITE: Install pubkey on vault-pi via delegate"
      ansible.builtin.authorized_key:
        user: "{{ offsite_user }}"
        key: "{{ offsite_pubkey.stdout }}"
        state: present
      delegate_to: vault_pi

    - name: "OFFSITE: Test SSH to vault-pi"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          -i /root/.ssh/offsite_key \
          {{ offsite_user }}@{{ offsite_host }} "echo OK"
      register: ssh_test
      changed_when: false

    - name: "OFFSITE: SSH connectivity verified"
      ansible.builtin.assert:
        that: ssh_test.stdout == "OK"
        success_msg: "PASS: SSH kubeadm → vault-pi working"

    # ── Step 1: Rsync MinIO data to vault-pi ──

    - name: "OFFSITE: Rsync MinIO data to vault-pi"
      ansible.builtin.shell: |
        rsync -az --delete \
          -e "ssh -o StrictHostKeyChecking=no -i /root/.ssh/offsite_key" \
          /tmp/velero-test-backups/ \
          {{ offsite_user }}@{{ offsite_host }}:{{ offsite_path }}/
      register: rsync_to_pi

    - name: "OFFSITE: Verify data on vault-pi"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -i /root/.ssh/offsite_key \
          {{ offsite_user }}@{{ offsite_host }} \
          "du -sh {{ offsite_path }} && find {{ offsite_path }} -type f | wc -l"
      register: offsite_verify
      changed_when: false

    - name: "OFFSITE: Data replicated to vault-pi"
      ansible.builtin.debug:
        msg: "Offsite data: {{ offsite_verify.stdout }}"

    # ── Step 2: Simulate primary backup loss + disaster ──

    - name: "OFFSITE: !! DESTROYING MinIO data + schnappy namespace !!"
      ansible.builtin.debug:
        msg: "Simulating primary backup storage failure + full disaster"

    - name: "OFFSITE: Wipe MinIO data on kubeadm"
      ansible.builtin.shell: |
        rm -rf /tmp/velero-test-backups/*
      changed_when: true

    - name: "OFFSITE: Delete schnappy namespace"
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
        state: absent
        wait: true
        wait_timeout: 120
      register: delete_ns_offsite

    - name: "OFFSITE: Verify namespace gone"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
      register: ns_check_offsite
      failed_when: (ns_check_offsite.resources | default([]) | length) > 0

    # ── Step 3: Restore MinIO data from vault-pi ──

    - name: "OFFSITE: Rsync data back from vault-pi"
      ansible.builtin.shell: |
        rsync -az \
          -e "ssh -o StrictHostKeyChecking=no -i /root/.ssh/offsite_key" \
          {{ offsite_user }}@{{ offsite_host }}:{{ offsite_path }}/ \
          /tmp/velero-test-backups/

    - name: "OFFSITE: Verify restored MinIO data"
      ansible.builtin.shell: |
        find /tmp/velero-test-backups -type f | wc -l
      register: restored_file_count
      changed_when: false

    - name: "OFFSITE: Assert MinIO data restored"
      ansible.builtin.assert:
        that: restored_file_count.stdout | int > 0
        fail_msg: "No files restored from vault-pi!"
        success_msg: "PASS: {{ restored_file_count.stdout }} files restored from offsite"

    # ── Step 4: Restart MinIO and wait for Velero ──

    - name: "OFFSITE: Restart MinIO pod to pick up restored data"
      kubernetes.core.k8s:
        api_version: v1
        kind: Pod
        namespace: "{{ velero_ns }}"
        label_selectors:
          - "app=minio-test"
        state: absent
        wait: false

    - name: "OFFSITE: Wait for MinIO ready"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: minio-test
        namespace: "{{ velero_ns }}"
      register: _rollout_minio_offsite
      retries: 60
      delay: 2
      until: >-
        (_rollout_minio_offsite.resources | default([]) | length > 0) and
        (_rollout_minio_offsite.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_minio_offsite.resources[0].status.replicas | default(-1)) and
        (_rollout_minio_offsite.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_minio_offsite.resources[0].status.replicas | default(-1))

    - name: "OFFSITE: Wait for Velero BSL available"
      kubernetes.core.k8s_info:
        api_version: velero.io/v1
        kind: BackupStorageLocation
        name: default
        namespace: "{{ velero_ns }}"
      register: bsl_offsite
      retries: 30
      delay: 10
      until: >-
        (bsl_offsite.resources | default([]) | length > 0) and
        (bsl_offsite.resources[0].status.phase | default('')) == "Available"

    - name: "OFFSITE: BSL available after restore"
      ansible.builtin.debug:
        msg: "BSL status: {{ bsl_offsite.resources[0].status.phase }}"

    # ── Step 5: Velero restore from offsite-recovered backup ──

    - name: "OFFSITE: Verify dr-test backup still visible"
      kubernetes.core.k8s_info:
        api_version: velero.io/v1
        kind: Backup
        name: dr-test
        namespace: "{{ velero_ns }}"
      register: backup_after_offsite

    - name: "OFFSITE: Assert backup visible"
      ansible.builtin.assert:
        that:
          - (backup_after_offsite.resources | default([]) | length) > 0
          - backup_after_offsite.resources[0].status.phase == "Completed"
        fail_msg: "Backup not visible after offsite restore! Got: {{ backup_after_offsite.resources[0].status.phase | default('missing') }}"
        success_msg: "PASS: dr-test backup visible from restored MinIO data"

    - name: "OFFSITE: Create Velero restore from offsite-recovered backup"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: velero.io/v1
          kind: Restore
          metadata:
            name: dr-offsite-restore
            namespace: "{{ velero_ns }}"
          spec:
            backupName: dr-test

    - name: "OFFSITE: Wait for restore to complete"
      kubernetes.core.k8s_info:
        api_version: velero.io/v1
        kind: Restore
        name: dr-offsite-restore
        namespace: "{{ velero_ns }}"
      register: offsite_restore_status
      retries: 60
      delay: 10
      until: >-
        (offsite_restore_status.resources | default([]) | length > 0) and
        (offsite_restore_status.resources[0].status.phase | default('')) in ["Completed", "Failed", "PartiallyFailed"]

    - name: "OFFSITE: Assert restore succeeded"
      ansible.builtin.assert:
        that:
          - offsite_restore_status.resources[0].status.phase in ["Completed", "PartiallyFailed"]
        fail_msg: "Offsite restore failed: {{ offsite_restore_status.resources[0].status.phase | default('unknown') }}"
        success_msg: "PASS: Velero restore from offsite backup {{ offsite_restore_status.resources[0].status.phase }}"

    # ── Step 5b: Recover Postgres from the offsite-recovered barman backup ──
    #
    # As in Suite 2: the CNPG Cluster was excluded from Velero (CNPG #5912),
    # so recover Postgres via a fresh Cluster bootstrapping from the barman
    # backup now restored into the MinIO `postgres-backups` bucket.

    - name: "OFFSITE: Re-create CNPG barman backup credentials Secret"
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata: { name: schnappy-postgres-minio-backup, namespace: "{{ ns }}" }
          type: Opaque
          stringData:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin

    - name: "OFFSITE: Recover Postgres via CNPG bootstrap.recovery"
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: schnappy-postgres
            namespace: "{{ ns }}"
          spec:
            instances: 1
            imageName: ghcr.io/cloudnative-pg/postgresql:17
            enableSuperuserAccess: true
            superuserSecret:
              name: schnappy-postgres-superuser
            inheritedMetadata:
              annotations:
                traffic.sidecar.istio.io/excludeOutboundPorts: "9000"
            storage:
              size: 100Mi
            bootstrap:
              recovery:
                source: backup-source
            externalClusters:
              - name: backup-source
                barmanObjectStore:
                  destinationPath: s3://postgres-backups/
                  endpointURL: http://minio-test.velero.svc:9000
                  serverName: schnappy-postgres
                  s3Credentials:
                    accessKeyId:
                      name: schnappy-postgres-minio-backup
                      key: MINIO_ROOT_USER
                    secretAccessKey:
                      name: schnappy-postgres-minio-backup
                      key: MINIO_ROOT_PASSWORD
                  wal:
                    maxParallel: 4

    # ── Step 6: Verify app + data integrity ──

    - name: "OFFSITE: Wait for postgres cluster Ready"
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        name: schnappy-postgres
        namespace: "{{ ns }}"
      register: _rollout_pg_offsite
      retries: 120
      delay: 5
      until: >-
        (_rollout_pg_offsite.resources | default([]) | length > 0) and
        ((_rollout_pg_offsite.resources[0].status.conditions | default([]) |
          selectattr('type', 'equalto', 'Ready') | list | first | default({})).status
          | default('')) == "True"

    - name: "OFFSITE: Wait for all deployments"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item }}"
        namespace: "{{ ns }}"
      loop:
        - schnappy-monitor
        - schnappy-valkey
        - schnappy-site
        - schnappy-keycloak
      register: _rollout_offsite
      retries: 150
      delay: 2
      until: >-
        (_rollout_offsite.resources | default([]) | length > 0) and
        (_rollout_offsite.resources[0].status.readyReplicas | default(0)) ==
        (_rollout_offsite.resources[0].status.replicas | default(-1)) and
        (_rollout_offsite.resources[0].status.updatedReplicas | default(0)) ==
        (_rollout_offsite.resources[0].status.replicas | default(-1))

    - name: "OFFSITE: Wait for app health"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/actuator/health"
        return_content: true
      register: health_offsite
      retries: 60
      delay: 10
      until: health_offsite.status == 200 and health_offsite.json.status == "UP"

    - name: "OFFSITE: Re-authenticate after offsite restore"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml
      vars:

    - name: "OFFSITE: Verify monitors after offsite restore"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: pages_offsite

    - name: "OFFSITE: Assert data intact after offsite restore"
      ansible.builtin.assert:
        that:
          - pages_offsite.json | length == monitor_count_before | int
        fail_msg: "Data lost! Before: {{ monitor_count_before }}, After: {{ pages_offsite.json | length }}"
        success_msg: "PASS: Data intact after offsite restore — {{ pages_offsite.json | length }} monitors"

    - name: "OFFSITE: Verify monitor config preserved"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/config"
        headers:
          Authorization: "Bearer {{ auth_token }}"
        return_content: true
      register: config_offsite

    - name: "OFFSITE: Assert monitor config preserved"
      ansible.builtin.assert:
        that:
          - config_offsite.json | selectattr('name', 'equalto', test_monitor_name) | list | length > 0
        fail_msg: "Monitor config '{{ test_monitor_name }}' not found after offsite restore!"
        success_msg: "PASS: Monitor config '{{ test_monitor_name }}' preserved after offsite restore"

    - name: "OFFSITE: Trigger manual check after offsite restore"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/check/{{ test_monitor_name }}"
        method: POST
        headers:
          Authorization: "Bearer {{ auth_token }}"
        status_code: [200, 201]
      register: check_offsite
      failed_when: false

    - name: "OFFSITE: App functional after offsite restore"
      ansible.builtin.debug:
        msg: "Post-offsite-restore check (status: {{ check_offsite.status | default('N/A') }})"

    # ── Cleanup ──

    - name: "OFFSITE: Cleanup restore objects"
      kubernetes.core.k8s:
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
        namespace: "{{ velero_ns }}"
        state: absent
      loop:
        - { api_version: "velero.io/v1", kind: "Backup", name: "dr-test" }
        - { api_version: "velero.io/v1", kind: "Restore", name: "dr-offsite-restore" }
      failed_when: false

    - name: "OFFSITE: Cleanup SSH key"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /root/.ssh/offsite_key
        - /root/.ssh/offsite_key.pub

    - name: "OFFSITE: Remove pubkey from vault-pi"
      ansible.builtin.authorized_key:
        user: "{{ offsite_user }}"
        key: "{{ offsite_pubkey.stdout }}"
        state: absent
      delegate_to: vault_pi

    - name: "=== Suite 3 Complete ==="
      ansible.builtin.debug:
        msg: "All offsite restore tests passed"

    # ================================================================
    # Summary
    # ================================================================

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/schnappy-dr-test-values.yml
        state: absent

    # ================================================================
    # Suite 4: Post-restore k6 smoke test
    # ================================================================

    - name: "SUITE 4: Post-restore k6 smoke test"
      ansible.builtin.debug:
        msg: "Running k6 smoke test to validate restored endpoints"

    - name: "K6: Check if k6-smoke CronJob exists"
      kubernetes.core.k8s_info:
        api_version: batch/v1
        kind: CronJob
        name: schnappy-k6-smoke
        namespace: "{{ ns }}"
      register: k6_cronjob_check
      failed_when: false

    - name: "K6: Set fact for whether k6 CronJob exists"
      ansible.builtin.set_fact:
        k6_cronjob_exists: "{{ (k6_cronjob_check.resources | default([]) | length) > 0 }}"

    - name: "K6: Run smoke test after restore"
      ansible.builtin.shell: |
        kubectl delete job k6-dr-verify -n {{ ns }} 2>/dev/null || true
        kubectl create job k6-dr-verify --from=cronjob/schnappy-k6-smoke -n {{ ns }}
        kubectl wait --for=condition=complete job/k6-dr-verify -n {{ ns }} --timeout=120s
      when: k6_cronjob_exists
      register: k6_dr_result
      changed_when: false

    - name: "K6: Get results"
      ansible.builtin.shell: kubectl logs job/k6-dr-verify -n {{ ns }} 2>/dev/null | grep -E '✓|✗|checks'
      register: k6_dr_logs
      when: k6_cronjob_exists
      changed_when: false

    - name: "K6: Display results"
      ansible.builtin.debug:
        msg: "{{ k6_dr_logs.stdout }}"
      when: k6_cronjob_exists

    - name: "K6: Smoke test skipped (no CronJob)"
      ansible.builtin.debug:
        msg: "k6 smoke test skipped — CronJob not deployed in this environment"
      when: not k6_cronjob_exists

    - name: "=== ALL DR TESTS PASSED ==="
      ansible.builtin.debug:
        msg: |
          Disaster Recovery Test Results:
            Suite 1 - Pod Recovery:
              - App pod kill + recovery: PASS
              - Postgres pod kill + recovery: PASS
              - Valkey pod kill + recovery: PASS
              - Frontend pod kill + recovery: PASS
              - All pods kill + recovery: PASS
            Suite 2 - Full DR (Velero):
              - Velero backup: PASS
              - Namespace destruction + restore: PASS
              - Data integrity after restore: PASS
              - App functional after restore: PASS
            Suite 3 - Offsite Restore (3rd copy):
              - Rsync to vault-pi: PASS
              - Primary backup wipe + namespace destroy: PASS
              - Rsync back from vault-pi: PASS
              - Velero restore from recovered backup: PASS
              - Data integrity after offsite restore: PASS
              - App functional after offsite restore: PASS
            Suite 4 - Post-restore smoke test:
              - k6 endpoint validation: {{ 'PASS' if k6_cronjob_exists else 'SKIPPED' }}
