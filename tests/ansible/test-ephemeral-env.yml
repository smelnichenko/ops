---
# Test ephemeral environment create/destroy lifecycle
#
# Verifies:
#   1. Create env "ephemeral" → all apps Synced+Healthy
#   2. HTTPRoutes exist
#   3. Destroy env → apps removed
#   4. Recreate → works (idempotency)
#   5. Final destroy — clean exit
#
# Uses a temporary infra repo clone pushing to Vagrant Forgejo,
# so production infra is never modified.
#
# Usage:
#   task test:ephemeral-env

- name: Test ephemeral environment lifecycle
  hosts: target
  become: true
  gather_facts: false

  vars:
    env_name: ephemeral
    ns: "schnappy-{{ env_name }}"
    forgejo_host: "{{ hostvars['pi1']['ansible_host'] | default('192.168.56.20') }}"
    forgejo_admin_user: forgejo_admin
    forgejo_admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') | default('vagrant-forgejo-pw', true) }}"
    forgejo_url: "http://{{ forgejo_host }}:3000"
    infra_git_url: "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}:3000/schnappy/infra.git"
    tmp_infra: /tmp/test-infra-ephemeral

  tasks:
    # ================================================================
    # Setup: clone infra repo to temp dir
    # ================================================================

    - name: Clean temp infra dir
      ansible.builtin.file:
        path: "{{ tmp_infra }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: Clone infra from Vagrant Forgejo
      ansible.builtin.shell: |
        git clone {{ infra_git_url }} {{ tmp_infra }}
        cd {{ tmp_infra }}
        git config user.email "test@test"
        git config user.name "test"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Ensure test template values exist in Vagrant infra
      ansible.builtin.shell: |
        cd {{ tmp_infra }}
        REAL_INFRA={{ playbook_dir }}/../../../../infra
        for chart in data apps mesh; do
          DIR=clusters/production/schnappy-test-${chart}
          if [ ! -f "$DIR/values.yaml" ]; then
            mkdir -p "$DIR"
            cp "$REAL_INFRA/$DIR/values.yaml" "$DIR/values.yaml"
          fi
        done
        git add -A
        git diff --cached --quiet || git commit -m "add test template values"
        git push origin main
      delegate_to: localhost
      become: false
      changed_when: true

    # ================================================================
    # Round 1: Create
    # ================================================================

    - name: "ROUND 1: Create"
      ansible.builtin.debug:
        msg: "Creating {{ ns }}..."

    - name: Run create-environment
      ansible.builtin.shell: |
        cd {{ playbook_dir }}/../../deploy/ansible
        venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/create-environment.yml \
          -e "env_name={{ env_name }}" \
          -e "infra_dir_override={{ tmp_infra }}" \
          -e "infra_git_url_override={{ infra_git_url }}"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Wait for ArgoCD sync
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          COUNT=$(kubectl get app -n argocd -o json | \
            jq -r '[.items[] | select(.metadata.name | test("{{ env_name }}")) | select(.status.sync.status != "Synced" or .status.health.status != "Healthy")] | length')
          [ "$COUNT" = "0" ] && FOUND=$(kubectl get app -n argocd -o json | jq -r '[.items[] | select(.metadata.name | test("{{ env_name }}"))] | length') && [ "$FOUND" -gt "0" ] && echo "ALL_HEALTHY" && exit 0
          sleep 10
        done
        echo "TIMEOUT"
        kubectl get app -n argocd | grep {{ env_name }}
        exit 1
      register: sync_wait
      changed_when: false
      failed_when: "'ALL_HEALTHY' not in sync_wait.stdout"

    - name: Verify HTTPRoutes exist
      ansible.builtin.shell: |
        kubectl get httproute -n {{ ns }} --no-headers | wc -l
      register: routes
      changed_when: false
      failed_when: routes.stdout | int == 0

    - name: "ROUND 1 CREATE: PASSED"
      ansible.builtin.debug:
        msg: "{{ ns }} created and synced"

    # ================================================================
    # Round 1: Destroy
    # ================================================================

    - name: "ROUND 1: Destroy"
      ansible.builtin.debug:
        msg: "Destroying {{ ns }}..."

    - name: Run destroy-environment
      ansible.builtin.shell: |
        cd {{ playbook_dir }}/../../deploy/ansible
        venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/destroy-environment.yml \
          -e "env_name={{ env_name }}" \
          -e "infra_dir_override={{ tmp_infra }}" \
          -e "infra_git_url_override={{ infra_git_url }}"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Wait for ArgoCD apps to disappear
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          COUNT=$(kubectl get app -n argocd -o json | \
            jq -r '[.items[] | select(.metadata.name | test("{{ env_name }}"))] | length')
          [ "$COUNT" = "0" ] && echo "GONE" && exit 0
          sleep 10
        done
        echo "TIMEOUT"
        exit 1
      register: destroy_wait
      changed_when: false
      failed_when: "'GONE' not in destroy_wait.stdout"

    - name: Delete namespace
      ansible.builtin.command:
        cmd: kubectl delete namespace {{ ns }} --timeout=120s
      changed_when: true
      failed_when: false

    - name: "ROUND 1 DESTROY: PASSED"
      ansible.builtin.debug:
        msg: "{{ ns }} destroyed"

    # ================================================================
    # Round 2: Recreate (idempotency)
    # ================================================================

    - name: "ROUND 2: Recreate"
      ansible.builtin.debug:
        msg: "Recreating {{ ns }}..."

    - name: Run create-environment (round 2)
      ansible.builtin.shell: |
        cd {{ playbook_dir }}/../../deploy/ansible
        venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/create-environment.yml \
          -e "env_name={{ env_name }}" \
          -e "infra_dir_override={{ tmp_infra }}" \
          -e "infra_git_url_override={{ infra_git_url }}"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Wait for ArgoCD sync (round 2)
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          COUNT=$(kubectl get app -n argocd -o json | \
            jq -r '[.items[] | select(.metadata.name | test("{{ env_name }}")) | select(.status.sync.status != "Synced" or .status.health.status != "Healthy")] | length')
          [ "$COUNT" = "0" ] && FOUND=$(kubectl get app -n argocd -o json | jq -r '[.items[] | select(.metadata.name | test("{{ env_name }}"))] | length') && [ "$FOUND" -gt "0" ] && echo "ALL_HEALTHY" && exit 0
          sleep 10
        done
        echo "TIMEOUT"
        exit 1
      register: sync_wait_2
      changed_when: false
      failed_when: "'ALL_HEALTHY' not in sync_wait_2.stdout"

    - name: "ROUND 2 RECREATE: PASSED"
      ansible.builtin.debug:
        msg: "{{ ns }} recreated — idempotent"

    # ================================================================
    # Final cleanup
    # ================================================================

    - name: Run destroy-environment (final)
      ansible.builtin.shell: |
        cd {{ playbook_dir }}/../../deploy/ansible
        venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/destroy-environment.yml \
          -e "env_name={{ env_name }}" \
          -e "infra_dir_override={{ tmp_infra }}" \
          -e "infra_git_url_override={{ infra_git_url }}"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Delete namespace (final)
      ansible.builtin.command:
        cmd: kubectl delete namespace {{ ns }} --timeout=120s
      changed_when: true
      failed_when: false

    - name: Clean temp infra dir
      ansible.builtin.file:
        path: "{{ tmp_infra }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: "TEST PASSED"
      ansible.builtin.debug:
        msg: |
          Ephemeral environment lifecycle test PASSED.
          - Create: OK
          - Destroy: OK
          - Recreate: OK (idempotent)
          - Final destroy: OK
