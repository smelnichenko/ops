---
# Failure Mode Tests
#
# Tests system resilience under load by injecting failures.
# Requires: deployed app in Vagrant with k6 installed on host.
#
# Usage:
#   task test:failure-modes
#
# Suite 1: Pod failure recovery under load
# Suite 2: Connection pool exhaustion
# Suite 3: Kafka outage isolation
# Suite 4: Memory pressure
# Suite 5: Rate limiting under load

- name: Failure Mode Tests
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    app_url: http://localhost
    kc_admin_password: "vagrant-test-kc-admin!!"
    test_email: fm-test@test.com
    test_password: fm-test-pass-12345
    k6_duration: "90s"
    k6_vus: 10

  tasks:
    # ================================================================
    # Prerequisites: Deploy the app
    # ================================================================

    - name: Verify k3s is running
      ansible.builtin.command: kubectl get nodes
      changed_when: false

    - name: Deploy app
      ansible.builtin.include_tasks: tasks/deploy-app.yml

    - name: Create test user and get token
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml

    - name: Verify authenticated access
      ansible.builtin.uri:
        url: "{{ app_url }}/api/monitor/pages"
        headers:
          Authorization: "Bearer {{ auth_token }}"
      register: auth_check
      failed_when: auth_check.status != 200

    - name: Install k6 in Vagrant VM
      ansible.builtin.shell: |
        which k6 && exit 0
        apt-get update -qq && apt-get install -y -qq gpg
        curl -sS https://dl.k6.io/key.gpg | gpg --dearmor -o /usr/share/keyrings/k6-archive.gpg
        echo "deb [signed-by=/usr/share/keyrings/k6-archive.gpg] https://dl.k6.io/deb stable main" > /etc/apt/sources.list.d/k6.list
        apt-get update -qq && apt-get install -y -qq k6
      changed_when: true

    - name: Write k6 load script
      ansible.builtin.copy:
        dest: /tmp/k6-failure-test.js
        mode: '0644'
        content: |
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          export const options = {
            vus: parseInt(__ENV.K6_VUS || '10'),
            duration: __ENV.K6_DURATION || '90s',
            thresholds: {
              http_req_failed: [{ threshold: `rate<${__ENV.K6_MAX_ERROR_RATE || '0.05'}`, abortOnFail: false }],
            },
          };

          const BASE_URL = __ENV.BASE_URL || 'http://localhost';
          const TOKEN = __ENV.AUTH_TOKEN || '';

          export default function () {
            const auth = TOKEN ? { headers: { Authorization: `Bearer ${TOKEN}` } } : {};

            const health = http.get(`${BASE_URL}/api/health`);
            check(health, { 'health 200': (r) => r.status === 200 });

            const pages = http.get(`${BASE_URL}/api/monitor/pages`, auth);
            check(pages, { 'pages ok': (r) => r.status === 200 || r.status === 401 });

            const rss = http.get(`${BASE_URL}/api/rss/feeds`, auth);
            check(rss, { 'rss ok': (r) => r.status === 200 || r.status === 401 });

            sleep(Math.random() + 0.5);
          }

    # ================================================================
    # Suite 1: Pod Failure Recovery Under Load
    # ================================================================

    - name: "=== Suite 1: Pod Failure Recovery ==="
      ansible.builtin.debug:
        msg: "Kill app pod during k6 load, verify recovery"

    - name: "S1: Start k6 load test in background"
      ansible.builtin.shell: |
        K6_VUS={{ k6_vus }} K6_DURATION={{ k6_duration }} K6_MAX_ERROR_RATE=0.15 \
        BASE_URL={{ app_url }} AUTH_TOKEN={{ auth_token }} \
        k6 run /tmp/k6-failure-test.js > /tmp/k6-s1.log 2>&1 &
        echo $!
      register: k6_pid_s1

    - name: "S1: Wait 15s for load to stabilize"
      ansible.builtin.pause:
        seconds: 15

    - name: "S1: Kill app pod"
      ansible.builtin.shell: |
        kubectl delete pod -l app.kubernetes.io/component=app -n {{ ns }} --grace-period=0 --force

    - name: "S1: Wait for new pod to be ready"
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=app -n {{ ns }} --timeout=120s
      register: pod_recovery
      retries: 3
      delay: 5
      until: pod_recovery.rc == 0

    - name: "S1: Wait for k6 to finish"
      ansible.builtin.shell: |
        tail --pid={{ k6_pid_s1.stdout | trim }} -f /dev/null 2>/dev/null
        cat /tmp/k6-s1.log
      register: k6_result_s1

    - name: "S1: Verify k6 completed"
      ansible.builtin.shell: |
        grep -cE "checks|http_reqs" /tmp/k6-s1.log
      register: s1_checks
      failed_when: s1_checks.stdout | int == 0

    - name: "S1: Verify app recovered"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/health"
      register: s1_health
      retries: 10
      delay: 3
      until: s1_health.status == 200

    - name: "=== Suite 1 Complete ==="
      ansible.builtin.debug:
        msg: "Pod recovered. k6 checks passed."

    # ================================================================
    # Suite 2: Connection Pool Exhaustion
    # ================================================================

    - name: "=== Suite 2: Connection Pool Exhaustion ==="
      ansible.builtin.debug:
        msg: "Reduce HikariCP pool to 3, run 10 VUs, verify no timeouts"

    - name: "S2: Patch app deployment with small pool"
      ansible.builtin.shell: |
        kubectl set env deployment/schnappy-monitor -n {{ ns }} \
          SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=3

    - name: "S2: Wait for rollout"
      ansible.builtin.shell: |
        kubectl rollout status deployment/schnappy-monitor -n {{ ns }} --timeout=120s

    - name: "S2: Wait for app healthy"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/health"
      register: s2_health
      retries: 30
      delay: 5
      until: s2_health.status == 200

    - name: "S2: Refresh auth token"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml

    - name: "S2: Run k6 with constrained pool"
      ansible.builtin.shell: |
        K6_VUS={{ k6_vus }} K6_DURATION=60s K6_MAX_ERROR_RATE=0.02 \
        BASE_URL={{ app_url }} AUTH_TOKEN={{ auth_token }} \
        k6 run /tmp/k6-failure-test.js > /tmp/k6-s2.log 2>&1
      register: k6_s2
      failed_when: false

    - name: "S2: Check k6 results"
      ansible.builtin.shell: |
        grep "http_req_failed" /tmp/k6-s2.log | tail -1
      register: s2_error_rate

    - name: "S2: Display results"
      ansible.builtin.debug:
        msg: "Pool=3, VUs={{ k6_vus }}: {{ s2_error_rate.stdout }}"

    - name: "S2: Restore pool size"
      ansible.builtin.shell: |
        kubectl set env deployment/schnappy-monitor -n {{ ns }} \
          SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE-

    - name: "S2: Wait for rollout"
      ansible.builtin.shell: |
        kubectl rollout status deployment/schnappy-monitor -n {{ ns }} --timeout=120s

    - name: "=== Suite 2 Complete ==="
      ansible.builtin.debug:
        msg: "Connection pool test done."

    # ================================================================
    # Suite 3: Kafka Outage Isolation (requires -e deploy_kafka=true)
    # ================================================================

    - name: "Suite 3: Kafka Outage Isolation"
      when: deploy_kafka | default(false) | bool
      block:
        - name: "=== Suite 3: Kafka Outage Isolation ==="
          ansible.builtin.debug:
            msg: "Scale Kafka to 0 during load, verify non-chat endpoints stay healthy"

        - name: "S3: Refresh auth token"
          ansible.builtin.include_tasks: tasks/keycloak-auth.yml

        - name: "S3: Start k6 in background"
          ansible.builtin.shell: |
            K6_VUS=5 K6_DURATION={{ k6_duration }} K6_MAX_ERROR_RATE=0.10 \
            BASE_URL={{ app_url }} AUTH_TOKEN={{ auth_token }} \
            k6 run /tmp/k6-failure-test.js > /tmp/k6-s3.log 2>&1 &
            echo $!
          register: k6_pid_s3

        - name: "S3: Wait 10s then kill Kafka"
          ansible.builtin.pause:
            seconds: 10

        - name: "S3: Scale Kafka to 0"
          ansible.builtin.shell: |
            kubectl scale statefulset schnappy-kafka -n {{ ns }} --replicas=0

        - name: "S3: Verify health endpoint still responds (Kafka down)"
          ansible.builtin.uri:
            url: "{{ app_url }}/api/health"
          register: s3_kafka_down_health
          retries: 5
          delay: 3
          until: s3_kafka_down_health.status == 200

        - name: "S3: Verify monitors endpoint still responds (Kafka down)"
          ansible.builtin.uri:
            url: "{{ app_url }}/api/monitor/pages"
            headers:
              Authorization: "Bearer {{ auth_token }}"
          register: s3_monitors
          retries: 5
          delay: 3
          until: s3_monitors.status == 200

        - name: "S3: Wait 30s with Kafka down"
          ansible.builtin.pause:
            seconds: 30

        - name: "S3: Restore Kafka"
          ansible.builtin.shell: |
            kubectl scale statefulset schnappy-kafka -n {{ ns }} --replicas=1

        - name: "S3: Wait for Kafka ready"
          ansible.builtin.shell: |
            kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=kafka -n {{ ns }} --timeout=180s
          retries: 3
          delay: 10
          until: true

        - name: "S3: Wait for k6 to finish"
          ansible.builtin.shell: |
            tail --pid={{ k6_pid_s3.stdout | trim }} -f /dev/null 2>/dev/null
            cat /tmp/k6-s3.log
          register: k6_result_s3

        - name: "=== Suite 3 Complete ==="
          ansible.builtin.debug:
            msg: "Non-chat endpoints stayed healthy during Kafka outage."

    - name: "Suite 3 skipped (no Kafka)"
      ansible.builtin.debug:
        msg: "Skipped — run with -e deploy_kafka=true for Kafka outage test"
      when: not (deploy_kafka | default(false) | bool)

    # ================================================================
    # Suite 4: Memory Pressure
    # ================================================================

    - name: "=== Suite 4: Memory Pressure ==="
      ansible.builtin.debug:
        msg: "Set heap to 256m, run load, verify no OOMKilled"

    - name: "S4: Patch app with small heap"
      ansible.builtin.shell: |
        kubectl set env deployment/schnappy-monitor -n {{ ns }} \
          JAVA_OPTS="-Xmx256m -XX:+UseZGC"

    - name: "S4: Wait for rollout"
      ansible.builtin.shell: |
        kubectl rollout status deployment/schnappy-monitor -n {{ ns }} --timeout=120s

    - name: "S4: Wait for app healthy"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/health"
      register: s4_health
      retries: 30
      delay: 5
      until: s4_health.status == 200

    - name: "S4: Refresh auth token"
      ansible.builtin.include_tasks: tasks/keycloak-auth.yml

    - name: "S4: Run k6 under memory pressure"
      ansible.builtin.shell: |
        K6_VUS=5 K6_DURATION=60s K6_MAX_ERROR_RATE=0.10 \
        BASE_URL={{ app_url }} AUTH_TOKEN={{ auth_token }} \
        k6 run /tmp/k6-failure-test.js > /tmp/k6-s4.log 2>&1
      register: k6_s4
      failed_when: false

    - name: "S4: Check pod not OOMKilled"
      ansible.builtin.shell: |
        kubectl get pod -l app.kubernetes.io/component=app -n {{ ns }} \
          -o jsonpath='{.items[0].status.containerStatuses[0].lastState.terminated.reason}'
      register: s4_oom
      failed_when: "'OOMKilled' in s4_oom.stdout"

    - name: "S4: Restore heap"
      ansible.builtin.shell: |
        kubectl set env deployment/schnappy-monitor -n {{ ns }} \
          JAVA_OPTS="-Xmx1536m -XX:+UseZGC"

    - name: "S4: Wait for rollout"
      ansible.builtin.shell: |
        kubectl rollout status deployment/schnappy-monitor -n {{ ns }} --timeout=120s

    - name: "=== Suite 4 Complete ==="
      ansible.builtin.debug:
        msg: "App survived memory pressure without OOMKill."

    # ================================================================
    # Suite 5: Rate Limiting Under Load
    # ================================================================

    - name: "=== Suite 5: Rate Limiting ==="
      ansible.builtin.debug:
        msg: "Run 20 VUs from single IP, verify 429 responses"

    - name: "S5: Wait for app healthy"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/health"
      register: s5_health
      retries: 30
      delay: 5
      until: s5_health.status == 200

    - name: "S5: Write rate limit test script"
      ansible.builtin.copy:
        dest: /tmp/k6-ratelimit.js
        mode: '0644'
        content: |
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Counter } from 'k6/metrics';

          const rateLimited = new Counter('rate_limited');

          export const options = {
            vus: 20,
            duration: '30s',
          };

          const BASE_URL = __ENV.BASE_URL || 'http://localhost';

          export default function () {
            const r = http.get(`${BASE_URL}/api/health`);
            if (r.status === 429) {
              rateLimited.add(1);
            }
            check(r, { 'not 500': (r) => r.status !== 500 });
            // No sleep — hammer the endpoint to trigger rate limiter
          }

    - name: "S5: Run rate limit test"
      ansible.builtin.shell: |
        BASE_URL={{ app_url }} k6 run /tmp/k6-ratelimit.js > /tmp/k6-s5.log 2>&1
      register: k6_s5
      failed_when: false

    - name: "S5: Check 429 responses were generated"
      ansible.builtin.shell: |
        grep "rate_limited" /tmp/k6-s5.log | tail -1
      register: s5_rate_limited

    - name: "S5: Verify rate limiting worked"
      ansible.builtin.debug:
        msg: "Rate limited responses: {{ s5_rate_limited.stdout }}"

    - name: "S5: Verify app still healthy after rate limiting"
      ansible.builtin.uri:
        url: "{{ app_url }}/api/health"
      register: s5_post_health
      retries: 10
      delay: 3
      until: s5_post_health.status == 200

    - name: "=== Suite 5 Complete ==="
      ansible.builtin.debug:
        msg: "Rate limiting functional. App healthy after test."

    # ================================================================
    # Final Summary
    # ================================================================

    - name: "=== All Failure Mode Suites Complete ==="
      ansible.builtin.debug:
        msg: |
          Suite 1: Pod failure recovery ✓
          Suite 2: Connection pool exhaustion ✓
          Suite 3: Kafka outage isolation ✓
          Suite 4: Memory pressure ✓
          Suite 5: Rate limiting ✓
