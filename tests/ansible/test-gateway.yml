---
# Test Istio Gateway + HTTPRoute integration in Vagrant.
#
# Deploys two tiny nginx backends in a dedicated namespace, attaches each
# to the shared `vagrant-gateway` Gateway (from tasks/setup-istio-gateway.yml)
# with distinct hostnames + path rules, then verifies:
#   1. Gateway resource is Programmed
#   2. Hostname-based routing (two hostnames → two backends)
#   3. Path-based routing (/b vs / within one hostname)
#   4. ResponseHeaderModifier filter pass-through
#   5. HTTP methods (GET/POST/PUT/DELETE) reach the backend
#   6. Unknown hostname → 404 from the gateway
#
# Replaces the retired Spring Cloud Gateway service test (that Java
# service no longer exists in the platform chart). The current
# "API gateway" layer is Istio Gateway API + HTTPRoute — exactly what
# this test exercises.
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml \
#     ../../tests/ansible/test-gateway.yml

- name: Test Istio Gateway + HTTPRoute routing
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: gateway-test
    host_a: "app-a.vagrant.test"
    host_b: "app-b.vagrant.test"
    host_unknown: "not-attached.vagrant.test"

  tasks:
    - ansible.builtin.import_tasks: tasks/setup-istio-gateway.yml

    - name: Base URL fact
      ansible.builtin.set_fact:
        gateway_base: "http://{{ node_ip }}:{{ istio_gateway_nodeport }}"

    # ── Setup: namespace + two backends ────────────────────────────────
    - name: Create {{ ns }} namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    - name: Deploy backend A ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata: { name: backend-a-content, namespace: "{{ ns }}" }
          data:
            index.html: "backend-a"
            a.html: "path-a-on-host-a"

    - name: Deploy backend A Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata: { name: backend-a, namespace: "{{ ns }}" }
          spec:
            replicas: 1
            selector: { matchLabels: { app: backend-a } }
            template:
              metadata: { labels: { app: backend-a } }
              spec:
                containers:
                  - name: nginx
                    image: nginx:1.29-alpine
                    ports: [{ containerPort: 80 }]
                    volumeMounts:
                      - { name: content, mountPath: /usr/share/nginx/html }
                volumes:
                  - name: content
                    configMap: { name: backend-a-content }

    - name: Deploy backend A Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata: { name: backend-a, namespace: "{{ ns }}" }
          spec:
            selector: { app: backend-a }
            ports: [{ port: 80, targetPort: 80 }]

    - name: Deploy backend B ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata: { name: backend-b-content, namespace: "{{ ns }}" }
          data:
            index.html: "backend-b"

    - name: Deploy backend B Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata: { name: backend-b, namespace: "{{ ns }}" }
          spec:
            replicas: 1
            selector: { matchLabels: { app: backend-b } }
            template:
              metadata: { labels: { app: backend-b } }
              spec:
                containers:
                  - name: nginx
                    image: nginx:1.29-alpine
                    ports: [{ containerPort: 80 }]
                    volumeMounts:
                      - { name: content, mountPath: /usr/share/nginx/html }
                volumes:
                  - name: content
                    configMap: { name: backend-b-content }

    - name: Deploy backend B Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata: { name: backend-b, namespace: "{{ ns }}" }
          spec:
            selector: { app: backend-b }
            ports: [{ port: 80, targetPort: 80 }]

    - name: Wait for backend-a rollout
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: apps/v1
        kind: Deployment
        name: "backend-a"
        namespace: "{{ ns }}"
      register: _rollout
      retries: 24
      delay: 5
      until:
        - (_rollout.resources | default([]) | length) > 0
        - _rollout.resources[0].status.readyReplicas | default(0) == _rollout.resources[0].spec.replicas | default(1) and _rollout.resources[0].status.updatedReplicas | default(0) == _rollout.resources[0].spec.replicas | default(1)

    - name: Wait for backend-b rollout
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: apps/v1
        kind: Deployment
        name: "backend-b"
        namespace: "{{ ns }}"
      register: _rollout
      retries: 24
      delay: 5
      until:
        - (_rollout.resources | default([]) | length) > 0
        - _rollout.resources[0].status.readyReplicas | default(0) == _rollout.resources[0].spec.replicas | default(1) and _rollout.resources[0].status.updatedReplicas | default(0) == _rollout.resources[0].spec.replicas | default(1)

    # ── HTTPRoutes: hostname + path-based ─────────────────────────────
    - name: HTTPRoute for host-a (path-based fan-out)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata: { name: host-a, namespace: "{{ ns }}" }
          spec:
            parentRefs:
              - name: "{{ istio_gateway_name }}"
                namespace: "{{ istio_gateway_ns }}"
            hostnames: ["{{ host_a }}"]
            rules:
              - matches: [{ path: { type: PathPrefix, value: /b } }]
                backendRefs: [{ name: backend-b, port: 80 }]
              - matches: [{ path: { type: PathPrefix, value: / } }]
                backendRefs: [{ name: backend-a, port: 80 }]

    - name: HTTPRoute for host-b (ResponseHeaderModifier filter)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata: { name: host-b, namespace: "{{ ns }}" }
          spec:
            parentRefs:
              - name: "{{ istio_gateway_name }}"
                namespace: "{{ istio_gateway_ns }}"
            hostnames: ["{{ host_b }}"]
            rules:
              - filters:
                  - type: ResponseHeaderModifier
                    responseHeaderModifier:
                      add:
                        - { name: X-Gateway-Test, value: "vagrant-ok" }
                backendRefs: [{ name: backend-b, port: 80 }]

    - name: /etc/hosts entries for test hostnames
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "\\s{{ item }}(\\s|$)"
        line: "{{ node_ip }} {{ item }}"
        state: present
      loop:
        - "{{ host_a }}"
        - "{{ host_b }}"
        - "{{ host_unknown }}"

    - name: Wait for HTTPRoutes to be Accepted
      ansible.builtin.shell: |
        for route in host-a host-b; do
          kubectl wait --for=jsonpath='{.status.parents[0].conditions[?(@.type=="Accepted")].status}'=True \
            httproute/$route -n {{ ns }} --timeout=60s
        done
      changed_when: false

    # ── Assertions ─────────────────────────────────────────────────────
    - name: "1. Gateway vagrant-gateway is Programmed"
      ansible.builtin.shell: |
        kubectl get gateway {{ istio_gateway_name }} -n {{ istio_gateway_ns }} \
          -o jsonpath='{.status.conditions[?(@.type=="Programmed")].status}'
      register: _gw_programmed
      changed_when: false
      failed_when: _gw_programmed.stdout != "True"

    - name: "2a. host-a / → backend-a"
      ansible.builtin.uri:
        url: "{{ gateway_base }}/"
        headers: { Host: "{{ host_a }}" }
        return_content: true
      register: _r_a_root
      retries: 6
      delay: 5
      until: _r_a_root.status == 200
      failed_when: "'backend-a' not in _r_a_root.content"

    - name: "2b. host-b / → backend-b"
      ansible.builtin.uri:
        url: "{{ gateway_base }}/"
        headers: { Host: "{{ host_b }}" }
        return_content: true
      register: _r_b_root
      failed_when: "'backend-b' not in _r_b_root.content"

    - name: "3a. host-a /b/ → backend-b (path fan-out)"
      ansible.builtin.uri:
        url: "{{ gateway_base }}/b/"
        headers: { Host: "{{ host_a }}" }
        return_content: true
      register: _r_a_b
      failed_when: "'backend-b' not in _r_a_b.content"

    - name: "3b. host-a /a.html → backend-a (default match)"
      ansible.builtin.uri:
        url: "{{ gateway_base }}/a.html"
        headers: { Host: "{{ host_a }}" }
        return_content: true
      register: _r_a_a
      failed_when: "'path-a-on-host-a' not in _r_a_a.content"

    - name: "4. ResponseHeaderModifier injects X-Gateway-Test on host-b"
      ansible.builtin.uri:
        url: "{{ gateway_base }}/"
        headers: { Host: "{{ host_b }}" }
        return_content: false
      register: _r_b_hdr
      failed_when: _r_b_hdr.x_gateway_test | default('') != 'vagrant-ok'

    - name: "5. Unknown hostname → 404 from gateway"
      ansible.builtin.uri:
        url: "{{ gateway_base }}/"
        headers: { Host: "{{ host_unknown }}" }
        status_code: [404]
        return_content: false
      register: _r_unk
      failed_when: _r_unk.status != 404

    - name: "6. HTTP methods (GET/POST/PUT/DELETE) reach the backend"
      ansible.builtin.shell: |
        set -e
        for method in GET POST PUT DELETE; do
          code=$(curl -sk -o /dev/null -w '%{http_code}' \
            -H "Host: {{ host_a }}" \
            -X $method \
            "{{ gateway_base }}/")
          # nginx static content returns 200 for GET, 405 for write methods
          # — both prove the request traversed the gateway and reached nginx.
          case "$code" in
            200|405) echo "$method -> $code OK" ;;
            *) echo "FAIL $method -> $code"; exit 1 ;;
          esac
        done
      changed_when: false

    # ── Cleanup ────────────────────────────────────────────────────────
    - name: Delete gateway-test namespace
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
        wait: true
      changed_when: false
      failed_when: false

    - name: TEST PASSED
      ansible.builtin.debug:
        msg: |
          ====================================================
          Istio Gateway + HTTPRoute test — PASSED
          ====================================================
          ✓ vagrant-gateway is Programmed
          ✓ Hostname-based routing
          ✓ Path-based routing within a hostname
          ✓ Default-path match fallback
          ✓ ResponseHeaderModifier filter pass-through
          ✓ Unknown hostname → 404
          ✓ GET/POST/PUT/DELETE reach backend
          ====================================================
