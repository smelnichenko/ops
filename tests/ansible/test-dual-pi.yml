---
# Test dual-Pi HA infrastructure
#
# Deploys and tests the full Pi HA stack in Vagrant:
#   1. Consul 3-node cluster
#   2. Patroni Postgres HA
#   3. Pi services (Forgejo, MinIO, Keycloak, Nexus)
#   4. GlusterFS repo replication
#   5. Keepalived VIP failover
#   6. Vault with Consul storage
#   7. Pi-1 failure + recovery
#
# Usage:
#   task test:dual-pi

# ─── Deploy all Pi services ─────────────────────────────────────────────────
- name: Deploy Consul
  ansible.builtin.import_playbook: "{{ playbook_dir }}/../../deploy/ansible/playbooks/setup-consul.yml"

- name: Deploy Pi services
  ansible.builtin.import_playbook: "{{ playbook_dir }}/../../deploy/ansible/playbooks/setup-pi-services.yml"

- name: Deploy Patroni
  ansible.builtin.import_playbook: "{{ playbook_dir }}/../../deploy/ansible/playbooks/setup-patroni.yml"

- name: Deploy GlusterFS
  ansible.builtin.import_playbook: "{{ playbook_dir }}/../../deploy/ansible/playbooks/setup-gluster.yml"

- name: Deploy Keepalived
  ansible.builtin.import_playbook: "{{ playbook_dir }}/../../deploy/ansible/playbooks/setup-keepalived.yml"

- name: Deploy Vault (Consul storage)
  ansible.builtin.import_playbook: "{{ playbook_dir }}/../../deploy/ansible/playbooks/migrate-vault-consul.yml"

# ─── Verify services ────────────────────────────────────────────────────────
- name: Verify all services
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Check all services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - forgejo
        - keycloak
        - minio
        - patroni
        - consul
        - vault
        - keepalived
        - glusterd

    - name: Verify Forgejo API
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200

    - name: Verify Keycloak
      ansible.builtin.uri:
        url: "http://localhost:8080/realms/master"
        status_code: 200

    - name: Verify MinIO health
      ansible.builtin.uri:
        url: "http://localhost:9000/minio/health/live"
        status_code: 200

    - name: Verify Patroni
      ansible.builtin.uri:
        url: "http://localhost:8008/health"
        status_code: 200

# ─── Test Consul cluster ────────────────────────────────────────────────────
- name: Test Consul cluster
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Check cluster members
      ansible.builtin.shell: |
        set -o pipefail
        consul members | grep -c alive
      register: consul_count
      changed_when: false

    - name: Verify at least 2 members
      ansible.builtin.assert:
        that: consul_count.stdout | trim | int >= 2
        fail_msg: "Expected at least 2 Consul members, got {{ consul_count.stdout }}"

# ─── Test Patroni replication ───────────────────────────────────────────────
- name: Test Patroni replication
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Write test data on primary
      ansible.builtin.shell: |
        sudo -u postgres psql -d forgejo -c "CREATE TABLE IF NOT EXISTS test_ha (id serial, val text)"
        sudo -u postgres psql -d forgejo -c "INSERT INTO test_ha (val) VALUES ('pi1-write')"
      changed_when: true

    - name: Verify replication on pi2
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -h {{ hostvars['pi2']['ansible_host'] }} -d forgejo -c "SELECT val FROM test_ha WHERE val='pi1-write'" | grep -c pi1-write
      register: repl_check
      changed_when: false
      retries: 5
      delay: 2
      until: repl_check.stdout | trim | int >= 1

# ─── Test GlusterFS replication ─────────────────────────────────────────────
- name: Test GlusterFS replication
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Create test file on pi1
      ansible.builtin.copy:
        dest: /var/lib/forgejo/repos/test-gluster.txt
        content: "gluster-test-{{ ansible_date_time.epoch | default('now') }}"
        mode: '0644'

    - name: Verify file replicated to pi2
      ansible.builtin.shell: |
        cat /var/lib/forgejo/repos/test-gluster.txt
      register: gluster_check
      changed_when: false
      delegate_to: pi2
      retries: 3
      delay: 2
      until: "'gluster-test' in gluster_check.stdout"

    - name: Clean up
      ansible.builtin.file:
        path: /var/lib/forgejo/repos/test-gluster.txt
        state: absent

# ─── Test Keepalived VIP ────────────────────────────────────────────────────
- name: Test Keepalived VIP
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    vip: "{{ lookup('env', 'VAGRANT_VIP') | default('192.168.56.50', true) }}"

  tasks:
    - name: Verify VIP is assigned
      ansible.builtin.shell: |
        set -o pipefail
        ip addr show | grep {{ vip }}
      register: vip_check
      changed_when: false
      failed_when: vip not in vip_check.stdout

    - name: Verify Forgejo via VIP
      ansible.builtin.uri:
        url: "http://{{ vip }}:3000/api/v1/version"
        status_code: 200

# ─── Test Pi-1 failure ──────────────────────────────────────────────────────
- name: Simulate Pi-1 failure
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Stop all services on pi1
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - forgejo
        - keycloak
        - minio
        - keepalived
        - patroni

- name: Verify Pi-2 takes over
  hosts: pi2
  become: true
  gather_facts: false

  vars:
    vip: "{{ lookup('env', 'VAGRANT_VIP') | default('192.168.56.50', true) }}"

  tasks:
    - name: Wait for VIP failover
      ansible.builtin.shell: |
        set -o pipefail
        ip addr show | grep {{ vip }}
      register: vip_failover
      changed_when: false
      retries: 12
      delay: 5
      until: vip in vip_failover.stdout

    - name: Verify Forgejo on pi2
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200

    - name: Verify Patroni promoted pi2
      ansible.builtin.uri:
        url: "http://localhost:8008/health"
        status_code: 200
      retries: 12
      delay: 5

    - name: Write data while pi1 is down
      ansible.builtin.shell: |
        sudo -u postgres psql -d forgejo -c "INSERT INTO test_ha (val) VALUES ('pi2-during-failover')"
      changed_when: true

# ─── Recover Pi-1 ───────────────────────────────────────────────────────────
- name: Recover Pi-1
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Start services on pi1
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - patroni
        - keepalived
        - forgejo
        - keycloak
        - minio

    - name: Wait for Patroni to rejoin
      ansible.builtin.uri:
        url: "http://localhost:8008/health"
        status_code: 200
      retries: 30
      delay: 5

    - name: Verify pi1 caught up with failover data
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -d forgejo -c "SELECT val FROM test_ha WHERE val='pi2-during-failover'" | grep -c pi2-during-failover
      register: catchup_check
      changed_when: false
      retries: 10
      delay: 3
      until: catchup_check.stdout | trim | int >= 1

# ─── Results ────────────────────────────────────────────────────────────────
- name: Test results
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Clean up test data
      ansible.builtin.shell: |
        sudo -u postgres psql -d forgejo -c "DROP TABLE IF EXISTS test_ha"
      changed_when: true

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Dual-Pi HA Test — PASSED
          ============================================
          - Consul cluster: OK
          - Patroni replication: OK
          - GlusterFS replication: OK
          - Keepalived VIP: OK
          - Pi-1 failure + Pi-2 takeover: OK
          - Pi-1 recovery + data catch-up: OK
          ============================================
