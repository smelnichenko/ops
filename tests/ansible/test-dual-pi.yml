---
# Dual-Pi HA assertions.
#
# Assumes the full Pi stack is already deployed:
#   setup-consul.yml + setup-pi-services.yml + setup-patroni.yml +
#   setup-vault-pi.yml + setup-gluster.yml + setup-keepalived.yml
#
# This playbook is pure verification — no deploys, no migrations.
# It exercises the HA scenario (Pi-1 failure + Pi-2 takeover + recovery).
#
# Usage:
#   task test:dual-pi         # no destroy, assumes stack is up
#   task test:dual-pi-clean   # full destroy + deploy + this playbook

# ─── Services are running ────────────────────────────────────────────────────
- name: All expected services active on both Pis
  hosts: pis
  become: true
  gather_facts: false

  tasks:
    - name: Check systemd units are active
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - consul
        - patroni
        - forgejo
        - keycloak
        - minio
        - keepalived
        - glusterd
        - haproxy
        - vault
        - vault-unseal

    - name: Patroni REST API healthy
      ansible.builtin.uri:
        url: "http://localhost:8008/health"
        status_code: [200, 503]  # 503 = replica, still healthy
      retries: 10
      delay: 5

    - name: Forgejo API
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200

    - name: Keycloak master realm
      ansible.builtin.uri:
        url: "http://localhost:8080/realms/master"
        status_code: 200

    - name: MinIO liveness
      ansible.builtin.uri:
        url: "http://localhost:9000/minio/health/live"
        status_code: 200

# ─── Consul cluster ──────────────────────────────────────────────────────────
- name: Consul cluster has ≥ 2 alive members
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Count alive Consul members
      ansible.builtin.shell: |
        set -o pipefail
        consul members | grep -c alive
      register: _count
      changed_when: false

    - name: Assert ≥ 2 alive
      ansible.builtin.assert:
        that: _count.stdout | trim | int >= 2
        fail_msg: "Expected ≥ 2 Consul members, got {{ _count.stdout }}"

# ─── Patroni replication ─────────────────────────────────────────────────────
# Write to the leader, read from the follower over its local socket (avoids
# pg_hba scram prompt that blocks remote psql).
- name: Discover Patroni leader
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Fetch leader from Patroni cluster API
      ansible.builtin.shell: |
        curl -sf http://localhost:8008/cluster 2>/dev/null | \
          python3 -c 'import sys,json; d=json.load(sys.stdin); print(next((m["name"] for m in d.get("members",[]) if m.get("role") in ["leader","master","primary"]), ""))'
      register: _leader
      changed_when: false
      run_once: true

    - name: Set patroni_leader fact
      ansible.builtin.set_fact:
        patroni_leader: "{{ _leader.stdout | trim }}"
      run_once: true

- name: Write on leader
  hosts: "{{ hostvars['pi1']['patroni_leader'] }}"
  become: true
  gather_facts: false

  tasks:
    - name: CREATE TABLE + INSERT
      ansible.builtin.shell: |
        sudo -u postgres psql -d forgejo -c "CREATE TABLE IF NOT EXISTS test_ha (id serial, val text)"
        sudo -u postgres psql -d forgejo -c "INSERT INTO test_ha (val) VALUES ('leader-write')"
      changed_when: true

- name: Read on follower
  hosts: "{{ ['pi1','pi2'] | difference([hostvars['pi1']['patroni_leader']]) | first }}"
  become: true
  gather_facts: false

  tasks:
    - name: Verify row replicated
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -d forgejo -c "SELECT val FROM test_ha WHERE val='leader-write'" | grep -c leader-write
      register: _repl
      changed_when: false
      retries: 5
      delay: 2
      until: _repl.stdout | trim | int >= 1

# ─── GlusterFS replication ───────────────────────────────────────────────────
- name: Gluster replication pi1 → pi2
  hosts: pi1
  become: true
  gather_facts: true

  tasks:
    - name: Write test file to gluster-mounted dir
      ansible.builtin.copy:
        dest: /var/lib/forgejo/repos/test-gluster.txt
        content: "gluster-test-{{ ansible_date_time.epoch }}"
        mode: '0644'

    - name: Verify file on pi2
      ansible.builtin.shell: |
        cat /var/lib/forgejo/repos/test-gluster.txt
      register: _g
      changed_when: false
      delegate_to: pi2
      retries: 3
      delay: 2
      until: "'gluster-test' in _g.stdout"

    - name: Clean up
      ansible.builtin.file:
        path: /var/lib/forgejo/repos/test-gluster.txt
        state: absent

# ─── Keepalived VIP ──────────────────────────────────────────────────────────
- name: VIP present + Forgejo reachable via VIP
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    vip: "{{ keepalived_vip | default(lookup('env', 'VAGRANT_VIP') | default('192.168.56.50', true)) }}"

  tasks:
    - name: VIP bound on pi1
      ansible.builtin.shell: |
        set -o pipefail
        ip addr show | grep {{ vip }}
      register: _vip
      changed_when: false
      failed_when: vip not in _vip.stdout

    - name: Forgejo responds via VIP
      ansible.builtin.uri:
        url: "http://{{ vip }}:3000/api/v1/version"
        status_code: 200

# ─── Vault cluster alive ─────────────────────────────────────────────────────
- name: Vault is unsealed on both Pis
  hosts: pis
  become: true
  gather_facts: false

  environment:
    VAULT_ADDR: https://127.0.0.1:8200
    VAULT_SKIP_VERIFY: "1"

  tasks:
    - name: vault status rc must be 0 (unsealed)
      ansible.builtin.command: vault status
      register: _vs
      changed_when: false
      failed_when: _vs.rc != 0

# ─── Pi-1 failure simulation ─────────────────────────────────────────────────
- name: Stop all user services on pi1
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: systemctl stop
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - forgejo
        - keycloak
        - minio
        - keepalived
        - patroni

- name: pi2 takes over
  hosts: pi2
  become: true
  gather_facts: false

  vars:
    vip: "{{ keepalived_vip | default(lookup('env', 'VAGRANT_VIP') | default('192.168.56.50', true)) }}"

  tasks:
    - name: VIP fails over to pi2
      ansible.builtin.shell: |
        set -o pipefail
        ip addr show | grep {{ vip }}
      register: _vip_fo
      changed_when: false
      retries: 12
      delay: 5
      until: vip in _vip_fo.stdout

    - name: Forgejo on pi2 still responds
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200

    - name: Patroni promoted pi2 to leader
      ansible.builtin.uri:
        url: "http://localhost:8008/health"
        status_code: 200
      retries: 12
      delay: 5

    - name: Write while pi1 is down
      ansible.builtin.shell: |
        sudo -u postgres psql -d forgejo -c "INSERT INTO test_ha (val) VALUES ('pi2-during-failover')"
      changed_when: true

# ─── Recovery ────────────────────────────────────────────────────────────────
- name: pi1 recovers
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: systemctl start
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - patroni
        - keepalived
        - forgejo
        - keycloak
        - minio

    - name: Patroni rejoins cluster
      ansible.builtin.uri:
        url: "http://localhost:8008/health"
        status_code: [200, 503]
      retries: 30
      delay: 5

    - name: pi1 caught up on failover writes
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -d forgejo -c "SELECT val FROM test_ha WHERE val='pi2-during-failover'" | grep -c pi2-during-failover
      register: _catchup
      changed_when: false
      retries: 10
      delay: 3
      until: _catchup.stdout | trim | int >= 1

# ─── Cleanup + results ───────────────────────────────────────────────────────
# After the failover scenario, the leader might be pi1 OR pi2 depending on
# re-election. Re-discover the leader so cleanup always runs on the writable
# node via its local socket (avoids HAProxy health-check race timing).
- name: Re-discover Patroni leader (post-failover)
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Fetch current leader from Patroni cluster API
      ansible.builtin.shell: |
        curl -sf http://localhost:8008/cluster 2>/dev/null | \
          python3 -c 'import sys,json; d=json.load(sys.stdin); print(next((m["name"] for m in d.get("members",[]) if m.get("role") in ["leader","master","primary"]), ""))'
      register: _leader2
      changed_when: false
      run_once: true

    - name: Set patroni_leader_final fact
      ansible.builtin.set_fact:
        patroni_leader_final: "{{ _leader2.stdout | trim }}"
      run_once: true

- name: Cleanup + summary
  hosts: "{{ hostvars['pi1']['patroni_leader_final'] }}"
  become: true
  gather_facts: false

  tasks:
    - name: Drop test table on the current leader
      ansible.builtin.shell: |
        sudo -u postgres psql -d forgejo -c "DROP TABLE IF EXISTS test_ha"
      changed_when: true

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Dual-Pi HA — all assertions PASSED
          ============================================
          ✓ Services active on pi1 + pi2
          ✓ Consul ≥ 2 members
          ✓ Patroni replication (leader → follower)
          ✓ GlusterFS replication
          ✓ Keepalived VIP + Forgejo-via-VIP
          ✓ Vault unsealed on both
          ✓ Pi-1 failure + Pi-2 takeover
          ✓ Pi-1 recovery + data catch-up
          ============================================
