---
# Test Grafana deployment in Vagrant
#
# Verifies Grafana deploys correctly with Mimir datasource,
# ExternalSecret syncs from Vault, and dashboard is accessible.
#
# Prerequisites:
#   - vagrant up (kubeadm + pi1 + pi2 VMs)
#   - setup-vault-pi.yml completed
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-grafana.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml

- name: Read Pi Vault root token (from pi1)
  hosts: pi1
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_tasks: tasks/fetch-pi-vault-token.yml

- name: Test Grafana integration
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    test_grafana_user: "admin"
    test_grafana_password: "vagrant-test-grafana-password"

  tasks:
    - name: Configure ESO ClusterSecretStore → Pi Vault
      ansible.builtin.import_tasks: tasks/setup-eso-vault-backend.yml

    - name: Seed grafana secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/grafana
        secret_data:
          admin_user: "{{ test_grafana_user }}"
          admin_password: "{{ test_grafana_password }}"

    # ================================================================
    # Phase 2: Deploy chart with Grafana + Prometheus enabled
    # ================================================================

    - name: Ensure schnappy namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    - name: Write Helm values for Grafana test
      ansible.builtin.copy:
        dest: /tmp/schnappy-grafana-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
          networkPolicies:
            enabled: false
          frontend:
            enabled: false
          site:
            enabled: false
          aptCache:
            enabled: false
          app:
            replicas: 0
          redis:
            enabled: false
          postgres:
            enabled: false
          elk:
            enabled: false
          ai:
            enabled: false
          mail:
            enabled: false
          webhook:
            enabled: false
          minio:
            enabled: false
          prometheus:
            enabled: true
            scrapeInterval: 30s
            # Skip cross-namespace NetworkPolicies — argocd/velero/external-secrets
            # namespaces aren't present in the test-grafana scope.
            crossNsScrapePolicies: false
          mimir:
            enabled: true
            image: grafana/mimir:2.16.0
            retention: 1d
            minioSecret: schnappy-minio
            storage: 1Gi
            storageClassName: local-path
            resources:
              requests: { memory: "256Mi", cpu: "100m" }
              limits: { memory: "1Gi", cpu: "500m" }
          grafana:
            enabled: true
            image: grafana/grafana:12.4.0
            existingSecret: "schnappy-grafana"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            storage:
              size: 1Gi
              storageClass: "local-path"
            service:
              type: ClusterIP
              port: 3000
            ingress:
              enabled: false

    - name: Deploy schnappy-mesh (ServiceAccounts for mesh-dependent pods)
      ansible.builtin.import_tasks: tasks/deploy-schnappy-mesh.yml

    - name: Deploy chart with Grafana + Prometheus (no wait — k8s_info below handles readiness)
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy
        chart_ref: /vagrant-platform/helm/schnappy-observability
        release_namespace: "{{ ns }}"
        create_namespace: true
        values_files:
          - /tmp/schnappy-grafana-test-values.yml
        wait: false
      register: helm_result

    - name: Show pod status
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ ns }}"
      register: pod_status

    - name: Pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.resources | map(attribute='metadata.name') | list }}"

    # ================================================================
    # Phase 3: Verify Grafana
    # ================================================================

    - name: Wait for Grafana deployment rollout (up to 20 min)
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: schnappy-grafana
        namespace: "{{ ns }}"
      register: grafana_rollout
      retries: 120
      delay: 10
      until:
        - grafana_rollout.resources | length > 0
        - grafana_rollout.resources[0].status.readyReplicas | default(0) == grafana_rollout.resources[0].spec.replicas
        - grafana_rollout.resources[0].status.updatedReplicas | default(0) == grafana_rollout.resources[0].spec.replicas

    - name: Verify ExternalSecret synced for grafana
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        name: schnappy-grafana
        namespace: "{{ ns }}"
      register: grafana_secret_sync
      retries: 12
      delay: 5
      until:
        - grafana_secret_sync.resources | length > 0
        - (grafana_secret_sync.resources[0].status.conditions | default([{}]))[0].reason | default('') == "SecretSynced"

    - name: Set Grafana ExternalSecret reason fact
      ansible.builtin.set_fact:
        grafana_secret_reason: "{{ (grafana_secret_sync.resources[0].status.conditions | default([{}]))[0].reason | default('') }}"

    - name: Check Grafana HTTP health
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-grafana -- curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/api/health
      register: grafana_health
      retries: 12
      delay: 10
      until: grafana_health.stdout | default('') == '200'

    - name: "Grafana health: HTTP {{ grafana_health.stdout | default('unreachable') }}"
      ansible.builtin.debug:
        msg: "{{ 'PASS — Grafana responding' if grafana_health.stdout | default('') == '200' else 'FAIL — Grafana not ready' }}"

    # ================================================================
    # Phase 4: Verify Grafana login with Vault credentials
    # ================================================================

    - name: Test Grafana login with seeded credentials
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-grafana -- curl -sf -o /dev/null -w '%{http_code}'  -u {{ test_grafana_user }}:{{ test_grafana_password }}  http://localhost:3000/api/org
      register: grafana_login
      retries: 6
      delay: 5
      until: grafana_login.stdout | default('') == '200'
      failed_when: false

    - name: "Grafana login: {{ 'PASS' if grafana_login.stdout | default('') == '200' else 'FAIL — HTTP ' + grafana_login.stdout | default('N/A') }}"
      ansible.builtin.debug:
        msg: "{{ 'Vault credentials work' if grafana_login.stdout | default('') == '200' else 'Login failed with Vault credentials' }}"

    # ================================================================
    # Phase 5: Verify Prometheus datasource
    # ================================================================

    - name: Check Grafana datasources
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-grafana -- curl -sf -u {{ test_grafana_user }}:{{ test_grafana_password }}  http://localhost:3000/api/datasources
      register: grafana_datasources
      retries: 6
      delay: 5
      until: grafana_datasources.rc == 0
      failed_when: false

    - name: Check Mimir datasource exists
      ansible.builtin.set_fact:
        datasource_ok: "{{ 'mimir' in (grafana_datasources.stdout | default('') | lower) }}"

    - name: "Datasource: {{ 'PASS — Mimir configured' if datasource_ok else 'FAIL — no Mimir datasource' }}"
      ansible.builtin.debug:
        msg: "Datasources: {{ grafana_datasources.stdout | default('N/A') }}"

    # ================================================================
    # Phase 6: Verify dashboard exists
    # ================================================================

    - name: Search for dashboards
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-grafana -- curl -sf -u {{ test_grafana_user }}:{{ test_grafana_password }}  'http://localhost:3000/api/search?type=dash-db'
      register: grafana_dashboards
      retries: 6
      delay: 5
      until: grafana_dashboards.rc == 0
      failed_when: false

    - name: Check dashboard loaded
      ansible.builtin.set_fact:
        dashboard_ok: "{{ 'Web Page Monitor' in (grafana_dashboards.stdout | default('')) }}"

    - name: "Dashboard: {{ 'PASS — Web Page Monitor dashboard loaded' if dashboard_ok else 'FAIL — dashboard not found' }}"
      ansible.builtin.debug:
        msg: "Dashboards: {{ grafana_dashboards.stdout | default('N/A') }}"

    # ================================================================
    # Phase 7: Summary
    # ================================================================

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/schnappy-grafana-test-values.yml
        state: absent

    - name: Set result facts
      ansible.builtin.set_fact:
        grafana_running: "{{ not grafana_rollout.failed | default(false) }}"
        secret_synced: "{{ grafana_secret_reason == 'SecretSynced' }}"
        health_pass: "{{ grafana_health.stdout | default('') == '200' }}"
        login_pass: "{{ grafana_login.stdout | default('') == '200' }}"

    - name: "TEST RESULT"
      vars:
        all_pass: "{{ grafana_running and secret_synced and health_pass and login_pass and datasource_ok and dashboard_ok }}"
      ansible.builtin.debug:
        msg: |
          ====================================================
          Grafana Integration Test: {{ 'PASS' if all_pass else 'PARTIAL' }}

          [{{ 'PASS' if grafana_running else 'FAIL' }}] Grafana deployment running
          [{{ 'PASS' if secret_synced else 'FAIL' }}] ExternalSecret synced from Vault
          [{{ 'PASS' if health_pass else 'FAIL' }}] Grafana health endpoint (HTTP 200)
          [{{ 'PASS' if login_pass else 'FAIL' }}] Login with Vault credentials
          [{{ 'PASS' if datasource_ok else 'FAIL' }}] Prometheus datasource configured
          [{{ 'PASS' if dashboard_ok else 'FAIL' }}] Web Page Monitor dashboard loaded
          ====================================================

    - name: Fail if critical checks failed
      ansible.builtin.fail:
        msg: "Critical Grafana checks failed — see summary above"
      when: not (grafana_running and secret_synced and health_pass and login_pass)
