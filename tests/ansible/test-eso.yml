---
# Test External Secrets Operator ↔ Pi Vault integration in Vagrant.
#
# End-to-end validation of the ESO pipe that production uses to sync
# secrets from Pi Vault into k8s Secrets. The test:
#   1. Bootstraps a ClusterSecretStore that points ESO at Pi Vault
#      (token auth — functionally equivalent to production's Kubernetes
#      auth, but doesn't need k8s auth backend pre-configured).
#   2. Seeds a test secret into Pi Vault via HTTPS.
#   3. Creates an ExternalSecret manifest.
#   4. Waits for ESO to sync it into a k8s Secret.
#   5. Verifies the k8s Secret content matches what was seeded.
#   6. Rotates the Vault value and confirms ESO re-syncs.
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml \
#     ../../tests/ansible/test-eso.yml

# ─── Fetch Pi Vault token + CA (pi1) ────────────────────────────────────────
- name: Read Pi Vault root token (from pi1)
  hosts: pi1
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_tasks: tasks/fetch-pi-vault-token.yml

# ─── Bootstrap ESO ↔ Pi Vault wiring + run the sync test ───────────────────
- name: Test ESO ↔ Pi Vault sync
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: eso-test
    secret_path: schnappy-eso-test/sample
    initial_value: "vagrant-initial-{{ 999999999 | random }}"
    rotated_value: "vagrant-rotated-{{ 999999999 | random }}"

  tasks:
    - ansible.builtin.import_tasks: tasks/setup-eso-vault-backend.yml

    - name: Create test namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    # ── Initial sync ──────────────────────────────────────────────────
    - name: Seed initial value into Pi Vault
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_data:
          api_key: "{{ initial_value }}"
          extra: "static-value"

    - name: Create ExternalSecret pointing at Pi Vault
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: eso-test-secret
            namespace: "{{ ns }}"
          spec:
            refreshInterval: 10s
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            target:
              name: eso-test-secret
              creationPolicy: Owner
            data:
              - secretKey: API_KEY
                remoteRef:
                  key: "{{ secret_path }}"
                  property: api_key
              - secretKey: EXTRA
                remoteRef:
                  key: "{{ secret_path }}"
                  property: extra

    - name: Wait for ExternalSecret to reach SecretSynced
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        name: eso-test-secret
        namespace: "{{ ns }}"
      register: _es
      retries: 30
      delay: 2
      until: >-
        (_es.resources | default([]) | length > 0) and
        ((_es.resources[0].status.conditions | default([])
          | selectattr('type', 'equalto', 'Ready')
          | selectattr('status', 'equalto', 'True')
          | list | length) > 0)

    - name: Read k8s Secret content
      ansible.builtin.shell: |
        kubectl get secret eso-test-secret -n {{ ns }} \
          -o jsonpath='{.data.API_KEY}' | base64 -d
      register: _k8s_api_key
      changed_when: false
      no_log: true

    - name: Assert k8s Secret API_KEY matches initial Vault value
      ansible.builtin.assert:
        that:
          - _k8s_api_key.stdout == initial_value
        fail_msg: "ESO sync mismatch — expected {{ initial_value }}, k8s Secret has {{ _k8s_api_key.stdout }}"
        success_msg: "ESO synced initial value correctly"

    - name: Read k8s Secret EXTRA field
      ansible.builtin.shell: |
        kubectl get secret eso-test-secret -n {{ ns }} \
          -o jsonpath='{.data.EXTRA}' | base64 -d
      register: _k8s_extra
      changed_when: false

    - name: Assert EXTRA field synced too
      ansible.builtin.assert:
        that:
          - _k8s_extra.stdout == "static-value"
        fail_msg: "ESO did not sync the second property"

    # ── Rotation test: confirm refreshInterval actually works ─────────
    - name: Rotate the Vault value
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_data:
          api_key: "{{ rotated_value }}"
          extra: "static-value"

    - name: Wait (up to 90s) for ESO to pick up the rotation
      ansible.builtin.shell: |
        set -e
        for i in $(seq 1 18); do
          VAL=$(kubectl get secret eso-test-secret -n {{ ns }} \
            -o jsonpath='{.data.API_KEY}' | base64 -d)
          if [ "$VAL" = "{{ rotated_value }}" ]; then
            echo "rotated-ok"
            exit 0
          fi
          sleep 5
        done
        echo "rotation timeout: k8s Secret still has $VAL"
        exit 1
      register: _rotation
      changed_when: false

    - name: Rotation confirmed
      ansible.builtin.assert:
        that:
          - "'rotated-ok' in _rotation.stdout"

    # ── Cleanup ───────────────────────────────────────────────────────
    - name: Delete ExternalSecret
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: absent
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        name: "eso-test-secret"
        namespace: "{{ ns }}"
      changed_when: true
      failed_when: false

    - name: Verify k8s Secret is reaped (creationPolicy=Owner)
      ansible.builtin.shell: |
        for i in $(seq 1 12); do
          if ! kubectl get secret eso-test-secret -n {{ ns }} >/dev/null 2>&1; then
            echo "reaped"
            exit 0
          fi
          sleep 2
        done
        echo "not-reaped"
        exit 1
      register: _reaped
      changed_when: false

    - name: Delete test namespace
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
        wait: true
      changed_when: true
      failed_when: false

    - name: TEST PASSED
      ansible.builtin.debug:
        msg: |
          ====================================================
          ESO ↔ Pi Vault integration test — PASSED
          ====================================================
          ✓ ClusterSecretStore vault-backend is Ready
          ✓ ExternalSecret synced initial value from Pi Vault KV
          ✓ Multiple properties from the same secret mapped correctly
          ✓ Rotation: Pi Vault update propagated within refreshInterval
          ✓ creationPolicy=Owner: k8s Secret reaped on ExternalSecret delete
          ====================================================
