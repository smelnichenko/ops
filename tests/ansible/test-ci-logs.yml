---
# Test CI/CD log shipping to ELK via Fluent-bit forward protocol
#
# Verifies that Docker container logs (simulating CI jobs) are shipped
# to Elasticsearch under the ci-logs-* index via Fluent-bit's forward input.
# Docker containers use --log-driver=fluentd to stream logs in real-time.
#
# Prerequisites:
#   - vagrant up (k3s + vault-pi VMs)
#   - setup-vault-pi.yml completed
#   - setup-vault.yml completed (Vault + ESO deployed)
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-ci-logs.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

- name: Test CI/CD log shipping to ELK
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: monitor
    vault_ns: vault
    test_es_password: "vagrant-test-elastic-password"
    test_kibana_password: "vagrant-test-kibana-password"

  tasks:
    - name: Generate test marker
      ansible.builtin.set_fact:
        test_marker: "CI_LOG_SHIPPING_TEST_{{ 999999 | random }}"
    # ================================================================
    # Phase 1: Seed Elasticsearch credentials into Vault
    # ================================================================

    - name: Get Vault root token from k8s secret
      ansible.builtin.shell: |
        k3s kubectl get secret vault-root-token -n {{ vault_ns }} \
          -o jsonpath='{.data.token}' | base64 -d
      register: vault_token_result
      changed_when: false
      no_log: true

    - name: Set Vault token fact
      ansible.builtin.set_fact:
        vault_root_token: "{{ vault_token_result.stdout }}"
      no_log: true

    - name: Seed elasticsearch secret
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault kv put secret/monitor/elasticsearch \
            password="{{ test_es_password }}" \
            kibana_password="{{ test_kibana_password }}"
      no_log: true

    - name: "SEED: Elasticsearch credentials written to Vault KV"
      ansible.builtin.debug:
        msg: "Seeded elasticsearch secrets into Vault KV"

    # ================================================================
    # Phase 2: Install Docker (Vagrant only has nerdctl/containerd)
    # ================================================================

    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Ensure Docker is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # ================================================================
    # Phase 3: Deploy chart with ELK + CI logs enabled
    # ================================================================

    - name: Create monitor namespace
      ansible.builtin.command: k3s kubectl create namespace {{ ns }}
      register: ns_result
      changed_when: ns_result.rc == 0
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Write Helm values for CI logs test
      ansible.builtin.copy:
        dest: /tmp/monitor-ci-logs-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
          auth:
            jwtSecret: "test-only-not-used-32-chars-long!!"
          networkPolicies:
            enabled: false
          frontend:
            enabled: false
          app:
            replicas: 0
          redis:
            enabled: false
          postgres:
            enabled: false
          elk:
            enabled: true
            elasticsearch:
              image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
              replicas: 1
              javaOpts: "-Xms256m -Xmx256m"
              existingSecret: "monitor-elasticsearch"
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "2000m"
              storage:
                size: 5Gi
                storageClass: "local-path"
              retention:
                days: 30
            kibana:
              image: docker.elastic.co/kibana/kibana:8.17.4
              replicas: 0
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              ingress:
                enabled: false
            fluentbit:
              image: cr.fluentbit.io/fluent/fluent-bit:3.2
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
            ciLogs:
              enabled: true
              retention:
                days: 90
          ai:
            enabled: false
          mail:
            enabled: false
          webhook:
            enabled: false
          kafka:
            replicas: 0
          scylla:
            replicas: 0
          minio:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false

    - name: Rsync chart to Vagrant VM
      ansible.builtin.command: vagrant rsync k3s
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Deploy chart with ELK + CI logs enabled
      ansible.builtin.shell: |
        helm upgrade --install monitor /vagrant/infra/helm \
          --namespace {{ ns }} \
          --create-namespace \
          --values /tmp/monitor-ci-logs-test-values.yml \
          --wait --timeout 600s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: helm_result

    - name: Show pod status
      ansible.builtin.shell: |
        k3s kubectl get pods -n {{ ns }} -o wide
      register: pod_status
      changed_when: false

    - name: Pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"

    # ================================================================
    # Phase 4: Verify Elasticsearch is ready
    # ================================================================

    - name: Wait for Elasticsearch StatefulSet rollout
      ansible.builtin.shell: |
        k3s kubectl rollout status statefulset/monitor-elasticsearch -n {{ ns }} --timeout=300s
      register: es_rollout
      changed_when: false

    - name: Verify ExternalSecret synced for elasticsearch
      ansible.builtin.shell: |
        k3s kubectl get externalsecret monitor-elasticsearch -n {{ ns }} \
          -o jsonpath='{.status.conditions[0].reason}'
      register: es_secret_sync
      retries: 12
      delay: 5
      until: es_secret_sync.stdout == "SecretSynced"
      changed_when: false

    - name: Wait for Elasticsearch to respond
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} monitor-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} http://localhost:9200/_cluster/health?pretty
      register: es_health
      retries: 30
      delay: 10
      until: es_health.rc == 0
      changed_when: false

    - name: "ES cluster health"
      ansible.builtin.debug:
        msg: "{{ es_health.stdout_lines }}"

    # ================================================================
    # Phase 5: Verify Fluent-bit is running with forward input
    # ================================================================

    - name: Wait for Fluent-bit DaemonSet ready
      ansible.builtin.shell: |
        k3s kubectl rollout status daemonset/monitor-fluentbit -n {{ ns }} --timeout=120s
      register: fluentbit_rollout
      changed_when: false

    - name: Verify Fluent-bit has hostPort 24224
      ansible.builtin.shell: |
        k3s kubectl get daemonset monitor-fluentbit -n {{ ns }} -o json | \
          python3 -c "
        import sys, json
        ds = json.load(sys.stdin)
        ports = ds['spec']['template']['spec']['containers'][0].get('ports', [])
        forward_ports = [p for p in ports if p.get('hostPort') == 24224]
        assert forward_ports, 'Missing hostPort 24224 for forward input'
        print('Forward input hostPort 24224 configured')
        "
      register: fluentbit_port
      changed_when: false

    - name: "Fluent-bit forward port"
      ansible.builtin.debug:
        msg: "{{ fluentbit_port.stdout }}"

    # ================================================================
    # Phase 6: Generate test Docker container logs via forward protocol
    # ================================================================

    - name: Wait for pod logs to be shipped first
      ansible.builtin.pause:
        seconds: 30

    - name: Run test Docker container with fluentd log driver
      ansible.builtin.shell: |
        docker run --rm \
          --log-driver=fluentd \
          --log-opt fluentd-address=localhost:24224 \
          --log-opt fluentd-async=true \
          --log-opt tag=ci \
          alpine echo "{{ test_marker }}"
      register: docker_run
      changed_when: true

    - name: "Test container output"
      ansible.builtin.debug:
        msg: "{{ docker_run.stdout }}"

    - name: Wait for CI logs to be shipped to ES
      ansible.builtin.pause:
        seconds: 15

    # ================================================================
    # Phase 7: Verify CI logs in Elasticsearch
    # ================================================================

    - name: Query ci-logs-* index for document count
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} monitor-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/ci-logs-*/_count' 2>/dev/null | \
          python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))"
      register: ci_count
      retries: 18
      delay: 10
      until: (ci_count.stdout | default('0') | int) > 0
      changed_when: false
      failed_when: false

    - name: "CI logs: {{ ci_count.stdout | default('0') }} documents indexed"
      ansible.builtin.debug:
        msg: "{{ 'PASS — CI logs are flowing' if (ci_count.stdout | default('0') | int) > 0 else 'WARN — no CI logs yet' }}"

    - name: Search for test marker in ci-logs
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} monitor-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/ci-logs-*/_search?size=10' 2>/dev/null | \
          grep -c '{{ test_marker }}' || echo 0
      register: marker_search
      retries: 12
      delay: 10
      until: (marker_search.stdout_lines | last | default('0') | int) > 0
      changed_when: false
      failed_when: false

    - name: "Test marker search: {{ marker_search.stdout_lines | last | default('0') }} hits"
      ansible.builtin.debug:
        msg: "{{ 'PASS — test marker found in ci-logs index' if (marker_search.stdout_lines | last | default('0') | int) > 0 else 'WARN — marker not found yet' }}"

    # ================================================================
    # Phase 8: Verify pod logs still work (no regression)
    # ================================================================

    - name: Query filebeat-* index for document count
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} monitor-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/filebeat-*/_count' 2>/dev/null | \
          python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))"
      register: pod_log_count
      retries: 18
      delay: 10
      until: (pod_log_count.stdout | default('0') | int) > 0
      changed_when: false
      failed_when: false

    - name: "Pod logs: {{ pod_log_count.stdout | default('0') }} documents indexed"
      ansible.builtin.debug:
        msg: "{{ 'PASS — pod logs still flowing' if (pod_log_count.stdout | default('0') | int) > 0 else 'WARN — no pod logs yet' }}"

    # ================================================================
    # Phase 9: Verify ILM policies
    # ================================================================

    - name: Check CI logs ILM policy exists
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} monitor-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/_ilm/policy/ci-logs-90d-retention' 2>/dev/null
      register: ci_ilm_check
      retries: 12
      delay: 5
      until: ci_ilm_check.rc == 0
      changed_when: false
      failed_when: false

    - name: "CI logs ILM policy: {{ 'exists' if ci_ilm_check.rc == 0 else 'missing' }}"
      ansible.builtin.debug:
        msg: "{{ ci_ilm_check.stdout | default('') }}"

    # ================================================================
    # Phase 10: Summary
    # ================================================================

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/monitor-ci-logs-test-values.yml
        state: absent

    - name: Set result facts
      ansible.builtin.set_fact:
        es_pass: "{{ es_rollout.rc is defined and es_rollout.rc == 0 }}"
        es_secret_pass: "{{ es_secret_sync.stdout == 'SecretSynced' }}"
        fluentbit_pass: "{{ fluentbit_rollout.rc is defined and fluentbit_rollout.rc == 0 }}"
        fluentbit_port_pass: "{{ fluentbit_port.rc is defined and fluentbit_port.rc == 0 }}"
        ci_logs_pass: "{{ (ci_count.stdout | default('0') | int) > 0 }}"
        marker_pass: "{{ (marker_search.stdout_lines | last | default('0') | int) > 0 }}"
        pod_logs_pass: "{{ (pod_log_count.stdout | default('0') | int) > 0 }}"
        ci_ilm_pass: "{{ ci_ilm_check.rc is defined and ci_ilm_check.rc == 0 }}"

    - name: "TEST RESULT"
      vars:
        critical_pass: "{{ es_pass and es_secret_pass and fluentbit_pass and fluentbit_port_pass }}"
        all_pass: "{{ es_pass and es_secret_pass and fluentbit_pass and fluentbit_port_pass and ci_logs_pass and marker_pass and pod_logs_pass }}"
      ansible.builtin.debug:
        msg: |
          ====================================================
          CI Log Shipping Test: {{ 'PASS' if all_pass else ('PARTIAL' if critical_pass else 'FAIL') }}

          [{{ 'PASS' if es_pass else 'FAIL' }}] Elasticsearch StatefulSet running
          [{{ 'PASS' if es_secret_pass else 'FAIL' }}] ExternalSecret synced
          [{{ 'PASS' if fluentbit_pass else 'FAIL' }}] Fluent-bit DaemonSet running
          [{{ 'PASS' if fluentbit_port_pass else 'FAIL' }}] Fluent-bit forward port 24224
          [{{ 'PASS' if ci_logs_pass else 'WARN' }}] CI logs indexed ({{ ci_count.stdout | default('0') }} docs)
          [{{ 'PASS' if marker_pass else 'WARN' }}] Test marker found in ci-logs
          [{{ 'PASS' if pod_logs_pass else 'WARN' }}] Pod logs still flowing ({{ pod_log_count.stdout | default('0') }} docs)
          [{{ 'PASS' if ci_ilm_pass else 'INFO' }}] CI logs ILM policy (90d retention)
          ====================================================

    - name: Fail if critical checks failed
      ansible.builtin.fail:
        msg: "Critical CI log shipping checks failed — see summary above"
      when: not (es_pass and es_secret_pass and fluentbit_pass and fluentbit_port_pass)
