---
# Test Keycloak deployment in Vagrant
#
# Verifies Keycloak deploys correctly, realm import works,
# SMTP config is applied, OAuth clients are created, and
# self-registration + password reset are enabled.
#
# Prerequisites:
#   - vagrant up (kubeadm + pi1 + pi2 VMs)
#   - setup-vault-pi.yml completed
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-keycloak.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml

- name: Read Pi Vault root token (from pi1)
  hosts: pi1
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_tasks: tasks/fetch-pi-vault-token.yml

- name: Test Keycloak integration
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    test_admin_password: "vagrant-test-admin-password!!"
    test_db_password: "vagrant-test-kc-db-password"
    test_smtp_password: "vagrant-test-smtp-password"
    test_forgejo_client_secret: "vagrant-test-forgejo-secret"
    test_grafana_client_secret: "vagrant-test-grafana-secret"
    test_mail_password: "vagrant-test-mail-password"

  tasks:
    - name: Configure ESO ClusterSecretStore → Pi Vault
      ansible.builtin.import_tasks: tasks/setup-eso-vault-backend.yml

    - name: Seed keycloak secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/keycloak
        secret_data:
          admin_password: "{{ test_admin_password }}"
          db_password: "{{ test_db_password }}"
          forgejo_client_secret: "{{ test_forgejo_client_secret }}"

    - name: Seed mail secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/mail
        secret_data:
          password: "{{ test_mail_password }}"

    - name: Seed grafana secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/grafana
        secret_data:
          admin_user: admin
          admin_password: vagrant-grafana-pw
          oauth-client-id: grafana
          oauth-client-secret: "{{ test_grafana_client_secret }}"

    # ================================================================
    # Phase 2: Deploy chart with Keycloak enabled
    # ================================================================

    - name: Ensure schnappy namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    - name: Write Helm values for Keycloak test
      ansible.builtin.copy:
        dest: /tmp/schnappy-keycloak-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
          networkPolicies:
            enabled: false
          frontend:
            enabled: false
          site:
            enabled: false
          aptCache:
            enabled: false
          app:
            replicas: 0
          valkey:
            enabled: false
          postgres:
            enabled: true
            existingSecret: "schnappy-postgres"
            storage:
              size: 1Gi
              storageClass: "local-path"
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits: { cpu: 500m, memory: 512Mi }
          elk:
            enabled: false
          ai:
            enabled: false
          mail:
            enabled: true
            existingSecret: "schnappy-mail"
            host: smtp.resend.com
            port: "587"
            username: resend
          webhook:
            enabled: false
          minio:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false
            existingSecret: "schnappy-grafana"
          kafka:
            enabled: false
          scylla:
            enabled: false
          keycloak:
            enabled: true
            existingSecret: "schnappy-keycloak"
            image: quay.io/keycloak/keycloak:26.5.6
            hostname: localhost
            mail:
              from: "test@example.com"
              fromDisplayName: "schnappy-test"
            clients:
              forgejo:
                enabled: true
                redirectUri: "https://git.example.com/callback"
              grafana:
                enabled: false
                redirectUri: ""
            resources:
              requests: { cpu: 200m, memory: 512Mi }
              limits: { cpu: 1000m, memory: 1Gi }
            ingress:
              enabled: false

    - name: Seed postgres secret (for keycloak DB)
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/postgres
        secret_data:
          database: keycloak
          username: postgres
          password: vagrant-test-pg-password

    - name: Seed auth secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/auth
        secret_data:
          jwt_secret: "test-only-not-used-32-chars-long!!"

    - name: Deploy schnappy-mesh (ServiceAccounts for mesh-dependent pods)
      ansible.builtin.import_tasks: tasks/deploy-schnappy-mesh.yml

    # schnappy-auth chart assumes postgres exists in-cluster as a Service
    # named `schnappy-postgres:5432` and a Secret `schnappy-postgres` with
    # POSTGRES_USER/POSTGRES_PASSWORD keys. In prod Keycloak runs on Pi
    # against Pi postgres (no k8s objects needed); the chart never had to
    # deploy postgres. For the Vagrant test, create the Secret and stand up
    # a minimal in-cluster postgres so the initContainer doesn't block
    # forever on `nc -z schnappy-postgres 5432`.
    - name: Create schnappy-postgres + schnappy-mail Secrets (test-only)
      # Prod would have ExternalSecrets for these but schnappy-auth chart
      # only creates the schnappy-keycloak ExternalSecret. For the test,
      # stand up the deps directly instead of reworking the production chart.
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          - apiVersion: v1
            kind: Secret
            metadata:
              name: schnappy-postgres
              namespace: "{{ ns }}"
            type: Opaque
            stringData:
              POSTGRES_USER: postgres
              POSTGRES_PASSWORD: vagrant-test-pg-password
          - apiVersion: v1
            kind: Secret
            metadata:
              name: schnappy-mail
              namespace: "{{ ns }}"
            type: Opaque
            stringData:
              MAIL_PASSWORD: test-mail-password-not-used

    - name: Deploy test postgres (for keycloak DB)
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: schnappy-postgres
              namespace: "{{ ns }}"
              labels: { app: schnappy-postgres }
            spec:
              replicas: 1
              selector: { matchLabels: { app: schnappy-postgres } }
              template:
                metadata:
                  labels: { app: schnappy-postgres }
                spec:
                  containers:
                    - name: postgres
                      image: postgres:17
                      env:
                        - { name: POSTGRES_DB, value: keycloak }
                        - name: POSTGRES_USER
                          valueFrom: { secretKeyRef: { name: schnappy-postgres, key: POSTGRES_USER } }
                        - name: POSTGRES_PASSWORD
                          valueFrom: { secretKeyRef: { name: schnappy-postgres, key: POSTGRES_PASSWORD } }
                        - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
                      ports: [{ name: postgres, containerPort: 5432 }]
                      resources:
                        requests: { cpu: 100m, memory: 256Mi }
                        limits: { cpu: 500m, memory: 512Mi }
                      volumeMounts:
                        - { name: data, mountPath: /var/lib/postgresql/data }
                  volumes:
                    - name: data
                      emptyDir: { sizeLimit: 1Gi }
          - apiVersion: v1
            kind: Service
            metadata:
              name: schnappy-postgres
              namespace: "{{ ns }}"
            spec:
              selector: { app: schnappy-postgres }
              ports:
                - { name: postgres, port: 5432, targetPort: 5432 }

    - name: Deploy chart with Keycloak enabled
      # wait=false — under vagrant constraints Keycloak bootstrap + first
      # ExternalSecret sync can blow past 15m. The downstream rollout/readiness
      # waits at lines 193–217 gate the real success anyway.
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy
        chart_ref: /vagrant-platform/helm/schnappy-auth
        release_namespace: "{{ ns }}"
        create_namespace: true
        values_files:
          - /tmp/schnappy-keycloak-test-values.yml
        wait: false
      register: helm_result

    - name: Show pod status
      ansible.builtin.shell: |
        kubectl get pods -n {{ ns }} -o wide
      register: pod_status
      changed_when: false

    - name: Pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"

    # ================================================================
    # Phase 3: Verify Keycloak deployment
    # ================================================================

    # Verify ExternalSecret FIRST — if Vault-backed secret isn't synced,
    # Deployment can't create pods (Secret ref in pod spec blocks scheduling).
    # Failing here gives a clearer signal than "exceeded progress deadline".
    - name: Verify ExternalSecret synced for keycloak
      ansible.builtin.shell: |
        kubectl get externalsecret schnappy-keycloak -n {{ ns }} \
          -o jsonpath='{.status.conditions[0].reason}'
      register: kc_secret_sync
      retries: 60
      delay: 5
      until: kc_secret_sync.stdout == "SecretSynced"
      changed_when: false

    - name: Wait for Keycloak deployment rollout (diag on failure)
      block:
        - name: Wait for Keycloak deployment rollout
          ansible.builtin.shell: |
            kubectl rollout status deploy/schnappy-keycloak -n {{ ns }} --timeout=1200s
          register: kc_rollout
          changed_when: false
      rescue:
        - name: DIAG events + describe + eso + secret
          ansible.builtin.shell: |
            echo "--- events (last 30) ---"
            kubectl get events -n {{ ns }} --sort-by=.lastTimestamp | tail -30
            echo "--- describe deploy ---"
            kubectl describe deploy/schnappy-keycloak -n {{ ns }} | tail -60
            echo "--- describe pod ---"
            kubectl describe pod -n {{ ns }} -l app.kubernetes.io/component=keycloak | tail -60
            echo "--- replicaset ---"
            kubectl get rs -n {{ ns }} -l app.kubernetes.io/component=keycloak -o yaml | tail -60
            echo "--- ExternalSecret ---"
            kubectl get externalsecret -n {{ ns }} schnappy-keycloak -o yaml | tail -40
            echo "--- Secret keys ---"
            kubectl get secret -n {{ ns }} schnappy-keycloak -o jsonpath='{.data}' 2>&1 | head -5
            echo "--- Node capacity + allocatable ---"
            kubectl describe nodes | grep -E "Capacity:|Allocatable:|cpu:|memory:" | head -20
            echo "--- schnappy-postgres CNPG cluster ---"
            kubectl get cluster -n {{ ns }} 2>&1 | head -5
            kubectl get pods -n {{ ns }} 2>&1 | head -30
          changed_when: false
          register: _kc_diag
        - name: DIAG output
          ansible.builtin.debug:
            var: _kc_diag.stdout_lines
        - name: Fail after diag
          ansible.builtin.fail:
            msg: "Keycloak rollout failed — see DIAG output above"

    - name: Wait for Keycloak readiness probe
      ansible.builtin.shell: |
        kubectl get pod -n {{ ns }} -l app.kubernetes.io/component=keycloak \
          -o jsonpath='{.items[0].status.containerStatuses[?(@.name=="keycloak")].ready}'
      register: kc_health
      retries: 60
      delay: 10
      until: kc_health.stdout == "true"
      changed_when: false

    # ================================================================
    # Phase 4: Verify realm import
    # ================================================================

    - name: Check schnappy realm exists
      ansible.builtin.shell: |
        kubectl exec deploy/schnappy-keycloak -n {{ ns }} -c keycloak -- \
          /opt/keycloak/bin/kcadm.sh get realms/schnappy \
            --fields realm,enabled,registrationAllowed,resetPasswordAllowed,loginTheme \
            --server http://localhost:8080 --realm master \
            --user admin --password "{{ test_admin_password }}"
      register: realm_info
      retries: 5
      delay: 5
      until: realm_info.rc == 0
      changed_when: false
      failed_when: false

    - name: Parse realm config
      ansible.builtin.set_fact:
        realm_json: "{{ realm_info.stdout | from_json }}"
      when: realm_info.rc == 0

    - name: Verify realm settings
      ansible.builtin.set_fact:
        realm_enabled: "{{ realm_json.enabled | default(false) }}"
        registration_enabled: "{{ realm_json.registrationAllowed | default(false) }}"
        reset_password_enabled: "{{ realm_json.resetPasswordAllowed | default(false) }}"
        login_theme_correct: "{{ realm_json.loginTheme | default('') == 'schnappy' }}"
      when: realm_info.rc == 0

    # ================================================================
    # Phase 5: Verify OAuth clients
    # ================================================================

    - name: List clients in schnappy realm
      ansible.builtin.shell: |
        kubectl exec deploy/schnappy-keycloak -n {{ ns }} -c keycloak -- \
          /opt/keycloak/bin/kcadm.sh get clients \
            --fields clientId -r schnappy \
            --server http://localhost:8080 --realm master \
            --user admin --password "{{ test_admin_password }}"
      register: clients_result
      changed_when: false
      failed_when: false

    - name: Check forgejo client exists
      ansible.builtin.set_fact:
        forgejo_client_exists: "{{ 'forgejo' in clients_result.stdout }}"
      when: clients_result.rc == 0

    - name: Check grafana client exists
      ansible.builtin.set_fact:
        grafana_client_exists: "{{ 'grafana' in clients_result.stdout }}"
      when: clients_result.rc == 0

    # ================================================================
    # Phase 6: Verify SMTP config
    # ================================================================

    - name: Check SMTP config in database
      ansible.builtin.shell: |
        kubectl exec deploy/schnappy-postgres -n {{ ns }} -c postgres -- \
          psql -U postgres -d keycloak -t -c \
            "SELECT count(*) FROM realm_smtp_config WHERE realm_id = (SELECT id FROM realm WHERE name = 'schnappy')"
      register: smtp_count
      changed_when: false
      failed_when: false

    - name: Set SMTP configured fact
      ansible.builtin.set_fact:
        smtp_configured: "{{ (smtp_count.stdout | default('0') | trim | int) > 0 }}"

    # ================================================================
    # Phase 7: Verify OIDC discovery endpoint
    # ================================================================

    - name: Check OIDC protocol available
      ansible.builtin.shell: |
        kubectl exec deploy/schnappy-keycloak -n {{ ns }} -c keycloak -- \
          /opt/keycloak/bin/kcadm.sh get clients -r schnappy \
            --fields clientId,protocol -q protocol=openid-connect \
            --server http://localhost:8080 --realm master \
            --user admin --password "{{ test_admin_password }}"
      register: oidc_discovery
      changed_when: false
      failed_when: false

    - name: Set OIDC fact
      ansible.builtin.set_fact:
        oidc_working: "{{ 'openid-connect' in (oidc_discovery.stdout | default('')) }}"

    # ================================================================
    # Phase 8: Summary
    # ================================================================

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/schnappy-keycloak-test-values.yml
        state: absent

    - name: Set result facts (defaults for failed realm check)
      ansible.builtin.set_fact:
        realm_enabled: "{{ realm_enabled | default(false) }}"
        registration_enabled: "{{ registration_enabled | default(false) }}"
        reset_password_enabled: "{{ reset_password_enabled | default(false) }}"
        login_theme_correct: "{{ login_theme_correct | default(false) }}"
        forgejo_client_exists: "{{ forgejo_client_exists | default(false) }}"
        smtp_configured: "{{ smtp_configured | default(false) }}"
        oidc_working: "{{ oidc_working | default(false) }}"

    - name: "TEST RESULT"
      vars:
        kc_deploy_pass: "{{ kc_rollout.rc is defined and kc_rollout.rc == 0 }}"
        kc_secret_pass: "{{ kc_secret_sync.stdout == 'SecretSynced' }}"
        kc_health_pass: "{{ kc_health.stdout | default('') == 'true' }}"
        all_pass: "{{ kc_deploy_pass and kc_secret_pass and kc_health_pass and realm_enabled and registration_enabled and reset_password_enabled and login_theme_correct and forgejo_client_exists and smtp_configured and oidc_working }}"
      ansible.builtin.debug:
        msg: |
          ====================================================
          Keycloak Integration Test: {{ 'PASS' if all_pass else 'PARTIAL' }}

          [{{ 'PASS' if kc_deploy_pass else 'FAIL' }}] Keycloak Deployment running
          [{{ 'PASS' if kc_secret_pass else 'FAIL' }}] ExternalSecret synced
          [{{ 'PASS' if kc_health_pass else 'FAIL' }}] Health endpoint responding
          [{{ 'PASS' if realm_enabled else 'FAIL' }}] Schnappy realm enabled
          [{{ 'PASS' if registration_enabled else 'FAIL' }}] Self-registration enabled
          [{{ 'PASS' if reset_password_enabled else 'FAIL' }}] Password reset enabled
          [{{ 'PASS' if login_theme_correct else 'FAIL' }}] Login theme = schnappy
          [{{ 'PASS' if forgejo_client_exists else 'FAIL' }}] Forgejo OAuth client exists
          [{{ 'PASS' if smtp_configured else 'FAIL' }}] SMTP configured
          [{{ 'PASS' if oidc_working else 'FAIL' }}] OIDC discovery endpoint working
          ====================================================

    - name: Fail if critical checks failed
      vars:
        kc_deploy_pass: "{{ kc_rollout.rc is defined and kc_rollout.rc == 0 }}"
        kc_secret_pass: "{{ kc_secret_sync.stdout == 'SecretSynced' }}"
        kc_health_pass: "{{ kc_health.stdout | default('') == 'true' }}"
      ansible.builtin.fail:
        msg: "Critical Keycloak checks failed — see summary above"
      when: not (kc_deploy_pass and kc_secret_pass and kc_health_pass and realm_enabled)
