---
# Test k6 smoke tests with Prometheus remote write in Vagrant
#
# Verifies:
#   1. k6 smoke test Job runs and passes all checks
#   2. k6 metrics are written to Prometheus via remote write
#   3. Prometheus alert rules for smoke tests are loaded
#
# Prerequisites:
#   - vagrant up (kubeadm + pi1 + pi2 VMs)
#   - setup-vault-pi.yml completed
#
# Usage:
#   task test:k6-smoke

- name: Read Pi Vault root token (from pi1)
  hosts: pi1
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_tasks: tasks/fetch-pi-vault-token.yml

- name: Test k6 smoke tests
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy

  tasks:
    - name: Seed postgres secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/postgres
        secret_data:
          database: monitor
          username: monitor
          password: vagrant-test

    - name: Seed valkey secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/valkey
        secret_data:
          password: vagrant-valkey

    # ================================================================
    # Phase 2: Deploy charts
    # ================================================================

    - name: Create schnappy namespace
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ ns }}"

    - name: Deploy schnappy-mesh (ServiceAccounts)
      ansible.builtin.import_tasks: tasks/deploy-schnappy-mesh.yml

    - name: Deploy schnappy-data chart
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy-data
        chart_ref: /vagrant-platform/helm/schnappy-data
        release_namespace: "{{ ns }}"
        wait: true
        wait_timeout: 5m
        values:
          fullnameOverride: schnappy
          vault:
            secretsEnabled: true
          postgres:
            enabled: true
            existingSecret: schnappy-postgres
          valkey:
            enabled: true
            existingSecret: schnappy-valkey
          kafka:
            enabled: false
          minio:
            enabled: false
          aptCache:
            enabled: false
          networkPolicies:
            enabled: false

    - name: Wait for postgres
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: schnappy-postgres
        namespace: "{{ ns }}"
      register: postgres_dep
      retries: 60
      delay: 3
      until:
        - postgres_dep.resources | length > 0
        - postgres_dep.resources[0].status.readyReplicas | default(0) == postgres_dep.resources[0].spec.replicas
        - postgres_dep.resources[0].status.updatedReplicas | default(0) == postgres_dep.resources[0].spec.replicas

    - name: Deploy schnappy-observability chart (Prometheus only)
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy-observability
        chart_ref: /vagrant-platform/helm/schnappy-observability
        release_namespace: "{{ ns }}"
        wait: true
        wait_timeout: 5m
        values:
          fullnameOverride: schnappy
          prometheus:
            enabled: true
            image: prom/prometheus:v3.10.0
          grafana:
            enabled: false
          alertmanager:
            enabled: false
          elk:
            enabled: false
          kubeStateMetrics:
            enabled: false
          networkPolicies:
            enabled: false

    - name: Wait for prometheus
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: schnappy-prometheus
        namespace: "{{ ns }}"
      register: prom_dep
      retries: 60
      delay: 3
      until:
        - prom_dep.resources | length > 0
        - prom_dep.resources[0].status.readyReplicas | default(0) == prom_dep.resources[0].spec.replicas
        - prom_dep.resources[0].status.updatedReplicas | default(0) == prom_dep.resources[0].spec.replicas

    - name: Deploy schnappy core chart
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy-app
        chart_ref: /vagrant-platform/helm/schnappy
        release_namespace: "{{ ns }}"
        wait: true
        wait_timeout: 5m
        values:
          fullnameOverride: schnappy
          site:
            dnsResolver: 10.43.0.10
            enabled: false
          gateway:
            enabled: false
          admin:
            enabled: false
          chatService:
            enabled: false
          chessService:
            enabled: false
          vault:
            secretsEnabled: true
          networkPolicies:
            enabled: false
          smokeTest:
            enabled: true
            baseUrl: http://schnappy-monitor:8080/api
          app:
            ingress:
              enabled: false
              host: localhost
          postgres:
            existingSecret: schnappy-postgres
          valkey:
            existingSecret: schnappy-valkey

    - name: Wait for app
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: schnappy-monitor
        namespace: "{{ ns }}"
      register: app_dep
      retries: 60
      delay: 3
      until:
        - app_dep.resources | length > 0
        - app_dep.resources[0].status.readyReplicas | default(0) == app_dep.resources[0].spec.replicas
        - app_dep.resources[0].status.updatedReplicas | default(0) == app_dep.resources[0].spec.replicas

    - name: "PHASE 2: Charts deployed"
      ansible.builtin.debug:
        msg: "All charts deployed and ready"

    # ================================================================
    # Phase 3: Run k6 smoke test
    # ================================================================

    - name: Create k6 smoke test Job
      ansible.builtin.shell: |
        kubectl create job k6-test --from=cronjob/schnappy-k6-smoke -n {{ ns }}
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: false

    - name: Wait for k6 Job to complete
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Job
        name: k6-test
        namespace: "{{ ns }}"
      register: k6_result
      retries: 60
      delay: 3
      until:
        - k6_result.resources | length > 0
        - (k6_result.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Complete') | selectattr('status', 'equalto', 'True') | list | length > 0)
          or (k6_result.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Failed') | selectattr('status', 'equalto', 'True') | list | length > 0)

    - name: Get k6 Job logs
      ansible.builtin.shell: kubectl logs job/k6-test -n {{ ns }}
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: k6_logs
      changed_when: false

    - name: Display k6 results
      ansible.builtin.debug:
        msg: "{{ k6_logs.stdout }}"

    - name: Verify k6 Job succeeded
      ansible.builtin.assert:
        that:
          - k6_result.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Complete') | selectattr('status', 'equalto', 'True') | list | length > 0
        fail_msg: "k6 smoke test FAILED"
        success_msg: "k6 smoke test PASSED — all checks OK"

    # ================================================================
    # Phase 4: Verify Prometheus metrics
    # ================================================================

    - name: Wait for metrics to be scraped
      ansible.builtin.pause:
        seconds: 10

    - name: Query Prometheus for k6 metrics
      ansible.builtin.shell: |
        kubectl exec deploy/schnappy-prometheus -n {{ ns }} -- \
          wget -qO- 'http://localhost:9090/api/v1/query?query=k6_http_reqs_total' 2>/dev/null
      register: prom_result
      changed_when: false

    - name: Verify k6 metrics in Prometheus
      ansible.builtin.assert:
        that:
          - "'k6_http_reqs_total' in prom_result.stdout"
        fail_msg: "k6 metrics NOT found in Prometheus — remote write failed"
        success_msg: "k6 metrics found in Prometheus — remote write working"

    - name: "TEST PASSED: k6 smoke tests with Prometheus remote write"
      ansible.builtin.debug:
        msg: |
          All tests passed:
            1. k6 smoke test Job completed successfully
            2. All health checks passed
            3. k6 metrics written to Prometheus via remote write
