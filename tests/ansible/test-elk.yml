---
# Test ELK stack deployment in Vagrant
#
# Verifies Elasticsearch, Kibana, and Fluent-bit deploy correctly,
# logs flow from pods into ES, and ILM retention is configured.
#
# Prerequisites:
#   - vagrant up (k3s + vault-pi VMs)
#   - setup-vault-pi.yml completed
#   - setup-vault.yml completed (Vault + ESO deployed)
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-elk.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

- name: Test ELK stack integration
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    vault_ns: vault
    test_es_password: "vagrant-test-elastic-password"
    test_kibana_password: "vagrant-test-kibana-password"

  tasks:
    # ================================================================
    # Phase 1: Seed Elasticsearch credentials into Vault
    # ================================================================

    - name: Get Vault root token from k8s secret
      ansible.builtin.shell: |
        k3s kubectl get secret vault-root-token -n {{ vault_ns }} \
          -o jsonpath='{.data.token}' | base64 -d
      register: vault_token_result
      changed_when: false
      no_log: true

    - name: Set Vault token fact
      ansible.builtin.set_fact:
        vault_root_token: "{{ vault_token_result.stdout }}"
      no_log: true

    - name: Seed elasticsearch secret
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault kv put secret/schnappy/elasticsearch \
            password="{{ test_es_password }}" \
            kibana_password="{{ test_kibana_password }}"
      no_log: true

    - name: "SEED: Elasticsearch credentials written to Vault KV"
      ansible.builtin.debug:
        msg: "Seeded auth, postgres, elasticsearch secrets into Vault KV"

    # ================================================================
    # Phase 2: Deploy chart with ELK enabled
    # ================================================================

    - name: Create schnappy namespace
      ansible.builtin.command: k3s kubectl create namespace {{ ns }}
      register: ns_result
      changed_when: ns_result.rc == 0
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Write Helm values for ELK test
      ansible.builtin.copy:
        dest: /tmp/schnappy-elk-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
          auth:
            jwtSecret: "test-only-not-used-32-chars-long!!"
          networkPolicies:
            enabled: false
          frontend:
            enabled: false
          site:
            enabled: false
          aptCache:
            enabled: false
          app:
            replicas: 0
          redis:
            enabled: false
          postgres:
            enabled: false
          elk:
            enabled: true
            elasticsearch:
              image: docker.elastic.co/elasticsearch/elasticsearch:8.19.8
              replicas: 1
              javaOpts: "-Xms256m -Xmx256m"
              existingSecret: "schnappy-elasticsearch"
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "2000m"
              storage:
                size: 5Gi
                storageClass: "local-path"
              retention:
                days: 30
            kibana:
              image: docker.elastic.co/kibana/kibana:8.19.8
              replicas: 1
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              ingress:
                enabled: false
            fluentbit:
              image: cr.fluentbit.io/fluent/fluent-bit:4.2.3
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          ai:
            enabled: false
          mail:
            enabled: false
          webhook:
            enabled: false
          minio:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false

    - name: Rsync chart to Vagrant VM
      ansible.builtin.command: vagrant rsync k3s
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Deploy chart with ELK enabled
      ansible.builtin.shell: |
        helm upgrade --install schnappy /vagrant-platform/helm \
          --namespace {{ ns }} \
          --create-namespace \
          --values /tmp/schnappy-elk-test-values.yml \
          --wait --timeout 600s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: helm_result

    - name: Show pod status
      ansible.builtin.shell: |
        k3s kubectl get pods -n {{ ns }} -o wide
      register: pod_status
      changed_when: false

    - name: Pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"

    # ================================================================
    # Phase 3: Verify Elasticsearch
    # ================================================================

    - name: Wait for Elasticsearch StatefulSet rollout
      ansible.builtin.shell: |
        k3s kubectl rollout status statefulset/schnappy-elasticsearch -n {{ ns }} --timeout=300s
      register: es_rollout
      changed_when: false

    - name: Verify ExternalSecret synced for elasticsearch
      ansible.builtin.shell: |
        k3s kubectl get externalsecret schnappy-elasticsearch -n {{ ns }} \
          -o jsonpath='{.status.conditions[0].reason}'
      register: es_secret_sync
      retries: 12
      delay: 5
      until: es_secret_sync.stdout == "SecretSynced"
      changed_when: false

    - name: Wait for Elasticsearch to respond
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} schnappy-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} http://localhost:9200/_cluster/health?pretty
      register: es_health
      retries: 30
      delay: 10
      until: es_health.rc == 0
      changed_when: false

    - name: "ES cluster health"
      ansible.builtin.debug:
        msg: "{{ es_health.stdout_lines }}"

    - name: Verify auth is enforced (unauthenticated should fail)
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} schnappy-elasticsearch-0 -- \
          curl -sf http://localhost:9200/ 2>&1 || echo "AUTH_REQUIRED"
      register: es_noauth
      changed_when: false

    - name: "ES auth check"
      ansible.builtin.debug:
        msg: "{{ 'PASS — unauthenticated request rejected' if 'AUTH_REQUIRED' in es_noauth.stdout else 'FAIL — ES accessible without auth!' }}"

    # ================================================================
    # Phase 4: Verify Fluent-bit
    # ================================================================

    - name: Wait for Fluent-bit DaemonSet ready
      ansible.builtin.shell: |
        k3s kubectl rollout status daemonset/schnappy-fluentbit -n {{ ns }} --timeout=120s
      register: fb_rollout
      changed_when: false

    - name: Wait for logs to be shipped
      ansible.builtin.pause:
        seconds: 60

    - name: Query podlogs-* index for document count
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} schnappy-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/podlogs-*/_count' 2>/dev/null | \
          python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))"
      register: fb_count
      retries: 18
      delay: 10
      until: (fb_count.stdout | default('0') | int) > 0
      changed_when: false
      failed_when: false

    - name: "Fluent-bit: {{ fb_count.stdout | default('0') }} documents indexed"
      ansible.builtin.debug:
        msg: "{{ 'PASS — logs are flowing' if (fb_count.stdout | default('0') | int) > 0 else 'WARN — no logs yet (may need more time)' }}"

    # ================================================================
    # Phase 5: Verify Kibana
    # ================================================================

    - name: Wait for Kibana deployment rollout
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/schnappy-kibana -n {{ ns }} --timeout=300s
      register: kb_rollout
      changed_when: false

    - name: Check Kibana HTTP status
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} deploy/schnappy-kibana -- \
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:5601/api/status
      register: kb_health
      retries: 24
      delay: 15
      until: kb_health.stdout | default('') == '200'
      changed_when: false
      failed_when: false

    - name: "Kibana: HTTP {{ kb_health.stdout | default('unreachable') }}"
      ansible.builtin.debug:
        msg: "{{ 'PASS — Kibana responding' if kb_health.stdout | default('') == '200' else 'WARN — Kibana not ready (HTTP ' + kb_health.stdout | default('N/A') + ')' }}"

    # ================================================================
    # Phase 6: Verify ILM policy
    # ================================================================

    - name: Check ILM policy exists
      ansible.builtin.shell: |
        k3s kubectl exec -n {{ ns }} schnappy-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/_ilm/policy/logs-30d-retention' 2>/dev/null
      register: ilm_check
      retries: 12
      delay: 5
      until: ilm_check.rc == 0
      changed_when: false
      failed_when: false

    - name: "ILM policy: {{ 'exists' if ilm_check.rc == 0 else 'missing' }}"
      ansible.builtin.debug:
        msg: "ILM policy status: {{ 'exists' if ilm_check.rc == 0 else 'missing — ILM job may not have completed' }}"

    # ================================================================
    # Phase 7: Summary
    # ================================================================

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/schnappy-elk-test-values.yml
        state: absent

    - name: Set result facts
      ansible.builtin.set_fact:
        es_pass: "{{ es_rollout.rc is defined and es_rollout.rc == 0 }}"
        es_auth_pass: "{{ 'AUTH_REQUIRED' in es_noauth.stdout }}"
        es_secret_pass: "{{ es_secret_sync.stdout == 'SecretSynced' }}"
        fluentbit_pass: "{{ fb_rollout.rc is defined and fb_rollout.rc == 0 }}"
        fluentbit_logs_pass: "{{ (fb_count.stdout | default('0') | int) > 0 }}"
        kb_pass: "{{ kb_health.stdout | default('') == '200' }}"

    - name: Count passes
      ansible.builtin.set_fact:
        pass_count: "{{ [es_pass, es_auth_pass, es_secret_pass, fluentbit_pass, kb_pass] | select('equalto', true) | list | length }}"
        total_checks: 5

    - name: "TEST RESULT"
      vars:
        all_pass: "{{ es_pass and es_auth_pass and es_secret_pass and fluentbit_pass and kb_pass }}"
      ansible.builtin.debug:
        msg: |
          ====================================================
          ELK Integration Test: {{ 'PASS' if all_pass else 'PARTIAL' }}

          [{{ 'PASS' if es_pass else 'FAIL' }}] Elasticsearch StatefulSet running
          [{{ 'PASS' if es_auth_pass else 'FAIL' }}] Elasticsearch auth enforced
          [{{ 'PASS' if es_secret_pass else 'FAIL' }}] ExternalSecret synced
          [{{ 'PASS' if fluentbit_pass else 'FAIL' }}] Fluent-bit DaemonSet running
          [{{ 'PASS' if fluentbit_logs_pass else 'WARN' }}] Logs flowing ({{ fb_count.stdout | default('0') }} docs)
          [{{ 'PASS' if kb_pass else 'WARN' }}] Kibana responding (HTTP {{ kb_health.stdout | default('N/A') }})
          [{{ 'INFO' }}] ILM policy: {{ 'exists' if ilm_check.rc == 0 else 'pending' }}
          ====================================================

    - name: Fail if critical checks failed
      ansible.builtin.fail:
        msg: "Critical ELK checks failed — see summary above"
      when: not (es_pass and es_auth_pass and es_secret_pass and fluentbit_pass)
