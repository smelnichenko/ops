---
# Test ELK stack deployment in Vagrant against Pi Vault + schnappy namespace.
#
# Seeds test credentials into Pi Vault (pi1:8200); deploys the ELK chart with
# externalSecrets pointing at `secret/schnappy/elasticsearch`; verifies ES +
# Fluent-bit + Kibana + ILM.
#
# Prereqs: `_vagrant:k8s-stack` (Pi stack + kubeadm + ESO configured).

# ─── Fetch Pi Vault root token ──────────────────────────────────────────────
- name: Read Pi Vault root token (from pi1)
  hosts: pi1
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_tasks: tasks/fetch-pi-vault-token.yml

- name: Test ELK stack integration
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    test_es_password: "vagrant-test-elastic-password"
    test_kibana_password: "vagrant-test-kibana-password"

  tasks:
# ─── Seed + deploy + assert ─────────────────────────────────────────────────
    - name: Configure ESO ClusterSecretStore → Pi Vault
      ansible.builtin.import_tasks: tasks/setup-eso-vault-backend.yml

    - name: Seed elasticsearch secret
      ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
      vars:
        secret_path: schnappy/elasticsearch
        secret_data:
          password: "{{ test_es_password }}"
          kibana_password: "{{ test_kibana_password }}"

    - name: Ensure schnappy namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    - name: Write Helm values for ELK test
      ansible.builtin.copy:
        dest: /tmp/schnappy-elk-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
          networkPolicies:
            enabled: false
          frontend:
            enabled: false
          site:
            enabled: false
          aptCache:
            enabled: false
          app:
            replicas: 0
          valkey:
            enabled: false
          postgres:
            enabled: false
          elk:
            enabled: true
            elasticsearch:
              image: docker.elastic.co/elasticsearch/elasticsearch:8.19.8
              replicas: 1
              javaOpts: "-Xms256m -Xmx256m"
              existingSecret: "schnappy-elasticsearch"
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "2000m"
              storage:
                size: 5Gi
                storageClass: "local-path"
              retention:
                days: 30
            kibana:
              image: docker.elastic.co/kibana/kibana:8.19.8
              replicas: 1
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              ingress:
                enabled: false
            fluentbit:
              image: cr.fluentbit.io/fluent/fluent-bit:4.2.3
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          ai:
            enabled: false
          mail:
            enabled: false
          webhook:
            enabled: false
          minio:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false

    - name: Deploy schnappy-mesh (provides ServiceAccounts for ES/Kibana)
      ansible.builtin.import_tasks: tasks/deploy-schnappy-mesh.yml

    - name: Deploy chart with ELK enabled (no wait — k8s_info below handles readiness)
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: schnappy
        chart_ref: /vagrant-platform/helm/schnappy-observability
        release_namespace: "{{ ns }}"
        create_namespace: true
        values_files:
          - /tmp/schnappy-elk-test-values.yml
        wait: false
      register: helm_result

    - name: Show pod status
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ ns }}"
      register: pod_status

    - name: Pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.resources | map(attribute='metadata.name') | list }}"

    - name: Wait for Elasticsearch StatefulSet rollout (up to 30 min)
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: StatefulSet
        name: schnappy-elasticsearch
        namespace: "{{ ns }}"
      register: es_rollout
      retries: 180
      delay: 10
      until:
        - es_rollout.resources | length > 0
        - es_rollout.resources[0].status.readyReplicas | default(0) == es_rollout.resources[0].spec.replicas

    - name: Verify ExternalSecret synced for elasticsearch
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        name: schnappy-elasticsearch
        namespace: "{{ ns }}"
      register: es_secret_sync
      retries: 12
      delay: 5
      until:
        - es_secret_sync.resources | length > 0
        - (es_secret_sync.resources[0].status.conditions | default([{}]))[0].reason | default('') == "SecretSynced"

    - name: Set ExternalSecret reason fact
      ansible.builtin.set_fact:
        es_secret_reason: "{{ (es_secret_sync.resources[0].status.conditions | default([{}]))[0].reason | default('') }}"

    - name: Wait for Elasticsearch to respond
      kubernetes.core.k8s_exec:
        kubeconfig: /etc/kubernetes/admin.conf
        namespace: "{{ ns }}"
        pod: "schnappy-elasticsearch-0"
        command: curl -sf -u elastic:{{ test_es_password }} http://localhost:9200/_cluster/health?pretty
      register: es_health
      retries: 30
      delay: 10
      until: es_health.rc == 0

    - name: ES cluster health
      ansible.builtin.debug:
        msg: "{{ es_health.stdout_lines }}"

    - name: Verify auth is enforced (unauthenticated should fail)
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} schnappy-elasticsearch-0 -- \
          curl -sf http://localhost:9200/ 2>&1 || echo "AUTH_REQUIRED"
      register: es_noauth
      changed_when: false

    - name: ES auth check
      ansible.builtin.debug:
        msg: "{{ 'PASS — unauthenticated request rejected' if 'AUTH_REQUIRED' in es_noauth.stdout else 'FAIL — ES accessible without auth!' }}"

    - name: Wait for Fluent-bit DaemonSet ready
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: DaemonSet
        name: schnappy-fluentbit
        namespace: "{{ ns }}"
      register: fb_rollout
      retries: 40
      delay: 3
      until:
        - fb_rollout.resources | length > 0
        - fb_rollout.resources[0].status.numberReady | default(0) == fb_rollout.resources[0].status.desiredNumberScheduled | default(-1)

    - name: Wait for logs to be shipped
      ansible.builtin.pause:
        seconds: 60

    - name: Query podlogs-* index for document count
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} schnappy-elasticsearch-0 -- \
          curl -sf -u elastic:{{ test_es_password }} \
            'http://localhost:9200/podlogs-*/_count' 2>/dev/null | \
          python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))"
      register: fb_count
      retries: 18
      delay: 10
      until: (fb_count.stdout | default('0') | int) > 0
      changed_when: false
      failed_when: false

    - name: Fluent-bit ingestion
      ansible.builtin.debug:
        msg: "{{ 'PASS — logs are flowing' if (fb_count.stdout | default('0') | int) > 0 else 'WARN — no logs yet (may need more time)' }} ({{ fb_count.stdout | default('0') }} docs)"

    - name: Wait for Kibana deployment rollout
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: schnappy-kibana
        namespace: "{{ ns }}"
      register: kb_rollout
      retries: 100
      delay: 3
      until:
        - kb_rollout.resources | length > 0
        - kb_rollout.resources[0].status.readyReplicas | default(0) == kb_rollout.resources[0].spec.replicas
        - kb_rollout.resources[0].status.updatedReplicas | default(0) == kb_rollout.resources[0].spec.replicas

    - name: Check Kibana HTTP status
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-kibana -- curl -sf -o /dev/null -w '%{http_code}' http://localhost:5601/api/status
      register: kb_health
      retries: 24
      delay: 15
      until: kb_health.stdout | default('') == '200'
      failed_when: false

    - name: Kibana HTTP
      ansible.builtin.debug:
        msg: "{{ 'PASS — Kibana responding' if kb_health.stdout | default('') == '200' else 'WARN — Kibana not ready (HTTP ' + kb_health.stdout | default('N/A') + ')' }}"

    - name: Check ILM policy exists
      kubernetes.core.k8s_exec:
        kubeconfig: /etc/kubernetes/admin.conf
        namespace: "{{ ns }}"
        pod: "schnappy-elasticsearch-0"
        command: curl -sf -u elastic:{{ test_es_password }}  'http://localhost:9200/_ilm/policy/logs-30d-retention' 2>/dev/null
      register: ilm_check
      retries: 12
      delay: 5
      until: ilm_check.rc == 0
      failed_when: false

    - name: ILM policy
      ansible.builtin.debug:
        msg: "ILM policy: {{ 'exists' if ilm_check.rc == 0 else 'pending' }}"

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/schnappy-elk-test-values.yml
        state: absent

    - name: Set result facts
      ansible.builtin.set_fact:
        es_pass: "{{ not es_rollout.failed | default(false) }}"
        es_auth_pass: "{{ 'AUTH_REQUIRED' in es_noauth.stdout }}"
        es_secret_pass: "{{ es_secret_reason == 'SecretSynced' }}"
        fluentbit_pass: "{{ not fb_rollout.failed | default(false) }}"
        fluentbit_logs_pass: "{{ (fb_count.stdout | default('0') | int) > 0 }}"
        kb_pass: "{{ kb_health.stdout | default('') == '200' }}"

    - name: TEST RESULT
      vars:
        all_pass: "{{ es_pass and es_auth_pass and es_secret_pass and fluentbit_pass and kb_pass }}"
      ansible.builtin.debug:
        msg: |
          ====================================================
          ELK Integration Test: {{ 'PASS' if all_pass else 'PARTIAL' }}

          [{{ 'PASS' if es_pass else 'FAIL' }}] Elasticsearch StatefulSet running
          [{{ 'PASS' if es_auth_pass else 'FAIL' }}] Elasticsearch auth enforced
          [{{ 'PASS' if es_secret_pass else 'FAIL' }}] ExternalSecret synced
          [{{ 'PASS' if fluentbit_pass else 'FAIL' }}] Fluent-bit DaemonSet running
          [{{ 'PASS' if fluentbit_logs_pass else 'WARN' }}] Logs flowing ({{ fb_count.stdout | default('0') }} docs)
          [{{ 'PASS' if kb_pass else 'WARN' }}] Kibana responding (HTTP {{ kb_health.stdout | default('N/A') }})
          [{{ 'INFO' }}] ILM policy: {{ 'exists' if ilm_check.rc == 0 else 'pending' }}
          ====================================================

    - name: Fail if critical checks failed
      ansible.builtin.fail:
        msg: "Critical ELK checks failed — see summary above"
      when: not (es_pass and es_auth_pass and es_secret_pass and fluentbit_pass)
