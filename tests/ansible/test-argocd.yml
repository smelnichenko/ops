---
# Test Argo CD GitOps in Vagrant
#
# Verifies:
#   1. Argo CD controllers running (server, repo-server, application-controller)
#   2. Application created and synced from Git
#   3. Git-push reconciliation (update → Argo CD detects → applies)
#
# Usage:
#   ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-argocd.yml
#
- name: Test Argo CD GitOps
  hosts: target
  become: true
  gather_facts: false

  vars:
    argocd_namespace: argocd
    test_namespace: argocd-test
    # Pi Forgejo from tasks/use-pi-forgejo.yml (sets forgejo_host + admin_user)
    test_repo_name: "argocd-test-infra"

  tasks:
    # ================================================================
    # Phase 1: Verify Pi Forgejo + create test repo
    # ================================================================
    - ansible.builtin.import_tasks: tasks/use-pi-forgejo.yml

    - name: Delete prior test repo if it exists (idempotent)
      ansible.builtin.uri:
        url: "http://{{ forgejo_host }}/api/v1/repos/{{ forgejo_admin_user }}/{{ test_repo_name }}"
        method: DELETE
        user: "{{ forgejo_admin_user }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        status_code: [204, 404]
      changed_when: false

    - name: Create fresh test repo in Pi Forgejo
      ansible.builtin.uri:
        url: "http://{{ forgejo_host }}/api/v1/user/repos"
        method: POST
        user: "{{ forgejo_admin_user }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ test_repo_name }}"
          auto_init: true
          default_branch: main
        status_code: [201, 409]
      changed_when: false

    - name: Set forgejo URL facts (for repo clone + Argo CD)
      ansible.builtin.set_fact:
        forgejo_repo_url: "http://{{ forgejo_host }}/{{ forgejo_admin_user }}/{{ test_repo_name }}.git"

    - name: Write seed manifests
      ansible.builtin.copy:
        dest: "/tmp/argocd-test-{{ item.name }}"
        content: "{{ item.content }}"
        mode: "0644"
      loop:
        - name: namespace.yaml
          content: |
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ test_namespace }}
        - name: configmap.yaml
          content: |
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: argocd-test
              namespace: {{ test_namespace }}
            data:
              version: "v1"
              message: "Initial deployment via Argo CD"

    - name: Push seed content to infra repo
      ansible.builtin.shell: |
        set -e
        REPO_DIR=$(mktemp -d)
        cd "$REPO_DIR"
        git init
        git config user.email "test@test.local"
        git config user.name "Test"
        git remote add origin "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}/{{ forgejo_admin_user }}/{{ test_repo_name }}.git"
        git fetch origin main 2>/dev/null || true
        git checkout -b main
        git pull origin main 2>/dev/null || true

        mkdir -p clusters/production
        cp /tmp/argocd-test-namespace.yaml clusters/production/namespace.yaml
        cp /tmp/argocd-test-configmap.yaml clusters/production/configmap.yaml

        git add -A
        git commit -m "seed: initial test manifests" --allow-empty
        git push -f origin main
        rm -rf "$REPO_DIR"
      changed_when: false

    # ================================================================
    # Phase 3: Install Argo CD
    # ================================================================

    - name: "PHASE 3: Install Argo CD"
      ansible.builtin.debug:
        msg: "Deploying Argo CD controllers"

    - name: Create argocd namespace
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ argocd_namespace }}"
            labels:
              pod-security.kubernetes.io/enforce: baseline
              pod-security.kubernetes.io/audit: restricted
              pod-security.kubernetes.io/warn: restricted

    - name: Add Argo Helm repo
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm

    - name: Deploy Argo CD
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: "{{ argocd_namespace }}"
        wait: true
        wait_timeout: 5m
        values:
          configs:
            params:
              server.insecure: true
          dex:
            enabled: false
          notifications:
            enabled: false
          applicationSet:
            enabled: false
          server:
            resources:
              requests: { cpu: 50m, memory: 64Mi }
              limits: { cpu: 500m, memory: 256Mi }
          repoServer:
            resources:
              requests: { cpu: 50m, memory: 64Mi }
              limits: { cpu: 500m, memory: 512Mi }
          controller:
            resources:
              requests: { cpu: 50m, memory: 128Mi }
              limits: { cpu: 500m, memory: 512Mi }
          redis:
            resources:
              requests: { cpu: 25m, memory: 32Mi }
              limits: { cpu: 100m, memory: 128Mi }

    - name: Wait for argocd-server
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: argocd-server
        namespace: "{{ argocd_namespace }}"
      register: argocd_server
      retries: 60
      delay: 5
      until:
        - argocd_server.resources | default([]) | length > 0
        - (argocd_server.resources[0].status.readyReplicas | default(0)) == (argocd_server.resources[0].spec.replicas | default(1))
        - (argocd_server.resources[0].status.updatedReplicas | default(0)) == (argocd_server.resources[0].spec.replicas | default(1))

    - name: Wait for argocd-repo-server
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Deployment
        name: argocd-repo-server
        namespace: "{{ argocd_namespace }}"
      register: argocd_repo_server
      retries: 60
      delay: 5
      until:
        - argocd_repo_server.resources | default([]) | length > 0
        - (argocd_repo_server.resources[0].status.readyReplicas | default(0)) == (argocd_repo_server.resources[0].spec.replicas | default(1))
        - (argocd_repo_server.resources[0].status.updatedReplicas | default(0)) == (argocd_repo_server.resources[0].spec.replicas | default(1))

    - name: Wait for argocd-application-controller
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: StatefulSet
        name: argocd-application-controller
        namespace: "{{ argocd_namespace }}"
      register: argocd_controller
      retries: 60
      delay: 5
      until:
        - argocd_controller.resources | default([]) | length > 0
        - (argocd_controller.resources[0].status.readyReplicas | default(0)) == (argocd_controller.resources[0].spec.replicas | default(1))
        - (argocd_controller.resources[0].status.updatedReplicas | default(0)) == (argocd_controller.resources[0].spec.replicas | default(1))

    # ================================================================
    # Phase 4: Configure Argo CD source and Application
    # ================================================================

    - name: "PHASE 4: Create Argo CD Application"
      ansible.builtin.debug:
        msg: "Configuring Argo CD to watch test repo"

    - name: Create repo credentials secret
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: forgejo-repo-creds
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: repo-creds
          type: Opaque
          stringData:
            type: git
            url: "http://{{ forgejo_host }}"
            username: "{{ forgejo_admin_user }}"
            password: "{{ forgejo_admin_password }}"

    - name: Create test Application
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: test-app
            namespace: "{{ argocd_namespace }}"
          spec:
            project: default
            source:
              repoURL: "http://{{ forgejo_host }}/{{ forgejo_admin_user }}/{{ test_repo_name }}.git"
              targetRevision: main
              path: clusters/production
            destination:
              server: https://kubernetes.default.svc
            syncPolicy:
              automated:
                selfHeal: true
                prune: true
              syncOptions:
                - CreateNamespace=true

    # ================================================================
    # Phase 5: Verify initial reconciliation
    # ================================================================

    - name: "PHASE 5: Verify initial reconciliation"
      ansible.builtin.debug:
        msg: "Waiting for Argo CD to sync test manifests"

    - name: Wait for Application to sync
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: test-app
        namespace: "{{ argocd_namespace }}"
      register: sync_result
      retries: 60
      delay: 5
      until:
        - sync_result.resources | default([]) | length > 0
        - (sync_result.resources[0].status.sync.status | default('')) == 'Synced'
        - (sync_result.resources[0].status.health.status | default('')) == 'Healthy'
      failed_when: false

    - name: Set initial sync fact
      ansible.builtin.set_fact:
        initial_sync_passed: "{{ not (sync_result.failed | default(false)) }}"

    - name: Check test namespace exists
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Namespace
        name: "{{ test_namespace }}"
      register: ns_check

    - name: Check ConfigMap v1 exists
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: ConfigMap
        name: argocd-test
        namespace: "{{ test_namespace }}"
      register: cm_check

    - name: Set v1 facts
      ansible.builtin.set_fact:
        namespace_created: "{{ (ns_check.resources | default([]) | length) > 0 }}"
        configmap_v1: "{{ (cm_check.resources | default([]) | length) > 0 and (cm_check.resources[0].data.version | default('')) == 'v1' }}"

    # ================================================================
    # Phase 6: Test git-push reconciliation
    # ================================================================

    - name: "PHASE 6: Test git-push reconciliation"
      ansible.builtin.debug:
        msg: "Pushing v2 ConfigMap and waiting for Argo CD to apply it"

    - name: Push v2 ConfigMap
      ansible.builtin.shell: |
        set -e
        REPO_DIR=$(mktemp -d)
        cd "$REPO_DIR"
        git init
        git config user.email "test@test.local"
        git config user.name "Test"
        git remote add origin "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}/{{ forgejo_admin_user }}/{{ test_repo_name }}.git"
        git fetch origin main
        git checkout main

        cat > clusters/production/configmap.yaml <<'CMEOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: argocd-test
          namespace: {{ test_namespace }}
        data:
          version: "v2"
          message: "Updated via git push — Argo CD reconciliation test"
        CMEOF

        git add -A
        git commit -m "update: configmap v2"
        git push origin main
        rm -rf "$REPO_DIR"
      changed_when: false

    - name: Wait for ConfigMap v2
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: ConfigMap
        name: argocd-test
        namespace: "{{ test_namespace }}"
      register: v2_result
      retries: 90
      delay: 5
      until:
        - v2_result.resources | default([]) | length > 0
        - (v2_result.resources[0].data.version | default('')) == 'v2'
      failed_when: false

    - name: Set v2 fact
      ansible.builtin.set_fact:
        configmap_v2: "{{ not (v2_result.failed | default(false)) }}"

    # ================================================================
    # Phase 7: Verify and report
    # ================================================================

    - name: "PHASE 7: Verify controllers and report"
      ansible.builtin.debug:
        msg: "Checking final state"

    - name: Check controller pods
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ argocd_namespace }}"
      register: pods

    - name: Check Application status
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: "{{ argocd_namespace }}"
      register: apps

    - name: Check server pod running
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - app.kubernetes.io/component=server
      register: server_status

    - name: Check repo-server pod running
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - app.kubernetes.io/component=repo-server
      register: repo_server_status

    - name: Check controller pod running
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - app.kubernetes.io/component=application-controller
      register: controller_status

    - name: Set pod-running facts
      ansible.builtin.set_fact:
        server_running: "{{ (server_status.resources | default([]) | length) > 0 and (server_status.resources[0].status.phase | default('')) == 'Running' }}"
        repo_server_running: "{{ (repo_server_status.resources | default([]) | length) > 0 and (repo_server_status.resources[0].status.phase | default('')) == 'Running' }}"
        controller_running: "{{ (controller_status.resources | default([]) | length) > 0 and (controller_status.resources[0].status.phase | default('')) == 'Running' }}"

    - name: TEST RESULT
      ansible.builtin.debug:
        msg: |
          ====================================================
          Argo CD Integration Test: {{ 'PASS' if (initial_sync_passed and namespace_created and configmap_v1 and configmap_v2 and server_running and repo_server_running and controller_running) else 'FAIL' }}

          [{{ 'PASS' if server_running else 'FAIL' }}] argocd-server running
          [{{ 'PASS' if repo_server_running else 'FAIL' }}] argocd-repo-server running
          [{{ 'PASS' if controller_running else 'FAIL' }}] argocd-application-controller running
          [{{ 'PASS' if initial_sync_passed else 'FAIL' }}] Initial sync (Synced + Healthy)
          [{{ 'PASS' if namespace_created else 'FAIL' }}] Test namespace created
          [{{ 'PASS' if configmap_v1 else 'FAIL' }}] ConfigMap v1 applied
          [{{ 'PASS' if configmap_v2 else 'FAIL' }}] ConfigMap v2 reconciled after git push
          ====================================================

    - name: Cleanup — delete test repo from Pi Forgejo
      ansible.builtin.uri:
        url: "http://{{ forgejo_host }}/api/v1/repos/{{ forgejo_admin_user }}/{{ test_repo_name }}"
        method: DELETE
        user: "{{ forgejo_admin_user }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        status_code: [204, 404]
      changed_when: false

    - name: Fail if critical checks failed
      ansible.builtin.fail:
        msg: "One or more Argo CD integration tests failed"
      when: not (initial_sync_passed and namespace_created and configmap_v1 and configmap_v2)
