---
# Cilium Migration End-to-End Test
#
# Tests the full kubeadm reset + Cilium install + Velero restore flow.
# Forgejo runs on vault-pi (outside the cluster) — survives cluster reset.
#
# Prerequisites:
#   - vagrant up (kubeadm + vault-pi VMs)
#   - Forgejo running on vault-pi (installed by Vagrantfile provisioner)
#   - Vault Pi initialized
#
# Usage:
#   # First setup Vault:
#   ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml
#   ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
#
#   # Then run this test:
#   ansible-playbook -i inventory/vagrant.yml tests/ansible/test-cilium-migration.yml

# ─── Play 0: Verify Forgejo on vault-pi ──────────────────────────────────────
- name: "Verify Forgejo on vault-pi"
  hosts: vault_pi
  become: true
  gather_facts: false

  tasks:
    - name: Wait for vault-pi SSH
      ansible.builtin.wait_for_connection:
        delay: 2
        timeout: 60

    - name: Check Forgejo is running
      ansible.builtin.uri:
        url: http://localhost:3000/
        status_code: 200
      register: forgejo_check
      retries: 5
      delay: 5
      until: forgejo_check.status == 200

    - name: Create test repos in Forgejo
      ansible.builtin.shell: |
        # Create schnappy org
        curl -sf -X POST http://localhost:3000/api/v1/orgs \
          -u forgejo_admin:vagrant-forgejo-pw \
          -H 'Content-Type: application/json' \
          -d '{"username":"schnappy","visibility":"private"}' || true

        # Create infra and platform repos
        for repo in infra platform; do
          curl -sf -X POST http://localhost:3000/api/v1/orgs/schnappy/repos \
            -u forgejo_admin:vagrant-forgejo-pw \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"$repo\",\"auto_init\":false,\"private\":true}" || true
        done
      changed_when: true

    - name: Verify repos created
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/repos/schnappy/{{ item }}"
        url_username: forgejo_admin
        url_password: vagrant-forgejo-pw
        force_basic_auth: true
        status_code: 200
      loop:
        - infra
        - platform

# ─── Play 1: Pre-migration setup on kubeadm ──────────────────────────────────
- name: "Pre-migration: Deploy workloads with PVC data"
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    node_ip: "192.168.56.10"
    forgejo_ip: "192.168.56.20"
    cilium_version: "1.19.2"

  tasks:
    - name: Push repos to Forgejo on vault-pi
      ansible.builtin.shell: |
        for repo in infra platform; do
          cd /vagrant-$repo
          git init 2>/dev/null || true
          git add -A 2>/dev/null
          git config user.email "test@test.local" 2>/dev/null
          git config user.name "test" 2>/dev/null
          git commit -m "initial" --allow-empty 2>/dev/null || true
          git remote remove forgejo 2>/dev/null || true
          git remote add forgejo http://forgejo_admin:vagrant-forgejo-pw@{{ forgejo_ip }}:3000/schnappy/$repo.git
          git push -u forgejo HEAD:main --force
        done
      become: false
      changed_when: true

    - name: Verify cluster is healthy with Calico
      ansible.builtin.shell: |
        kubectl get nodes | grep -q " Ready" && echo "node ready"
        kubectl get pods -n calico-system -l k8s-app=calico-node --no-headers | grep -q Running && echo "calico running"
      changed_when: false

    - name: Create namespace
      ansible.builtin.command: kubectl create namespace {{ ns }}
      register: ns_result
      changed_when: ns_result.rc == 0
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Create service accounts
      ansible.builtin.shell: |
        for sa in schnappy-postgres schnappy-redis schnappy-apt-cache; do
          kubectl create serviceaccount $sa -n {{ ns }} 2>/dev/null || true
        done
      changed_when: true

    - name: Deploy Postgres with PVC
      ansible.builtin.shell: |
        helm upgrade --install schnappy-data /vagrant-platform/helm/schnappy-data \
          --namespace {{ ns }} \
          --set fullnameOverride=schnappy \
          --set vault.secretsEnabled=false \
          --set networkPolicies.enabled=false \
          --set postgres.enabled=true \
          --set postgres.image=postgres:17-alpine \
          --set postgres.password=test-pw \
          --set postgres.database=monitor \
          --set postgres.storage.storageClass=local-path \
          --set redis.enabled=true \
          --set redis.image=redis:7-alpine \
          --set kafka.enabled=false \
          --set scylla.enabled=false \
          --set minio.enabled=false
      changed_when: true

    - name: Wait for Postgres to be ready
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          READY=$(kubectl get pod -n {{ ns }} -l app.kubernetes.io/component=postgres \
            -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null)
          if [ "$READY" = "true" ]; then echo "postgres ready"; exit 0; fi
          sleep 5
        done
        kubectl get pods -n {{ ns }} --no-headers
        exit 1
      changed_when: false
      timeout: 330

    - name: Insert test data into Postgres
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-postgres -- \
          psql -U postgres -d monitor -c "
            CREATE TABLE IF NOT EXISTS migration_test (id serial PRIMARY KEY, data text, created_at timestamp DEFAULT now());
            INSERT INTO migration_test (data) VALUES ('cilium-migration-test-{{ ansible_date_time.iso8601 | default('unknown') }}');
            SELECT count(*) as rows FROM migration_test;
          "
      register: test_data
      changed_when: true

    - name: Record test data count
      ansible.builtin.debug:
        msg: "Test data inserted: {{ test_data.stdout }}"

    - name: Record pre-migration pod count
      ansible.builtin.shell: |
        kubectl get pods -n {{ ns }} --no-headers | grep -c Running
      register: pre_pod_count
      changed_when: false

    # ================================================================
    # Phase 2: Setup Velero with Pi MinIO + backup
    # ================================================================

    - name: Create Velero credentials secret
      ansible.builtin.shell: |
        kubectl create namespace velero 2>/dev/null || true
        kubectl create secret generic velero-credentials -n velero \
          --from-literal=cloud="[default]
        aws_access_key_id=velero-admin
        aws_secret_access_key=velero-vagrant-secret" \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Install Velero via Helm pointing to Pi MinIO
      ansible.builtin.shell: |
        helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts 2>/dev/null || true
        helm repo update vmware-tanzu
        helm upgrade --install velero vmware-tanzu/velero \
          -n velero \
          --version 12.0.0 \
          --set initContainers[0].name=velero-plugin-for-aws \
          --set initContainers[0].image=velero/velero-plugin-for-aws:v1.11.1 \
          --set initContainers[0].volumeMounts[0].name=plugins \
          --set initContainers[0].volumeMounts[0].mountPath=/target \
          --set credentials.useSecret=true \
          --set credentials.existingSecret=velero-credentials \
          --set configuration.backupStorageLocation[0].name=default \
          --set configuration.backupStorageLocation[0].provider=aws \
          --set configuration.backupStorageLocation[0].bucket=velero \
          --set configuration.backupStorageLocation[0].config.region=us-east-1 \
          --set configuration.backupStorageLocation[0].config.s3ForcePathStyle=true \
          --set configuration.backupStorageLocation[0].config.s3Url=http://{{ forgejo_ip }}:9000 \
          --set configuration.defaultVolumesToFsBackup=true \
          --set snapshotsEnabled=false \
          --set deployNodeAgent=true \
          --set upgradeCRDs=false \
          --wait --timeout 300s
      changed_when: true
      timeout: 360

    - name: Wait for Velero to be ready
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          READY=$(kubectl get pod -n velero -l app.kubernetes.io/name=velero \
            -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null)
          [ "$READY" = "true" ] && echo "velero ready" && exit 0
          sleep 10
        done
        exit 1
      changed_when: false
      timeout: 330

    - name: Take Velero backup to Pi MinIO
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: velero.io/v1
        kind: Backup
        metadata:
          name: pre-cilium-vagrant
          namespace: velero
        spec:
          includedNamespaces: ["*"]
          defaultVolumesToFsBackup: true
          ttl: 24h
        EOF
        for i in $(seq 1 120); do
          PHASE=$(kubectl get backup pre-cilium-vagrant -n velero -o jsonpath='{.status.phase}' 2>/dev/null)
          if [ "$PHASE" = "Completed" ] || [ "$PHASE" = "PartiallyFailed" ]; then
            echo "Backup $PHASE"; exit 0
          fi
          sleep 10
        done
        echo "Backup timeout"; exit 1
      changed_when: true
      timeout: 1260

    # ================================================================
    # Phase 3: Destroy cluster
    # ================================================================

    - name: "Phase 3: kubeadm reset"
      ansible.builtin.shell: |
        kubeadm reset --force --cleanup-tmp-dir
      changed_when: true

    - name: Clean Calico host state (NOT flush ruleset!)
      ansible.builtin.shell: |
        nft delete table ip calico 2>/dev/null || true
        nft delete table ip6 calico 2>/dev/null || true
        rm -f /etc/cni/net.d/10-calico.conflist /etc/cni/net.d/calico-kubeconfig
        rm -f /opt/cni/bin/calico /opt/cni/bin/calico-ipam
        ip link delete vxlan.calico 2>/dev/null || true
      changed_when: true

    - name: Verify PVC data still on disk
      ansible.builtin.shell: |
        find /opt/local-path-provisioner/ -name "PG_VERSION" 2>/dev/null | head -1 || echo "no-pg-data"
      register: pvc_check
      changed_when: false

    - name: Assert PVC data survived reset
      ansible.builtin.assert:
        that: "'PG_VERSION' in pvc_check.stdout"
        fail_msg: "Postgres PVC data not found on disk after kubeadm reset!"

    - name: Verify Forgejo still accessible (on vault-pi)
      ansible.builtin.uri:
        url: "http://{{ forgejo_ip }}:3000/api/v1/repos/schnappy/infra"
        url_username: forgejo_admin
        url_password: vagrant-forgejo-pw
        force_basic_auth: true
        status_code: 200

    - name: Verify MinIO backup still on Pi
      ansible.builtin.uri:
        url: "http://{{ forgejo_ip }}:9000/minio/health/live"
        status_code: 200

    # ================================================================
    # Phase 4: Rebuild with Cilium
    # ================================================================

    - name: "Phase 4: kubeadm init (no kube-proxy)"
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --apiserver-advertise-address={{ node_ip }} \
          --skip-phases=addon/kube-proxy \
          --node-name={{ ansible_hostname | default('schnappy-test') }}
      changed_when: true

    - name: Setup kubeconfig
      ansible.builtin.shell: |
        mkdir -p /root/.kube /home/vagrant/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        cp /etc/kubernetes/admin.conf /home/vagrant/.kube/config
        chown -R vagrant:vagrant /home/vagrant/.kube
      changed_when: true

    - name: Remove control plane taint
      ansible.builtin.shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: true

    - name: Install Cilium
      ansible.builtin.shell: |
        helm repo add cilium https://helm.cilium.io/ 2>/dev/null || true
        helm repo update cilium
        helm install cilium cilium/cilium \
          --namespace kube-system \
          --version {{ cilium_version }} \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="{{ pod_cidr }}" \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ node_ip }} \
          --set k8sServicePort=6443 \
          --set cni.exclusive=false \
          --set routingMode=native \
          --set ipv4NativeRoutingCIDR={{ pod_cidr }} \
          --set bpf.masquerade=true \
          --set operator.replicas=1 \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=false \
          --wait --timeout 300s
      changed_when: true

    - name: Wait for node Ready
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          if kubectl get nodes | grep -q " Ready"; then echo "ready"; exit 0; fi
          sleep 5
        done
        exit 1
      changed_when: false
      timeout: 330

    - name: Install local-path-provisioner
      ansible.builtin.shell: |
        kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.31/deploy/local-path-storage.yaml
        kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      changed_when: true

    # ================================================================
    # Phase 5: Bootstrap Tier 0 + Restore
    # ================================================================

    - name: "Phase 5: Run bootstrap.sh (skip Velero — we install it separately)"
      ansible.builtin.shell: |
        export INFRA_DIR=/vagrant-infra
        /vagrant/bootstrap.sh cert-manager
        /vagrant/bootstrap.sh porkbun-webhook
        /vagrant/bootstrap.sh external-secrets
        /vagrant/bootstrap.sh istio
      become: false
      changed_when: true
      timeout: 600

    - name: Install Velero pointing to Pi MinIO
      ansible.builtin.shell: |
        kubectl create namespace velero 2>/dev/null || true
        kubectl create secret generic velero-credentials -n velero \
          --from-literal=cloud="[default]
        aws_access_key_id=velero-admin
        aws_secret_access_key=velero-vagrant-secret" \
          --dry-run=client -o yaml | kubectl apply -f -

        helm upgrade --install velero vmware-tanzu/velero \
          -n velero \
          --version 12.0.0 \
          --set initContainers[0].name=velero-plugin-for-aws \
          --set initContainers[0].image=velero/velero-plugin-for-aws:v1.11.1 \
          --set initContainers[0].volumeMounts[0].name=plugins \
          --set initContainers[0].volumeMounts[0].mountPath=/target \
          --set credentials.useSecret=true \
          --set credentials.existingSecret=velero-credentials \
          --set configuration.backupStorageLocation[0].name=default \
          --set configuration.backupStorageLocation[0].provider=aws \
          --set configuration.backupStorageLocation[0].bucket=velero \
          --set configuration.backupStorageLocation[0].config.region=us-east-1 \
          --set configuration.backupStorageLocation[0].config.s3ForcePathStyle=true \
          --set configuration.backupStorageLocation[0].config.s3Url=http://{{ forgejo_ip }}:9000 \
          --set configuration.defaultVolumesToFsBackup=true \
          --set snapshotsEnabled=false \
          --set deployNodeAgent=true \
          --set upgradeCRDs=false \
          --wait --timeout 300s
      changed_when: true
      timeout: 360

    - name: Restore from Pi MinIO backup
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: velero.io/v1
        kind: Restore
        metadata:
          name: cilium-restore
          namespace: velero
        spec:
          backupName: pre-cilium-vagrant
          includedNamespaces: ["*"]
          existingResourcePolicy: update
        EOF
        for i in $(seq 1 120); do
          PHASE=$(kubectl get restore cilium-restore -n velero -o jsonpath='{.status.phase}' 2>/dev/null)
          if [ "$PHASE" = "Completed" ] || [ "$PHASE" = "PartiallyFailed" ]; then
            echo "Restore $PHASE"; exit 0
          fi
          sleep 10
        done
        echo "Restore timeout"; exit 1
      changed_when: true
      timeout: 1260

    # ================================================================
    # Phase 6: Verify
    # ================================================================

    - name: "Phase 6: Wait for pods to stabilize"
      ansible.builtin.pause:
        seconds: 90

    - name: Create service accounts (if not restored)
      ansible.builtin.shell: |
        for sa in schnappy-postgres schnappy-redis schnappy-apt-cache; do
          kubectl create serviceaccount $sa -n {{ ns }} 2>/dev/null || true
        done
      changed_when: true

    - name: Wait for Postgres pod
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          READY=$(kubectl get pod -n {{ ns }} -l app.kubernetes.io/component=postgres \
            -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null)
          [ "$READY" = "true" ] && exit 0
          sleep 5
        done
        kubectl get pods -n {{ ns }} --no-headers
        exit 1
      changed_when: false
      timeout: 330

    - name: Verify test data survived migration
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-postgres -- \
          psql -U postgres -d monitor -c "SELECT count(*) FROM migration_test;"
      register: post_data
      changed_when: false

    - name: Assert data survived
      ansible.builtin.assert:
        that: "'1' in post_data.stdout or '2' in post_data.stdout"
        fail_msg: "Test data not found after migration! Data: {{ post_data.stdout }}"

    - name: Check Cilium is running
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l app.kubernetes.io/name=cilium-agent --no-headers | grep -q Running
      changed_when: false

    - name: Check no kube-proxy
      ansible.builtin.shell: |
        ! kubectl get daemonset kube-proxy -n kube-system 2>/dev/null
      changed_when: false

    - name: Check Hubble relay
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l app.kubernetes.io/name=hubble-relay --no-headers | grep -q Running
      changed_when: false

    - name: Check Forgejo still accessible
      ansible.builtin.uri:
        url: "http://{{ forgejo_ip }}:3000/api/v1/repos/schnappy/infra"
        url_username: forgejo_admin
        url_password: vagrant-forgejo-pw
        force_basic_auth: true
        status_code: 200

    - name: Post-migration pod count
      ansible.builtin.shell: |
        kubectl get pods -n {{ ns }} --no-headers | grep -c Running
      register: post_pod_count
      changed_when: false

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Cilium Migration Test Results
          ============================================
          Pre-migration pods:  {{ pre_pod_count.stdout }}
          Post-migration pods: {{ post_pod_count.stdout }}
          Postgres data:       {{ post_data.stdout | trim }}
          CNI: Cilium {{ cilium_version }}
          Forgejo: http://{{ forgejo_ip }}:3000 (on vault-pi)
          ============================================
