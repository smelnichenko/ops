---
# Cilium Migration End-to-End Test
#
# Tests: Calico cluster → pg_dump → kubeadm reset → Cilium rebuild →
#        Helm redeploy → pg_restore → verify data + auth + ArgoCD
#
# No Velero in this test — Postgres data backed up via pg_dump to Pi MinIO.
# Velero backup/restore is tested separately in test-dr.yml.
#
# Prerequisites:
#   - vagrant up (kubeadm + vault-pi VMs)
#   - Vault Pi + Vault cluster initialized
#
# Usage:
#   ansible-playbook -i inventory/vagrant.yml tests/ansible/test-cilium-migration.yml

# ─── Play 0: Verify Pi services ──────────────────────────────────────────────
- name: "Verify Pi services"
  hosts: vault_pi
  become: true
  gather_facts: false

  tasks:
    - name: Wait for vault-pi SSH
      ansible.builtin.wait_for_connection:
        delay: 2
        timeout: 60

    - name: Check Forgejo is running
      ansible.builtin.uri:
        url: http://localhost:3000/api/v1/version
        status_code: 200
      retries: 5
      delay: 5

    - name: Check MinIO is running
      ansible.builtin.uri:
        url: http://localhost:9000/minio/health/live
        status_code: 200

    - name: Check Keycloak is running
      ansible.builtin.uri:
        url: http://localhost:8080/realms/master
        status_code: 200
      retries: 10
      delay: 10

    - name: Create schnappy org and repos in Forgejo
      ansible.builtin.shell: |
        curl -sf -X POST http://localhost:3000/api/v1/orgs \
          -u forgejo_admin:vagrant-forgejo-pw \
          -H 'Content-Type: application/json' \
          -d '{"username":"schnappy","visibility":"private"}' || true
        for repo in infra platform; do
          curl -sf -X POST http://localhost:3000/api/v1/orgs/schnappy/repos \
            -u forgejo_admin:vagrant-forgejo-pw \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"$repo\",\"auto_init\":false,\"private\":true}" || true
        done
      changed_when: true

    - name: Ensure pg-dump bucket exists
      ansible.builtin.shell: |
        HOME=/tmp mc alias set local http://localhost:9000 velero-admin velero-vagrant-secret 2>/dev/null
        HOME=/tmp mc mb local/pg-dump --ignore-existing
      changed_when: true

# ─── Play 1: Pre-migration — deploy, populate, dump ──────────────────────────
- name: "Pre-migration: deploy and backup"
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    node_ip: "192.168.56.10"
    forgejo_ip: "192.168.56.20"
    cilium_version: "1.19.2"

  tasks:
    # ── Push repos to Pi Forgejo ──
    - name: Push repos to Forgejo on vault-pi
      ansible.builtin.shell: |
        for repo in infra platform; do
          cd /vagrant-$repo
          git init 2>/dev/null || true
          git add -A 2>/dev/null
          git config user.email "test@test.local"
          git config user.name "test"
          git commit -m "initial" --allow-empty 2>/dev/null || true
          git remote remove forgejo 2>/dev/null || true
          git remote add forgejo http://forgejo_admin:vagrant-forgejo-pw@{{ forgejo_ip }}:3000/schnappy/$repo.git
          git push -u forgejo HEAD:main --force
        done
      become: false
      changed_when: true

    # ── Verify Calico cluster ──
    - name: Verify cluster healthy with Calico
      ansible.builtin.shell: |
        kubectl get nodes | grep -q " Ready"
        kubectl get pods -n calico-system -l k8s-app=calico-node --no-headers | grep -q Running
      changed_when: false

    # ── Deploy Postgres ──
    - name: Create namespace and service accounts
      ansible.builtin.shell: |
        kubectl create namespace {{ ns }} 2>/dev/null || true
        for sa in schnappy-postgres schnappy-redis schnappy-apt-cache; do
          kubectl create serviceaccount $sa -n {{ ns }} 2>/dev/null || true
        done
      changed_when: true

    - name: Deploy schnappy-data
      ansible.builtin.shell: |
        helm upgrade --install schnappy-data /vagrant-platform/helm/schnappy-data \
          --namespace {{ ns }} \
          --set fullnameOverride=schnappy \
          --set vault.secretsEnabled=false \
          --set networkPolicies.enabled=false \
          --set postgres.enabled=true \
          --set postgres.image=postgres:17-alpine \
          --set postgres.password=test-pw \
          --set postgres.database=monitor \
          --set postgres.storage.storageClass=local-path \
          --set redis.enabled=true \
          --set redis.image=redis:7-alpine \
          --set kafka.enabled=false \
          --set scylla.enabled=false \
          --set minio.enabled=false \
          --set aptCache.enabled=false \
          --wait --timeout 300s
      changed_when: true
      timeout: 360

    - name: Wait for Postgres ready
      ansible.builtin.shell: |
        until kubectl get pod -n {{ ns }} -l app.kubernetes.io/component=postgres \
          -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q true; do
          sleep 5
        done
        echo "postgres ready"
      changed_when: false
      timeout: 300

    # ── Keycloak on Pi: create test user ──
    - name: Create test user in Keycloak on Pi
      ansible.builtin.shell: |
        KC_URL=http://{{ forgejo_ip }}:8080
        TOKEN=$(curl -sf -X POST $KC_URL/realms/master/protocol/openid-connect/token \
          -d "client_id=admin-cli&grant_type=password&username=admin&password=admin-test-pw" | \
          python3 -c 'import sys,json; print(json.load(sys.stdin)["access_token"])')
        curl -sf -X POST $KC_URL/admin/realms/schnappy/users \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"username":"testuser","enabled":true,"emailVerified":true,"email":"test@test.local","firstName":"Test","lastName":"User","credentials":[{"type":"password","value":"test123","temporary":false}]}'
        echo "test user created"
      changed_when: true

    - name: Verify test user can authenticate (pre-migration)
      ansible.builtin.shell: |
        RESULT=$(curl -s -X POST http://{{ forgejo_ip }}:8080/realms/schnappy/protocol/openid-connect/token \
          -d "client_id=admin-cli&grant_type=password&username=testuser&password=test123")
        echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print("authenticated:", d.get("token_type") == "Bearer")'
      register: pre_auth
      changed_when: false

    - name: Assert pre-migration auth works
      ansible.builtin.assert:
        that: "'authenticated: True' in pre_auth.stdout"
        fail_msg: "FAIL: Keycloak auth failed pre-migration"

    # ── Insert test data ──
    - name: Insert test data
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-postgres -c postgres -- \
          psql -U postgres -d monitor -c "
            CREATE TABLE IF NOT EXISTS migration_test (id serial PRIMARY KEY, data text);
            INSERT INTO migration_test (data) VALUES ('cilium-test-data');
            SELECT count(*) as rows FROM migration_test;
          "
      register: pre_data
      changed_when: true

    - name: Show pre-migration data
      ansible.builtin.debug:
        msg: "{{ pre_data.stdout }}"

    # ── pg_dump to Pi MinIO ──
    - name: pg_dump to Pi MinIO
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-postgres -c postgres -- \
          pg_dumpall -U postgres > /tmp/pg-dump.sql
        which mc >/dev/null 2>&1 || {
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
        }
        HOME=/tmp mc alias set pi http://{{ forgejo_ip }}:9000 velero-admin velero-vagrant-secret
        HOME=/tmp mc cp /tmp/pg-dump.sql pi/pg-dump/
        SIZE=$(wc -c < /tmp/pg-dump.sql)
        echo "pg_dump uploaded: $SIZE bytes"
        [ "$SIZE" -gt 1000 ] || { echo "FAIL: dump too small"; exit 1; }
      changed_when: true

    - name: Record pre-migration state
      ansible.builtin.shell: |
        kubectl get pods -n {{ ns }} --no-headers | grep -c Running
      register: pre_pod_count
      changed_when: false

    # ================================================================
    # Phase 2: Destroy cluster
    # ================================================================

    - name: "Phase 2: kubeadm reset"
      ansible.builtin.shell: |
        kubeadm reset --force --cleanup-tmp-dir
      changed_when: true

    - name: Clean Calico host state
      ansible.builtin.shell: |
        nft delete table ip calico 2>/dev/null || true
        nft delete table ip6 calico 2>/dev/null || true
        rm -f /etc/cni/net.d/* /opt/cni/bin/calico*
        ip link delete vxlan.calico 2>/dev/null || true
      changed_when: true

    - name: Verify Pi services survived reset
      ansible.builtin.uri:
        url: "http://{{ forgejo_ip }}:3000/api/v1/version"
        status_code: 200

    - name: Verify pg_dump on Pi MinIO
      ansible.builtin.shell: |
        HOME=/tmp mc ls pi/pg-dump/pg-dump.sql
      changed_when: false

    # ================================================================
    # Phase 3: Rebuild with Cilium
    # ================================================================

    - name: "Phase 3: kubeadm init with Cilium"
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --apiserver-advertise-address={{ node_ip }} \
          --skip-phases=addon/kube-proxy \
          --node-name=schnappy-test
      changed_when: true

    - name: Setup kubeconfig
      ansible.builtin.shell: |
        mkdir -p /root/.kube /home/vagrant/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        cp /etc/kubernetes/admin.conf /home/vagrant/.kube/config
        chown -R vagrant:vagrant /home/vagrant/.kube
      changed_when: true

    - name: Remove control plane taint
      ansible.builtin.shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: true

    - name: Install Cilium
      ansible.builtin.shell: |
        helm repo add cilium https://helm.cilium.io/ 2>/dev/null || true
        helm repo update cilium
        helm install cilium cilium/cilium \
          --namespace kube-system \
          --version {{ cilium_version }} \
          --set ipam.operator.clusterPoolIPv4PodCIDRList="{{ pod_cidr }}" \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ node_ip }} \
          --set k8sServicePort=6443 \
          --set cni.exclusive=false \
          --set routingMode=native \
          --set ipv4NativeRoutingCIDR={{ pod_cidr }} \
          --set bpf.masquerade=true \
          --set operator.replicas=1 \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=false \
          --wait --timeout 300s
      changed_when: true

    - name: Wait for node Ready
      ansible.builtin.shell: |
        until kubectl get nodes | grep -q " Ready"; do sleep 5; done
        echo "node ready"
      changed_when: false
      timeout: 300

    - name: Install local-path-provisioner
      ansible.builtin.shell: |
        kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.31/deploy/local-path-storage.yaml
        kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      changed_when: true

    # ================================================================
    # Phase 4: Redeploy + restore data
    # ================================================================

    - name: "Phase 4: Create namespace and SAs"
      ansible.builtin.shell: |
        kubectl create namespace {{ ns }} 2>/dev/null || true
        for sa in schnappy-postgres schnappy-redis schnappy-apt-cache; do
          kubectl create serviceaccount $sa -n {{ ns }} 2>/dev/null || true
        done
      changed_when: true

    - name: Redeploy schnappy-data
      ansible.builtin.shell: |
        helm upgrade --install schnappy-data /vagrant-platform/helm/schnappy-data \
          --namespace {{ ns }} \
          --set fullnameOverride=schnappy \
          --set vault.secretsEnabled=false \
          --set networkPolicies.enabled=false \
          --set postgres.enabled=true \
          --set postgres.image=postgres:17-alpine \
          --set postgres.password=test-pw \
          --set postgres.database=monitor \
          --set postgres.storage.storageClass=local-path \
          --set redis.enabled=true \
          --set redis.image=redis:7-alpine \
          --set kafka.enabled=false \
          --set scylla.enabled=false \
          --set minio.enabled=false \
          --set aptCache.enabled=false \
          --wait --timeout 300s
      changed_when: true
      timeout: 360

    - name: Wait for Postgres ready
      ansible.builtin.shell: |
        until kubectl get pod -n {{ ns }} -l app.kubernetes.io/component=postgres \
          -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q true; do
          sleep 5
        done
        echo "postgres ready"
      changed_when: false
      timeout: 300

    - name: Import pg_dump from Pi MinIO
      ansible.builtin.shell: |
        which mc >/dev/null 2>&1 || {
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
        }
        HOME=/tmp mc alias set pi http://{{ forgejo_ip }}:9000 velero-admin velero-vagrant-secret
        HOME=/tmp mc cp pi/pg-dump/pg-dump.sql /tmp/pg-restore.sql
        kubectl exec -i -n {{ ns }} deploy/schnappy-postgres -c postgres -- \
          psql -U postgres < /tmp/pg-restore.sql
        echo "pg_dump imported"
      changed_when: true

    # ── Verify Keycloak on Pi survived migration ──
    - name: Verify test user can still authenticate (post-migration)
      ansible.builtin.shell: |
        RESULT=$(curl -s -X POST http://{{ forgejo_ip }}:8080/realms/schnappy/protocol/openid-connect/token \
          -d "client_id=admin-cli&grant_type=password&username=testuser&password=test123")
        echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print("authenticated:", d.get("token_type") == "Bearer")'
      register: post_auth
      changed_when: false

    - name: Assert Keycloak auth works after migration
      ansible.builtin.assert:
        that: "'authenticated: True' in post_auth.stdout"
        fail_msg: "FAIL: Keycloak auth failed after migration: {{ post_auth.stdout }}"

    # ── Setup ArgoCD ──
    - name: Install ArgoCD
      ansible.builtin.shell: |
        helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
        helm repo update argo
        kubectl create namespace argocd 2>/dev/null || true
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd \
          --version 9.4.16 \
          --set server.service.type=ClusterIP \
          --set configs.params."server\.insecure"=true \
          --set crds.install=true \
          --wait --timeout 300s
      changed_when: true
      timeout: 360

    - name: Configure ArgoCD repo pointing to Pi Forgejo
      ansible.builtin.shell: |
        kubectl apply -n argocd -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: forgejo-repo
          labels:
            argocd.argoproj.io/secret-type: repository
        type: Opaque
        stringData:
          type: git
          url: http://{{ forgejo_ip }}:3000/schnappy/infra.git
          username: forgejo_admin
          password: vagrant-forgejo-pw
        EOF
      changed_when: true

    - name: Create ArgoCD test Application
      ansible.builtin.shell: |
        kubectl apply -n argocd -f - <<'EOF'
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: test-app
        spec:
          project: default
          source:
            repoURL: http://{{ forgejo_ip }}:3000/schnappy/infra.git
            targetRevision: main
            path: clusters/production/cilium
          destination:
            server: https://kubernetes.default.svc
            namespace: default
          syncPolicy:
            automated:
              selfHeal: true
        EOF
      changed_when: true

    - name: Wait for ArgoCD app to sync
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          STATUS=$(kubectl get app test-app -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null)
          [ "$STATUS" = "Synced" ] && echo "ArgoCD synced" && exit 0
          echo "ArgoCD status: $STATUS ($i/30)"
          sleep 10
        done
        kubectl get app test-app -n argocd -o yaml | tail -20
        exit 1
      register: argocd_sync
      changed_when: false
      timeout: 330

    - name: Assert ArgoCD synced from Pi Forgejo
      ansible.builtin.assert:
        that: "'ArgoCD synced' in argocd_sync.stdout"
        fail_msg: "FAIL: ArgoCD did not sync from Pi Forgejo"

    # ================================================================
    # Phase 5: Verify everything
    # ================================================================

    - name: "Phase 5: Verify Postgres data survived"
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} deploy/schnappy-postgres -c postgres -- \
          psql -U postgres -d monitor -t -c "SELECT count(*) FROM migration_test;"
      register: post_data
      changed_when: false

    - name: Assert data survived
      ansible.builtin.assert:
        that: "post_data.stdout | trim | int >= 1"
        fail_msg: "FAIL: migration_test has {{ post_data.stdout | trim }} rows (expected >= 1)"

    - name: Verify Cilium running
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l app.kubernetes.io/name=cilium-agent --no-headers | grep -q Running
      changed_when: false

    - name: Verify no kube-proxy
      ansible.builtin.shell: |
        ! kubectl get daemonset kube-proxy -n kube-system 2>/dev/null
      changed_when: false

    - name: Verify Hubble relay
      ansible.builtin.shell: |
        kubectl get pods -n kube-system -l app.kubernetes.io/name=hubble-relay --no-headers | grep -q Running
      changed_when: false

    - name: Verify Forgejo on Pi still accessible
      ansible.builtin.uri:
        url: "http://{{ forgejo_ip }}:3000/api/v1/repos/schnappy/infra"
        url_username: forgejo_admin
        url_password: vagrant-forgejo-pw
        force_basic_auth: true
        status_code: 200

    - name: Verify MinIO on Pi still accessible
      ansible.builtin.uri:
        url: "http://{{ forgejo_ip }}:9000/minio/health/live"
        status_code: 200

    - name: Post-migration pod count
      ansible.builtin.shell: |
        kubectl get pods -n {{ ns }} --no-headers | grep -c Running
      register: post_pod_count
      changed_when: false

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Cilium Migration Test — PASSED
          ============================================
          Pre-migration pods:  {{ pre_pod_count.stdout }}
          Post-migration pods: {{ post_pod_count.stdout }}
          Postgres rows:       {{ post_data.stdout | trim }}
          Keycloak auth:       {{ post_auth.stdout | trim }}
          ArgoCD sync:         {{ argocd_sync.stdout | trim }}
          CNI: Cilium {{ cilium_version }}
          Forgejo: http://{{ forgejo_ip }}:3000
          MinIO:   http://{{ forgejo_ip }}:9000
          ============================================
