---
# Writes a KV-v2 secret to Pi Vault at secret/data/{{ secret_path }}.
#
# Expects facts set by tasks/fetch-pi-vault-token.yml (run in a prior pi1-
# targeted play). Usage:
#
#   - name: Seed elasticsearch secret
#     ansible.builtin.include_tasks: tasks/seed-pi-vault-secret.yml
#     vars:
#       secret_path: schnappy/elasticsearch
#       secret_data:
#         password: "{{ test_es_password }}"
#         kibana_password: "{{ test_kibana_password }}"

- name: "Seed {{ secret_path }} into Pi Vault"
  ansible.builtin.uri:
    url: "https://{{ hostvars['pi1']['ansible_host'] }}:8200/v1/secret/data/{{ secret_path }}"
    method: POST
    validate_certs: false
    headers:
      X-Vault-Token: "{{ hostvars['pi1']['vault_root_token'] }}"
    body_format: json
    body:
      data: "{{ secret_data }}"
  no_log: true
