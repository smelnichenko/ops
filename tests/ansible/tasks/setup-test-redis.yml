---
# Stand up an in-cluster redis with the Service name `schnappy-redis`
# that the chart's `schnappy.redis.serviceName` resolves to.
#
# Production wires schnappy-redis via ESO + an Argo CD-managed Helm
# release. The vagrant tests just need a Spring Boot pod to reach a
# valkey-protocol-compatible cache on `schnappy-redis:6379`.
#
# Required vars:
#   ns: Kubernetes namespace
#
# Usage:
#   - ansible.builtin.import_tasks: tasks/setup-test-redis.yml

- name: Test redis Deployment + Service
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      - apiVersion: apps/v1
        kind: Deployment
        metadata: { name: schnappy-redis, namespace: "{{ ns }}", labels: { app: schnappy-redis } }
        spec:
          replicas: 1
          selector: { matchLabels: { app: schnappy-redis } }
          template:
            metadata: { labels: { app: schnappy-redis } }
            spec:
              containers:
                - name: redis
                  image: redis:7-alpine
                  ports: [{ name: redis, containerPort: 6379 }]
                  readinessProbe:
                    exec: { command: ["redis-cli", "ping"] }
                    initialDelaySeconds: 2
                    periodSeconds: 5
                  resources:
                    requests: { cpu: 50m, memory: 64Mi }
                    limits: { cpu: 200m, memory: 256Mi }
      - apiVersion: v1
        kind: Service
        metadata: { name: schnappy-redis, namespace: "{{ ns }}" }
        spec:
          selector: { app: schnappy-redis }
          ports: [{ name: redis, port: 6379, targetPort: 6379 }]

- name: Wait for test redis to be Ready
  kubernetes.core.k8s_info:
    kubeconfig: /etc/kubernetes/admin.conf
    api_version: apps/v1
    kind: Deployment
    name: schnappy-redis
    namespace: "{{ ns }}"
  register: _redis
  retries: 12
  delay: 5
  until:
    - _redis.resources | default([]) | length > 0
    - (_redis.resources[0].status.readyReplicas | default(0)) >= 1
