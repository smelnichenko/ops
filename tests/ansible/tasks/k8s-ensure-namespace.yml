---
# Idempotently create a Kubernetes namespace.
# Required var: ns
#
# Usage:
#   - ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml
#     vars: { ns: schnappy }

- name: "Ensure namespace {{ ns }} exists"
  ansible.builtin.command: kubectl create namespace {{ ns }}
  register: _ns_result
  changed_when: _ns_result.rc == 0
  failed_when: _ns_result.rc != 0 and 'already exists' not in _ns_result.stderr
