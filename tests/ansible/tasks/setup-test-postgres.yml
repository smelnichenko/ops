---
# Stand up an ephemeral CNPG `Cluster` named `schnappy-postgres` with
# all per-service databases (monitor, admin, chat, chess) created at
# bootstrap, plus the `schnappy-postgres-<svc>` Secrets that the
# chart wires into pod env vars.
#
# Same operator-managed shape as production — just smaller and
# without backups. Replaces the prior hand-rolled raw Deployment.
#
# Prereqs: CNPG operator must be installed cluster-wide
# (setup-kubeadm.yml's Phase 13 handles this).
#
# Required vars:
#   ns:  Kubernetes namespace
#
# Usage:
#   - ansible.builtin.import_tasks: tasks/setup-test-postgres.yml

- name: Per-service postgres credentials (inline; vagrant skips ESO/Vault)
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      - apiVersion: v1
        kind: Secret
        metadata: { name: schnappy-postgres-superuser, namespace: "{{ ns }}" }
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: vagrant
      - apiVersion: v1
        kind: Secret
        metadata: { name: schnappy-postgres-monitor, namespace: "{{ ns }}" }
        type: kubernetes.io/basic-auth
        stringData:
          username: monitor
          password: vagrant
          DB_NAME: monitor
          DB_USERNAME: monitor
          DB_PASSWORD: vagrant
      - apiVersion: v1
        kind: Secret
        metadata: { name: schnappy-postgres-admin, namespace: "{{ ns }}" }
        type: kubernetes.io/basic-auth
        stringData:
          username: admin
          password: vagrant
          DB_NAME: admin
          DB_USERNAME: admin
          DB_PASSWORD: vagrant
      - apiVersion: v1
        kind: Secret
        metadata: { name: schnappy-postgres-chat, namespace: "{{ ns }}" }
        type: kubernetes.io/basic-auth
        stringData:
          username: chat
          password: vagrant
          DB_NAME: chat
          DB_USERNAME: chat
          DB_PASSWORD: vagrant
      - apiVersion: v1
        kind: Secret
        metadata: { name: schnappy-postgres-chess, namespace: "{{ ns }}" }
        type: kubernetes.io/basic-auth
        stringData:
          username: chess
          password: vagrant
          DB_NAME: chess
          DB_USERNAME: chess
          DB_PASSWORD: vagrant

- name: Ephemeral CNPG Cluster `schnappy-postgres`
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: schnappy-postgres
        namespace: "{{ ns }}"
        labels:
          app.kubernetes.io/component: postgres
          schnappy.io/ephemeral: "true"
      spec:
        instances: 1
        imageName: ghcr.io/cloudnative-pg/postgresql:17
        enableSuperuserAccess: true
        superuserSecret:
          name: schnappy-postgres-superuser
        storage:
          size: 100Mi
        postgresql:
          parameters:
            shared_buffers: 64MB
            effective_cache_size: 192MB
            work_mem: 4MB
            maintenance_work_mem: 32MB
            max_parallel_workers_per_gather: "0"
            max_parallel_workers: "2"
            max_worker_processes: "4"
        bootstrap:
          initdb:
            database: monitor
            owner: monitor
            secret: { name: schnappy-postgres-monitor }
            postInitSQL:
              - GRANT ALL ON SCHEMA public TO monitor
              - CREATE USER admin WITH PASSWORD 'vagrant'
              - CREATE DATABASE admin OWNER admin
              - CREATE USER chat WITH PASSWORD 'vagrant'
              - CREATE DATABASE chat OWNER chat
              - CREATE USER chess WITH PASSWORD 'vagrant'
              - CREATE DATABASE chess OWNER chess
        resources:
          requests: { cpu: "50m", memory: "256Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }

- name: Wait for postgres cluster Ready
  kubernetes.core.k8s_info:
    kubeconfig: /etc/kubernetes/admin.conf
    api_version: postgresql.cnpg.io/v1
    kind: Cluster
    name: schnappy-postgres
    namespace: "{{ ns }}"
  register: _pg_cluster
  retries: 60
  delay: 5
  until:
    - _pg_cluster.resources | length > 0
    - (_pg_cluster.resources[0].status.conditions | default([]) | selectattr('type','equalto','Ready') | list | first | default({})).status | default('') == "True"

# CNPG creates `<cluster>-rw` and `<cluster>-ro` Services. The chart's
# helper points at `schnappy-postgres` (no -rw suffix), so add an alias
# so the legacy hostname keeps resolving.
- name: schnappy-postgres alias Service → CNPG -rw
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: schnappy-postgres
        namespace: "{{ ns }}"
      spec:
        type: ExternalName
        externalName: "schnappy-postgres-rw.{{ ns }}.svc.cluster.local"
        ports:
          - { name: postgres, port: 5432, targetPort: 5432 }
