# Reusable tasks: Deploy app in Vagrant via Helm, attached to vagrant-gateway
#
# Required vars:
#   ns: Kubernetes namespace (default: schnappy)
#   keycloak_admin_password: Keycloak admin password (from inventory)
#   helm_values_extra: Additional Helm values YAML (optional)
#
# Assumes (caller must import these first in a target-host play):
#   - kubeadm running + ESO configured against Pi Vault
#   - Pi Vault root token fact published on pi1 (via tasks/fetch-pi-vault-token.yml
#     — run that from a prior hosts:pi1 play)
#   - Istio vagrant-gateway deployed (via tasks/setup-istio-gateway.yml) —
#     publishes node_ip + istio_gateway_nodeport facts
#   - Container images built (monitor:local, monitor-frontend:local)
#   - Gateway repo at /vagrant-gateway
#
# Publishes:
#   app_url — http://schnappy-app.vagrant.test:<gateway NodePort>

- name: Compose app_url for this environment
  ansible.builtin.set_fact:
    app_hostname: "schnappy-app.vagrant.test"
    app_url: "http://schnappy-app.vagrant.test:{{ istio_gateway_nodeport }}"

- name: Create namespace
  ansible.builtin.command: kubectl create namespace {{ ns }}
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

- name: Write Helm values
  ansible.builtin.copy:
    dest: /tmp/schnappy-test-values.yml
    mode: '0600'
    content: |
      vault:
        secretsEnabled: true
      networkPolicies:
        enabled: false
      site:
        dnsResolver: "10.43.0.10"
        enabled: true
        image:
          repository: monitor-frontend
          tag: local
          pullPolicy: Never
      app:
        replicas: 1
        image:
          repository: monitor
          tag: local
          pullPolicy: Never
        # ingress disabled — HTTPRoute below attaches to vagrant-gateway
        ingress:
          enabled: false
      gateway:
        enabled: true
        replicas: 1
        image:
          repository: monitor-gateway
          tag: local
          pullPolicy: Never
        javaOpts: "-Xmx256m -XX:+UseZGC"
      postgres:
        enabled: true
        existingSecret: "schnappy-postgres"
        image: postgres:17-alpine
        storage:
          storageClass: "local-path"
      redis:
        enabled: true
        image: redis:7-alpine
      keycloak:
        enabled: true
        existingSecret: "schnappy-keycloak"
        image: quay.io/keycloak/keycloak:26.5.6
        hostname: localhost
        mail:
          from: "test@example.com"
        clients:
          app:
            enabled: true
            redirectUri: "http://localhost/auth/callback"
          forgejo:
            enabled: false
            redirectUri: ""
          grafana:
            enabled: false
            redirectUri: ""
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits: { cpu: 1000m, memory: 1Gi }
        ingress:
          enabled: false
      aptCache:
        enabled: false
      captcha:
        enabled: false
      elk:
        enabled: false
      ai:
        enabled: false
      mail:
        enabled: false
      webhook:
        enabled: false
      minio:
        enabled: false
      prometheus:
        enabled: false
      grafana:
        enabled: false
      smokeTest:
        enabled: false
      loadTest:
        enabled: false
      {{ helm_values_extra | default('') | indent(6) }}

- name: Seed postgres secret
  ansible.builtin.include_tasks: seed-pi-vault-secret.yml
  vars:
    secret_path: schnappy/postgres
    secret_data: { database: monitor, username: postgres, password: vagrant-test-pw }

- name: Seed keycloak secret
  ansible.builtin.include_tasks: seed-pi-vault-secret.yml
  vars:
    secret_path: schnappy/keycloak
    secret_data:
      admin_password: "{{ keycloak_admin_password }}"
      db_password: vagrant-test-kc-db
      forgejo_client_secret: not-used

- name: Seed kafka secret (if needed)
  ansible.builtin.include_tasks: seed-pi-vault-secret.yml
  vars:
    secret_path: schnappy/kafka
    secret_data: { password: vagrant-test-kafka }
  when: deploy_kafka | default(false) | bool

- name: Build gateway JAR
  ansible.builtin.shell: |
    source $HOME/.sdkman/bin/sdkman-init.sh
    cd /vagrant-gateway && ./gradlew bootJar --no-daemon -x test
  args:
    executable: /bin/bash
  become: false
  changed_when: true

- name: Build gateway container image
  ansible.builtin.shell: |
    STAGE=$(mktemp -d)
    cp /vagrant-gateway/build/libs/*.jar "$STAGE/app.jar"
    cp /vagrant-gateway/Dockerfile "$STAGE/Dockerfile"
    nerdctl -n k8s.io build \
      -t monitor-gateway:local "$STAGE"
    rm -rf "$STAGE"
  changed_when: true

- name: Deploy schnappy-data chart
  ansible.builtin.shell: |
    helm upgrade --install schnappy-data /vagrant-platform/helm/schnappy-data \
      --namespace {{ ns }} \
      --create-namespace \
      --set fullnameOverride=schnappy \
      --values /tmp/schnappy-test-values.yml \
      --timeout 600s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Deploy schnappy-auth chart
  ansible.builtin.shell: |
    helm upgrade --install schnappy-auth /vagrant-platform/helm/schnappy-auth \
      --namespace {{ ns }} \
      --set fullnameOverride=schnappy \
      --values /tmp/schnappy-test-values.yml \
      --timeout 300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Deploy schnappy chart (app)
  ansible.builtin.shell: |
    helm upgrade --install schnappy /vagrant-platform/helm/schnappy \
      --namespace {{ ns }} \
      --values /tmp/schnappy-test-values.yml \
      --timeout 300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Attach HTTPRoute schnappy-app → vagrant-gateway
  ansible.builtin.include_tasks: create-httproute.yml
  vars:
    route_name: schnappy-app
    route_ns: "{{ ns }}"
    route_host: "{{ app_hostname }}"
    route_service: schnappy-monitor
    route_port: 8080

- name: Wait for app to be ready
  ansible.builtin.shell: |
    for i in $(seq 1 60); do
      READY=$(kubectl get pods -n {{ ns }} -l app.kubernetes.io/component=monitor \
        -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null)
      if [ "$READY" = "true" ]; then
        echo "OK: App pod ready"
        exit 0
      fi
      echo "Waiting... ready=$READY (attempt $i/60)"
      sleep 10
    done
    echo "FAIL: app not ready after 10 minutes"
    kubectl get pods -n {{ ns }} -o wide
    kubectl logs -l app.kubernetes.io/component=monitor -n {{ ns }} --tail=20
    exit 1
  register: app_readiness
  changed_when: false
  timeout: 660

- name: Verify app is healthy
  ansible.builtin.uri:
    url: "{{ app_url }}/api/health"
  register: deploy_health
  retries: 30
  delay: 5
  until: deploy_health.status == 200
