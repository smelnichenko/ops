# Reusable tasks: Create a test user in Keycloak and get a JWT
#
# Required vars:
#   kc_admin_password: Keycloak admin password
#   test_email: Test user email
#   test_password: Test user password
#   ns: Kubernetes namespace (default: schnappy)
#
# Sets facts:
#   auth_token: Bearer access token for API calls

- name: "AUTH: Wait for Keycloak readiness"
  ansible.builtin.shell: |
    k3s kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=keycloak -n {{ ns }} --timeout=300s
  changed_when: false

- name: "AUTH: Create test user in Keycloak"
  ansible.builtin.shell: |
    k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      /opt/keycloak/bin/kcadm.sh create users -r schnappy \
        -s "username={{ test_email }}" \
        -s "email={{ test_email }}" \
        -s enabled=true \
        -s emailVerified=true \
        -s 'requiredActions=[]' \
        --server http://localhost:8080 --realm master \
        --user admin --password "{{ kc_admin_password }}"
  register: kc_create_user
  changed_when: kc_create_user.rc == 0
  failed_when: kc_create_user.rc != 0 and 'already exists' not in kc_create_user.stderr
  retries: 5
  delay: 10
  until: kc_create_user.rc == 0 or 'already exists' in (kc_create_user.stderr | default(''))

- name: "AUTH: Set test user password"
  ansible.builtin.shell: |
    k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      /opt/keycloak/bin/kcadm.sh set-password -r schnappy \
        --username "{{ test_email }}" \
        --new-password "{{ test_password }}" \
        --temporary=false \
        --server http://localhost:8080 --realm master \
        --user admin --password "{{ kc_admin_password }}"

- name: "AUTH: Disable VERIFY_PROFILE default required action"
  ansible.builtin.shell: |
    k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      /opt/keycloak/bin/kcadm.sh update authentication/required-actions/VERIFY_PROFILE -r schnappy \
        -s defaultAction=false -s enabled=false \
        --server http://localhost:8080 --realm master \
        --user admin --password "{{ kc_admin_password }}" 2>/dev/null || true
  changed_when: true

- name: "AUTH: Clear user required actions"
  ansible.builtin.shell: |
    USER_ID=$(k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      /opt/keycloak/bin/kcadm.sh get users -r schnappy -q "username={{ test_email }}" \
        --fields id --format csv --noquotes \
        --server http://localhost:8080 --realm master \
        --user admin --password "{{ kc_admin_password }}")
    k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      /opt/keycloak/bin/kcadm.sh update "users/$USER_ID" -r schnappy \
        -s 'requiredActions=[]' \
        --server http://localhost:8080 --realm master \
        --user admin --password "{{ kc_admin_password }}"
  failed_when: false

- name: "AUTH: Assign realm roles to test user"
  ansible.builtin.shell: |
    for role in PLAY CHAT EMAIL METRICS MANAGE_USERS; do
      k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
        /opt/keycloak/bin/kcadm.sh add-roles -r schnappy \
          --uusername "{{ test_email }}" --rolename "$role" \
          --server http://localhost:8080 --realm master \
          --user admin --password "{{ kc_admin_password }}" 2>/dev/null || true
    done
  changed_when: true

- name: "AUTH: Create test-cli client for password grant"
  ansible.builtin.shell: |
    k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      /opt/keycloak/bin/kcadm.sh create clients -r schnappy \
        -s clientId=test-cli -s enabled=true \
        -s directAccessGrantsEnabled=true \
        -s publicClient=false -s secret=test-cli-secret \
        -s 'serviceAccountsEnabled=false' \
        --server http://localhost:8080 --realm master \
        --user admin --password "{{ kc_admin_password }}" 2>/dev/null || true
  changed_when: true

- name: "AUTH: Get access token via token endpoint"
  ansible.builtin.shell: |
    k3s kubectl exec deploy/schnappy-keycloak -n {{ ns }} -- \
      curl -sf http://localhost:8080/realms/schnappy/protocol/openid-connect/token \
        -d "client_id=test-cli" \
        -d "client_secret=test-cli-secret" \
        -d "grant_type=password" \
        -d "username={{ test_email }}" \
        -d "password={{ test_password }}"
  register: token_result
  retries: 5
  delay: 5
  until: token_result.rc == 0

- name: "AUTH: Set auth token"
  ansible.builtin.set_fact:
    auth_token: "{{ (token_result.stdout | from_json).access_token }}"
