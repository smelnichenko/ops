---
# Test Flux CD GitOps deployment in Vagrant
#
# Deploys Forgejo + Flux, creates an infra repo, pushes manifests,
# and verifies Flux reconciles them into the cluster.
#
# Prerequisites:
#   - vagrant up k3s
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-flux.yml

- name: Test Flux CD GitOps deployment
  hosts: target
  become: true
  gather_facts: false

  vars:
    flux_ns: flux-system
    forgejo_ns: forgejo
    forgejo_host: "git.vagrant.test"
    forgejo_admin_user: "testadmin"
    forgejo_admin_password: "TestPassword123"
    forgejo_admin_email: "admin@vagrant.test"
    forgejo_chart_version: "16.2.0"
    flux_chart: "oci://ghcr.io/fluxcd-community/charts/flux2"
    flux_chart_version: "2.14.1"
    infra_repo_name: "infra"
    test_ns: "flux-test"

  tasks:
    # ================================================================
    # Phase 1: Deploy Forgejo
    # ================================================================

    - name: "PHASE 1: Deploy Forgejo"
      ansible.builtin.debug:
        msg: "Deploying Forgejo to Vagrant k3s"

    - name: Create forgejo namespace
      ansible.builtin.shell: |
        cat <<EOF | k3s kubectl apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ forgejo_ns }}
          labels:
            pod-security.kubernetes.io/enforce: baseline
            pod-security.kubernetes.io/audit: restricted
            pod-security.kubernetes.io/warn: restricted
        EOF
      changed_when: false

    - name: Add DNS for Forgejo
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ forgejo_host }}"
        state: present

    - name: Add custom DNS for Forgejo via CoreDNS
      ansible.builtin.shell: |
        NODE_IP=$(k3s kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')

        k3s kubectl create configmap coredns-custom -n kube-system \
          --from-literal="vagrant.test.server=vagrant.test:53 {
          hosts {
            ${NODE_IP} {{ forgejo_host }}
            fallthrough
          }
          whoami
        }" --dry-run=client -o yaml | k3s kubectl apply -f -

        k3s kubectl rollout restart deployment coredns -n kube-system
        k3s kubectl rollout status deployment coredns -n kube-system --timeout=60s
      changed_when: false

    - name: Deploy Forgejo via Helm
      ansible.builtin.shell: |
        helm upgrade --install forgejo oci://code.forgejo.org/forgejo-helm/forgejo \
          --namespace {{ forgejo_ns }} \
          --version {{ forgejo_chart_version }} \
          --set gitea.admin.username={{ forgejo_admin_user }} \
          --set gitea.admin.password={{ forgejo_admin_password }} \
          --set gitea.admin.email={{ forgejo_admin_email }} \
          --set persistence.size=5Gi \
          --set gitea.config.server.DOMAIN={{ forgejo_host }} \
          --set gitea.config.server.ROOT_URL=http://{{ forgejo_host }} \
          --set gitea.config.server.PROTOCOL=http \
          --set gitea.config.server.HTTP_PORT=3000 \
          --set gitea.config.service.DISABLE_REGISTRATION=true \
          --set service.http.type=ClusterIP \
          --set service.http.port=3000 \
          --set service.ssh.enabled=false \
          --set ingress.enabled=true \
          --set ingress.className=traefik \
          --set 'ingress.hosts[0].host={{ forgejo_host }}' \
          --set 'ingress.hosts[0].paths[0].path=/' \
          --set 'ingress.hosts[0].paths[0].pathType=Prefix' \
          --set resources.requests.memory=256Mi \
          --set resources.requests.cpu=100m \
          --set resources.limits.memory=1Gi \
          --set resources.limits.cpu=2000m \
          --wait --timeout 5m
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for Forgejo to be ready
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          if curl -sf -o /dev/null http://{{ forgejo_host }}/api/v1/settings/api 2>/dev/null; then
            echo "Forgejo is ready"
            exit 0
          fi
          sleep 5
        done
        echo "Forgejo not ready after 5 minutes"
        exit 1
      changed_when: false

    - name: Clear must_change_password flag on admin user
      ansible.builtin.shell: |
        k3s kubectl exec deploy/forgejo -n {{ forgejo_ns }} -- \
          gitea admin user change-password \
          -u {{ forgejo_admin_user }} \
          -p '{{ forgejo_admin_password }}' \
          --must-change-password=false
      changed_when: false

    - name: Verify Forgejo API auth works
      ansible.builtin.shell: |
        curl -sf "http://{{ forgejo_host }}/api/v1/user" \
          -u "{{ forgejo_admin_user }}:{{ forgejo_admin_password }}"
      changed_when: false

    # ================================================================
    # Phase 2: Create infra repo and push seed content
    # ================================================================

    - name: "PHASE 2: Create infra repo with seed content"
      ansible.builtin.debug:
        msg: "Creating {{ infra_repo_name }} repo in Forgejo and pushing Flux manifests"

    - name: Create infra repository in Forgejo
      ansible.builtin.shell: |
        HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' \
          -u "{{ forgejo_admin_user }}:{{ forgejo_admin_password }}" \
          "http://{{ forgejo_host }}/api/v1/repos/{{ forgejo_admin_user }}/{{ infra_repo_name }}" 2>/dev/null)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "Repo already exists"
          exit 0
        fi

        curl -sf -X POST "http://{{ forgejo_host }}/api/v1/user/repos" \
          -u "{{ forgejo_admin_user }}:{{ forgejo_admin_password }}" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "{{ infra_repo_name }}",
            "auto_init": true,
            "default_branch": "main",
            "object_format_name": "sha1"
          }'
      changed_when: false

    - name: Write seed kustomization.yaml
      ansible.builtin.copy:
        dest: /tmp/flux-seed-kustomization.yaml
        mode: '0644'
        content: |
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
            - namespace.yaml
            - configmap.yaml

    - name: Write seed namespace.yaml
      ansible.builtin.copy:
        dest: /tmp/flux-seed-namespace.yaml
        mode: '0644'
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: flux-test

    - name: Write seed configmap.yaml (v1)
      ansible.builtin.copy:
        dest: /tmp/flux-seed-configmap.yaml
        mode: '0644'
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: flux-test-config
            namespace: flux-test
          data:
            version: "v1"
            message: "Hello from Flux GitOps"

    - name: Push seed content to infra repo
      ansible.builtin.shell: |
        set -e
        WORKDIR=$(mktemp -d)
        cd "$WORKDIR"
        git clone "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}/{{ forgejo_admin_user }}/{{ infra_repo_name }}.git" repo
        cd repo
        git config user.email "test@vagrant.test"
        git config user.name "Test"
        mkdir -p clusters/production
        cp /tmp/flux-seed-kustomization.yaml clusters/production/kustomization.yaml
        cp /tmp/flux-seed-namespace.yaml clusters/production/namespace.yaml
        cp /tmp/flux-seed-configmap.yaml clusters/production/configmap.yaml
        git add -A
        git diff --cached --quiet && { echo "No changes to push"; rm -rf "$WORKDIR"; exit 0; }
        git commit -m "Initial infra seed: namespace + configmap"
        git push origin main
        rm -rf "$WORKDIR"
        echo "Seed content pushed to {{ infra_repo_name }}"
      changed_when: false

    # ================================================================
    # Phase 3: Install Flux
    # ================================================================

    - name: "PHASE 3: Install Flux CD"
      ansible.builtin.debug:
        msg: "Deploying Flux via Helm and configuring Git sources"

    - name: Create flux-system namespace
      ansible.builtin.shell: |
        cat <<EOF | k3s kubectl apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ flux_ns }}
          labels:
            pod-security.kubernetes.io/enforce: baseline
            pod-security.kubernetes.io/audit: restricted
            pod-security.kubernetes.io/warn: restricted
        EOF
      changed_when: false

    - name: Create Forgejo credentials secret for Flux
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'EOF' | k3s kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: forgejo-credentials
          namespace: {{ flux_ns }}
        type: Opaque
        stringData:
          username: "{{ forgejo_admin_user }}"
          password: "{{ forgejo_admin_password }}"
        EOF
      args:
        executable: /bin/bash
      changed_when: false

    - name: Deploy Flux via Helm
      ansible.builtin.shell: |
        helm upgrade --install flux \
          {{ flux_chart }} \
          --version {{ flux_chart_version }} \
          --namespace {{ flux_ns }} \
          --values - <<'HELMEOF'
        notificationController:
          create: false
        imageReflectionController:
          create: false
        imageAutomationController:
          create: false
        sourceController:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        helmController:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        kustomizeController:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        HELMEOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Wait for source-controller
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/source-controller -n {{ flux_ns }} --timeout=300s
      changed_when: false

    - name: Wait for kustomize-controller
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/kustomize-controller -n {{ flux_ns }} --timeout=300s
      changed_when: false

    - name: Wait for helm-controller
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/helm-controller -n {{ flux_ns }} --timeout=300s
      changed_when: false

    # ================================================================
    # Phase 4: Configure Flux sources and Kustomization
    # ================================================================

    - name: "PHASE 4: Configure Flux GitRepository and Kustomization"
      ansible.builtin.debug:
        msg: "Creating GitRepository source and root Kustomization"

    - name: Get Forgejo ClusterIP for internal access
      ansible.builtin.shell: |
        k3s kubectl get svc forgejo-http -n {{ forgejo_ns }} \
          -o jsonpath='{.spec.clusterIP}'
      register: forgejo_clusterip_result
      changed_when: false

    - name: Create GitRepository for infra repo
      ansible.builtin.shell: |
        set -o pipefail
        cat <<EOF | k3s kubectl apply -f -
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: GitRepository
        metadata:
          name: infra
          namespace: {{ flux_ns }}
        spec:
          interval: 1m
          url: http://{{ forgejo_clusterip_result.stdout }}:3000/{{ forgejo_admin_user }}/{{ infra_repo_name }}.git
          ref:
            branch: main
          secretRef:
            name: forgejo-credentials
        EOF
      changed_when: false

    - name: Create root Kustomization
      ansible.builtin.shell: |
        set -o pipefail
        cat <<EOF | k3s kubectl apply -f -
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: infra
          namespace: {{ flux_ns }}
        spec:
          interval: 1m
          sourceRef:
            kind: GitRepository
            name: infra
          path: ./clusters/production
          prune: false
          wait: true
          timeout: 5m
        EOF
      changed_when: false

    # ================================================================
    # Phase 5: Verify initial reconciliation
    # ================================================================

    - name: "PHASE 5: Verify Flux reconciliation"
      ansible.builtin.debug:
        msg: "Waiting for Flux to reconcile infra repo content"

    - name: Wait for GitRepository to become Ready
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          STATUS=$(k3s kubectl get gitrepository infra -n {{ flux_ns }} \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
          if [ "$STATUS" = "True" ]; then
            echo "GitRepository is Ready"
            exit 0
          fi
          REASON=$(k3s kubectl get gitrepository infra -n {{ flux_ns }} \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
          echo "Waiting for GitRepository... status=$STATUS reason=$REASON (attempt $i/60)"
          sleep 5
        done
        echo "GitRepository not ready after 5 minutes"
        k3s kubectl describe gitrepository infra -n {{ flux_ns }}
        exit 1
      changed_when: false

    - name: Wait for Kustomization to become Ready
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          STATUS=$(k3s kubectl get kustomization infra -n {{ flux_ns }} \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
          if [ "$STATUS" = "True" ]; then
            echo "Kustomization is Ready"
            exit 0
          fi
          REASON=$(k3s kubectl get kustomization infra -n {{ flux_ns }} \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
          MSG=$(k3s kubectl get kustomization infra -n {{ flux_ns }} \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].message}' 2>/dev/null)
          echo "Waiting for Kustomization... status=$STATUS reason=$REASON msg=$MSG (attempt $i/60)"
          sleep 5
        done
        echo "Kustomization not ready after 5 minutes"
        k3s kubectl describe kustomization infra -n {{ flux_ns }}
        exit 1
      changed_when: false

    - name: Verify test namespace was created by Flux
      ansible.builtin.shell: |
        k3s kubectl get namespace {{ test_ns }} -o jsonpath='{.metadata.name}'
      register: ns_check
      changed_when: false
      failed_when: false

    - name: Verify ConfigMap was created by Flux
      ansible.builtin.shell: |
        k3s kubectl get configmap flux-test-config -n {{ test_ns }} \
          -o jsonpath='{.data.version}'
      register: cm_check
      changed_when: false
      failed_when: false

    - name: Set initial reconciliation facts
      ansible.builtin.set_fact:
        ns_created: "{{ ns_check.stdout == test_ns }}"
        cm_created: "{{ cm_check.stdout == 'v1' }}"

    # ================================================================
    # Phase 6: Test git-push reconciliation (update ConfigMap)
    # ================================================================

    - name: "PHASE 6: Test git-push reconciliation"
      ansible.builtin.debug:
        msg: "Updating ConfigMap in Git and verifying Flux reconciles the change"

    - name: Write updated configmap.yaml (v2)
      ansible.builtin.copy:
        dest: /tmp/flux-seed-configmap-v2.yaml
        mode: '0644'
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: flux-test-config
            namespace: flux-test
          data:
            version: "v2"
            message: "Updated by git push - Flux reconciled!"

    - name: Push updated ConfigMap to infra repo
      ansible.builtin.shell: |
        set -e
        WORKDIR=$(mktemp -d)
        cd "$WORKDIR"
        git clone "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}/{{ forgejo_admin_user }}/{{ infra_repo_name }}.git" repo
        cd repo
        git config user.email "test@vagrant.test"
        git config user.name "Test"
        cp /tmp/flux-seed-configmap-v2.yaml clusters/production/configmap.yaml
        git add -A
        git diff --cached --quiet && { echo "No changes to push"; rm -rf "$WORKDIR"; exit 0; }
        git commit -m "deploy: update configmap to v2"
        git push origin main
        rm -rf "$WORKDIR"
        echo "Updated ConfigMap pushed"
      changed_when: false

    - name: Wait for Flux to reconcile the update
      ansible.builtin.shell: |
        for i in $(seq 1 90); do
          VERSION=$(k3s kubectl get configmap flux-test-config -n {{ test_ns }} \
            -o jsonpath='{.data.version}' 2>/dev/null)
          if [ "$VERSION" = "v2" ]; then
            echo "ConfigMap updated to v2 — Flux reconciled!"
            exit 0
          fi
          echo "Waiting for reconciliation... current version=$VERSION (attempt $i/90)"
          sleep 5
        done
        echo "ConfigMap not updated after 7.5 minutes"
        k3s kubectl describe kustomization infra -n {{ flux_ns }}
        exit 1
      register: reconcile_check
      changed_when: false
      failed_when: false

    - name: Verify updated ConfigMap value
      ansible.builtin.shell: |
        k3s kubectl get configmap flux-test-config -n {{ test_ns }} \
          -o jsonpath='{.data.version}'
      register: cm_updated_check
      changed_when: false
      failed_when: false

    - name: Set reconciliation result facts
      ansible.builtin.set_fact:
        reconcile_works: "{{ cm_updated_check.stdout == 'v2' }}"

    # ================================================================
    # Phase 7: Verify Flux controller status
    # ================================================================

    - name: "PHASE 7: Verify Flux controller health"
      ansible.builtin.debug:
        msg: "Checking Flux controller pod status"

    - name: Check source-controller pod
      ansible.builtin.shell: |
        k3s kubectl get pods -n {{ flux_ns }} -l app=source-controller \
          -o jsonpath='{.items[0].status.phase}'
      register: source_ctrl_status
      changed_when: false
      failed_when: false

    - name: Check kustomize-controller pod
      ansible.builtin.shell: |
        k3s kubectl get pods -n {{ flux_ns }} -l app=kustomize-controller \
          -o jsonpath='{.items[0].status.phase}'
      register: kustomize_ctrl_status
      changed_when: false
      failed_when: false

    - name: Check helm-controller pod
      ansible.builtin.shell: |
        k3s kubectl get pods -n {{ flux_ns }} -l app=helm-controller \
          -o jsonpath='{.items[0].status.phase}'
      register: helm_ctrl_status
      changed_when: false
      failed_when: false

    - name: Check GitRepository status
      ansible.builtin.shell: |
        k3s kubectl get gitrepository -n {{ flux_ns }} -o wide
      register: git_sources
      changed_when: false

    - name: Check Kustomization status
      ansible.builtin.shell: |
        k3s kubectl get kustomization -n {{ flux_ns }} -o wide
      register: kustomizations
      changed_when: false

    - name: Set controller status facts
      ansible.builtin.set_fact:
        source_running: "{{ source_ctrl_status.stdout == 'Running' }}"
        kustomize_running: "{{ kustomize_ctrl_status.stdout == 'Running' }}"
        helm_running: "{{ helm_ctrl_status.stdout == 'Running' }}"

    # ================================================================
    # Summary
    # ================================================================

    - name: Show all pods in flux-system namespace
      ansible.builtin.shell: |
        k3s kubectl get pods -n {{ flux_ns }} -o wide
      register: final_pods
      changed_when: false

    - name: Pod listing
      ansible.builtin.debug:
        msg: "{{ final_pods.stdout_lines }}"

    - name: GitRepository status
      ansible.builtin.debug:
        msg: "{{ git_sources.stdout_lines }}"

    - name: Kustomization status
      ansible.builtin.debug:
        msg: "{{ kustomizations.stdout_lines }}"

    - name: "TEST RESULTS"
      vars:
        all_pass: >-
          {{ source_running and kustomize_running and helm_running
             and ns_created and cm_created
             and reconcile_works }}
      ansible.builtin.debug:
        msg: |
          ====================================================
          Flux CD Test: {{ 'PASS' if all_pass else 'PARTIAL' }}

          --- Controllers ---
          [{{ 'PASS' if source_running else 'FAIL' }}] source-controller running
          [{{ 'PASS' if kustomize_running else 'FAIL' }}] kustomize-controller running
          [{{ 'PASS' if helm_running else 'FAIL' }}] helm-controller running

          --- Initial Reconciliation ---
          [{{ 'PASS' if ns_created else 'FAIL' }}] Namespace created by Flux
          [{{ 'PASS' if cm_created else 'FAIL' }}] ConfigMap created by Flux (v1)

          --- Git Push Reconciliation ---
          [{{ 'PASS' if reconcile_works else 'FAIL' }}] ConfigMap updated to v2 after git push
          ====================================================

    - name: Fail if critical checks failed
      vars:
        critical_pass: "{{ source_running and kustomize_running and helm_running and ns_created and cm_created and reconcile_works }}"
      ansible.builtin.fail:
        msg: "Critical Flux CD checks failed — see summary above"
      when: not critical_pass
