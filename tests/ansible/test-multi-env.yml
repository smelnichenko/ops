---
# Test multi-environment (test + prod) isolation in Vagrant
#
# Full-stack test: Cilium, Istio, all operators, Vault, ArgoCD.
# Creates schnappy/infra and schnappy/platform repos in Forgejo,
# pushes chart + values content, lets ArgoCD deploy both envs,
# then verifies all apps are Synced+Healthy with proper isolation.
#
# Prerequisites:
#   - vagrant up (kubeadm + pi1 + pi2)
#   - setup-kubeadm.yml completed (Cilium, Istio, operators, ESO)
#   - setup-vault-pi.yml completed (Vault on pi1)
#   - setup-vault.yml completed (Vault + ESO in cluster)
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-multi-env.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

- name: Test multi-environment isolation
  hosts: target
  become: true
  gather_facts: false

  vars:
    prod_ns: schnappy
    test_ns: schnappy-test
    vault_ns: vault
    forgejo_admin_user: forgejo_admin
    forgejo_admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') | default('vagrant-forgejo-pw', true) }}"
    prod_pg_password: "vagrant-prod-pg-pw"
    test_pg_password: "vagrant-test-pg-pw"
    prod_redis_password: "vagrant-prod-redis-pw"
    test_redis_password: "vagrant-test-redis-pw"

  tasks:
    # ================================================================
    # Phase 1: Seed Vault secrets for both environments
    # ================================================================

    - name: Get Vault root token
      ansible.builtin.shell: |
        kubectl get secret vault-root-token -n {{ vault_ns }} \
          -o jsonpath='{.data.token}' | base64 -d
      register: vault_token_result
      changed_when: false
      no_log: true

    - name: Set Vault token fact
      ansible.builtin.set_fact:
        vault_root_token: "{{ vault_token_result.stdout }}"
      no_log: true

    - name: Seed prod secrets (secret/schnappy/*)
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault kv put secret/schnappy/{{ item.path }} {{ item.data }}
      loop:
        - { path: "postgres", data: "database=monitor username=monitor password={{ prod_pg_password }}" }
        - { path: "redis", data: "password={{ prod_redis_password }}" }
        - { path: "minio", data: "access_key=minioadmin secret_key=minioadmin" }
        - { path: "mail", data: "password=test-smtp" }
      no_log: true

    - name: Seed test secrets (secret/schnappy-test/*)
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault kv put secret/schnappy-test/{{ item.path }} {{ item.data }}
      loop:
        - { path: "postgres", data: "database=monitor username=monitor password={{ test_pg_password }}" }
        - { path: "redis", data: "password={{ test_redis_password }}" }
        - { path: "minio", data: "access_key=testadmin secret_key=testadmin" }
        - { path: "mail", data: "password=test-smtp" }
      no_log: true

    # ================================================================
    # Phase 2: Setup Forgejo repos with actual content
    # ================================================================

    - name: Set Forgejo facts
      ansible.builtin.set_fact:
        forgejo_url: "http://{{ hostvars['pi1']['ansible_host'] | default('192.168.56.20') }}:3000"
        forgejo_host: "{{ hostvars['pi1']['ansible_host'] | default('192.168.56.20') }}"

    - name: Create schnappy org in Forgejo
      ansible.builtin.shell: |
        curl -sf -X POST "{{ forgejo_url }}/api/v1/orgs" \
          -u "{{ forgejo_admin_user }}:{{ forgejo_admin_password }}" \
          -H "Content-Type: application/json" \
          -d '{"username":"schnappy","visibility":"public"}' 2>/dev/null || true
      changed_when: false

    - name: Create repos in Forgejo
      ansible.builtin.shell: |
        curl -sf -X POST "{{ forgejo_url }}/api/v1/orgs/schnappy/repos" \
          -u "{{ forgejo_admin_user }}:{{ forgejo_admin_password }}" \
          -H "Content-Type: application/json" \
          -d '{"name":"{{ item }}","auto_init":true,"default_branch":"main"}' 2>/dev/null || true
      loop:
        - infra
        - platform
      changed_when: false

    - name: Install rsync on target
      ansible.builtin.apt:
        name: rsync
        state: present

    - name: Sync repos to VM
      ansible.builtin.shell: |
        rsync -az --delete \
          -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i {{ ansible_ssh_private_key_file }}" \
          {{ lookup('env', 'HOME') }}/src/{{ item }}/ \
          {{ ansible_user }}@{{ ansible_host }}:/tmp/{{ item }}-repo/
      loop:
        - platform
        - infra
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Patch infra repo for Vagrant (replace production IPs, remove conflicting apps)
      ansible.builtin.shell: |
        cd /tmp/infra-repo
        # Replace production Forgejo/Pi IP with Vagrant Pi IP in all ArgoCD app files
        find clusters/production/argocd/apps -name '*.yaml' -exec \
          sed -i 's|192.168.11.5:3000|{{ forgejo_host }}:3000|g; s|192.168.11.4|{{ forgejo_host }}|g; s|192.168.11.5|{{ forgejo_host }}|g; s|192.168.11.6|{{ forgejo_host }}|g; s|git.pmon.dev|{{ forgejo_host }}:3000|g' {} +
        # Also patch cluster-config (NPs reference Pi IPs)
        find clusters/production/cluster-config -name '*.yaml' -exec \
          sed -i 's|192.168.11.5|{{ forgejo_host }}|g; s|192.168.11.4|{{ forgejo_host }}|g' {} +
        # Remove old static apps replaced by ApplicationSets
        rm -f clusters/production/argocd/apps/schnappy-data.yaml
        rm -f clusters/production/argocd/apps/schnappy.yaml
        rm -f clusters/production/argocd/apps/schnappy-mesh.yaml
        # Remove apps for infra already installed by setup-kubeadm.yml
        rm -f clusters/production/argocd/apps/istio-base.yaml
        rm -f clusters/production/argocd/apps/istiod.yaml
        rm -f clusters/production/argocd/apps/istio-cni.yaml
        rm -f clusters/production/argocd/apps/cert-manager.yaml
        rm -f clusters/production/argocd/apps/external-secrets.yaml
        rm -f clusters/production/argocd/apps/metrics-server.yaml
        rm -f clusters/production/argocd/apps/cnpg.yaml
        rm -f clusters/production/argocd/apps/strimzi.yaml
        rm -f clusters/production/argocd/apps/scylla-operator.yaml
        rm -f clusters/production/argocd/apps/scylla-manager.yaml
        rm -f clusters/production/argocd/apps/cilium.yaml
      changed_when: true

    - name: Push platform repo to Forgejo
      ansible.builtin.shell: |
        cd /tmp/platform-repo
        git init 2>/dev/null || true
        git config user.email "test@vagrant.local"
        git config user.name "Vagrant Test"
        git add -A
        git commit -m "vagrant: platform charts" --allow-empty
        git remote remove origin 2>/dev/null || true
        git remote add origin "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}:3000/schnappy/platform.git"
        git push -f origin HEAD:main
      changed_when: true

    - name: Push infra repo to Forgejo
      ansible.builtin.shell: |
        cd /tmp/infra-repo
        git init 2>/dev/null || true
        git config user.email "test@vagrant.local"
        git config user.name "Vagrant Test"
        git add -A
        git commit -m "vagrant: infra config" --allow-empty
        git remote remove origin 2>/dev/null || true
        git remote add origin "http://{{ forgejo_admin_user }}:{{ forgejo_admin_password }}@{{ forgejo_host }}:3000/schnappy/infra.git"
        git push -f origin HEAD:main
      changed_when: true

    # ================================================================
    # Phase 3: Wait for ArgoCD to sync all applications
    # (ArgoCD installed by setup-argocd.yml Taskfile step before this playbook)
    # ================================================================

    - name: Wait for root app to sync
      ansible.builtin.shell: |
        kubectl get application root -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null
      register: root_sync
      retries: 30
      delay: 10
      until: root_sync.stdout == "Synced"
      changed_when: false

    - name: Wait for all applications to sync (10 min max)
      ansible.builtin.shell: |
        APPS=$(kubectl get applications -n argocd -o json)
        TOTAL=$(echo "$APPS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['items']))")
        SYNCED=$(echo "$APPS" | python3 -c "
        import sys,json
        items = json.load(sys.stdin)['items']
        synced = sum(1 for a in items if a.get('status',{}).get('sync',{}).get('status') == 'Synced')
        print(synced)")
        HEALTHY=$(echo "$APPS" | python3 -c "
        import sys,json
        items = json.load(sys.stdin)['items']
        healthy = sum(1 for a in items if a.get('status',{}).get('health',{}).get('status') in ('Healthy',''))
        print(healthy)")
        echo "total=$TOTAL synced=$SYNCED healthy=$HEALTHY"
        [ "$SYNCED" -eq "$TOTAL" ] && [ "$HEALTHY" -eq "$TOTAL" ]
      register: app_status
      retries: 30
      delay: 10
      until: app_status.rc == 0
      changed_when: false
      failed_when: false

    - name: Get detailed app status
      ansible.builtin.shell: |
        kubectl get applications -n argocd \
          -o custom-columns='NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status' \
          --no-headers
      register: app_details
      changed_when: false

    - name: "ARGOCD: Application status"
      ansible.builtin.debug:
        msg: "{{ app_details.stdout_lines }}"

    # ================================================================
    # Phase 5: Verify namespace isolation
    # ================================================================

    - name: Verify pods in prod namespace
      ansible.builtin.shell: |
        kubectl get pods -n {{ prod_ns }} --no-headers 2>/dev/null | wc -l
      register: prod_pods
      changed_when: false

    - name: Verify pods in test namespace
      ansible.builtin.shell: |
        kubectl get pods -n {{ test_ns }} --no-headers 2>/dev/null | wc -l
      register: test_pods
      changed_when: false

    - name: "PODS: prod={{ prod_pods.stdout }}, test={{ test_pods.stdout }}"
      ansible.builtin.debug:
        msg: "Prod has {{ prod_pods.stdout }} pods, test has {{ test_pods.stdout }} pods"

    # ================================================================
    # Phase 6: Verify ExternalSecrets isolation
    # ================================================================

    - name: Check prod ExternalSecrets
      ansible.builtin.shell: |
        kubectl get externalsecrets -n {{ prod_ns }} -o json | \
          python3 -c "
        import sys, json
        items = json.load(sys.stdin)['items']
        synced = sum(1 for i in items
          if any(c.get('reason') == 'SecretSynced'
                 for c in i.get('status', {}).get('conditions', [])))
        print(f'{synced}/{len(items)}')
        sys.exit(0 if synced == len(items) and len(items) > 0 else 1)
        "
      register: prod_es
      retries: 24
      delay: 5
      until: prod_es.rc == 0
      changed_when: false
      failed_when: false

    - name: Check test ExternalSecrets
      ansible.builtin.shell: |
        kubectl get externalsecrets -n {{ test_ns }} -o json | \
          python3 -c "
        import sys, json
        items = json.load(sys.stdin)['items']
        synced = sum(1 for i in items
          if any(c.get('reason') == 'SecretSynced'
                 for c in i.get('status', {}).get('conditions', [])))
        print(f'{synced}/{len(items)}')
        sys.exit(0 if synced == len(items) and len(items) > 0 else 1)
        "
      register: test_es
      retries: 24
      delay: 5
      until: test_es.rc == 0
      changed_when: false
      failed_when: false

    - name: "ESO: prod={{ prod_es.stdout | default('N/A') }}, test={{ test_es.stdout | default('N/A') }}"
      ansible.builtin.debug:
        msg: "Prod ES: {{ prod_es.stdout | default('N/A') }}, Test ES: {{ test_es.stdout | default('N/A') }}"

    # ================================================================
    # Phase 7: Verify secret content differs between envs
    # ================================================================

    - name: Get prod postgres password
      ansible.builtin.shell: |
        kubectl get secret schnappy-postgres -n {{ prod_ns }} \
          -o jsonpath='{.data.POSTGRES_PASSWORD}' 2>/dev/null | base64 -d
      register: prod_pg_pw_actual
      changed_when: false
      no_log: true
      failed_when: false

    - name: Get test postgres password
      ansible.builtin.shell: |
        kubectl get secret schnappy-test-postgres -n {{ test_ns }} \
          -o jsonpath='{.data.POSTGRES_PASSWORD}' 2>/dev/null | base64 -d
      register: test_pg_pw_actual
      changed_when: false
      no_log: true
      failed_when: false

    - name: "ISOLATION: Verify different postgres passwords"
      ansible.builtin.assert:
        that:
          - prod_pg_pw_actual.stdout == prod_pg_password
          - test_pg_pw_actual.stdout == test_pg_password
          - prod_pg_pw_actual.stdout != test_pg_pw_actual.stdout
        fail_msg: "SECRET LEAK: prod and test postgres passwords should differ!"
        success_msg: "Prod and test use different postgres credentials from different Vault paths"
      when:
        - prod_pg_pw_actual.rc == 0
        - test_pg_pw_actual.rc == 0
        - prod_pg_pw_actual.stdout | length > 0
        - test_pg_pw_actual.stdout | length > 0

    # ================================================================
    # Phase 8: Verify service names differ
    # ================================================================

    - name: Check prod services
      ansible.builtin.shell: |
        kubectl get svc -n {{ prod_ns }} --no-headers -o custom-columns=NAME:.metadata.name 2>/dev/null
      register: prod_svcs
      changed_when: false

    - name: Check test services
      ansible.builtin.shell: |
        kubectl get svc -n {{ test_ns }} --no-headers -o custom-columns=NAME:.metadata.name 2>/dev/null
      register: test_svcs
      changed_when: false

    - name: "SERVICES: prod"
      ansible.builtin.debug:
        msg: "{{ prod_svcs.stdout_lines }}"

    - name: "SERVICES: test"
      ansible.builtin.debug:
        msg: "{{ test_svcs.stdout_lines }}"

    # ================================================================
    # Phase 9: Final ArgoCD health check
    # ================================================================

    - name: Final ArgoCD status — all apps must be Synced (data apps may lag due to operator CRDs)
      ansible.builtin.shell: |
        NOT_SYNCED=$(kubectl get applications -n argocd -o json | python3 -c "
        import sys,json
        # Data apps contain operator CRDs that take time to reconcile — allow OutOfSync
        allowed_outsync = {'schnappy-production-data', 'schnappy-test-data'}
        items = json.load(sys.stdin)['items']
        bad = [a['metadata']['name'] for a in items
               if a.get('status',{}).get('sync',{}).get('status') != 'Synced'
               and a['metadata']['name'] not in allowed_outsync]
        print(','.join(bad) if bad else 'ALL_SYNCED')
        ")
        echo "$NOT_SYNCED"
        [ "$NOT_SYNCED" = "ALL_SYNCED" ]
      register: final_sync
      changed_when: false
      failed_when: false

    - name: "TEST RESULT"
      ansible.builtin.debug:
        msg: |
          ====================================================
          Multi-Environment Isolation Test

          ArgoCD apps:      {{ app_status.stdout | default('N/A') }}
          Final sync:       {{ final_sync.stdout | default('N/A') }}
          Pods:             prod={{ prod_pods.stdout }}, test={{ test_pods.stdout }}
          ExternalSecrets:  prod={{ prod_es.stdout | default('N/A') }}, test={{ test_es.stdout | default('N/A') }}
          Secret isolation: {{ 'VERIFIED' if (prod_pg_pw_actual.rc | default(1) == 0 and test_pg_pw_actual.rc | default(1) == 0) else 'SKIPPED (secrets not ready)' }}
          ====================================================

    - name: Assert all ArgoCD apps synced
      ansible.builtin.assert:
        that:
          - final_sync.stdout == "ALL_SYNCED"
        fail_msg: "Not all ArgoCD apps are synced: {{ final_sync.stdout }}"
        success_msg: "All ArgoCD applications are Synced and Healthy"
