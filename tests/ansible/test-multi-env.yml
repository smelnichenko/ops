---
# Test multi-environment (test + prod) isolation in Vagrant
#
# Verifies that two environments can coexist on the same cluster:
# - Separate namespaces with isolated data stores
# - Different Vault secret paths per environment
# - No cross-namespace data leakage
# - ResourceQuota enforcement on test namespace
#
# Prerequisites:
#   - vagrant up (kubeadm + pi VMs)
#   - setup-vault-pi.yml completed
#   - setup-vault.yml completed (Vault + ESO deployed)
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-multi-env.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

- name: Test multi-environment isolation
  hosts: target
  become: true
  gather_facts: false

  vars:
    prod_ns: schnappy
    test_ns: schnappy-test
    vault_ns: vault
    # Different credentials per environment
    prod_pg_password: "vagrant-prod-pg-pw"
    test_pg_password: "vagrant-test-pg-pw"
    prod_redis_password: "vagrant-prod-redis-pw"
    test_redis_password: "vagrant-test-redis-pw"
    prod_kafka_cluster_id: "vagrant-prod-kafka-cluster-id0"
    test_kafka_cluster_id: "vagrant-test-kafka-cluster-id0"

  tasks:
    # ================================================================
    # Phase 1: Get Vault token and seed secrets for both envs
    # ================================================================

    - name: Get Vault root token
      ansible.builtin.shell: |
        kubectl get secret vault-root-token -n {{ vault_ns }} \
          -o jsonpath='{.data.token}' | base64 -d
      register: vault_token_result
      changed_when: false
      no_log: true

    - name: Set Vault token fact
      ansible.builtin.set_fact:
        vault_root_token: "{{ vault_token_result.stdout }}"
      no_log: true

    - name: Seed prod secrets (secret/schnappy/*)
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault kv put secret/schnappy/{{ item.path }} {{ item.data }}
      loop:
        - { path: "postgres", data: "database=monitor username=monitor password={{ prod_pg_password }}" }
        - { path: "redis", data: "password={{ prod_redis_password }}" }
        - { path: "kafka", data: "cluster_id={{ prod_kafka_cluster_id }}" }
        - { path: "minio", data: "access_key=minioadmin secret_key=minioadmin" }
        - { path: "mail", data: "password=test-smtp" }
      no_log: true

    - name: Seed test secrets (secret/schnappy-test/*)
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault kv put secret/schnappy-test/{{ item.path }} {{ item.data }}
      loop:
        - { path: "postgres", data: "database=monitor username=monitor password={{ test_pg_password }}" }
        - { path: "redis", data: "password={{ test_redis_password }}" }
        - { path: "kafka", data: "cluster_id={{ test_kafka_cluster_id }}" }
        - { path: "minio", data: "access_key=testadmin secret_key=testadmin" }
        - { path: "mail", data: "password=test-smtp" }
      no_log: true

    - name: Update Vault policy to allow schnappy-test path
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_root_token }}" \
          vault policy write eso-policy - <<'POLICY'
        path "secret/data/schnappy/*" {
          capabilities = ["read"]
        }
        path "secret/data/schnappy-test/*" {
          capabilities = ["read"]
        }
        POLICY
      changed_when: false

    - name: "SEED: Secrets written for both environments"
      ansible.builtin.debug:
        msg: "Prod secrets at secret/schnappy/*, test secrets at secret/schnappy-test/*"

    # ================================================================
    # Phase 2: Create namespaces
    # ================================================================

    - name: Create prod namespace
      ansible.builtin.command: kubectl create namespace {{ prod_ns }}
      register: ns_prod
      changed_when: ns_prod.rc == 0
      failed_when: ns_prod.rc != 0 and 'already exists' not in ns_prod.stderr

    - name: Create test namespace
      ansible.builtin.command: kubectl create namespace {{ test_ns }}
      register: ns_test
      changed_when: ns_test.rc == 0
      failed_when: ns_test.rc != 0 and 'already exists' not in ns_test.stderr

    - name: Apply ResourceQuota on test namespace
      ansible.builtin.shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: ResourceQuota
        metadata:
          name: test-quota
          namespace: {{ test_ns }}
        spec:
          hard:
            requests.cpu: "2"
            requests.memory: 4Gi
            limits.cpu: "8"
            limits.memory: 8Gi
        EOF
      changed_when: false

    # ================================================================
    # Phase 3: Deploy data stores in both namespaces
    # ================================================================

    - name: Sync platform charts to VM
      ansible.builtin.synchronize:
        src: "{{ lookup('env', 'HOME') }}/src/platform/"
        dest: /vagrant-platform/
        delete: true
      delegate_to: localhost
      become: false

    - name: Write prod data values
      ansible.builtin.copy:
        dest: /tmp/prod-data-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
            secretPathPrefix: "secret/data/schnappy"
          networkPolicies:
            enabled: false
          postgres:
            enabled: true
            image: postgres:17-alpine
            existingSecret: schnappy-postgres
            resources:
              requests: { cpu: 50m, memory: 128Mi }
              limits: { cpu: 500m, memory: 512Mi }
            storage:
              size: 1Gi
              storageClass: local-path
          redis:
            enabled: true
            image: redis:7-alpine
            existingSecret: schnappy-redis
            resources:
              requests: { cpu: 25m, memory: 32Mi }
              limits: { cpu: 100m, memory: 64Mi }
          kafka:
            enabled: false
          scylla:
            enabled: false
          scyllaOperator:
            enabled: false
          strimzi:
            enabled: false
          cnpg:
            enabled: false
          minio:
            enabled: false
          aptCache:
            enabled: false

    - name: Write test data values
      ansible.builtin.copy:
        dest: /tmp/test-data-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: true
            secretPathPrefix: "secret/data/schnappy-test"
          networkPolicies:
            enabled: false
          postgres:
            enabled: true
            image: postgres:17-alpine
            existingSecret: schnappy-test-postgres
            resources:
              requests: { cpu: 25m, memory: 64Mi }
              limits: { cpu: 250m, memory: 256Mi }
            storage:
              size: 1Gi
              storageClass: local-path
          redis:
            enabled: true
            image: redis:7-alpine
            existingSecret: schnappy-test-redis
            resources:
              requests: { cpu: 10m, memory: 16Mi }
              limits: { cpu: 50m, memory: 32Mi }
          kafka:
            enabled: false
          scylla:
            enabled: false
          scyllaOperator:
            enabled: false
          strimzi:
            enabled: false
          cnpg:
            enabled: false
          minio:
            enabled: false
          aptCache:
            enabled: false

    - name: Deploy prod data chart
      ansible.builtin.shell: |
        helm upgrade --install schnappy /vagrant-platform/helm/schnappy-data \
          --namespace {{ prod_ns }} \
          --values /tmp/prod-data-values.yml \
          --timeout 120s --wait
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Deploy test data chart
      ansible.builtin.shell: |
        helm upgrade --install schnappy-test /vagrant-platform/helm/schnappy-data \
          --namespace {{ test_ns }} \
          --values /tmp/test-data-values.yml \
          --timeout 120s --wait
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    # ================================================================
    # Phase 4: Verify namespace isolation
    # ================================================================

    - name: Verify pods in prod namespace
      ansible.builtin.shell: |
        kubectl get pods -n {{ prod_ns }} --no-headers | wc -l
      register: prod_pods
      retries: 12
      delay: 5
      until: prod_pods.stdout | int >= 2
      changed_when: false

    - name: Verify pods in test namespace
      ansible.builtin.shell: |
        kubectl get pods -n {{ test_ns }} --no-headers | wc -l
      register: test_pods
      retries: 12
      delay: 5
      until: test_pods.stdout | int >= 2
      changed_when: false

    - name: "PODS: prod={{ prod_pods.stdout }}, test={{ test_pods.stdout }}"
      ansible.builtin.debug:
        msg: "Prod has {{ prod_pods.stdout }} pods, test has {{ test_pods.stdout }} pods"

    # ================================================================
    # Phase 5: Verify ExternalSecrets use different Vault paths
    # ================================================================

    - name: Wait for prod ExternalSecrets to sync
      ansible.builtin.shell: |
        kubectl get externalsecrets -n {{ prod_ns }} -o json | \
          python3 -c "
        import sys, json
        items = json.load(sys.stdin)['items']
        synced = sum(1 for i in items
          if any(c.get('reason') == 'SecretSynced'
                 for c in i.get('status', {}).get('conditions', [])))
        print(f'{synced}/{len(items)}')
        sys.exit(0 if synced == len(items) and len(items) > 0 else 1)
        "
      register: prod_es
      retries: 24
      delay: 5
      until: prod_es.rc == 0
      changed_when: false

    - name: Wait for test ExternalSecrets to sync
      ansible.builtin.shell: |
        kubectl get externalsecrets -n {{ test_ns }} -o json | \
          python3 -c "
        import sys, json
        items = json.load(sys.stdin)['items']
        synced = sum(1 for i in items
          if any(c.get('reason') == 'SecretSynced'
                 for c in i.get('status', {}).get('conditions', [])))
        print(f'{synced}/{len(items)}')
        sys.exit(0 if synced == len(items) and len(items) > 0 else 1)
        "
      register: test_es
      retries: 24
      delay: 5
      until: test_es.rc == 0
      changed_when: false

    - name: "ESO: prod={{ prod_es.stdout }}, test={{ test_es.stdout }}"
      ansible.builtin.debug:
        msg: "Prod ExternalSecrets: {{ prod_es.stdout }}, Test ExternalSecrets: {{ test_es.stdout }}"

    # ================================================================
    # Phase 6: Verify secrets contain different values
    # ================================================================

    - name: Get prod postgres password
      ansible.builtin.shell: |
        kubectl get secret schnappy-postgres -n {{ prod_ns }} \
          -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d
      register: prod_pg_pw_actual
      changed_when: false
      no_log: true

    - name: Get test postgres password
      ansible.builtin.shell: |
        kubectl get secret schnappy-test-postgres -n {{ test_ns }} \
          -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d
      register: test_pg_pw_actual
      changed_when: false
      no_log: true

    - name: "ISOLATION: Verify different postgres passwords"
      ansible.builtin.assert:
        that:
          - prod_pg_pw_actual.stdout == prod_pg_password
          - test_pg_pw_actual.stdout == test_pg_password
          - prod_pg_pw_actual.stdout != test_pg_pw_actual.stdout
        fail_msg: "SECRET LEAK: prod and test postgres passwords should differ!"
        success_msg: "Prod and test use different postgres credentials from different Vault paths"

    # ================================================================
    # Phase 7: Verify service names are unique per environment
    # ================================================================

    - name: Check prod service names
      ansible.builtin.shell: |
        kubectl get svc -n {{ prod_ns }} --no-headers -o custom-columns=NAME:.metadata.name
      register: prod_svcs
      changed_when: false

    - name: Check test service names
      ansible.builtin.shell: |
        kubectl get svc -n {{ test_ns }} --no-headers -o custom-columns=NAME:.metadata.name
      register: test_svcs
      changed_when: false

    - name: "SERVICES: prod={{ prod_svcs.stdout_lines | join(', ') }}"
      ansible.builtin.debug:
        msg: "{{ prod_svcs.stdout_lines }}"

    - name: "SERVICES: test={{ test_svcs.stdout_lines | join(', ') }}"
      ansible.builtin.debug:
        msg: "{{ test_svcs.stdout_lines }}"

    - name: "ISOLATION: Verify service name prefixes differ"
      ansible.builtin.assert:
        that:
          - "'schnappy-postgres' in prod_svcs.stdout"
          - "'schnappy-test-postgres' in test_svcs.stdout"
          - "'schnappy-redis' in prod_svcs.stdout"
          - "'schnappy-test-redis' in test_svcs.stdout"
        fail_msg: "Service names not properly parameterized!"
        success_msg: "Service names correctly prefixed per environment"

    # ================================================================
    # Phase 8: Verify ResourceQuota on test namespace
    # ================================================================

    - name: Check ResourceQuota enforcement
      ansible.builtin.shell: |
        kubectl get resourcequota test-quota -n {{ test_ns }} \
          -o jsonpath='{.status.hard.requests\.memory}'
      register: quota_check
      changed_when: false

    - name: "QUOTA: test namespace memory limit={{ quota_check.stdout }}"
      ansible.builtin.assert:
        that:
          - quota_check.stdout == "4Gi"
        fail_msg: "ResourceQuota not enforced on test namespace!"
        success_msg: "ResourceQuota correctly enforced: {{ quota_check.stdout }} memory limit"

    # ================================================================
    # Phase 9: Cleanup and summary
    # ================================================================

    - name: Clean up values files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/prod-data-values.yml
        - /tmp/test-data-values.yml

    - name: "TEST RESULT"
      ansible.builtin.debug:
        msg: |
          ====================================================
          Multi-Environment Isolation Test: PASS

          Namespaces:       {{ prod_ns }} (prod), {{ test_ns }} (test)
          Pods:             prod={{ prod_pods.stdout }}, test={{ test_pods.stdout }}
          ExternalSecrets:  prod={{ prod_es.stdout }}, test={{ test_es.stdout }}
          Secret isolation: VERIFIED (different passwords from different Vault paths)
          Service names:    VERIFIED (schnappy-* vs schnappy-test-*)
          ResourceQuota:    VERIFIED ({{ quota_check.stdout }} on test)
          ====================================================
