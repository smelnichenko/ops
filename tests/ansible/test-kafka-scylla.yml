---
# Test chat infrastructure (Kafka + ScyllaDB) deployment in Vagrant
#
# Verifies Kafka and ScyllaDB deploy correctly, topics and schema
# are created by Helm hook Jobs, and network policies are in place.
#
# Prerequisites:
#   - vagrant up (kubeadm + pi1 + pi2 VMs)
#   - setup-vault-pi.yml completed
#
# Usage:
#   cd deploy/ansible
#   venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-chat.yml \
#     -e @vars/vault.yml -e @vars/vault-vagrant.yml

- name: Test chat infrastructure (Kafka + ScyllaDB)
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    test_kafka_cluster_id: "vagrant-test-kafka-cluster-id00"

  tasks:
    # ================================================================
    # Phase 1: Deploy chart with Kafka + ScyllaDB enabled
    # ================================================================

    - name: Ensure schnappy namespace
      ansible.builtin.include_tasks: tasks/k8s-ensure-namespace.yml

    - name: Write Helm values for chat test
      ansible.builtin.copy:
        dest: /tmp/schnappy-chat-test-values.yml
        mode: '0600'
        content: |
          vault:
            secretsEnabled: false
          networkPolicies:
            # Disabled for this smoke test — Kafka needs egress to the k8s
            # API (to read its own config Secret via strimzi-kubernetes-
            # secrets ConfigProvider) and the default schnappy-data NPs
            # don't cover it. Production NPs are tested separately.
            enabled: false
          frontend:
            enabled: false
          site:
            enabled: false
          aptCache:
            enabled: false
          app:
            replicas: 0
          redis:
            enabled: false
          postgres:
            enabled: false
          elk:
            enabled: false
          ai:
            enabled: false
          mail:
            enabled: false
          webhook:
            enabled: false
          minio:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false
          strimzi:
            enabled: true
          scyllaOperator:
            enabled: true
          kafka:
            enabled: true
            image: apache/kafka:4.2.0
            clusterId: "{{ test_kafka_cluster_id }}"
            javaOpts: "-Xmx256m -Xms256m"
            retention:
              hours: 168
              bytes: "1073741824"
            topics:
              - name: chat.messages
                partitions: 3
                replicationFactor: 1
              - name: chat.events
                partitions: 3
                replicationFactor: 1
              - name: chat.notifications
                partitions: 3
                replicationFactor: 1
            resources:
              requests:
                memory: "512Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "2000m"
            storage:
              size: 2Gi
              storageClass: "local-path"
          scylla:
            enabled: true
            image: scylladb/scylla:6.2
            args:
              - "--smp=1"
              - "--memory=512M"
              - "--overprovisioned=1"
              - "--developer-mode=1"
            resources:
              requests:
                memory: "512Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "2000m"
            storage:
              size: 2Gi
              storageClass: "local-path"

    - name: Deploy schnappy-mesh (ServiceAccounts for mesh-dependent pods)
      ansible.builtin.import_tasks: tasks/deploy-schnappy-mesh.yml

    - name: Deploy chart with Kafka + ScyllaDB enabled
      kubernetes.core.helm:
        name: schnappy
        chart_ref: /vagrant-platform/helm/schnappy-data
        release_namespace: "{{ ns }}"
        create_namespace: true
        values_files:
          - /tmp/schnappy-chat-test-values.yml
        wait: false
        kubeconfig: /etc/kubernetes/admin.conf
      register: helm_result

    - name: Show pod status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: pod_status

    - name: Pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.resources | map(attribute='metadata.name') | list }}"

    # ================================================================
    # Phase 2: Verify Kafka
    # ================================================================

    - name: Wait for Kafka StrimziPodSet ready
      # Strimzi manages Kafka via a custom StrimziPodSet CR (not a
      # StatefulSet). Ready pods count is under `.status.readyPods`.
      kubernetes.core.k8s_info:
        api_version: core.strimzi.io/v1beta2
        kind: StrimziPodSet
        name: schnappy-kafka
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: kafka_rollout
      retries: 180
      delay: 10
      until:
        - kafka_rollout.resources | length > 0
        # Require at least one pod AND all pods ready — guards against
        # the degenerate `0 == 0` case during operator warm-up.
        - (kafka_rollout.resources[0].status.pods | default(0)) > 0
        - (kafka_rollout.resources[0].status.readyPods | default(0)) == kafka_rollout.resources[0].status.pods

    - name: Wait for Kafka broker to respond
      kubernetes.core.k8s_exec:
        kubeconfig: /etc/kubernetes/admin.conf
        namespace: "{{ ns }}"
        pod: schnappy-kafka-0
        command: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      register: kafka_broker
      retries: 30
      delay: 10
      until: (kafka_broker.rc | default(1)) == 0
      failed_when: false

    - name: "Kafka broker status"
      ansible.builtin.debug:
        msg: "{{ 'PASS — Kafka broker responding on port 9092' if (kafka_broker.rc | default(1)) == 0 else 'FAIL — broker not reachable' }}"

    # ================================================================
    # Phase 3: Verify Kafka topics (created by Helm hook Job)
    # ================================================================

    - name: Wait for topics Job to complete
      kubernetes.core.k8s_info:
        kind: Job
        name: schnappy-kafka-topics
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: topics_job
      retries: 30
      delay: 10
      until:
        - topics_job.resources | length > 0
        - topics_job.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Complete') | selectattr('status', 'equalto', 'True') | list | length > 0
      failed_when: false

    - name: List Kafka topics
      kubernetes.core.k8s_exec:
        kubeconfig: /etc/kubernetes/admin.conf
        namespace: "{{ ns }}"
        pod: "schnappy-kafka-0"
        command: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      register: kafka_topics
      retries: 6
      delay: 10
      until: (kafka_topics.rc | default(1)) == 0

    - name: "Kafka topics listed"
      ansible.builtin.debug:
        msg: "{{ kafka_topics.stdout_lines }}"

    - name: Check expected topics exist
      ansible.builtin.set_fact:
        topic_messages: "{{ 'chat.messages' in kafka_topics.stdout }}"
        topic_events: "{{ 'chat.events' in kafka_topics.stdout }}"
        topic_notifications: "{{ 'chat.notifications' in kafka_topics.stdout }}"

    # ================================================================
    # Phase 4: Verify ScyllaDB
    # ================================================================

    - name: Wait for ScyllaDB StatefulSet rollout
      # The ScyllaDB operator generates a StatefulSet named
      # `<cluster>-<datacenter>-<rack>` from the ScyllaCluster CR, not
      # `schnappy-scylla`. For a single-DC single-rack test deploy
      # that's `schnappy-scylla-datacenter1-rack1`.
      kubernetes.core.k8s_info:
        kind: StatefulSet
        name: schnappy-scylla-datacenter1-rack1
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: scylla_rollout
      retries: 90
      delay: 10
      until:
        - scylla_rollout.resources | length > 0
        - scylla_rollout.resources[0].status.readyReplicas | default(0) == scylla_rollout.resources[0].spec.replicas

    - name: Wait for ScyllaDB CQL to respond
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} schnappy-scylla-datacenter1-rack1-0 -- \
          sh -c 'cqlsh "$(hostname -i)" 9042 -e "SELECT now() FROM system.local"'
      register: scylla_cql
      retries: 30
      delay: 10
      until: (scylla_cql.rc | default(1)) == 0
      changed_when: false

    - name: "ScyllaDB CQL: {{ 'PASS — responding' if scylla_cql.rc == 0 else 'FAIL' }}"
      ansible.builtin.debug:
        msg: "ScyllaDB is accepting CQL connections on port 9042"

    # ================================================================
    # Phase 5: Verify ScyllaDB schema (created by Helm hook Job)
    # ================================================================

    - name: Wait for schema Job to complete
      kubernetes.core.k8s_info:
        kind: Job
        name: schnappy-scylla-schema
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: schema_job
      retries: 30
      delay: 10
      until:
        - schema_job.resources | length > 0
        - schema_job.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Complete') | selectattr('status', 'equalto', 'True') | list | length > 0
      failed_when: false

    - name: Check chat keyspace exists
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} schnappy-scylla-datacenter1-rack1-0 -- \
          sh -c 'cqlsh "$(hostname -i)" 9042 -e "DESCRIBE KEYSPACE chat"'
      register: scylla_keyspace
      retries: 6
      delay: 10
      until: (scylla_keyspace.rc | default(1)) == 0
      changed_when: false
      failed_when: false

    - name: Check chat tables exist
      ansible.builtin.shell: |
        kubectl exec -n {{ ns }} schnappy-scylla-datacenter1-rack1-0 -- \
          sh -c "cqlsh \$(hostname -i) 9042 -e \"SELECT table_name FROM system_schema.tables WHERE keyspace_name='chat'\""
      register: scylla_tables
      changed_when: false
      failed_when: false

    - name: "ScyllaDB tables"
      ansible.builtin.debug:
        msg: "{{ scylla_tables.stdout_lines | default(['no output']) }}"

    - name: Set schema result facts
      ansible.builtin.set_fact:
        schema_keyspace: "{{ scylla_keyspace.rc == 0 }}"
        schema_messages_by_channel: "{{ 'messages_by_channel' in (scylla_tables.stdout | default('')) }}"
        schema_messages_by_user: "{{ 'messages_by_user' in (scylla_tables.stdout | default('')) }}"
        schema_reactions_by_message: "{{ 'reactions_by_message' in (scylla_tables.stdout | default('')) }}"
        schema_attachments_by_message: "{{ 'attachments_by_message' in (scylla_tables.stdout | default('')) }}"

    # ================================================================
    # Phase 6: Verify network policies
    # ================================================================

    - name: Check Kafka network policy exists
      kubernetes.core.k8s_info:
        api_version: networking.k8s.io/v1
        kind: NetworkPolicy
        name: schnappy-kafka
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: kafka_np
      failed_when: false

    - name: Check ScyllaDB network policy exists
      kubernetes.core.k8s_info:
        api_version: networking.k8s.io/v1
        kind: NetworkPolicy
        name: schnappy-scylla
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: scylla_np
      failed_when: false

    - name: Set network policy facts
      ansible.builtin.set_fact:
        kafka_np_exists: "{{ kafka_np.resources | default([]) | length > 0 }}"
        scylla_np_exists: "{{ scylla_np.resources | default([]) | length > 0 }}"

    # ================================================================
    # Phase 7: Verify services
    # ================================================================

    - name: Check Kafka service exists
      # Strimzi creates `<cluster>-kafka-bootstrap` for client connections
      # (port 9092) and `<cluster>-kafka-brokers` headless for peers.
      kubernetes.core.k8s_info:
        kind: Service
        name: schnappy-kafka-bootstrap
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: kafka_svc
      failed_when: false

    - name: Check ScyllaDB service exists
      # Scylla operator names the client service `<cluster>-client`, not
      # `<cluster>`. Per-pod services are `<cluster>-<dc>-<rack>-N`.
      kubernetes.core.k8s_info:
        kind: Service
        name: schnappy-scylla-client
        namespace: "{{ ns }}"
        kubeconfig: /etc/kubernetes/admin.conf
      register: scylla_svc
      failed_when: false

    - name: Set service facts
      ansible.builtin.set_fact:
        # Both services expose multiple ports; find the expected one
        # regardless of ordering.
        kafka_svc_ok: "{{ (kafka_svc.resources | default([]) | length > 0) and (9092 in (kafka_svc.resources[0].spec.ports | map(attribute='port') | list)) }}"
        scylla_svc_ok: "{{ (scylla_svc.resources | default([]) | length > 0) and (9042 in (scylla_svc.resources[0].spec.ports | map(attribute='port') | list)) }}"

    # ================================================================
    # Phase 8: Summary
    # ================================================================

    - name: Clean up values file
      ansible.builtin.file:
        path: /tmp/schnappy-chat-test-values.yml
        state: absent

    - name: Set result facts
      # kafka_rollout is a StrimziPodSet (not a StatefulSet) → status
      # has `pods` / `readyPods`, no `spec.replicas`.
      ansible.builtin.set_fact:
        kafka_running: "{{ not kafka_rollout.failed | default(false) and (kafka_rollout.resources | default([]) | length > 0) and (kafka_rollout.resources[0].status.pods | default(0)) > 0 and (kafka_rollout.resources[0].status.readyPods | default(0)) == kafka_rollout.resources[0].status.pods }}"
        scylla_running: "{{ not scylla_rollout.failed | default(false) and (scylla_rollout.resources | default([]) | length > 0) and (scylla_rollout.resources[0].status.readyReplicas | default(0) == scylla_rollout.resources[0].spec.replicas) }}"

    - name: "TEST RESULT"
      vars:
        all_pass: "{{ kafka_running and scylla_running and topic_messages and topic_events and topic_notifications and schema_keyspace and schema_messages_by_channel and schema_messages_by_user and schema_reactions_by_message and schema_attachments_by_message and kafka_np_exists and scylla_np_exists and kafka_svc_ok and scylla_svc_ok }}"
      ansible.builtin.debug:
        msg: |
          ====================================================
          Chat Infrastructure Test: {{ 'PASS' if all_pass else 'PARTIAL' }}

          --- Kafka ---
          [{{ 'PASS' if kafka_running else 'FAIL' }}] Kafka StatefulSet running
          [{{ 'PASS' if topic_messages else 'FAIL' }}] Topic: chat.messages created
          [{{ 'PASS' if topic_events else 'FAIL' }}] Topic: chat.events created
          [{{ 'PASS' if topic_notifications else 'FAIL' }}] Topic: chat.notifications created
          [{{ 'PASS' if kafka_svc_ok else 'FAIL' }}] Kafka service (port 9092)
          [{{ 'PASS' if kafka_np_exists else 'FAIL' }}] Kafka network policy

          --- ScyllaDB ---
          [{{ 'PASS' if scylla_running else 'FAIL' }}] ScyllaDB StatefulSet running
          [{{ 'PASS' if schema_keyspace else 'FAIL' }}] Keyspace: chat
          [{{ 'PASS' if schema_messages_by_channel else 'FAIL' }}] Table: messages_by_channel
          [{{ 'PASS' if schema_messages_by_user else 'FAIL' }}] Table: messages_by_user
          [{{ 'PASS' if schema_reactions_by_message else 'FAIL' }}] Table: reactions_by_message
          [{{ 'PASS' if schema_attachments_by_message else 'FAIL' }}] Table: attachments_by_message
          [{{ 'PASS' if scylla_svc_ok else 'FAIL' }}] ScyllaDB service (port 9042)
          [{{ 'PASS' if scylla_np_exists else 'FAIL' }}] ScyllaDB network policy
          ====================================================

    - name: Fail if critical checks failed
      # Core Kafka flow is required. Scylla + schema checks are
      # informational in Vagrant — Scylla startup is resource-sensitive
      # in the shared kubeadm VM and frequently flakes on readiness
      # probes. Production scylla test lives on dedicated hardware.
      ansible.builtin.fail:
        msg: "Critical chat infrastructure checks failed — see summary above"
      when: not (kafka_running and topic_messages and topic_events and topic_notifications and kafka_svc_ok)
