[defaults]
inventory = inventory/localhost.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = False
executable = /bin/bash
# vagrant-libvirt SSH connections drop intermittently when 3 VMs boot
# concurrently. Stop ssh from giving up at the first dropped read.
timeout = 60

[inventory]
enable_plugins = yaml, ini

[ssh_connection]
retries = 5
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=30
