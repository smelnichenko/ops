---
# Vagrant overrides for setup-vault-pi.yml.
# Apply with: -e @vars/vault.yml -e @vars/vault-vagrant.yml
#
# Usage:
#   venv/bin/ansible-playbook -i inventory/vagrant.yml \
#     playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

vault_arch: "amd64"                                # x86_64 VM
vault_cluster_ip: "192.168.56.10"                  # kubeadm node (for UFW)
vault_cluster_ipv6: ""                             # no IPv6 in Vagrant
vault_pi_ssh_allow_ipv4: "192.168.56.0/24"         # Vagrant private net
vault_pi_ssh_allow_ipv6: ""
vault_pi_ssh_allow_extra_ipv4: "192.168.121.0/24"  # Vagrant NAT
