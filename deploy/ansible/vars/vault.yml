---
# Vault shared variables — used by setup-vault-pi.yml.
#
# Per-environment overrides (see also vars/vault-vagrant.yml):
#   -e vault_arch=amd64          (Vagrant x86_64)

# ── Vault binary ────────────────────────────────────────────────────────────
vault_version: "1.21.3"
vault_arch: "arm64"            # arm64 for Pi, amd64 for Vagrant/x86_64

# ── Shared DNS (SAN + api_addr) ─────────────────────────────────────────────
vault_pi_dns: "vault.schnappy.io"

# ── Shamir seal params ──────────────────────────────────────────────────────
vault_unseal_shares: 3
vault_unseal_threshold: 2
