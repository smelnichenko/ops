---
# Production environment variables (64GB target)
# Usage: ansible-playbook deploy.yml -e @vars/production.yml
#
# Secrets are managed by Vault + External Secrets Operator.
# Non-secret config (hosts, ports, feature flags) stays here.
# To fall back to .env-based secrets, remove existingSecret and set values directly.

monitor_release_name: monitor
monitor_namespace: monitor

# Registry pull-through cache on Pi (setup-registry-mirror.yml)
registry_mirror_ip: "192.168.11.4"

monitor_values:
  # Vault integration — ESO syncs secrets from Vault KV into k8s Secrets
  vault:
    secretsEnabled: true

  auth:
    existingSecret: "monitor-auth"
    tokenExpiration: 1h
    registrationEnabled: true
    secureCookies: true

  # Network policies for pod isolation in production
  networkPolicies:
    enabled: true

  frontend:
    enabled: true
    image:
      repository: git.pmon.dev/schnappy/monitor-frontend
      tag: "latest"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"

  app:
    image:
      repository: git.pmon.dev/schnappy/monitor
      tag: "latest"
      pullPolicy: IfNotPresent
    replicas: 1
    javaOpts: "-Xmx6g -XX:+UseZGC"
    hikari:
      minimumIdle: 5
      maximumPoolSize: 20
      idleTimeout: 300000
      maxLifetime: 1200000
      connectionTimeout: 20000
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "8Gi"
        cpu: "6000m"
    ingress:
      enabled: true
      className: traefik
      host: "pmon.dev"
      annotations: {}
      tls:
        enabled: true
        secretName: "pmon-dev-tls"
        clusterIssuer: "letsencrypt-prod"

  mail:
    enabled: true
    existingSecret: "monitor-mail"
    host: "smtp.resend.com"
    port: "587"
    username: "resend"
    fromAddress: "noreply@pmon.dev"
    appUrl: "https://pmon.dev"

  webhook:
    enabled: true
    existingSecret: "monitor-webhook"

  minio:
    enabled: true
    image: "quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z"
    existingSecret: "monitor-minio"
    bucket: "email-attachments"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  ai:
    enabled: true
    existingSecret: "monitor-ai"
    model: "claude-haiku-4-5-20251001"

  monitor:
    enabled: true
    http:
      connectTimeout: 10s
      readTimeout: 30s
      userAgent: "MonitorBot/1.0"

  redis:
    enabled: true
    image: redis:7-alpine
    existingSecret: "monitor-redis"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "4Gi"
        cpu: "1000m"

  postgres:
    enabled: true
    image: postgres:17-alpine
    existingSecret: "monitor-postgres"
    sharedBuffers: "4GB"
    effectiveCacheSize: "12GB"
    workMem: "64MB"
    maintenanceWorkMem: "512MB"
    maxParallelWorkersPerGather: 4
    maxParallelWorkers: 6
    maxWorkerProcesses: 10
    effectiveIoConcurrency: 200
    randomPageCost: "1.1"
    resources:
      requests:
        memory: "4Gi"
        cpu: "500m"
      limits:
        memory: "16Gi"
        cpu: "6000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  prometheus:
    enabled: true
    image: prom/prometheus:v3.9.1
    retention: 30d
    scrapeInterval: 15s
    vault:
      enabled: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  grafana:
    enabled: true
    image: grafana/grafana:12.4.0
    existingSecret: "monitor-grafana"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    storage:
      size: 5Gi
      storageClass: "local-path"
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: traefik
      host: "grafana.pmon.dev"
      tls:
        enabled: true
        secretName: "grafana-pmon-dev-tls"
        clusterIssuer: "letsencrypt-dns"

  kafka:
    enabled: true
    image: apache/kafka:3.9.0
    existingSecret: "monitor-kafka"
    javaOpts: "-Xmx1g -Xms1g"
    retention:
      hours: 168
      bytes: "10737418240"
    topics:
      - name: chat.messages
        partitions: 12
        replicationFactor: 1
      - name: chat.events
        partitions: 6
        replicationFactor: 1
      - name: chat.notifications
        partitions: 3
        replicationFactor: 1
    resources:
      requests:
        memory: "1Gi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
    storage:
      size: 10Gi
      storageClass: "local-path"

  scylla:
    enabled: true
    image: scylladb/scylla:6.2
    args:
      - "--smp=2"
      - "--memory=2G"
      - "--overprovisioned=1"
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "4000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  sonarqube:
    enabled: true
    image: sonarqube:26.3.0.120487-community
    existingSecret: "monitor-sonarqube"
    javaOpts: "-Xms1g -Xmx1g"
    resources:
      requests:
        memory: "3Gi"
        cpu: "500m"
      limits:
        memory: "6Gi"
        cpu: "4000m"
    storage:
      size: 10Gi
      storageClass: "local-path"
    postgres:
      image: postgres:17-alpine
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "1000m"
      storage:
        size: 5Gi
        storageClass: "local-path"
    ingress:
      enabled: true
      className: traefik
      host: "sonar.pmon.dev"
      tls:
        enabled: true
        secretName: "sonar-pmon-dev-tls"
        clusterIssuer: "letsencrypt-dns"

  elk:
    enabled: true
    elasticsearch:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
      replicas: 1
      javaOpts: "-Xms2g -Xmx2g"
      existingSecret: "monitor-elasticsearch"
      resources:
        requests:
          memory: "4Gi"
          cpu: "500m"
        limits:
          memory: "8Gi"
          cpu: "4000m"
      storage:
        size: 50Gi
        storageClass: "local-path"
      retention:
        days: 30
    kibana:
      image: docker.elastic.co/kibana/kibana:8.17.4
      replicas: 1
      resources:
        requests:
          memory: "1Gi"
          cpu: "100m"
        limits:
          memory: "2Gi"
          cpu: "1000m"
      ingress:
        enabled: true
        className: traefik
        host: "logs.pmon.dev"
        tls:
          enabled: true
          secretName: "logs-pmon-dev-tls"
          clusterIssuer: "letsencrypt-dns"
    fluentbit:
      image: cr.fluentbit.io/fluent/fluent-bit:3.2
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "200m"
    ciLogs:
      enabled: true
      retention:
        days: 90

# Forgejo (self-hosted Git forge) — these are deploy-time only, not runtime secrets
forgejo_host: "git.pmon.dev"
forgejo_chart_version: "16.2.0"
forgejo_storage_size: "20Gi"
forgejo_admin_user: "{{ lookup('env', 'FORGEJO_ADMIN_USER') | default('admin', true) }}"
forgejo_admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') }}"
forgejo_admin_email: "{{ lookup('env', 'FORGEJO_ADMIN_EMAIL') | default('admin@pmon.dev', true) }}"
forgejo_runner_secret: "{{ lookup('env', 'FORGEJO_RUNNER_SECRET') }}"

# Porkbun DNS-01 (cert-manager webhook) — deploy-time only
porkbun_api_key: "{{ lookup('env', 'PORKBUN_API_KEY') }}"
porkbun_secret_key: "{{ lookup('env', 'PORKBUN_SECRET_KEY') }}"

# Velero + Backup MinIO — deploy-time only
velero_backup_path: "/mnt/backups/minio"
velero_minio_storage_size: "100Gi"
velero_minio_access_key: "{{ lookup('env', 'VELERO_MINIO_ACCESS_KEY') | default('velero-admin', true) }}"
velero_minio_secret_key: "{{ lookup('env', 'VELERO_MINIO_SECRET_KEY') }}"

# Total resource allocation (10-core / 64GB target):
#                     CPU limit    Memory limit
# - Frontend:         500m         256Mi
# - App:              6000m        8Gi    (JVM heap 6GB + ZGC + metaspace/native)
# - Redis:            1000m        4Gi
# - Postgres:         6000m        16Gi   (shared_buffers 4GB, effective_cache_size 12GB)
# - Kafka:            2000m        2Gi    (JVM heap 1GB)
# - ScyllaDB:         4000m        4Gi    (smp=2, memory=2G)
# - Elasticsearch:    4000m        8Gi    (JVM heap 2GB + Lucene file cache)
# - Kibana:           1000m        2Gi    (Node.js + v8, needs ~1Gi minimum)
# - Filebeat:         200m         256Mi
# - SonarQube:        4000m        6Gi    (3x JVM heaps: web/ce/search, 1g each)
# - SonarQube PG:     1000m        512Mi
# - Forgejo:          2000m        1Gi
# - Backup MinIO:     500m         512Mi
# - Velero:           1000m        512Mi
# - Prometheus:       2000m        4Gi
# - Grafana:          1000m        1Gi
# - k3s system:       ~1000m       ~2Gi
# ------------------------------------------------
# Active total:       ~35200m      ~54.5Gi  (leaves ~9.5GB for OS cache + bursts)
