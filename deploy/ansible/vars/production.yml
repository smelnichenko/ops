---
# Production environment variables (64GB target)
# Usage: ansible-playbook deploy.yml -e @vars/production.yml
#
# REQUIRED: Set these environment variables before deployment:
#   export POSTGRES_USERNAME=monitor_user        # optional, defaults to monitor_user
#   export MONITOR_DB_PASSWORD=your-secure-password
#   export JWT_SECRET=your-jwt-secret-at-least-32-chars
#   export GRAFANA_ADMIN_USER=admin              # optional, defaults to admin
#   export GRAFANA_ADMIN_PASSWORD=your-secure-password

monitor_release_name: monitor
monitor_namespace: monitor

monitor_values:
  auth:
    jwtSecret: "{{ lookup('env', 'JWT_SECRET') | default('CHANGE_ME_GENERATE_A_SECURE_32_CHAR_SECRET', true) }}"
    tokenExpiration: 1h
    registrationEnabled: true
    secureCookies: true

  # Network policies for pod isolation in production
  networkPolicies:
    enabled: true

  frontend:
    enabled: true
    image:
      repository: ghcr.io/schnappy/monitor-frontend
      tag: "latest"
      pullPolicy: Never
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"

  app:
    image:
      repository: ghcr.io/schnappy/monitor
      tag: "latest"
      pullPolicy: Never
    replicas: 1
    javaOpts: "-Xmx6g -XX:+UseZGC"
    hikari:
      minimumIdle: 5
      maximumPoolSize: 20
      idleTimeout: 300000
      maxLifetime: 1200000
      connectionTimeout: 20000
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "8Gi"
        cpu: "6000m"
    ingress:
      enabled: true
      className: traefik
      host: "pmon.dev"
      annotations: {}
      tls:
        enabled: true
        secretName: "pmon-dev-tls"
        clusterIssuer: "letsencrypt-prod"

  mail:
    enabled: "{{ lookup('env', 'MAIL_ENABLED') | default('false', true) | bool }}"
    host: "{{ lookup('env', 'MAIL_HOST') | default('smtp.gmail.com', true) }}"
    port: "{{ lookup('env', 'MAIL_PORT') | default('587', true) }}"
    username: "{{ lookup('env', 'MAIL_USERNAME') | default('', true) }}"
    password: "{{ lookup('env', 'MAIL_PASSWORD') | default('', true) }}"
    fromAddress: "{{ lookup('env', 'MAIL_FROM') | default('noreply@example.com', true) }}"
    appUrl: "{{ lookup('env', 'APP_URL') | default('https://pmon.dev', true) }}"

  webhook:
    enabled: "{{ lookup('env', 'RESEND_WEBHOOK_ENABLED') | default('false', true) | bool }}"
    signingSecret: "{{ lookup('env', 'RESEND_WEBHOOK_SECRET') | default('', true) }}"
    apiKey: "{{ lookup('env', 'RESEND_API_KEY') | default('', true) }}"

  minio:
    enabled: "{{ lookup('env', 'MINIO_ENABLED') | default('false', true) | bool }}"
    image: "quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z"
    accessKey: "{{ lookup('env', 'MINIO_ROOT_USER') | default('', true) }}"
    secretKey: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') | default('', true) }}"
    bucket: "email-attachments"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  ai:
    enabled: true
    apiKey: "{{ lookup('env', 'ANTHROPIC_API_KEY') }}"
    model: "claude-haiku-4-5-20251001"

  monitor:
    enabled: true
    http:
      connectTimeout: 10s
      readTimeout: 30s
      userAgent: "MonitorBot/1.0"

  redis:
    enabled: true
    image: redis:7-alpine
    password: "{{ lookup('env', 'REDIS_PASSWORD') | default('', true) }}"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "4Gi"
        cpu: "1000m"

  postgres:
    enabled: true
    image: postgres:17-alpine
    database: monitor
    username: "{{ lookup('env', 'POSTGRES_USERNAME') | default('monitor_user', true) }}"
    password: "{{ lookup('env', 'MONITOR_DB_PASSWORD') | default('CHANGE_ME', true) }}"
    sharedBuffers: "4GB"
    effectiveCacheSize: "12GB"
    workMem: "64MB"
    maintenanceWorkMem: "512MB"
    maxParallelWorkersPerGather: 4
    maxParallelWorkers: 6
    maxWorkerProcesses: 10
    effectiveIoConcurrency: 200
    randomPageCost: "1.1"
    resources:
      requests:
        memory: "4Gi"
        cpu: "500m"
      limits:
        memory: "16Gi"
        cpu: "6000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  prometheus:
    enabled: false
    image: prom/prometheus:v3.9.1
    retention: 30d
    scrapeInterval: 15s
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  grafana:
    enabled: false
    image: grafana/grafana:12.4.0
    adminUser: "{{ lookup('env', 'GRAFANA_ADMIN_USER') | default('admin', true) }}"
    adminPassword: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('CHANGE_ME', true) }}"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    storage:
      size: 5Gi
      storageClass: "local-path"
    service:
      type: NodePort

# Forgejo (self-hosted Git forge)
forgejo_host: "git.pmon.dev"
forgejo_chart_version: "16.2.0"
forgejo_storage_size: "20Gi"
forgejo_admin_user: "{{ lookup('env', 'FORGEJO_ADMIN_USER') | default('admin', true) }}"
forgejo_admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') }}"
forgejo_admin_email: "{{ lookup('env', 'FORGEJO_ADMIN_EMAIL') | default('admin@pmon.dev', true) }}"
forgejo_runner_secret: "{{ lookup('env', 'FORGEJO_RUNNER_SECRET') }}"

# Velero + Backup MinIO
velero_backup_path: "/mnt/backups/minio"
velero_minio_storage_size: "100Gi"
velero_minio_access_key: "{{ lookup('env', 'VELERO_MINIO_ACCESS_KEY') | default('velero-admin', true) }}"
velero_minio_secret_key: "{{ lookup('env', 'VELERO_MINIO_SECRET_KEY') }}"

# Total resource allocation (10-core / 64GB target):
#                     CPU limit    Memory limit
# - Frontend:         500m         256Mi
# - App:              6000m        8Gi    (JVM heap 6GB + ZGC + metaspace/native)
# - Redis:            1000m        4Gi
# - Postgres:         6000m        16Gi   (shared_buffers 4GB, effective_cache_size 12GB)
# - Forgejo:          2000m        1Gi
# - Backup MinIO:     500m         512Mi
# - Velero:           1000m        512Mi
# - Prometheus:       2000m        4Gi    (disabled by default)
# - Grafana:          1000m        1Gi    (disabled by default)
# - k3s system:       ~1000m       ~2Gi
# ------------------------------------------------
# Active total:       ~18000m      ~30Gi  (leaves headroom for OS cache + bursts)
