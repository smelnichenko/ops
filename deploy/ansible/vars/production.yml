---
# Production environment variables - Raspberry Pi 5 (8GB RAM)
# Usage: ansible-playbook deploy.yml -e @vars/production.yml
#
# REQUIRED: Set these environment variables before deployment:
#   export POSTGRES_USERNAME=monitor_user        # optional, defaults to monitor_user
#   export MONITOR_DB_PASSWORD=your-secure-password
#   export JWT_SECRET=your-jwt-secret-at-least-32-chars
#   export GRAFANA_ADMIN_USER=admin              # optional, defaults to admin
#   export GRAFANA_ADMIN_PASSWORD=your-secure-password

monitor_release_name: monitor
monitor_namespace: monitor

monitor_values:
  auth:
    jwtSecret: "{{ lookup('env', 'JWT_SECRET') | default('CHANGE_ME_GENERATE_A_SECURE_32_CHAR_SECRET', true) }}"
    tokenExpiration: 24h
    registrationEnabled: true

  # Enable network policies for pod isolation in production
  networkPolicies:
    enabled: false

  frontend:
    enabled: true
    image:
      repository: ghcr.io/schnappy/monitor-frontend
      tag: "latest"
      pullPolicy: Never
    replicas: 1
    resources:
      requests:
        memory: "32Mi"
        cpu: "25m"
      limits:
        memory: "64Mi"
        cpu: "100m"

  app:
    image:
      repository: ghcr.io/schnappy/monitor
      tag: "latest"
      pullPolicy: Never
    replicas: 1  # Single replica for Pi 5
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1500m"  # Allow burst to ~1.5 cores
    ingress:
      enabled: true
      className: traefik
      host: ""  # Empty = accept any host
      annotations: {}

  monitor:
    enabled: true
    http:
      connectTimeout: 10s
      readTimeout: 30s
      userAgent: "MonitorBot/1.0"

  redis:
    enabled: true
    image: redis:latest
    resources:
      requests:
        memory: "64Mi"
        cpu: "25m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  postgres:
    enabled: true
    image: postgres:latest
    database: monitor
    username: "{{ lookup('env', 'POSTGRES_USERNAME') | default('monitor_user', true) }}"
    password: "{{ lookup('env', 'MONITOR_DB_PASSWORD') | default('CHANGE_ME', true) }}"
    resources:
      requests:
        memory: "512Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    storage:
      size: 5Gi
      storageClass: "local-path"  # k0s default storage class

  prometheus:
    enabled: false
    image: prom/prometheus:v2.48.0
    retention: 15d  # Reduced retention for SD card longevity
    scrapeInterval: 30s  # Less frequent scraping
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    storage:
      size: 5Gi
      storageClass: "local-path"  # k0s default storage class

  grafana:
    enabled: false
    image: grafana/grafana:10.2.0
    adminUser: "{{ lookup('env', 'GRAFANA_ADMIN_USER') | default('admin', true) }}"
    adminPassword: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('CHANGE_ME', true) }}"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "300m"
    storage:
      size: 1Gi
      storageClass: "local-path"  # k0s default storage class
    service:
      type: NodePort

# Total resource allocation (~8GB Pi 5):
# - Frontend:   64Mi limit
# - App:        2Gi limit
# - Redis:      256Mi limit
# - Postgres:   1Gi limit
# - Prometheus: 512Mi limit
# - Grafana:    256Mi limit
# - k0s system: ~1Gi
# - OS:         ~512Mi
# -------------------------
# Total:        ~5.5Gi (leaves headroom for bursts)
