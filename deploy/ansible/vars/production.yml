---
# Production environment variables (64GB target)
# Usage: ansible-playbook deploy.yml -e @vars/production.yml
#
# REQUIRED: Set these environment variables before deployment:
#   export POSTGRES_USERNAME=monitor_user        # optional, defaults to monitor_user
#   export MONITOR_DB_PASSWORD=your-secure-password
#   export JWT_SECRET=your-jwt-secret-at-least-32-chars
#   export GRAFANA_ADMIN_USER=admin              # optional, defaults to admin
#   export GRAFANA_ADMIN_PASSWORD=your-secure-password

monitor_release_name: monitor
monitor_namespace: monitor

monitor_values:
  auth:
    jwtSecret: "{{ lookup('env', 'JWT_SECRET') | default('CHANGE_ME_GENERATE_A_SECURE_32_CHAR_SECRET', true) }}"
    tokenExpiration: 24h
    registrationEnabled: true

  # Enable network policies for pod isolation in production
  networkPolicies:
    enabled: false

  frontend:
    enabled: true
    image:
      repository: ghcr.io/schnappy/monitor-frontend
      tag: "latest"
      pullPolicy: Never
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"

  app:
    image:
      repository: ghcr.io/schnappy/monitor
      tag: "latest"
      pullPolicy: Never
    replicas: 1
    javaOpts: "-Xmx6g -XX:+UseZGC"
    hikari:
      minimumIdle: 5
      maximumPoolSize: 20
      idleTimeout: 300000
      maxLifetime: 1200000
      connectionTimeout: 20000
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "8Gi"
        cpu: "6000m"
    ingress:
      enabled: true
      className: traefik
      host: ""  # Empty = accept any host
      annotations: {}

  monitor:
    enabled: true
    http:
      connectTimeout: 10s
      readTimeout: 30s
      userAgent: "MonitorBot/1.0"

  redis:
    enabled: true
    image: redis:latest
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "4Gi"
        cpu: "1000m"

  postgres:
    enabled: true
    image: postgres:latest
    database: monitor
    username: "{{ lookup('env', 'POSTGRES_USERNAME') | default('monitor_user', true) }}"
    password: "{{ lookup('env', 'MONITOR_DB_PASSWORD') | default('CHANGE_ME', true) }}"
    sharedBuffers: "4GB"
    effectiveCacheSize: "12GB"
    workMem: "64MB"
    maintenanceWorkMem: "512MB"
    maxParallelWorkersPerGather: 4
    maxParallelWorkers: 6
    maxWorkerProcesses: 10
    effectiveIoConcurrency: 200
    randomPageCost: "1.1"
    resources:
      requests:
        memory: "4Gi"
        cpu: "500m"
      limits:
        memory: "16Gi"
        cpu: "6000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  prometheus:
    enabled: false
    image: prom/prometheus:v2.48.0
    retention: 30d
    scrapeInterval: 15s
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    storage:
      size: 20Gi
      storageClass: "local-path"

  grafana:
    enabled: false
    image: grafana/grafana:10.2.0
    adminUser: "{{ lookup('env', 'GRAFANA_ADMIN_USER') | default('admin', true) }}"
    adminPassword: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('CHANGE_ME', true) }}"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    storage:
      size: 5Gi
      storageClass: "local-path"
    service:
      type: NodePort

# Total resource allocation (10-core / 64GB target):
#                 CPU limit    Memory limit
# - Frontend:     500m         256Mi
# - App:          6000m        8Gi    (JVM heap 6GB + ZGC + metaspace/native)
# - Redis:        1000m        4Gi
# - Postgres:     6000m        16Gi   (shared_buffers 4GB, effective_cache_size 12GB)
# - Prometheus:   2000m        4Gi    (disabled by default)
# - Grafana:      1000m        1Gi    (disabled by default)
# - k3s system:   ~1000m       ~2Gi
# ------------------------------------------------
# Active total:   ~14500m      ~27Gi  (leaves headroom for OS cache + bursts)
