---
# Monitor Application Uninstall Playbook
#
# Usage:
#   ansible-playbook uninstall.yml
#   ansible-playbook uninstall.yml -e monitor_namespace=production
#
- name: Uninstall Monitor Application
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    monitor_release_name: schnappy
    monitor_namespace: schnappy
    monitor_delete_namespace: false
    monitor_delete_pvcs: false

  tasks:
    - name: Uninstall Helm release
      kubernetes.core.helm:
        name: "{{ monitor_release_name }}"
        release_namespace: "{{ monitor_namespace }}"
        state: absent
        wait: true

    - name: Delete PVCs
      kubernetes.core.k8s:
        api_version: v1
        kind: PersistentVolumeClaim
        namespace: "{{ monitor_namespace }}"
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ monitor_release_name }}-schnappy-postgres"
        - "{{ monitor_release_name }}-schnappy-prometheus"
        - "{{ monitor_release_name }}-schnappy-grafana"
      when: monitor_delete_pvcs

    - name: Delete namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ monitor_namespace }}"
        state: absent
      when: monitor_delete_namespace

    - name: Display uninstall status
      ansible.builtin.debug:
        msg: |

          Monitor application uninstalled.

          Release: {{ monitor_release_name }}
          Namespace: {{ monitor_namespace }}
          PVCs deleted: {{ monitor_delete_pvcs }}
          Namespace deleted: {{ monitor_delete_namespace }}
