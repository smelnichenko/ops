---
# Setup Pi Vault — final-state, idempotent
#
# Produces the current production state in a single pass on BOTH Pis:
#   - vault + vault-unseal systemd units
#   - Consul storage backend
#   - Shamir unseal with keys persisted to /etc/vault-unseal/ (consumed by
#     vault-unseal.service on reboot)
#   - KV v2 + eso-reader policy + kubernetes auth (initialised once on pi1)
#
# Prerequisites:
#   - Consul cluster running on pi1 + pi2 (setup-consul.yml)
#   - Postgres/services present (setup-pi-services.yml) — not a hard dep,
#     but the tls cert host list assumes both Pis are reachable
#
# Usage:
#   task deploy:vault-pi
#   # or (vagrant)
#   venv/bin/ansible-playbook -i inventory/vagrant.yml \
#     playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

# ─── Install Vault on both Pis ──────────────────────────────────────────────
- name: Install Vault on pi1 + pi2
  hosts: pis
  become: true
  gather_facts: true

  vars:
    node_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"

  pre_tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

  tasks:
    # ── Packages + user ────────────────────────────────────────────────
    - name: Install required packages
      ansible.builtin.apt:
        name: [curl, unzip, jq, ufw, openssl, python3]
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create vault group
      ansible.builtin.group:
        name: vault
        system: true

    - name: Create vault user
      ansible.builtin.user:
        name: vault
        group: vault
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/vault
        create_home: false

    - name: Create vault directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: vault
        group: vault
        mode: '0750'
      loop:
        - /etc/vault.d
        - /etc/vault.d/tls
        - /var/lib/vault

    - name: Create vault-unseal directory
      ansible.builtin.file:
        path: /etc/vault-unseal
        state: directory
        owner: root
        group: root
        mode: '0700'

    # ── UFW ────────────────────────────────────────────────────────────
    - name: UFW default deny
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: UFW allow SSH from LAN IPv4
      community.general.ufw:
        rule: allow
        from_ip: "{{ vault_pi_ssh_allow_ipv4 | default('192.168.11.0/24') }}"
        port: "22"
        proto: tcp

    - name: UFW allow SSH from LAN IPv6
      community.general.ufw:
        rule: allow
        from_ip: "{{ vault_pi_ssh_allow_ipv6 | default('fd0a:94e6:20b4:9f6b::/64') }}"
        port: "22"
        proto: tcp
      when: (vault_pi_ssh_allow_ipv6 | default('fd0a:94e6:20b4:9f6b::/64')) | length > 0

    - name: UFW allow SSH from extra range (Vagrant NAT)
      community.general.ufw:
        rule: allow
        from_ip: "{{ vault_pi_ssh_allow_extra_ipv4 }}"
        port: "22"
        proto: tcp
      when: vault_pi_ssh_allow_extra_ipv4 is defined and vault_pi_ssh_allow_extra_ipv4 | length > 0

    - name: UFW allow Vault from kubeadm node IPv4
      community.general.ufw:
        rule: allow
        from_ip: "{{ vault_cluster_ip | default('192.168.11.2') }}"
        port: "8200"
        proto: tcp

    - name: UFW allow Vault from kubeadm node IPv6
      community.general.ufw:
        rule: allow
        from_ip: "{{ vault_cluster_ipv6 | default('fd0a:94e6:20b4:9f6b::2') }}"
        port: "8200"
        proto: tcp
      when: (vault_cluster_ipv6 | default('fd0a:94e6:20b4:9f6b::2')) | length > 0

    - name: UFW allow Vault peer-to-peer (Pi↔Pi cluster port)
      community.general.ufw:
        rule: allow
        from_ip: "{{ item }}"
        port: "8201"
        proto: tcp
      loop:
        - "{{ hostvars['pi1']['ansible_host'] }}"
        - "{{ hostvars['pi2']['ansible_host'] }}"

    # ── Vault binary ───────────────────────────────────────────────────
    - name: Check current Vault version
      ansible.builtin.command: /usr/local/bin/vault version
      register: current_vault_version
      failed_when: false
      changed_when: false

    - name: Install Vault binary
      when: vault_version not in (current_vault_version.stdout | default(''))
      block:
        - name: Download Vault
          ansible.builtin.get_url:
            url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_{{ vault_arch }}.zip"
            dest: /tmp/vault.zip
            mode: '0644'
        - name: Unzip Vault
          ansible.builtin.unarchive:
            src: /tmp/vault.zip
            dest: /usr/local/bin/
            remote_src: true
        - name: Vault binary mode
          ansible.builtin.file:
            path: /usr/local/bin/vault
            mode: '0755'
            owner: root
            group: root
        - name: Remove Vault zip
          ansible.builtin.file:
            path: /tmp/vault.zip
            state: absent

    # ── TLS cert (self-signed, per-Pi; idempotent via creates:) ────────
    - name: Generate TLS cert + key (self-signed, per-Pi)
      ansible.builtin.shell: |
        openssl req -x509 \
          -newkey ec -pkeyopt ec_paramgen_curve:P-384 \
          -days 3650 -nodes \
          -keyout /etc/vault.d/tls/vault-key.pem \
          -out /etc/vault.d/tls/vault-cert.pem \
          -subj "/CN={{ vault_pi_dns }}" \
          -addext "subjectAltName=DNS:{{ vault_pi_dns }},DNS:{{ inventory_hostname }}.schnappy.io,IP:{{ node_ip }},IP:127.0.0.1"
      args:
        creates: /etc/vault.d/tls/vault-cert.pem

    # CA cert slot: referenced by vault.hcl's tls_client_ca_file. On
    # production this is a real CA from an earlier run; if absent, fall
    # back to the node's own cert (self-trust — the listener still works
    # because we don't require client certs).
    - name: Ensure ca-cert.pem exists (self-trust fallback)
      ansible.builtin.shell: |
        if [ ! -f /etc/vault.d/tls/ca-cert.pem ]; then
          cp /etc/vault.d/tls/vault-cert.pem /etc/vault.d/tls/ca-cert.pem
        fi
      args:
        creates: /etc/vault.d/tls/ca-cert.pem

    - name: Set TLS file ownership
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: vault
        group: vault
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/vault.d/tls/vault-cert.pem, mode: '0644' }
        - { path: /etc/vault.d/tls/vault-key.pem, mode: '0640' }
        - { path: /etc/vault.d/tls/ca-cert.pem, mode: '0644' }

    # ── vault.hcl ──────────────────────────────────────────────────────
    - name: Write vault.hcl (Consul backend)
      ansible.builtin.copy:
        dest: /etc/vault.d/vault.hcl
        owner: vault
        group: vault
        mode: '0640'
        content: |
          ui = false
          disable_mlock = true

          storage "consul" {
            address = "127.0.0.1:8500"
            path    = "vault/"
          }

          listener "tcp" {
            address            = "[::]:8200"
            tls_cert_file      = "/etc/vault.d/tls/vault-cert.pem"
            tls_key_file       = "/etc/vault.d/tls/vault-key.pem"
            tls_client_ca_file = "/etc/vault.d/tls/ca-cert.pem"
          }

          api_addr     = "https://{{ node_ip }}:8200"
          cluster_addr = "https://{{ node_ip }}:8201"
      notify: Restart vault

    # ── vault.service ──────────────────────────────────────────────────
    # Wants= (soft) not Requires= (hard): vault retries consul backend
    # internally. Hard dep caused boot-order coupling that broke reboots
    # when consul.service hadn't activated yet (commit aec9422).
    - name: Write vault.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/vault.service
        mode: '0644'
        content: |
          [Unit]
          Description=Vault Server
          After=network-online.target consul.service
          Wants=network-online.target consul.service

          [Service]
          User=vault
          Group=vault
          ExecStart=/usr/local/bin/vault server -config=/etc/vault.d/vault.hcl
          ExecReload=/bin/kill --signal HUP $MAINPID
          KillMode=process
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd and restart vault

    # ── unseal.sh ──────────────────────────────────────────────────────
    # rc-based sealed check (vault status rc=2) — commit 4773821
    # Consul-leader wait — commit 1964e7f
    - name: Write unseal.sh
      ansible.builtin.copy:
        dest: /etc/vault-unseal/unseal.sh
        owner: root
        group: root
        mode: '0700'
        content: |
          #!/bin/bash
          export VAULT_ADDR=https://127.0.0.1:8200
          export VAULT_SKIP_VERIFY=1
          KEYS=/etc/vault-unseal/unseal-keys

          # Wait for Consul leader (vault's storage backend). Without this,
          # vault is "up but sealed" before Consul elects a leader and unseal
          # calls silently fail.
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8500/v1/status/leader 2>/dev/null | grep -q ':' && break
            sleep 2
          done

          # Wait for vault process; rc=0 unsealed, rc=2 sealed, rc=1 unreachable.
          until vault status >/dev/null 2>&1; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 2 ]; do sleep 1; done

          # rc=2 == sealed (version-proof; grep on pretty-printed JSON missed
          # the space after the colon).
          vault status >/dev/null 2>&1
          if [ $? -eq 2 ]; then
            KEY1=$(sed -n '1p' $KEYS)
            KEY2=$(sed -n '2p' $KEYS)
            vault operator unseal "$KEY1" | grep -E 'Sealed|Unseal Progress'
            vault operator unseal "$KEY2" | grep -E 'Sealed|Unseal Progress'
          fi

    - name: Write vault-unseal.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/vault-unseal.service
        mode: '0644'
        content: |
          [Unit]
          Description=Auto-unseal Vault
          After=vault.service
          Requires=vault.service

          [Service]
          Type=oneshot
          ExecStart=/etc/vault-unseal/unseal.sh
          RemainAfterExit=true

          [Install]
          WantedBy=multi-user.target

    # ── Start vault ────────────────────────────────────────────────────
    - name: Flush handlers before API wait
      ansible.builtin.meta: flush_handlers

    - name: Enable + start vault.service
      ansible.builtin.systemd:
        name: vault
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Vault API (rc=0 unsealed, rc=2 sealed — both mean up)
      ansible.builtin.command: vault operator init -status
      environment:
        VAULT_ADDR: https://127.0.0.1:8200
        VAULT_SKIP_VERIFY: "1"
      register: _api_wait
      retries: 12
      delay: 5
      until: _api_wait.rc in [0, 2]
      changed_when: false
      failed_when: _api_wait.rc not in [0, 1, 2]

  handlers:
    - name: Reload systemd and restart vault
      ansible.builtin.systemd:
        name: vault
        daemon_reload: true
        state: restarted

    - name: Restart vault
      ansible.builtin.systemd:
        name: vault
        state: restarted

# ─── Initialise Vault on pi1 (first run only) ───────────────────────────────
- name: Initialise Vault on pi1
  hosts: pi1
  become: true
  gather_facts: false

  environment:
    VAULT_ADDR: https://127.0.0.1:8200
    VAULT_SKIP_VERIFY: "1"

  tasks:
    - name: Check init status
      ansible.builtin.command: vault operator init -status
      register: _init_status
      changed_when: false
      failed_when: _init_status.rc not in [0, 2]

    - name: Initialise Vault
      ansible.builtin.command: >-
        vault operator init
        -key-shares={{ vault_unseal_shares }}
        -key-threshold={{ vault_unseal_threshold }}
        -format=json
      register: _init
      when: _init_status.rc == 2
      changed_when: true
      no_log: true

    - name: Persist unseal keys (first init only)  # noqa: no-handler
      ansible.builtin.copy:
        dest: /etc/vault-unseal/unseal-keys
        content: |
          {% for k in (_init.stdout | from_json).unseal_keys_b64 %}
          {{ k }}
          {% endfor %}
        owner: root
        group: root
        mode: '0400'
      when: _init is changed
      no_log: true

    - name: Persist root token (first init only)  # noqa: no-handler
      ansible.builtin.copy:
        dest: /etc/vault-unseal/root-token
        content: "{{ (_init.stdout | from_json).root_token }}"
        owner: root
        group: root
        mode: '0400'
      when: _init is changed
      no_log: true

    - name: Show root token (first init only)  # noqa: no-handler
      ansible.builtin.debug:
        msg: |
          ============================================================
          VAULT INITIALISED. Unseal keys + root token stored at:
            /etc/vault-unseal/unseal-keys
            /etc/vault-unseal/root-token

          BACK THESE UP OFFLINE (USB / safe / paper). They are the
          only way to recover the cluster if both Pis die.
          ============================================================
      when: _init is changed

    - name: Fetch unseal-keys to controller (for distribution to pi2)
      ansible.builtin.fetch:
        src: /etc/vault-unseal/unseal-keys
        dest: /tmp/vault-unseal-keys
        flat: true

    - name: Unseal pi1 if sealed  # noqa: command-instead-of-shell
      ansible.builtin.shell: |
        vault status >/dev/null 2>&1; rc=$?
        if [ $rc -eq 2 ]; then
          KEY1=$(sed -n '1p' /etc/vault-unseal/unseal-keys)
          KEY2=$(sed -n '2p' /etc/vault-unseal/unseal-keys)
          vault operator unseal "$KEY1" >/dev/null
          vault operator unseal "$KEY2" >/dev/null
          echo unsealed
        fi
      register: _pi1_unseal
      changed_when: "'unsealed' in _pi1_unseal.stdout"

    # ── First-time bootstrap: KV v2 + ESO policy + k8s auth ────────────
    - name: Bootstrap KV + ESO + k8s-auth (first init only)
      when: _init is changed
      block:
        - name: Enable KV v2
          ansible.builtin.shell: |
            export VAULT_TOKEN=$(cat /etc/vault-unseal/root-token)
            vault secrets enable -path=secret kv-v2 2>&1 || echo already-enabled
          changed_when: true

        - name: Write eso-reader policy
          ansible.builtin.shell: |
            export VAULT_TOKEN=$(cat /etc/vault-unseal/root-token)
            vault policy write eso-reader - <<'POLICY'
            path "secret/data/*"     { capabilities = ["read"] }
            path "secret/metadata/*" { capabilities = ["read", "list"] }
            POLICY
          changed_when: true

        - name: Enable Kubernetes auth
          ansible.builtin.shell: |
            export VAULT_TOKEN=$(cat /etc/vault-unseal/root-token)
            vault auth enable kubernetes 2>&1 || echo already-enabled
          changed_when: true

# ─── Distribute keys + unseal pi2 ───────────────────────────────────────────
- name: Distribute unseal keys to pi2
  hosts: pi2
  become: true
  gather_facts: false

  environment:
    VAULT_ADDR: https://127.0.0.1:8200
    VAULT_SKIP_VERIFY: "1"

  tasks:
    - name: Copy unseal-keys to pi2
      ansible.builtin.copy:
        src: /tmp/vault-unseal-keys
        dest: /etc/vault-unseal/unseal-keys
        owner: root
        group: root
        mode: '0400'

    - name: Unseal pi2 if sealed
      ansible.builtin.shell: |
        vault status >/dev/null 2>&1; rc=$?
        if [ $rc -eq 2 ]; then
          KEY1=$(sed -n '1p' /etc/vault-unseal/unseal-keys)
          KEY2=$(sed -n '2p' /etc/vault-unseal/unseal-keys)
          vault operator unseal "$KEY1" >/dev/null
          vault operator unseal "$KEY2" >/dev/null
          echo unsealed
        fi
      register: _pi2_unseal
      changed_when: "'unsealed' in _pi2_unseal.stdout"

# ─── Enable vault-unseal + ops infrastructure (both Pis) ────────────────────
- name: Enable vault-unseal and install ops infrastructure
  hosts: pis
  become: true
  gather_facts: false

  tasks:
    - name: Enable vault-unseal.service
      ansible.builtin.systemd:
        name: vault-unseal
        enabled: true
        daemon_reload: true

    # ── Health-check cron ──────────────────────────────────────────────
    - name: Write vault health-check script
      ansible.builtin.copy:
        dest: /usr/local/bin/vault-health-check.sh
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/bin/bash
          HEALTH=$(curl -s --cacert /etc/vault.d/tls/vault-cert.pem \
            https://127.0.0.1:8200/v1/sys/health \
            -o /tmp/vault-health.json -w "%{http_code}" 2>/dev/null)
          SEALED=$(jq -r '.sealed // true' /tmp/vault-health.json 2>/dev/null)
          if [ "$SEALED" != "false" ]; then
            logger -t vault-unseal "ALERT: Vault sealed or unreachable, HTTP $HEALTH"
          fi

    - name: Vault health-check cron (every 5 min)
      ansible.builtin.copy:
        dest: /etc/cron.d/vault-health
        mode: '0644'
        content: |
          */5 * * * * root /usr/local/bin/vault-health-check.sh

    # ── Offsite backup dir (receives rsync from cluster) ───────────────
    - name: Create offsite backup dir
      ansible.builtin.file:
        path: /mnt/backups/velero
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0750'

    # ── Git-mirror bare repo ───────────────────────────────────────────
    - name: Install git
      ansible.builtin.apt:
        name: git
        state: present

    - name: Create git mirror dir
      ansible.builtin.file:
        path: /mnt/backups/git-mirror
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0750'

    - name: Initialise bare git mirror for monitor repo
      ansible.builtin.shell: |
        if [ ! -f /mnt/backups/git-mirror/monitor.git/HEAD ]; then
          git init --bare /mnt/backups/git-mirror/monitor.git
          chown -R {{ ansible_user }}:{{ ansible_user }} /mnt/backups/git-mirror/monitor.git
          echo created
        fi
      register: _git_init
      changed_when: "'created' in _git_init.stdout"

    # ── Daily vault data backup ────────────────────────────────────────
    - name: Write vault-backup script
      ansible.builtin.copy:
        dest: /usr/local/bin/vault-backup.sh
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/bin/bash
          TIMESTAMP=$(date +%Y%m%d)
          BACKUP_DIR="/var/backups/vault"
          mkdir -p "$BACKUP_DIR"
          # With Consul backend, /var/lib/vault is mostly empty, but the
          # snapshot captures anything written via vault's sys/raw too.
          tar czf "${BACKUP_DIR}/vault-${TIMESTAMP}.tar.gz" /var/lib/vault 2>/dev/null
          # Keep last 90 daily copies (2TB NVMe has space).
          ls -t "${BACKUP_DIR}"/vault-*.tar.gz 2>/dev/null | tail -n +91 | xargs -r rm

    - name: Vault backup cron (02:00 daily)
      ansible.builtin.copy:
        dest: /etc/cron.d/vault-backup
        mode: '0644'
        content: |
          0 2 * * * root /usr/local/bin/vault-backup.sh

# ─── Verify ─────────────────────────────────────────────────────────────────
- name: Verify Vault cluster
  hosts: pi1
  become: true
  gather_facts: false

  environment:
    VAULT_ADDR: https://127.0.0.1:8200
    VAULT_SKIP_VERIFY: "1"

  tasks:
    - name: Vault status
      ansible.builtin.command: vault status
      register: _status
      changed_when: false
      failed_when: false

    - name: Consul KV has vault/ keys
      ansible.builtin.shell: |
        set -o pipefail
        consul kv get -keys vault/ 2>/dev/null | head -5
      register: _consul_keys
      changed_when: false

    - name: Summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Vault on pi1 + pi2 — ready
          ============================================
          {{ _status.stdout }}
          ============================================
          Consul KV (vault/ top-level):
          {{ _consul_keys.stdout }}
          ============================================
