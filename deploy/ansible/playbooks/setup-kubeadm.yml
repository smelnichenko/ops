---
# Install vanilla Kubernetes via kubeadm on ten
#
# Replaces k3s with:
# - kubeadm + kubelet + kubectl
# - containerd (standalone)
# - Calico CNI (nftables native NetworkPolicy)
# - HAProxy (host-level, forwards 80/443 to Istio gateway NodePorts)
#
# Prerequisites:
#   - k3s stopped
#   - PVC data backed up at /mnt/backups/
#   - Vault running on Pi (transit unseal)
#
# Usage:
#   task deploy:kubeadm

- name: Install kubeadm on ten
  hosts: target
  become: true
  gather_facts: true

  vars:
    k8s_version: "1.34"
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    node_ip: "192.168.11.2"
    calico_version: "3.30.0"
    data_dir: "/mnt/storage"

  tasks:
    # ================================================================
    # Phase 1: Stop k3s
    # ================================================================

    - name: Stop and disable k3s
      ansible.builtin.systemd:
        name: k3s
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Uninstall k3s
      ansible.builtin.shell: /usr/local/bin/k3s-uninstall.sh
      ignore_errors: true

    - name: Clean stale nftables rules from k3s
      ansible.builtin.shell: |
        nft flush ruleset 2>/dev/null || true
      changed_when: true

    # ================================================================
    # Phase 2: Install containerd
    # ================================================================

    - name: Install containerd and dependencies
      ansible.builtin.apt:
        name:
          - containerd
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      changed_when: true

    - name: Enable SystemdCgroup in containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Configure containerd registry mirror for Forgejo
      ansible.builtin.blockinfile:
        path: /etc/containerd/config.toml
        block: |
          [plugins."io.containerd.grpc.v1.cri".registry.mirrors."git.pmon.dev"]
            endpoint = ["https://git.pmon.dev"]
        marker: "# {mark} FORGEJO REGISTRY"
        insertafter: EOF

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true

    # ================================================================
    # Phase 3: Install kubeadm, kubelet, kubectl
    # ================================================================

    - name: Add Kubernetes apt key
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg --yes
      changed_when: true

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
        mode: '0644'

    - name: Install kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: true

    - name: Hold kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    # ================================================================
    # Phase 4: Kernel prerequisites
    # ================================================================

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        persistent: present
      loop:
        - br_netfilter
        - overlay

    - name: Set sysctl for kubernetes
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables, value: '1' }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: '1' }
        - { key: net.ipv4.ip_forward, value: '1' }

    # ================================================================
    # Phase 5: Initialize cluster
    # ================================================================

    - name: Initialize kubeadm cluster
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --apiserver-advertise-address={{ node_ip }} \
          --skip-phases=addon/kube-proxy
      register: kubeadm_init
      changed_when: true

    - name: Create .kube directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Copy kubeconfig for sm user
      ansible.builtin.shell: |
        mkdir -p /home/sm/.kube
        cp /etc/kubernetes/admin.conf /home/sm/.kube/config
        chown sm:sm /home/sm/.kube/config
      changed_when: true

    - name: Remove control-plane taint (single node)
      ansible.builtin.shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: true

    # ================================================================
    # Phase 6: Install kube-proxy with nftables
    # ================================================================

    - name: Install kube-proxy via kubeadm
      ansible.builtin.shell: |
        kubeadm init phase addon kube-proxy --apiserver-advertise-address={{ node_ip }}
      changed_when: true

    # ================================================================
    # Phase 7: Install Calico CNI
    # ================================================================

    - name: Install Calico operator
      ansible.builtin.shell: |
        kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/tigera-operator.yaml
      changed_when: true

    - name: Install Calico custom resources
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: operator.tigera.io/v1
        kind: Installation
        metadata:
          name: default
        spec:
          calicoNetwork:
            ipPools:
              - cidr: {{ pod_cidr }}
                encapsulation: VXLANCrossSubnet
                natOutgoing: true
            linuxDataplane: NFTables
        EOF
      changed_when: true

    - name: Wait for Calico pods
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod -l k8s-app=calico-node -n calico-system --timeout=120s
      register: calico_wait
      retries: 6
      delay: 10
      until: calico_wait.rc == 0

    # ================================================================
    # Phase 8: Install local-path-provisioner
    # ================================================================

    - name: Install local-path-provisioner
      ansible.builtin.shell: |
        kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.31/deploy/local-path-provisioner.yaml
      changed_when: true

    - name: Set local-path as default StorageClass
      ansible.builtin.shell: |
        kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      changed_when: true

    # ================================================================
    # Phase 9: Configure HAProxy
    # ================================================================

    - name: Install HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present

    - name: HAProxy will be configured after Istio gateway is deployed
      ansible.builtin.debug:
        msg: "HAProxy config will be updated once Istio gateway NodePorts are known"

    - name: "KUBEADM CLUSTER READY"
      ansible.builtin.debug:
        msg: |
          Kubernetes cluster initialized:
            - API server: https://{{ node_ip }}:6443
            - CNI: Calico v{{ calico_version }} (nftables)
            - StorageClass: local-path
            - kubeconfig: /home/sm/.kube/config
          Next steps:
            1. Install cert-manager
            2. Install ESO
            3. Install Vault
            4. Install Argo CD
            5. Restore PVC data
            6. Install Istio ambient
