---
# Install vanilla Kubernetes via kubeadm on ten
#
# Components:
# - kubeadm + kubelet + kubectl
# - containerd (standalone) + nerdctl-full (buildkit for image builds)
# - Cilium CNI (eBPF) + Istio sidecar mesh
# - HAProxy (host-level, forwards 80/443 to Istio gateway NodePorts)
# - Operators: cert-manager, ESO, Prometheus CRDs, CNPG, Strimzi, ScyllaDB
#
# Prerequisites:
#   - PVC data backed up at /mnt/backups/
#   - Vault running on Pi (transit unseal)
#
# Usage:
#   task deploy:kubeadm

- name: Install kubeadm on ten
  hosts: target
  become: true
  gather_facts: true

  vars:
    k8s_version: "1.34"
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    node_ip: "{{ node_ip_override | default('192.168.11.2') }}"
    cilium_version: "1.19.1"
    istio_version: "1.25.2"
    data_dir: "/mnt/storage"

  tasks:
    # ================================================================
    # Phase 1: Install containerd
    # ================================================================

    - name: Install containerd and dependencies
      ansible.builtin.apt:
        name:
          - containerd
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          # Python libs required by kubernetes.core.* Ansible modules
          # (k8s / k8s_info / helm). Used throughout setup-kubeadm,
          # setup-argocd, setup-velero, setup-woodpecker.
          - python3-yaml
          - python3-kubernetes
        state: present
        update_cache: true

    - name: Check if nerdctl is installed
      ansible.builtin.stat:
        path: /usr/local/bin/nerdctl
      register: _nerdctl_stat

    - name: Install nerdctl-full (CLI + buildkit + buildctl — used by test:cicd image build/push)
      # nerdctl-full bundles buildkitd + buildctl (separate from the containerd
      # apt package, which doesn't ship them). `nerdctl build` needs buildkitd;
      # without it the build fails with "no buildkit host is available".
      ansible.builtin.shell: |
        set -e
        ARCH=$(dpkg --print-architecture)
        VERSION=2.0.3
        curl -fsSL -o /tmp/nerdctl-full.tar.gz \
          "https://github.com/containerd/nerdctl/releases/download/v${VERSION}/nerdctl-full-${VERSION}-linux-${ARCH}.tar.gz"
        tar -C /usr/local -xzf /tmp/nerdctl-full.tar.gz
        rm -f /tmp/nerdctl-full.tar.gz
        systemctl daemon-reload
        systemctl enable --now buildkit
      when: not _nerdctl_stat.stat.exists
      changed_when: true

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      changed_when: true

    - name: Enable SystemdCgroup in containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Set containerd CRI registry config_path (v2 plugin path)
      # containerd v2.x's default config already has
      #   [plugins.'io.containerd.cri.v1.images'.registry]
      #     config_path = ''
      # Edit it in place (don't append — duplicate table is a TOML error).
      # Setting config_path makes kubelet → CRI read
      # /etc/containerd/certs.d/<host>/hosts.toml so vagrant-test plain-HTTP
      # registries (Forgejo on NodePort) actually work.
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: "^(\\s*)config_path = ''$"
        replace: "\\1config_path = '/etc/containerd/certs.d'"

    - name: Create /etc/containerd/certs.d
      ansible.builtin.file:
        path: /etc/containerd/certs.d
        state: directory
        mode: '0755'

    - name: Restart containerd
      ansible.builtin.systemd_service:
        name: containerd
        state: restarted
        enabled: true

    # ================================================================
    # Phase 2: Install kubeadm, kubelet, kubectl
    # ================================================================

    - name: Add Kubernetes apt key  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg --yes
      args:
        executable: /bin/bash
      changed_when: true

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
        mode: '0644'

    - name: Install kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: true

    - name: Hold kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    # ================================================================
    # Phase 3: Kernel prerequisites
    # ================================================================

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        persistent: present
      loop:
        - br_netfilter
        - overlay

    - name: Set sysctl for kubernetes
      ansible.builtin.shell: |
        params="net.bridge.bridge-nf-call-iptables=1 net.bridge.bridge-nf-call-ip6tables=1"
        params="$params net.ipv4.ip_forward=1 fs.aio-max-nr=1048576 vm.max_map_count=524288"
        for param in $params; do
          sysctl -w "$param"
        done
        cat > /etc/sysctl.d/99-kubernetes.conf <<'EOF'
        net.bridge.bridge-nf-call-iptables = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward = 1
        fs.aio-max-nr = 1048576
        vm.max_map_count = 524288
        EOF
        sysctl --system
      changed_when: true

    # ================================================================
    # Phase 3b: Base firewall rules (survives CNI removal/crash)
    # ================================================================

    - name: Write base nftables config
      ansible.builtin.copy:
        dest: /etc/nftables.conf
        mode: '0644'
        content: |
          #!/usr/sbin/nft -f
          # Base firewall rules — survives CNI removal/crash
          # CNI (Calico/Cilium) adds its own tables on top

          table ip base-filter {
            chain input {
              type filter hook input priority -10; policy accept;
              ct state established,related accept
              iif lo accept
              tcp dport 22 accept
              tcp dport 6443 accept
              icmp type echo-request accept
            }
            chain forward {
              type filter hook forward priority -10; policy accept;
            }
            chain output {
              type filter hook output priority -10; policy accept;
            }
          }

    - name: Enable and start nftables
      ansible.builtin.systemd_service:
        name: nftables
        enabled: true
        state: started

    # ================================================================
    # Phase 4: Initialize cluster
    # ================================================================

    - name: Initialize kubeadm cluster
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --apiserver-advertise-address={{ node_ip }} \
          --skip-phases=addon/kube-proxy
      register: kubeadm_init
      changed_when: true

    - name: Create .kube directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Copy kubeconfig for non-root user
      ansible.builtin.shell: |
        set -o pipefail
        USER_HOME=$(getent passwd {{ ansible_user }} | cut -d: -f6)
        mkdir -p "$USER_HOME/.kube"
        cp /etc/kubernetes/admin.conf "$USER_HOME/.kube/config"
        chown {{ ansible_user }}:{{ ansible_user }} "$USER_HOME/.kube/config"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Remove control-plane taint (single node)
      ansible.builtin.shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: true

    - name: Enable kubelet graceful node shutdown
      ansible.builtin.replace:
        path: /var/lib/kubelet/config.yaml
        regexp: 'shutdownGracePeriod: 0s'
        replace: 'shutdownGracePeriod: 60s'

    - name: Set critical pods shutdown grace period
      ansible.builtin.replace:
        path: /var/lib/kubelet/config.yaml
        regexp: 'shutdownGracePeriodCriticalPods: 0s'
        replace: 'shutdownGracePeriodCriticalPods: 15s'

    - name: Restart kubelet for shutdown config
      ansible.builtin.systemd_service:
        name: kubelet
        state: restarted

    # ================================================================
    # Phase 5: Install kube-proxy with nftables
    # ================================================================

    - name: Install kube-proxy via kubeadm
      ansible.builtin.shell: |
        kubeadm init phase addon kube-proxy --apiserver-advertise-address={{ node_ip }}
      changed_when: true

    - name: Set kube-proxy to nftables mode  # noqa: risky-shell-pipe
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get configmap kube-proxy -n kube-system -o json | \
          python3 -c "import json,sys; cm=json.loads(sys.stdin.read()); \
            cc=cm['data']['config.conf']; \
            cm['data']['config.conf']=cc.replace('mode: \"\"','mode: \"nftables\"'); \
            print(json.dumps(cm))" | \
          kubectl apply -f -
        kubectl rollout restart daemonset kube-proxy -n kube-system
        kubectl rollout status daemonset kube-proxy -n kube-system --timeout=60s
      args:
        executable: /bin/bash
      changed_when: true

    # ================================================================
    # Phase 5b: Install Helm
    # ================================================================

    - name: Install Helm  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    # ================================================================
    # Phase 6: Install Cilium CNI
    # ================================================================

    - name: Add Cilium Helm repo
      kubernetes.core.helm_repository:
        name: cilium
        repo_url: https://helm.cilium.io/

    - name: Install Cilium via Helm
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: cilium
        chart_ref: cilium/cilium
        chart_version: "{{ cilium_version }}"
        release_namespace: kube-system
        values:
          cluster:
            name: kubernetes
          ipam:
            operator:
              clusterPoolIPv4PodCIDRList: "{{ pod_cidr }}"
          k8sServiceHost: "{{ node_ip }}"
          k8sServicePort: 6443
          kubeProxyReplacement: true
          routingMode: tunnel
          tunnelProtocol: vxlan
          operator:
            replicas: 1
          hubble:
            enabled: true
            relay:
              enabled: true
            ui:
              enabled: true
          cni:
            exclusive: false
        wait: true
        wait_timeout: 180s

    - name: Wait for Cilium pods
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: kube-system
        label_selectors:
          - k8s-app=cilium
      register: cilium_wait
      retries: 12
      delay: 10
      until:
        - cilium_wait.resources | length > 0
        - >-
          cilium_wait.resources
          | map(attribute='status.conditions', default=[])
          | map('selectattr', 'type', 'equalto', 'Ready')
          | map('selectattr', 'status', 'equalto', 'True')
          | map('list') | map('length') | min > 0

    # ================================================================
    # Phase 6b: Install Istio service mesh
    # ================================================================

    - name: Add Istio Helm repo
      kubernetes.core.helm_repository:
        name: istio
        repo_url: https://istio-release.storage.googleapis.com/charts

    - name: Install Istio base (CRDs)
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: istio-base
        chart_ref: istio/base
        chart_version: "{{ istio_version }}"
        release_namespace: istio-system
        create_namespace: true
        wait: true
        wait_timeout: 300s

    - name: Install Istiod (control plane)
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: istiod
        chart_ref: istio/istiod
        chart_version: "{{ istio_version }}"
        release_namespace: istio-system
        values:
          global:
            proxy:
              holdApplicationUntilProxyStarts: true
          meshConfig:
            accessLogFile: /dev/stdout
        wait: true
        wait_timeout: 300s

    - name: Install Istio CNI
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: istio-cni
        chart_ref: istio/cni
        chart_version: "{{ istio_version }}"
        release_namespace: istio-system
        values:
          cni:
            cniConfDir: /etc/cni/net.d
            cniBinDir: /opt/cni/bin
        wait: true
        wait_timeout: 300s

    - name: Wait for Istiod
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: istio-system
        label_selectors:
          - app=istiod
      register: istiod_wait
      retries: 12
      delay: 10
      until:
        - istiod_wait.resources | length > 0
        - >-
          istiod_wait.resources
          | map(attribute='status.conditions', default=[])
          | map('selectattr', 'type', 'equalto', 'Ready')
          | map('selectattr', 'status', 'equalto', 'True')
          | map('list') | map('length') | min > 0

    # ================================================================
    # Phase 7: Install local-path-provisioner
    # ================================================================

    - name: Add local-path-provisioner Helm repo
      kubernetes.core.helm_repository:
        name: local-path-provisioner
        repo_url: https://charts.containeroo.ch

    - name: Install local-path-provisioner via Helm
      # wait=false so vagrant cold-starts (image pull + CNI ready) don't blow
      # past helm timeout; downstream wait below polls the deployment.
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: local-path-provisioner
        chart_ref: local-path-provisioner/local-path-provisioner
        release_namespace: local-path-storage
        create_namespace: true
        values:
          storageClass:
            defaultClass: true
        wait: false

    - name: Wait for local-path-provisioner deployment to be Ready (up to 15 min)
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: apps/v1
        kind: Deployment
        name: local-path-provisioner
        namespace: local-path-storage
      register: _lpp
      retries: 90
      delay: 10
      until:
        - _lpp.resources | default([]) | length > 0
        - (_lpp.resources[0].status.readyReplicas | default(0)) >= 1

    # ================================================================
    # Phase 7b: PriorityClasses (production-aligned; tests reference them)
    # ================================================================

    - name: Create PriorityClass infra-critical
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: infra-critical
          value: 1000000
          preemptionPolicy: PreemptLowerPriority
          description: "Infrastructure: cert-manager, external-secrets, operators"

    - name: Create PriorityClass data-critical
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: data-critical
          value: 500000
          preemptionPolicy: PreemptLowerPriority
          description: "Data stores: PostgreSQL, Kafka, Valkey, ScyllaDB, MinIO"

    - name: Create PriorityClass app-default
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: app-default
          value: 100000
          globalDefault: true
          preemptionPolicy: PreemptLowerPriority
          description: "Application workloads"

    # ================================================================
    # Phase 8: Install metrics-server
    # ================================================================

    - name: Add metrics-server Helm repo
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: https://kubernetes-sigs.github.io/metrics-server/

    - name: Install metrics-server
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        values:
          args:
            - --kubelet-insecure-tls
        wait: true
        wait_timeout: 60s

    # ================================================================
    # Phase 9: Install cert-manager
    # ================================================================

    - name: Add Jetstack Helm repo
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io

    - name: Install cert-manager
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        values:
          crds:
            enabled: true
        wait: true
        wait_timeout: 300s

    # ================================================================
    # Phase 10: Install Gateway API CRDs
    # ================================================================

    - name: Install Gateway API CRDs
      ansible.builtin.shell: |
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
      changed_when: true

    # ================================================================
    # Phase 11: Install ESO
    # ================================================================

    - name: Add External Secrets Helm repo
      kubernetes.core.helm_repository:
        name: external-secrets
        repo_url: https://charts.external-secrets.io

    - name: Install External Secrets Operator
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: external-secrets
        chart_ref: external-secrets/external-secrets
        release_namespace: external-secrets
        create_namespace: true
        wait: true
        wait_timeout: 300s

    - name: Add Prometheus Operator CRDs Helm repo
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: https://prometheus-community.github.io/helm-charts

    # Install only the CRDs (PodMonitor, ServiceMonitor, Probe, etc.)
    # so schnappy-observability's monitoring resources can be applied
    # in tests. Production installs the full kube-prometheus-stack via
    # ArgoCD; Vagrant tests just need the CRDs.
    - name: Install Prometheus Operator CRDs
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: prometheus-operator-crds
        chart_ref: prometheus-community/prometheus-operator-crds
        release_namespace: monitoring
        create_namespace: true
        wait: true
        wait_timeout: 300s

    # ================================================================
    # Phase 13: Install database/streaming operators
    # ================================================================

    - name: Add CNPG Helm repo
      kubernetes.core.helm_repository:
        name: cnpg
        repo_url: https://cloudnative-pg.github.io/charts

    - name: Install CNPG operator
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: cnpg
        chart_ref: cnpg/cloudnative-pg
        chart_version: "0.28.0"
        release_namespace: cnpg-system
        create_namespace: true
        values:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        wait: true
        wait_timeout: 300s

    - name: Add Strimzi Helm repo
      kubernetes.core.helm_repository:
        name: strimzi
        repo_url: https://strimzi.io/charts/

    - name: Install Strimzi operator
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: strimzi
        chart_ref: strimzi/strimzi-kafka-operator
        chart_version: "0.51.0"
        release_namespace: strimzi
        create_namespace: true
        values:
          # Watch all namespaces — by default the operator watches only
          # its own install namespace, which breaks any chart that
          # deploys a Kafka CR outside `strimzi` (e.g. `schnappy` in
          # the vagrant tests and in production).
          watchAnyNamespace: true
        wait: true
        wait_timeout: 300s

    - name: Add ScyllaDB operator Helm repo
      kubernetes.core.helm_repository:
        name: scylla-operator
        repo_url: https://scylla-operator-charts.storage.googleapis.com/stable

    - name: Install ScyllaDB operator
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: scylla-operator
        chart_ref: scylla-operator/scylla-operator
        chart_version: "1.20.2"
        release_namespace: scylla-operator
        create_namespace: true
        wait: true
        wait_timeout: 300s

    - name: Install ScyllaDB Manager
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: scylla-manager
        chart_ref: scylla-operator/scylla-manager
        chart_version: "1.20.2"
        release_namespace: scylla-manager
        create_namespace: true
        values:
          scylla:
            developerMode: true
        wait: true
        wait_timeout: 15m
      when: install_scylla_manager | default(true) | bool

    # Plan 064 — Valkey operator (replaces hand-rolled redis Deployment).
    # The chart still renders a hand-rolled Deployment when
    # valkey.operator.enabled=false, so installing the operator here is
    # safe even if no Valkey CR is applied yet.
    - name: Add hyperspike (valkey-operator) Helm repo
      kubernetes.core.helm_repository:
        name: hyperspike
        repo_url: https://hyperspike.github.io/valkey-operator

    - name: Install valkey-operator
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: valkey-operator
        chart_ref: hyperspike/valkey-operator
        release_namespace: valkey-operator-system
        create_namespace: true
        wait: true
        wait_timeout: 300s
      when: install_valkey_operator | default(true) | bool

    # ================================================================
    # Phase 14: Configure HAProxy
    # ================================================================

    - name: Install HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present

    - name: HAProxy will be configured after Istio gateway is deployed
      ansible.builtin.debug:
        msg: "HAProxy config will be updated once Istio gateway NodePorts are known"

    - name: "KUBEADM CLUSTER READY"
      ansible.builtin.debug:
        msg: |
          Kubernetes cluster initialized:
            - API server: https://{{ node_ip }}:6443
            - CNI: Cilium {{ cilium_version }}
            - Mesh: Istio {{ istio_version }}
            - Operators: CNPG, Strimzi, ScyllaDB
            - StorageClass: local-path
          Next steps:
            1. Install Pi Vault (setup-vault-pi.yml) — Consul backend on both Pis
            2. Install ArgoCD (setup-argocd.yml)
            3. Seed secrets (deploy:seed-secrets)
