---
# Install vanilla Kubernetes via kubeadm on ten
#
# Replaces k3s with:
# - kubeadm + kubelet + kubectl
# - containerd (standalone)
# - Calico CNI (nftables native NetworkPolicy)
# - HAProxy (host-level, forwards 80/443 to Istio gateway NodePorts)
#
# Prerequisites:
#   - k3s stopped
#   - PVC data backed up at /mnt/backups/
#   - Vault running on Pi (transit unseal)
#
# Usage:
#   task deploy:kubeadm

- name: Install kubeadm on ten
  hosts: target
  become: true
  gather_facts: true

  vars:
    k8s_version: "1.34"
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    node_ip: "{{ node_ip_override | default('192.168.11.2') }}"
    cilium_version: "1.19.1"
    istio_version: "1.25.2"
    data_dir: "/mnt/storage"

  tasks:
    # ================================================================
    # Phase 1: Stop k3s
    # ================================================================

    - name: Stop and disable k3s  # noqa: ignore-errors
      ansible.builtin.systemd:
        name: k3s
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Uninstall k3s  # noqa: ignore-errors command-instead-of-shell risky-shell-pipe no-changed-when
      ansible.builtin.shell: /usr/local/bin/k3s-uninstall.sh
      ignore_errors: true

    - name: Clean stale nftables rules from k3s
      ansible.builtin.shell: |
        nft flush ruleset 2>/dev/null || true
      changed_when: true

    # ================================================================
    # Phase 2: Install containerd
    # ================================================================

    - name: Install containerd and dependencies
      ansible.builtin.apt:
        name:
          - containerd
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      changed_when: true

    - name: Enable SystemdCgroup in containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Configure containerd registry mirror for Forgejo
      ansible.builtin.blockinfile:
        path: /etc/containerd/config.toml
        block: |
          [plugins."io.containerd.grpc.v1.cri".registry.mirrors."git.pmon.dev"]
            endpoint = ["https://git.pmon.dev"]
        marker: "# {mark} FORGEJO REGISTRY"
        insertafter: EOF

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true

    # ================================================================
    # Phase 3: Install kubeadm, kubelet, kubectl
    # ================================================================

    - name: Add Kubernetes apt key  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg --yes
      args:
        executable: /bin/bash
      changed_when: true

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
        mode: '0644'

    - name: Install kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: true

    - name: Hold kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    # ================================================================
    # Phase 4: Kernel prerequisites
    # ================================================================

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        persistent: present
      loop:
        - br_netfilter
        - overlay

    - name: Set sysctl for kubernetes
      ansible.builtin.shell: |
        for param in "net.bridge.bridge-nf-call-iptables=1" "net.bridge.bridge-nf-call-ip6tables=1" "net.ipv4.ip_forward=1" "fs.aio-max-nr=1048576" "vm.max_map_count=524288"; do
          sysctl -w "$param"
        done
        cat > /etc/sysctl.d/99-kubernetes.conf <<'EOF'
        net.bridge.bridge-nf-call-iptables = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward = 1
        fs.aio-max-nr = 1048576
        vm.max_map_count = 524288
        EOF
        sysctl --system
      changed_when: true

    # ================================================================
    # Phase 4b: Base firewall rules (survives CNI removal/crash)
    # ================================================================

    - name: Write base nftables config
      ansible.builtin.copy:
        dest: /etc/nftables.conf
        mode: '0644'
        content: |
          #!/usr/sbin/nft -f
          # Base firewall rules — survives CNI removal/crash
          # CNI (Calico/Cilium) adds its own tables on top

          table ip base-filter {
            chain input {
              type filter hook input priority -10; policy accept;
              ct state established,related accept
              iif lo accept
              tcp dport 22 accept
              tcp dport 6443 accept
              icmp type echo-request accept
            }
            chain forward {
              type filter hook forward priority -10; policy accept;
            }
            chain output {
              type filter hook output priority -10; policy accept;
            }
          }

    - name: Enable and start nftables
      ansible.builtin.systemd:
        name: nftables
        enabled: true
        state: started

    # ================================================================
    # Phase 5: Initialize cluster
    # ================================================================

    - name: Initialize kubeadm cluster
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --apiserver-advertise-address={{ node_ip }} \
          --skip-phases=addon/kube-proxy
      register: kubeadm_init
      changed_when: true

    - name: Create .kube directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Copy kubeconfig for non-root user
      ansible.builtin.shell: |
        set -o pipefail
        USER_HOME=$(getent passwd {{ ansible_user }} | cut -d: -f6)
        mkdir -p "$USER_HOME/.kube"
        cp /etc/kubernetes/admin.conf "$USER_HOME/.kube/config"
        chown {{ ansible_user }}:{{ ansible_user }} "$USER_HOME/.kube/config"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Remove control-plane taint (single node)
      ansible.builtin.shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: true

    # ================================================================
    # Phase 6: Install kube-proxy with nftables
    # ================================================================

    - name: Install kube-proxy via kubeadm
      ansible.builtin.shell: |
        kubeadm init phase addon kube-proxy --apiserver-advertise-address={{ node_ip }}
      changed_when: true

    - name: Set kube-proxy to nftables mode  # noqa: risky-shell-pipe
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get configmap kube-proxy -n kube-system -o json | \
          python3 -c "import json,sys; cm=json.loads(sys.stdin.read()); \
            cc=cm['data']['config.conf']; \
            cm['data']['config.conf']=cc.replace('mode: \"\"','mode: \"nftables\"'); \
            print(json.dumps(cm))" | \
          kubectl apply -f -
        kubectl rollout restart daemonset kube-proxy -n kube-system
        kubectl rollout status daemonset kube-proxy -n kube-system --timeout=60s
      args:
        executable: /bin/bash
      changed_when: true

    # ================================================================
    # Phase 6b: Install Helm
    # ================================================================

    - name: Install Helm  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    # ================================================================
    # Phase 7: Install Cilium CNI
    # ================================================================

    - name: Install Cilium via Helm
      ansible.builtin.shell: |
        helm repo add cilium https://helm.cilium.io/
        helm upgrade --install cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace kube-system \
          --set cluster.name=kubernetes \
          --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_cidr }} \
          --set k8sServiceHost={{ node_ip }} \
          --set k8sServicePort=6443 \
          --set kubeProxyReplacement=true \
          --set routingMode=tunnel \
          --set tunnelProtocol=vxlan \
          --set operator.replicas=1 \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set cni.exclusive=false \
          --wait --timeout 180s
      changed_when: true

    - name: Wait for Cilium pods
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=ready pod -l k8s-app=cilium -n kube-system --timeout=120s
      register: cilium_wait
      changed_when: false
      retries: 6
      delay: 10
      until: cilium_wait.rc == 0

    # ================================================================
    # Phase 7b: Install Istio service mesh
    # ================================================================

    - name: Add Istio Helm repo
      ansible.builtin.shell: |
        helm repo add istio https://istio-release.storage.googleapis.com/charts
        helm repo update istio
      changed_when: true

    - name: Install Istio base (CRDs)
      ansible.builtin.shell: |
        helm upgrade --install istio-base istio/base \
          --version {{ istio_version }} \
          --namespace istio-system --create-namespace \
          --wait --timeout 300s
      changed_when: true

    - name: Install Istiod (control plane)
      ansible.builtin.shell: |
        helm upgrade --install istiod istio/istiod \
          --version {{ istio_version }} \
          --namespace istio-system \
          --set global.proxy.holdApplicationUntilProxyStarts=true \
          --set meshConfig.accessLogFile=/dev/stdout \
          --wait --timeout 300s
      changed_when: true

    - name: Install Istio CNI
      ansible.builtin.shell: |
        helm upgrade --install istio-cni istio/cni \
          --version {{ istio_version }} \
          --namespace istio-system \
          --set cni.cniConfDir=/etc/cni/net.d \
          --set cni.cniBinDir=/opt/cni/bin \
          --wait --timeout 300s
      changed_when: true

    - name: Wait for Istiod
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=ready pod -l app=istiod -n istio-system --timeout=120s
      changed_when: false

    # ================================================================
    # Phase 8: Install local-path-provisioner
    # ================================================================

    - name: Install local-path-provisioner via Helm
      ansible.builtin.shell: |
        helm repo add local-path-provisioner https://charts.containeroo.ch
        helm upgrade --install local-path-provisioner local-path-provisioner/local-path-provisioner \
          --namespace local-path-storage --create-namespace \
          --set storageClass.defaultClass=true \
          --wait --timeout 300s
      changed_when: true

    # ================================================================
    # Phase 9: Install metrics-server
    # ================================================================

    - name: Install metrics-server
      ansible.builtin.shell: |
        helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
        helm upgrade --install metrics-server metrics-server/metrics-server \
          --namespace kube-system \
          --set args="{--kubelet-insecure-tls}" \
          --wait --timeout 60s
      changed_when: true

    # ================================================================
    # Phase 10: Install cert-manager
    # ================================================================

    - name: Install cert-manager
      ansible.builtin.shell: |
        helm repo add jetstack https://charts.jetstack.io
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set crds.enabled=true \
          --wait --timeout 300s
      changed_when: true

    # ================================================================
    # Phase 11: Install Gateway API CRDs
    # ================================================================

    - name: Install Gateway API CRDs
      ansible.builtin.shell: |
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
      changed_when: true

    # ================================================================
    # Phase 12: Install ESO
    # ================================================================

    - name: Install External Secrets Operator
      ansible.builtin.shell: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm upgrade --install external-secrets external-secrets/external-secrets \
          --namespace external-secrets --create-namespace \
          --wait --timeout 300s
      changed_when: true

    # ================================================================
    # Phase 13: Install database/streaming operators
    # ================================================================

    - name: Install CNPG operator
      ansible.builtin.shell: |
        helm repo add cnpg https://cloudnative-pg.github.io/charts
        helm upgrade --install cnpg cnpg/cloudnative-pg \
          --version 0.28.0 \
          --namespace cnpg-system --create-namespace \
          --set resources.requests.cpu=50m \
          --set resources.requests.memory=128Mi \
          --set resources.limits.cpu=500m \
          --set resources.limits.memory=256Mi \
          --wait --timeout 300s
      changed_when: true

    - name: Install Strimzi operator
      ansible.builtin.shell: |
        helm repo add strimzi https://strimzi.io/charts/
        helm upgrade --install strimzi strimzi/strimzi-kafka-operator \
          --version 0.51.0 \
          --namespace strimzi --create-namespace \
          --wait --timeout 300s
      changed_when: true

    - name: Install ScyllaDB operator
      ansible.builtin.shell: |
        helm repo add scylla-operator https://scylla-operator-charts.storage.googleapis.com/stable
        helm upgrade --install scylla-operator scylla-operator/scylla-operator \
          --version 1.20.2 \
          --namespace scylla-operator --create-namespace \
          --wait --timeout 300s
      changed_when: true

    - name: Install ScyllaDB Manager
      ansible.builtin.shell: |
        helm upgrade --install scylla-manager scylla-operator/scylla-manager \
          --version 1.20.2 \
          --namespace scylla-manager --create-namespace \
          --set scylla.developerMode=true \
          --wait --timeout 300s
      changed_when: true
      when: install_scylla_manager | default(true) | bool

    # ================================================================
    # Phase 14: Configure HAProxy
    # ================================================================

    - name: Install HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present

    - name: HAProxy will be configured after Istio gateway is deployed
      ansible.builtin.debug:
        msg: "HAProxy config will be updated once Istio gateway NodePorts are known"

    - name: "KUBEADM CLUSTER READY"
      ansible.builtin.debug:
        msg: |
          Kubernetes cluster initialized:
            - API server: https://{{ node_ip }}:6443
            - CNI: Cilium {{ cilium_version }}
            - Mesh: Istio {{ istio_version }}
            - Operators: CNPG, Strimzi, ScyllaDB
            - StorageClass: local-path
          Next steps:
            1. Install Vault (setup-vault-pi.yml + setup-vault.yml)
            2. Install ArgoCD (setup-argocd.yml)
            3. Seed secrets (deploy:seed-secrets)
