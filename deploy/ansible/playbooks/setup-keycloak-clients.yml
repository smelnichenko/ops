---
# Configure Keycloak service account roles
#
# Assigns required realm roles to service accounts of Keycloak clients.
# Runs after Keycloak is deployed and clients are created.
#
# Usage:
#   task deploy:keycloak-clients

- name: Read Pi Vault root token (from pi1)
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Slurp root token
      ansible.builtin.slurp:
        src: /etc/vault-unseal/root-token
      register: _root_token_b64
      no_log: true

    - name: Publish as group fact
      ansible.builtin.set_fact:
        vault_root_token: "{{ _root_token_b64.content | b64decode | trim }}"
      no_log: true

- name: Configure Keycloak client service account roles
  hosts: target
  become: true
  gather_facts: false

  vars:
    keycloak_url: https://auth.pmon.dev
    vault_addr: "https://{{ hostvars['pi1']['ansible_host'] }}:8200"
    realm: schnappy
    clients_roles:
      - client_id: k6-smoke
        roles: [PLAY, VIEW, CHAT]

  tasks:
    - name: Get Keycloak admin password from Pi Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/secret/data/schnappy/keycloak"
        headers:
          X-Vault-Token: "{{ hostvars['pi1']['vault_root_token'] }}"
        validate_certs: false
      register: _kc_pw
      no_log: true

    - name: Extract admin_password
      ansible.builtin.set_fact:
        kc_password: "{{ _kc_pw.json.data.data.admin_password }}"
      no_log: true

    - name: Get Keycloak admin token
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: admin-cli
          username: admin
          password: "{{ kc_password }}"
          grant_type: password
        validate_certs: true
      register: kc_token
      no_log: true

    - name: Assign roles to client service accounts
      ansible.builtin.include_tasks: tasks/keycloak-assign-sa-roles.yml
      loop: "{{ clients_roles }}"
      loop_control:
        loop_var: client_config
