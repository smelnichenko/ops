---
# Full deployment: Setup k3s + Deploy Monitor application
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/full-deploy.yml
#
# This playbook:
#   1. Sets up k3s (includes Traefik + local-path-provisioner)
#   2. Deploys the Monitor application via Helm
#
- name: Full deployment to target host
  hosts: all
  gather_facts: true

  vars:
    monitor_release_name: monitor
    monitor_namespace: monitor
    monitor_chart_path: "{{ playbook_dir }}/../../backend/helm/monitor"

  tasks:
    # ==================== K3S SETUP ====================
    - name: Setup k3s
      become: true
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Install required packages
          ansible.builtin.apt:
            name:
              - curl
              - apt-transport-https
              - ca-certificates
              - python3-pip
              - python3-kubernetes
            state: present

        - name: Install Docker (for building images)
          block:
            - name: Install Docker via convenience script
              ansible.builtin.shell: |
                curl -fsSL https://get.docker.com | sh
              args:
                creates: /usr/bin/docker

            - name: Add user to docker group
              ansible.builtin.user:
                name: "{{ ansible_user }}"
                groups: docker
                append: true

        - name: Enable cgroups for ARM64
          ansible.builtin.lineinfile:
            path: /boot/firmware/cmdline.txt
            regexp: '^(.*)$'
            line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
            backrefs: true
          register: cgroups_enabled
          when: ansible_architecture == "aarch64"

        - name: Reboot if cgroups were enabled
          ansible.builtin.reboot:
            msg: "Rebooting to enable cgroups"
            reboot_timeout: 300
          when: cgroups_enabled.changed

        - name: Check if k3s is already installed
          ansible.builtin.stat:
            path: /usr/local/bin/k3s
          register: k3s_binary

        - name: Install k3s
          ansible.builtin.shell: |
            curl -sfL https://get.k3s.io | sh -
          when: not k3s_binary.stat.exists

        - name: Wait for k3s to be ready
          ansible.builtin.shell: k3s kubectl get nodes
          register: k3s_ready
          until: k3s_ready.rc == 0
          retries: 30
          delay: 10
          changed_when: false

        - name: Wait for node to be Ready
          ansible.builtin.shell: |
            k3s kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
          register: node_ready
          until: node_ready.stdout == "True"
          retries: 30
          delay: 10
          changed_when: false

        - name: Create .kube directory
          ansible.builtin.file:
            path: "/home/{{ ansible_user }}/.kube"
            state: directory
            owner: "{{ ansible_user }}"
            group: "{{ ansible_user }}"
            mode: '0755'

        - name: Copy kubeconfig
          ansible.builtin.copy:
            src: /etc/rancher/k3s/k3s.yaml
            dest: "/home/{{ ansible_user }}/.kube/config"
            owner: "{{ ansible_user }}"
            group: "{{ ansible_user }}"
            mode: '0600'
            remote_src: true

    # ==================== PERFORMANCE TUNING ====================
    - name: Setup performance profile
      become: true
      block:
        - name: Install tuned
          ansible.builtin.apt:
            name: tuned
            state: present

        - name: Enable and start tuned
          ansible.builtin.systemd:
            name: tuned
            enabled: true
            state: started

        - name: Set powersave profile
          ansible.builtin.command: tuned-adm profile powersave
          register: tuned_result
          changed_when: "'already active' not in tuned_result.stdout"

    # ==================== HELM SETUP ====================
    - name: Setup Helm
      become: true
      block:
        - name: Check if Helm is installed
          ansible.builtin.command: which helm
          register: helm_check
          ignore_errors: true
          changed_when: false

        - name: Download Helm installer
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            dest: /tmp/get-helm.sh
            mode: '0755'
          when: helm_check.rc != 0

        - name: Install Helm
          ansible.builtin.command: /tmp/get-helm.sh
          when: helm_check.rc != 0

    # ==================== DEPLOY APPLICATION ====================
    - name: Deploy Monitor application
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      block:
        - name: Create namespace
          ansible.builtin.shell: |
            k3s kubectl create namespace {{ monitor_namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
          become: true
          changed_when: false

        - name: Copy Helm chart to remote
          ansible.builtin.synchronize:
            src: "{{ monitor_chart_path }}/"
            dest: "/tmp/monitor-chart/"
            delete: true

        - name: Deploy with Helm
          ansible.builtin.command: >
            helm upgrade --install {{ monitor_release_name }}
            /tmp/monitor-chart
            --namespace {{ monitor_namespace }}
            --set postgres.password={{ lookup('env', 'MONITOR_DB_PASSWORD') | default('monitor123', true) }}
            --set auth.jwtSecret={{ lookup('env', 'JWT_SECRET') | default('CHANGE_ME_GENERATE_A_SECURE_32_CHAR_SECRET', true) }}
            --set grafana.adminPassword={{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('admin123', true) }}
            --set app.ingress.className=traefik
            --set app.ingress.host=
            --set postgres.storage.storageClass=local-path
            --set prometheus.storage.storageClass=local-path
            --set grafana.storage.storageClass=local-path
            --wait
            --timeout 10m
          become: true
          register: helm_deploy

        - name: Display deployment result
          ansible.builtin.debug:
            var: helm_deploy.stdout_lines

    # ==================== POST DEPLOY ====================
    - name: Get deployment info
      become: true
      block:
        - name: Get pods status
          ansible.builtin.command: k3s kubectl get pods -n {{ monitor_namespace }}
          register: pods_status
          changed_when: false

        - name: Get services
          ansible.builtin.command: k3s kubectl get svc -n {{ monitor_namespace }}
          register: svc_status
          changed_when: false

        - name: Get ingress
          ansible.builtin.command: k3s kubectl get ingress -n {{ monitor_namespace }}
          register: ingress_status
          changed_when: false

        - name: Display deployment summary
          ansible.builtin.debug:
            msg: |
              ========================================
              Deployment Complete!
              ========================================

              Pods:
              {{ pods_status.stdout }}

              Services:
              {{ svc_status.stdout }}

              Ingress:
              {{ ingress_status.stdout }}

              ----------------------------------------
              Access the application:
                http://{{ ansible_host }}/

              Or use port-forward:
                k3s kubectl port-forward svc/{{ monitor_release_name }}-monitor-frontend 8080:8080 -n {{ monitor_namespace }}
              ========================================
