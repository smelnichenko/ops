---
# Full deployment: Setup k0s + Deploy Monitor application
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/full-deploy.yml
#
# This playbook:
#   1. Sets up k0s with Traefik on a fresh Pi
#   2. Deploys the Monitor application via Helm
#
- name: Full deployment to Raspberry Pi 5
  hosts: all
  gather_facts: true

  vars:
    k0s_version: "v1.29.1+k0s.0"
    monitor_release_name: monitor
    monitor_namespace: monitor
    monitor_chart_path: "{{ playbook_dir }}/../../backend/helm/monitor"

  tasks:
    # ==================== K0S SETUP ====================
    - name: Setup k0s
      become: true
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Install required packages
          ansible.builtin.apt:
            name:
              - curl
              - apt-transport-https
              - ca-certificates
              - python3-pip
              - python3-kubernetes
            state: present

        - name: Enable cgroups for Raspberry Pi
          ansible.builtin.lineinfile:
            path: /boot/firmware/cmdline.txt
            regexp: '^(.*)$'
            line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
            backrefs: true
          register: cgroups_enabled
          when: ansible_architecture == "aarch64"

        - name: Reboot if cgroups were enabled
          ansible.builtin.reboot:
            msg: "Rebooting to enable cgroups"
            reboot_timeout: 300
          when: cgroups_enabled.changed

        - name: Check if k0s is already installed
          ansible.builtin.stat:
            path: /usr/local/bin/k0s
          register: k0s_binary

        - name: Download k0s installer
          ansible.builtin.get_url:
            url: https://get.k0s.sh
            dest: /tmp/k0s-install.sh
            mode: '0755'
          when: not k0s_binary.stat.exists

        - name: Install k0s binary
          ansible.builtin.shell: /tmp/k0s-install.sh
          args:
            creates: /usr/local/bin/k0s
          environment:
            K0S_VERSION: "{{ k0s_version }}"
          when: not k0s_binary.stat.exists

        - name: Create k0s config directory
          ansible.builtin.file:
            path: /etc/k0s
            state: directory
            mode: '0755'

        - name: Generate default k0s config
          ansible.builtin.shell: k0s config create > /etc/k0s/k0s.yaml
          args:
            creates: /etc/k0s/k0s.yaml

        - name: Check if k0s service exists
          ansible.builtin.stat:
            path: /etc/systemd/system/k0scontroller.service
          register: k0s_service

        - name: Install k0s controller with worker
          ansible.builtin.shell: k0s install controller --single -c /etc/k0s/k0s.yaml
          when: not k0s_service.stat.exists

        - name: Start k0s service
          ansible.builtin.systemd:
            name: k0scontroller
            state: started
            enabled: true

        - name: Wait for k0s to be ready
          ansible.builtin.shell: k0s kubectl get nodes
          register: k0s_ready
          until: k0s_ready.rc == 0
          retries: 30
          delay: 10
          changed_when: false

        - name: Wait for node to be Ready
          ansible.builtin.shell: |
            k0s kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
          register: node_ready
          until: node_ready.stdout == "True"
          retries: 30
          delay: 10
          changed_when: false

        - name: Create .kube directory
          ansible.builtin.file:
            path: "/home/{{ ansible_user }}/.kube"
            state: directory
            owner: "{{ ansible_user }}"
            group: "{{ ansible_user }}"
            mode: '0755'

        - name: Copy kubeconfig
          ansible.builtin.copy:
            src: /var/lib/k0s/pki/admin.conf
            dest: "/home/{{ ansible_user }}/.kube/config"
            owner: "{{ ansible_user }}"
            group: "{{ ansible_user }}"
            mode: '0600'
            remote_src: true

    # ==================== HELM SETUP ====================
    - name: Setup Helm
      become: true
      block:
        - name: Check if Helm is installed
          ansible.builtin.command: which helm
          register: helm_check
          ignore_errors: true
          changed_when: false

        - name: Download Helm installer
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            dest: /tmp/get-helm.sh
            mode: '0755'
          when: helm_check.rc != 0

        - name: Install Helm
          ansible.builtin.command: /tmp/get-helm.sh
          when: helm_check.rc != 0

    # ==================== TRAEFIK INGRESS ====================
    - name: Install Traefik ingress controller
      become: true
      environment:
        KUBECONFIG: /var/lib/k0s/pki/admin.conf
      block:
        - name: Add Traefik Helm repo
          ansible.builtin.shell: |
            helm repo add traefik https://traefik.github.io/charts
            helm repo update
          changed_when: false

        - name: Create traefik namespace
          ansible.builtin.shell: |
            k0s kubectl create namespace traefik --dry-run=client -o yaml | k0s kubectl apply -f -
          changed_when: false

        - name: Install Traefik via Helm
          ansible.builtin.shell: |
            helm upgrade --install traefik traefik/traefik \
              --namespace traefik \
              --set ports.web.nodePort=80 \
              --set ports.websecure.nodePort=443 \
              --set service.type=NodePort \
              --set ingressClass.enabled=true \
              --set ingressClass.isDefaultClass=true
          changed_when: false

        - name: Wait for Traefik to be ready
          ansible.builtin.shell: |
            k0s kubectl wait --for=condition=available deployment/traefik -n traefik --timeout=300s
          changed_when: false

    # ==================== DEPLOY APPLICATION ====================
    - name: Deploy Monitor application
      environment:
        KUBECONFIG: /var/lib/k0s/pki/admin.conf
      block:
        - name: Create namespace
          kubernetes.core.k8s:
            name: "{{ monitor_namespace }}"
            api_version: v1
            kind: Namespace
            state: present
          become: true

        - name: Copy Helm chart to remote
          ansible.builtin.synchronize:
            src: "{{ monitor_chart_path }}/"
            dest: "/tmp/monitor-chart/"
            delete: true

        - name: Deploy with Helm
          ansible.builtin.command: >
            helm upgrade --install {{ monitor_release_name }}
            /tmp/monitor-chart
            --namespace {{ monitor_namespace }}
            --set postgres.password={{ lookup('env', 'MONITOR_DB_PASSWORD') | default('monitor123', true) }}
            --set grafana.adminPassword={{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('admin123', true) }}
            --set app.ingress.className=traefik
            --set postgres.storage.storageClass=openebs-hostpath
            --set prometheus.storage.storageClass=openebs-hostpath
            --set grafana.storage.storageClass=openebs-hostpath
            --wait
            --timeout 10m
          become: true
          register: helm_deploy

        - name: Display deployment result
          ansible.builtin.debug:
            var: helm_deploy.stdout_lines

    # ==================== POST DEPLOY ====================
    - name: Get deployment info
      become: true
      environment:
        KUBECONFIG: /var/lib/k0s/pki/admin.conf
      block:
        - name: Get pods status
          ansible.builtin.command: k0s kubectl get pods -n {{ monitor_namespace }}
          register: pods_status
          changed_when: false

        - name: Get services
          ansible.builtin.command: k0s kubectl get svc -n {{ monitor_namespace }}
          register: svc_status
          changed_when: false

        - name: Get ingress
          ansible.builtin.command: k0s kubectl get ingress -n {{ monitor_namespace }}
          register: ingress_status
          changed_when: false

        - name: Display deployment summary
          ansible.builtin.debug:
            msg: |
              ========================================
              Deployment Complete!
              ========================================

              Pods:
              {{ pods_status.stdout }}

              Services:
              {{ svc_status.stdout }}

              Ingress:
              {{ ingress_status.stdout }}

              ----------------------------------------
              Access the application:

              1. Add to /etc/hosts on your machine:
                 {{ ansible_host }} monitor.local

              2. Open http://monitor.local

              3. Grafana: http://{{ ansible_host }}:<NodePort>
                 Get NodePort: k0s kubectl get svc -n {{ monitor_namespace }} | grep grafana

              Or use port-forward:
                 k0s kubectl port-forward svc/{{ monitor_release_name }}-monitor-frontend 8080:8080 -n {{ monitor_namespace }}
              ========================================
