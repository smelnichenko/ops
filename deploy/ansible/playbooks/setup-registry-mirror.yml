---
# Setup Docker Registry Pull-Through Cache on Pi
#
# Deploys three registry instances (standalone binary) as pull-through caches for:
#   - Docker Hub     (port 5000)
#   - Elastic.co     (port 5001)
#   - Quay.io        (port 5002)
#
# Uses the standalone registry binary from distribution/distribution (no Docker needed).
# Cached images persist on Pi's NVMe at /mnt/data/registry-cache/
# k3s nodes and Docker clients use these as mirrors — transparent fallback
# to upstream if Pi is unreachable.
#
# Idempotent: safe to re-run. Only restarts services if config changes.
#
# Prerequisites:
#   - Debian target (Pi or Vagrant VM)
#   - SSH access with become (sudo)
#
# Usage:
#   # Production (Pi)
#   ansible-playbook -i inventory/production.yml playbooks/setup-registry-mirror.yml
#
#   # Vagrant
#   ansible-playbook -i inventory/vagrant.yml playbooks/setup-registry-mirror.yml

- name: Setup Docker Registry Pull-Through Cache
  hosts: vault_pi
  become: true
  gather_facts: true

  vars:
    registry_version: "3.0.0"
    registry_cache_dir: /mnt/data/registry-cache
    registry_config_dir: /etc/registry-mirror
    registry_bin: /usr/local/bin/registry
    registry_user: registry
    registry_registries:
      - name: dockerhub
        port: 5000
        remote_url: https://registry-1.docker.io
      - name: elastic
        port: 5001
        remote_url: https://docker.elastic.co
      - name: quay
        port: 5002
        remote_url: https://quay.io

  pre_tasks:
    - name: Wait for SSH to be available
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

  tasks:
    # ================================================================
    # Phase 1: Install registry binary
    # ================================================================

    - name: Check if registry binary exists
      ansible.builtin.stat:
        path: "{{ registry_bin }}"
      register: registry_binary

    - name: Check installed registry version
      ansible.builtin.command:
        cmd: "{{ registry_bin }} --version"
      register: registry_version_check
      changed_when: false
      failed_when: false
      when: registry_binary.stat.exists

    - name: Download and install registry binary
      when: not registry_binary.stat.exists or registry_version not in (registry_version_check.stdout | default(''))
      block:
        - name: Determine architecture
          ansible.builtin.set_fact:
            registry_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

        - name: Download registry tarball
          vars:
            registry_base: "https://github.com/distribution/distribution/releases/download"
            registry_file: "registry_{{ registry_version }}_linux_{{ registry_arch }}.tar.gz"
          ansible.builtin.get_url:
            url: "{{ registry_base }}/v{{ registry_version }}/{{ registry_file }}"
            dest: /tmp/registry.tar.gz
            mode: "0644"

        - name: Extract registry binary
          ansible.builtin.unarchive:
            src: /tmp/registry.tar.gz
            dest: /usr/local/bin/
            remote_src: true
            extra_opts: [registry]

        - name: Make registry executable
          ansible.builtin.file:
            path: "{{ registry_bin }}"
            mode: "0755"

        - name: Clean up tarball
          ansible.builtin.file:
            path: /tmp/registry.tar.gz
            state: absent

    # ================================================================
    # Phase 2: Create user and directories
    # ================================================================

    - name: Create registry system user
      ansible.builtin.user:
        name: "{{ registry_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create config directory
      ansible.builtin.file:
        path: "{{ registry_config_dir }}"
        state: directory
        owner: "{{ registry_user }}"
        group: "{{ registry_user }}"
        mode: "0755"

    - name: Create cache directories
      ansible.builtin.file:
        path: "{{ registry_cache_dir }}/{{ item.name }}"
        state: directory
        owner: "{{ registry_user }}"
        group: "{{ registry_user }}"
        mode: "0755"
      loop: "{{ registry_registries }}"

    # ================================================================
    # Phase 3: Create config files and systemd services
    # ================================================================

    - name: Create registry config files
      ansible.builtin.copy:
        dest: "{{ registry_config_dir }}/{{ item.name }}.yml"
        owner: "{{ registry_user }}"
        group: "{{ registry_user }}"
        mode: "0644"
        content: |
          version: 0.1
          proxy:
            remoteurl: {{ item.remote_url }}
          storage:
            filesystem:
              rootdirectory: {{ registry_cache_dir }}/{{ item.name }}
            delete:
              enabled: true
          http:
            addr: :{{ item.port }}
      loop: "{{ registry_registries }}"
      notify: Restart registry services

    - name: Create systemd service files
      ansible.builtin.copy:
        dest: /etc/systemd/system/registry-{{ item.name }}.service
        mode: "0644"
        content: |
          [Unit]
          Description=Registry pull-through cache ({{ item.name }} → {{ item.remote_url }})
          After=network.target

          [Service]
          Type=simple
          User={{ registry_user }}
          Group={{ registry_user }}
          ExecStart={{ registry_bin }} serve {{ registry_config_dir }}/{{ item.name }}.yml
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      loop: "{{ registry_registries }}"
      notify: Reload systemd for registry

    - name: Flush handlers before starting services
      ansible.builtin.meta: flush_handlers

    - name: Enable and start registry services
      ansible.builtin.systemd:
        name: "registry-{{ item.name }}"
        state: started
        enabled: true
      loop: "{{ registry_registries }}"


    # ================================================================
    # Phase 4: UFW firewall
    # ================================================================

    - name: Allow registry ports from LAN (IPv4)
      community.general.ufw:
        rule: allow
        port: "{{ item.port | string }}"
        proto: tcp
        from_ip: 192.168.11.0/24
      loop: "{{ registry_registries }}"

    - name: Allow registry ports from LAN (IPv6)
      community.general.ufw:
        rule: allow
        port: "{{ item.port | string }}"
        proto: tcp
        from_ip: fd0a:94e6:20b4:9f6b::/64
      loop: "{{ registry_registries }}"

    # ================================================================
    # Phase 5: Weekly garbage collection
    # ================================================================

    - name: Setup weekly garbage collection
      ansible.builtin.cron:
        name: "registry-gc-{{ item.name }}"
        user: "{{ registry_user }}"
        weekday: "0"
        hour: "3"
        minute: "{{ 5 * loop_index0 }}"
        job: >-
          {{ registry_bin }} garbage-collect {{ registry_config_dir }}/{{ item.name }}.yml --delete-untagged
          2>&1 | logger -t registry-gc-{{ item.name }}
      loop: "{{ registry_registries }}"
      loop_control:
        index_var: loop_index0

    # ================================================================
    # Verify
    # ================================================================

    - name: Wait for registries to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/v2/"
        status_code: 200
      loop: "{{ registry_registries }}"
      retries: 10
      delay: 3

    - name: Verify registries respond
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/v2/_catalog"
        return_content: true
      loop: "{{ registry_registries }}"
      register: catalog_check

    - name: Show registry status
      ansible.builtin.debug:
        msg: "{{ item.item.name }} (:{{ item.item.port }}) — {{ item.json }}"
      loop: "{{ catalog_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

  handlers:
    - name: Reload systemd for registry
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart registry services
      ansible.builtin.systemd:
        name: "registry-{{ item.name }}"
        state: restarted
      loop: "{{ registry_registries }}"
