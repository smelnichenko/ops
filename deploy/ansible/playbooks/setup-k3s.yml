---
# Setup k3s on a fresh target host
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml
#
- name: Setup k3s on target host
  hosts: target
  become: true
  gather_facts: true

  handlers:
    - name: Reboot for cgroups
      ansible.builtin.reboot:
        msg: "Rebooting to enable cgroups"
        reboot_timeout: 300

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Install Docker (for building images)
      block:
        - name: Check if Docker is installed
          ansible.builtin.stat:
            path: /usr/bin/docker
          register: docker_binary

        - name: Download Docker install script
          ansible.builtin.get_url:
            url: https://get.docker.com
            dest: /tmp/get-docker.sh
            mode: '0755'
          when: not docker_binary.stat.exists

        - name: Run Docker install script
          ansible.builtin.command: /tmp/get-docker.sh
          when: not docker_binary.stat.exists
          changed_when: true

        - name: Clean up Docker install script
          ansible.builtin.file:
            path: /tmp/get-docker.sh
            state: absent

        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: true

    - name: Enable cgroups for ARM64
      ansible.builtin.lineinfile:
        path: /boot/firmware/cmdline.txt
        regexp: '^(.*)$'
        line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
        backrefs: true
      notify: Reboot for cgroups
      when: ansible_architecture == "aarch64"

    - name: Check if k3s is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Create k3s config directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Read Forgejo registry credentials from Vault
      ansible.builtin.shell: |
        k3s kubectl exec -n vault vault-0 -- \
          env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="$(k3s kubectl get secret vault-root-token -n vault -o jsonpath='{.data.token}' | base64 -d)" \
          vault kv get -format=json secret/schnappy/registry
      register: vault_registry
      changed_when: false
      failed_when: false
      no_log: true
      when: k3s_binary.stat.exists

    - name: Parse Forgejo registry credentials
      ansible.builtin.set_fact:
        forgejo_pull_user: "{{ (vault_registry.stdout | from_json).data.data.pull_user }}"
        forgejo_pull_token: "{{ (vault_registry.stdout | from_json).data.data.pull_token }}"
      when: vault_registry is not skipped and vault_registry.rc == 0
      no_log: true

    - name: Write registries.yaml
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/registries.yaml
        mode: "0600"
        content: |
          {% if registry_mirror_ip | default('') | length > 0 %}
          mirrors:
            docker.io:
              endpoint:
                - "http://{{ registry_mirror_ip }}:{{ nexus_docker_port | default('8082') }}"
            docker.elastic.co:
              endpoint:
                - "http://{{ registry_mirror_ip }}:{{ nexus_docker_port | default('8082') }}"
            quay.io:
              endpoint:
                - "http://{{ registry_mirror_ip }}:{{ nexus_docker_port | default('8082') }}"
          {% if forgejo_pull_token | default('') | length > 0 %}
            {{ forgejo_host }}:
              endpoint:
                - "https://{{ forgejo_host }}"
          {% endif %}
          {% endif %}
          {% if forgejo_pull_token | default('') | length > 0 %}
          configs:
            "{{ forgejo_host }}":
              auth:
                username: "{{ forgejo_pull_user }}"
                password: "{{ forgejo_pull_token }}"
          {% endif %}
      register: registries_yaml

    - name: Restart k3s to pick up registry config
      ansible.builtin.systemd:
        name: k3s
        state: restarted
      when: registries_yaml.changed and k3s_binary.stat.exists

    - name: Download k3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/get-k3s.sh
        mode: '0755'
      when: not k3s_binary.stat.exists

    - name: Install k3s
      ansible.builtin.command: /tmp/get-k3s.sh
      when: not k3s_binary.stat.exists
      changed_when: true

    - name: Clean up k3s install script
      ansible.builtin.file:
        path: /tmp/get-k3s.sh
        state: absent

    - name: Wait for k3s to be ready
      ansible.builtin.command: k3s kubectl get nodes
      register: k3s_ready
      until: k3s_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for node to be Ready
      ansible.builtin.shell: |
        k3s kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      until: node_ready.stdout == "True"
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for Traefik to be ready
      ansible.builtin.shell: |
        k3s kubectl get deployment traefik -n kube-system -o jsonpath='{.status.availableReplicas}'
      register: traefik_ready
      until: traefik_ready.stdout | default('0') | int >= 1
      retries: 30
      delay: 10
      changed_when: false

    - name: Patch k3s local-storage manifest (path + permissions)
      ansible.builtin.copy:
        src: ../../k8s/local-storage.yaml
        dest: /mnt/storage/k3s/server/manifests/local-storage.yaml
        owner: root
        group: root
        mode: "0600"

    - name: Install Helm
      block:
        - name: Check if Helm is installed
          ansible.builtin.command: which helm
          register: helm_check
          ignore_errors: true
          changed_when: false

        - name: Download Helm install script
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            dest: /tmp/get-helm-3.sh
            mode: '0755'
          when: helm_check.rc != 0

        - name: Run Helm install script
          ansible.builtin.command: /tmp/get-helm-3.sh
          when: helm_check.rc != 0
          changed_when: true

        - name: Clean up Helm install script
          ansible.builtin.file:
            path: /tmp/get-helm-3.sh
            state: absent

    - name: Create .kube directory for user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy kubeconfig for user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
        remote_src: true

    - name: Update kubeconfig server address
      ansible.builtin.replace:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: 'https://127.0.0.1:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: Fetch kubeconfig to local machine
      ansible.builtin.fetch:
        src: "/home/{{ ansible_user }}/.kube/config"
        dest: "{{ playbook_dir }}/../kubeconfig-{{ inventory_hostname }}"
        flat: true

    - name: Install cert-manager
      block:
        - name: Check if cert-manager is installed
          ansible.builtin.shell: |
            k3s kubectl get namespace cert-manager
          register: certmanager_ns
          ignore_errors: true
          changed_when: false

        - name: Install cert-manager CRDs and resources
          ansible.builtin.shell: |
            k3s kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          when: certmanager_ns.rc != 0
          changed_when: true

        - name: Wait for cert-manager webhook to be ready
          ansible.builtin.shell: |
            k3s kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
          changed_when: false

        - name: Create Let's Encrypt HTTP-01 ClusterIssuer
          ansible.builtin.shell: |
            k3s kubectl apply -f - <<'EOF'
            apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            metadata:
              name: letsencrypt-prod
            spec:
              acme:
                server: https://acme-v02.api.letsencrypt.org/directory
                email: sergei.melnichenko@gmail.com
                privateKeySecretRef:
                  name: letsencrypt-prod
                solvers:
                  - http01:
                      ingress:
                        ingressClassName: traefik
            EOF
          changed_when: false

    - name: Setup Porkbun DNS-01 webhook for internal hosts
      when: porkbun_api_key | default('') | length > 0
      block:
        - name: Add cert-manager-webhook-porkbun Helm repo
          ansible.builtin.shell: |
            helm repo add cert-manager-webhook-porkbun https://talinx.github.io/cert-manager-webhook-porkbun && \
            helm repo update cert-manager-webhook-porkbun
          environment:
            KUBECONFIG: /etc/rancher/k3s/k3s.yaml
          changed_when: false

        - name: Check if Porkbun webhook is installed
          ansible.builtin.shell: |
            helm status cert-manager-webhook-porkbun -n cert-manager 2>/dev/null
          environment:
            KUBECONFIG: /etc/rancher/k3s/k3s.yaml
          register: porkbun_webhook_status
          ignore_errors: true
          changed_when: false

        - name: Install Porkbun webhook Helm chart
          ansible.builtin.shell: |
            helm install cert-manager-webhook-porkbun \
              cert-manager-webhook-porkbun/cert-manager-webhook-porkbun \
              -n cert-manager --wait --timeout 120s
          environment:
            KUBECONFIG: /etc/rancher/k3s/k3s.yaml
          when: porkbun_webhook_status.rc != 0
          changed_when: true

        - name: Create Porkbun API credentials secret
          ansible.builtin.shell: |
            k3s kubectl apply -f - <<'EOF'
            apiVersion: v1
            kind: Secret
            metadata:
              name: porkbun-secret
              namespace: cert-manager
            type: Opaque
            stringData:
              PORKBUN_API_KEY: "{{ porkbun_api_key }}"
              PORKBUN_SECRET_API_KEY: "{{ porkbun_secret_key }}"
            EOF
          no_log: true
          changed_when: false

        - name: Create Let's Encrypt DNS-01 ClusterIssuer
          ansible.builtin.shell: |
            k3s kubectl apply -f - <<'EOF'
            apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            metadata:
              name: letsencrypt-dns
            spec:
              acme:
                server: https://acme-v02.api.letsencrypt.org/directory
                email: sergei.melnichenko@gmail.com
                privateKeySecretRef:
                  name: letsencrypt-dns
                solvers:
                  - selector:
                      dnsZones:
                        - pmon.dev
                    dns01:
                      webhook:
                        groupName: porkbun.talinx.dev
                        solverName: porkbun
                        config:
                          apiKey:
                            key: PORKBUN_API_KEY
                            name: porkbun-secret
                          secretApiKey:
                            key: PORKBUN_SECRET_API_KEY
                            name: porkbun-secret
            EOF
          changed_when: false

        - name: Wait for DNS-01 ClusterIssuer to be ready
          ansible.builtin.shell: |
            k3s kubectl get clusterissuer letsencrypt-dns -o jsonpath='{.status.conditions[0].status}'
          register: dns_issuer_ready
          retries: 12
          delay: 5
          until: dns_issuer_ready.stdout == "True"
          changed_when: false

    - name: Display k3s status
      vars:
        porkbun_msg: >-
          {{ 'Porkbun DNS-01 webhook installed (letsencrypt-dns issuer ready).'
          if porkbun_api_key | default('') | length > 0
          else 'Porkbun DNS-01 webhook skipped (no API key provided).' }}
      ansible.builtin.debug:
        msg: |
          k3s installed successfully!

          Traefik ingress controller is ready (bundled with k3s).
          local-path-provisioner configured to use /mnt/storage/k3s-pvcs.
          cert-manager installed with Let's Encrypt ClusterIssuer.
          {{ porkbun_msg }}

          To use kubectl locally:
            export KUBECONFIG={{ playbook_dir }}/../kubeconfig-{{ inventory_hostname }}
            kubectl get nodes
