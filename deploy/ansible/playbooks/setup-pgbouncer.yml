---
# PgBouncer in front of Patroni on each Pi.
#
# Topology:
#   app → 127.0.0.1:6432 (PgBouncer) → 127.0.0.1:5000 (HAProxy) → Patroni leader
#
# Pool mode: session (one client = one backend connection for the
# duration of the client's session). Transaction mode would pool more
# aggressively but Keycloak relies on session-scoped temp tables +
# advisory locks that don't survive transaction boundaries; safer
# baseline. Switch to transaction per-database via [databases] entries
# if a specific DB is verified compatible.
#
# Usage:
#   task deploy:pgbouncer
#   ansible-playbook -i inventory/production.yml playbooks/setup-pgbouncer.yml

- name: PgBouncer on each Pi
  hosts: pis
  become: true
  gather_facts: true

  vars:
    pgbouncer_listen_port: 6432
    haproxy_port: 5000
    pgbouncer_user: pgbouncer
    # Path to the auth_user secret (for auth_query against Patroni)
    auth_secret_dir: /etc/pgbouncer
    # Databases to expose. Each gets a [databases] entry pointing at
    # HAProxy. App-side DSN switches from :5000 → :6432.
    databases:
      - {name: forgejo, user: forgejo}
      - {name: keycloak, user: keycloak}

  tasks:
    - name: Install pgbouncer
      ansible.builtin.apt:
        name: pgbouncer
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure pgbouncer config dir
      ansible.builtin.file:
        path: "{{ auth_secret_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0750'

    # Auth model: pgbouncer authenticates against an `auth_user`
    # (created in Patroni) that can SELECT from a stub view exposing
    # password hashes. Lets clients use their real Patroni passwords
    # without us copying every credential into userlist.txt.
    #
    # Both Pis must share the same password — they all log into the
    # same Patroni role. Generate on pi1 (run_once), distribute to
    # the rest.
    - name: Generate pgbouncer auth_user password on pi1 (idempotent)  # noqa: run-once[task]
      ansible.builtin.shell: |
        set -eo pipefail
        if [ ! -f {{ auth_secret_dir }}/auth_user.password ]; then
          umask 077
          openssl rand -hex 32 > {{ auth_secret_dir }}/auth_user.password
          chown postgres:postgres {{ auth_secret_dir }}/auth_user.password
        fi
      run_once: true
      delegate_to: pi1
      changed_when: false

    - name: Read auth_user password from pi1  # noqa: run-once[task]
      ansible.builtin.slurp:
        src: "{{ auth_secret_dir }}/auth_user.password"
      register: _auth_user_pw_raw
      run_once: true
      delegate_to: pi1
      no_log: true

    - name: Set auth_user password fact (shared across all Pis)
      ansible.builtin.set_fact:
        auth_user_password: "{{ _auth_user_pw_raw.content | b64decode | trim }}"
      no_log: true

    - name: Distribute auth_user password to every Pi
      ansible.builtin.copy:
        dest: "{{ auth_secret_dir }}/auth_user.password"
        owner: postgres
        group: postgres
        mode: '0600'
        content: "{{ auth_user_password }}"
      no_log: true

    - name: Provision auth_user role + lookup function in Patroni (run_once)  # noqa: run-once[task]
      ansible.builtin.shell: |
        set -eo pipefail
        PGPASSWORD='{{ postgres_admin_password }}' psql -h 127.0.0.1 -p {{ haproxy_port }} -U postgres -d postgres <<'SQL'
        DO $do$
        BEGIN
          IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'pgbouncer') THEN
            CREATE ROLE pgbouncer LOGIN PASSWORD '{{ auth_user_password }}';
          ELSE
            ALTER ROLE pgbouncer WITH PASSWORD '{{ auth_user_password }}';
          END IF;
        END
        $do$;

        CREATE OR REPLACE FUNCTION public.user_lookup(in i_username text, out uname text, out phash text)
          RETURNS record AS $$
        BEGIN
          SELECT usename, passwd FROM pg_shadow WHERE usename = i_username INTO uname, phash;
          RETURN;
        END;
        $$ LANGUAGE plpgsql SECURITY DEFINER;

        REVOKE ALL ON FUNCTION public.user_lookup(text) FROM public;
        GRANT EXECUTE ON FUNCTION public.user_lookup(text) TO pgbouncer;
        SQL
      run_once: true
      delegate_to: pi1
      no_log: true
      changed_when: true   # idempotent SQL but report change for visibility

    - name: Render pgbouncer.ini
      ansible.builtin.copy:
        dest: /etc/pgbouncer/pgbouncer.ini
        owner: postgres
        group: postgres
        mode: '0640'
        content: |
          ;; pgbouncer in front of HAProxy → Patroni.
          ;; auth_dbname=postgres on every entry — the user_lookup
          ;; function lives in the postgres DB; without this PgBouncer
          ;; would try to call it inside forgejo/keycloak DBs and the
          ;; lookup would silently return "no such user".
          [databases]
          {% for db in databases %}
          {{ db.name }} = host=127.0.0.1 port={{ haproxy_port }} dbname={{ db.name }} auth_dbname=postgres
          {% endfor %}
          ;; '*' wildcard so unknown DB names get a connection too (useful
          ;; for psql ad-hoc); remove if you want strict allow-listing.
          * = host=127.0.0.1 port={{ haproxy_port }} auth_dbname=postgres

          [pgbouncer]
          listen_addr = 127.0.0.1
          listen_port = {{ pgbouncer_listen_port }}
          auth_type = scram-sha-256
          auth_user = pgbouncer
          auth_query = SELECT uname, phash FROM public.user_lookup($1)
          auth_file = {{ auth_secret_dir }}/userlist.txt

          pool_mode = session
          default_pool_size = 25
          max_client_conn = 1000
          reserve_pool_size = 5
          reserve_pool_timeout = 3
          server_reset_query = DISCARD ALL
          server_check_delay = 30
          server_lifetime = 3600
          server_idle_timeout = 600

          ignore_startup_parameters = extra_float_digits,search_path

          logfile = /var/log/postgresql/pgbouncer.log
          pidfile = /var/run/postgresql/pgbouncer.pid
          unix_socket_dir = /var/run/postgresql

          ;; Avoid PgBouncer's admin console being reachable without auth
          admin_users = postgres
          stats_users = postgres
      notify: Restart pgbouncer

    - name: Render userlist.txt (only the auth_user; everything else uses auth_query)
      ansible.builtin.copy:
        dest: "{{ auth_secret_dir }}/userlist.txt"
        owner: postgres
        group: postgres
        mode: '0640'
        content: |
          "pgbouncer" "{{ auth_user_password }}"
      no_log: true
      notify: Restart pgbouncer

    - name: Enable + start pgbouncer
      ansible.builtin.systemd_service:
        name: pgbouncer
        enabled: true
        state: started

    - name: Wait for pgbouncer to listen
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ pgbouncer_listen_port }}"
        timeout: 30

    # Smoke-test: read the actual postgres superuser password from
    # Pi Vault (where the seed playbook stored it) and verify a
    # round-trip through PgBouncer→HAProxy→Patroni.
    # No smoke-test of the auth path here — any synthetic query would
    # need credentials we'd rather not surface in the playbook. The
    # `wait_for: port=6432` above proves the listener is up; full
    # end-to-end validation comes from the next deploy cycle when
    # Forgejo + Keycloak start using port 6432 (their startup logs
    # will surface any auth_query issue immediately).

  handlers:
    - name: Restart pgbouncer
      ansible.builtin.systemd_service:
        name: pgbouncer
        state: restarted
