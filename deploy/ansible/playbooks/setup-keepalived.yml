---
# Setup Keepalived for floating VIP between pi1 and pi2
#
# Provides a single stable IP (192.168.11.5) that floats between Pis.
# All services (Forgejo, Keycloak, MinIO, Postgres) are reached via VIP.
# If the active Pi dies, the other grabs the VIP in ~3 seconds.
#
# Prerequisites:
#   - Both Pis running with services installed
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-keepalived.yml

- name: Setup Keepalived
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    vip: "{{ keepalived_vip | default('192.168.11.5') }}"
    vip_cidr: 24
    vrrp_router_id: 51
    vrrp_password: "{{ keepalived_vrrp_password }}"
    # pi1 is master (higher priority), pi2 is backup
    vrrp_priority: "{{ 150 if inventory_hostname == 'pi1' else 100 }}"
    # Both start as BACKUP — higher priority wins MASTER. nopreempt requires this.
    vrrp_state: BACKUP
    # Unicast VRRP: explicit source + peer on the private-network IPs.
    peer_src_ip: "{{ ansible_host }}"
    peer_other_ip: "{{ hostvars['pi2']['ansible_host'] if inventory_hostname == 'pi1' else hostvars['pi1']['ansible_host'] }}"

  tasks:
    - name: Discover VRRP interface (the one carrying ansible_host)
      ansible.builtin.shell: |
        set -eo pipefail
        ip -o -4 addr show | awk -v ip="{{ ansible_host }}" '$4 ~ "^"ip"/" {print $2; exit}'
      register: _vrrp_iface
      changed_when: false

    - name: Set vrrp_interface fact
      ansible.builtin.set_fact:
        vrrp_interface: "{{ _vrrp_iface.stdout | trim }}"

    - name: Fail if we couldn't find the interface
      ansible.builtin.assert:
        that: vrrp_interface | length > 0
        fail_msg: "Could not find an interface with IP {{ ansible_host }}"

    - name: Install Keepalived
      ansible.builtin.apt:
        name: keepalived
        state: present

    - name: Allow VRRP through UFW
      community.general.ufw:
        rule: allow
        proto: vrrp
        from_ip: 192.168.11.0/24
        comment: "VRRP protocol"

    - name: Create health check script
      ansible.builtin.copy:
        dest: /etc/keepalived/check_services.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Check critical services — if any fails, reduce priority to trigger failover.
          # Nexus and MinIO are intentionally excluded: they're controlled by
          # notify_master / notify_backup scripts below, not by this health probe.
          # (They're stopped on the BACKUP Pi, so probing them there would
          # always fail and pin the VIP to the MASTER incorrectly.)

          # Forgejo
          curl -sf -o /dev/null -m 3 http://localhost:3000/api/v1/version || exit 1

          # Keycloak
          curl -sf -o /dev/null -m 3 http://localhost:8080/realms/master || exit 1

          # Patroni
          curl -sf -o /dev/null -m 3 http://localhost:8008/health || exit 1

          exit 0

    # Active-passive controller scripts (Nexus + MinIO). Same safety
    # model for both:
    #   1. VRRP election: exactly one Pi holds VIP in the common case
    #   2. <data-dir>/.active-on-<hostname> sentinel: informational +
    #      split-brain detector; notify_master logs a warning if another
    #      host's sentinel exists
    #   3. Service-level lock: Nexus's H2 (/mnt/data/nexus/db/nexus.lock.db)
    #      refuses concurrent starts. MinIO's xl-single doesn't have an
    #      equivalent fencing primitive — we rely on layers 1+2 plus the
    #      systemd unit's StartLimitBurst=3 cap as a backstop.
    #   4. Live-VIP gating + per-service flock: handlers converge to the
    #      LATEST VRRP state by re-reading kernel VIP ownership under the
    #      service lock (keepalived updates the address BEFORE invoking
    #      notify scripts). Kernel state cannot be written out of order,
    #      unlike a recorded state file racing concurrent notify writers.
    #      Without this, a master handler stuck in its readiness wait can
    #      outlive a MASTER->BACKUP flip and start its service on the
    #      now-passive Pi (dual-active MinIO, 2026-06-12). The ExecStopPost
    #      path passes --force: keepalived is gone there, so a lingering
    #      VIP no longer implies mastership.
    # Gluster replica-3-arbiter on ten provides write-quorum: during a true
    # pi1↔pi2 partition, the side that can still reach ten gets writes; the
    # other side gets EROFS and its services crash cleanly — no corruption.
    - name: Create notify protocol library
      ansible.builtin.copy:
        dest: /etc/keepalived/notify_lib.sh
        mode: '0644'
        content: |
          #!/bin/bash
          # Shared protocol for keepalived notify handlers (sourced, not run).
          # Mastership is read from live VIP ownership — kernel state that
          # keepalived updates BEFORE invoking notify scripts. A handler that
          # re-reads it under its service lock always converges to the latest
          # transition; kernel state cannot land out of order the way a
          # recorded state file racing concurrent notify writers can.
          vip_present() {
            [ -n "$(ip -o addr show to {{ vip }}/32)" ]
          }

          # Single source of truth for the active-passive service set:
          # <unit> <data-dir (sentinel home)> <health-url> <timeout-s> <probe-interval-s>
          SERVICES="
          nexus /mnt/data/nexus http://localhost:8081/service/rest/v1/status 180 10
          minio /var/lib/minio/data http://localhost:9000/minio/health/cluster 90 5
          "

          # Run "$1 <svc args>" for every service in parallel; nonzero if any failed.
          for_each_service() {
            local cmd=$1 rc=0 pids=() svc dir url timeout interval
            while read -r svc dir url timeout interval; do
              [ -n "$svc" ] || continue
              "$cmd" "$svc" "$dir" "$url" "$timeout" "$interval" &
              pids+=($!)
            done <<< "$SERVICES"
            for p in "${pids[@]}"; do
              wait "$p" || rc=1
            done
            return "$rc"
          }

    - name: Create per-service takeover script
      ansible.builtin.copy:
        dest: /etc/keepalived/service_master.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Usage: service_master.sh <unit> <data-dir> <health-url> <timeout-s> <probe-interval-s>
          set +e
          . /etc/keepalived/notify_lib.sh
          SVC=$1; DATA_DIR=$2; HEALTH_URL=$3; TIMEOUT=$4; INTERVAL=$5
          TAG="${SVC}-keepalived"
          HOSTNAME=$(hostname)
          SENTINEL="${DATA_DIR}/.active-on-${HOSTNAME}"

          # Vagrant flows deploy keepalived without every service installed.
          systemctl cat "$SVC" >/dev/null 2>&1 || { logger -t "$TAG" "unit $SVC not installed — skipping"; exit 0; }

          # Serialize against the backup handler for this service; a queued
          # stale handler re-reads VIP ownership under the lock and yields.
          # Bounded so a Gluster-wedged peer handler can't park us forever.
          exec 9>"/run/lock/keepalived-${SVC}.lock"
          flock -w 300 9 || { logger -t "$TAG" "ERROR: lock timeout for $SVC"; exit 1; }

          if ! vip_present; then
            logger -t "$TAG" "skip takeover on $HOSTNAME: VIP not held"
            exit 0
          fi
          logger -t "$TAG" "notify_master: taking over $SVC on $HOSTNAME"

          # Refuse a missing data dir — mkdir here would shadow an unmounted
          # Gluster mountpoint with an empty rootfs dir and start the service
          # against it.
          [ -d "$DATA_DIR" ] || { logger -t "$TAG" "ERROR: data dir $DATA_DIR missing (unmounted?)"; exit 1; }

          # Stale sentinels from other hosts should have been removed by
          # their notify_backup; log and continue — service-level locks are
          # the backstop.
          for stale in "$DATA_DIR"/.active-on-*; do
            [ -e "$stale" ] || continue
            [ "$stale" = "$SENTINEL" ] || logger -t "$TAG" "WARN: stale sentinel $stale"
          done
          touch "$SENTINEL"

          # --no-block: a Gluster stall can wedge a forking start for up to
          # TimeoutStartSec while we hold the service lock; the loop below
          # gates readiness and stays abortable.
          systemctl start --no-block "$SVC"

          # Readiness wait: recheck VIP ownership every second (the wait must
          # not outlive a MASTER->BACKUP flip) and fail fast on a failed unit
          # (start-limit-hit is reported nowhere else with --no-block).
          elapsed=0
          while [ "$elapsed" -lt "$TIMEOUT" ]; do
            if ! vip_present; then
              logger -t "$TAG" "VIP lost during $SVC takeover on $HOSTNAME — yielding"
              exit 0
            fi
            if systemctl is-failed --quiet "$SVC"; then
              logger -t "$TAG" "ERROR: $SVC entered failed state during takeover"
              exit 1
            fi
            if [ $((elapsed % INTERVAL)) -eq 0 ] && curl -sf -o /dev/null -m 3 "$HEALTH_URL"; then
              logger -t "$TAG" "$SVC on $HOSTNAME is ready"
              exit 0
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          logger -t "$TAG" "ERROR: $SVC on $HOSTNAME not ready in ${TIMEOUT}s"
          exit 1

    - name: Create per-service release script
      ansible.builtin.copy:
        dest: /etc/keepalived/service_backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Usage: service_backup.sh <unit> <data-dir> [ignored extra args]
          # RELEASE_FORCE=--force (ExecStopPost path) skips the master-again
          # gate: keepalived is gone there, so a lingering VIP no longer
          # implies mastership.
          set +e
          . /etc/keepalived/notify_lib.sh
          SVC=$1; DATA_DIR=$2
          TAG="${SVC}-keepalived"
          HOSTNAME=$(hostname)

          systemctl cat "$SVC" >/dev/null 2>&1 || { logger -t "$TAG" "unit $SVC not installed — skipping"; exit 0; }

          exec 9>"/run/lock/keepalived-${SVC}.lock"
          flock -w 300 9 || { logger -t "$TAG" "ERROR: lock timeout for $SVC"; exit 1; }

          if [ "${RELEASE_FORCE:-}" != "--force" ] && vip_present; then
            logger -t "$TAG" "skip release on $HOSTNAME: VIP held (master again)"
            exit 0
          fi
          logger -t "$TAG" "notify_backup: releasing $SVC on $HOSTNAME"
          systemctl stop "$SVC"
          rm -f "${DATA_DIR}/.active-on-${HOSTNAME}"
          if systemctl is-active --quiet "$SVC"; then
            logger -t "$TAG" "ERROR: $SVC still active after stop on $HOSTNAME"
            exit 1
          fi

    # Remove the old hand-duplicated per-service scripts (nexus_*/minio_*),
    # now superseded by the parameterized service_master.sh/service_backup.sh
    # driven from the SERVICES table in notify_lib.sh.
    - name: Remove superseded per-service notify scripts
      ansible.builtin.file:
        path: "/etc/keepalived/{{ item }}"
        state: absent
      loop:
        - nexus_master.sh
        - nexus_backup.sh
        - minio_master.sh
        - minio_backup.sh

    # Combined master/backup helpers — keepalived's notify_* directives
    # take a single script path, but we coordinate multiple active-passive
    # services. Each combined script converges all services in PARALLEL:
    # a slow Nexus takeover must not delay MinIO by up to 180s, which is
    # how the 2026-06-12 stale-takeover happened.
    - name: Create combined notify_master script
      ansible.builtin.copy:
        dest: /etc/keepalived/active_services_master.sh
        mode: '0755'
        content: |
          #!/bin/bash
          . /etc/keepalived/notify_lib.sh
          for_each_service /etc/keepalived/service_master.sh

    - name: Create combined notify_backup script
      ansible.builtin.copy:
        dest: /etc/keepalived/active_services_backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # --force (ExecStopPost path): unconditional release — keepalived
          # is gone, a lingering VIP no longer implies mastership.
          RELEASE_FORCE="${1:-}"
          export RELEASE_FORCE
          . /etc/keepalived/notify_lib.sh
          for_each_service /etc/keepalived/service_backup.sh

    # Ensure Nexus + MinIO are stopped whenever Keepalived stops
    # (systemctl stop, daemon crash, OOM, etc.) — notify_backup only
    # fires on VRRP state transitions, not on daemon exit. Without
    # this, stopping keepalived on the active Pi leaves the active
    # services running while the other Pi takes VIP and starts its
    # own copies — both race on cluster locks.
    - name: Systemd drop-in dir for keepalived
      ansible.builtin.file:
        path: /etc/systemd/system/keepalived.service.d
        state: directory
        mode: '0755'

    - name: Drop-in to release active-passive services on keepalived stop
      ansible.builtin.copy:
        dest: /etc/systemd/system/keepalived.service.d/release-active-services.conf
        mode: '0644'
        content: |
          [Service]
          ExecStopPost=/etc/keepalived/active_services_backup.sh --force
      notify:
        - Reload systemd
        - Restart Keepalived

    # Remove the old Nexus-only drop-in if it's still around — replaced
    # by release-active-services.conf above.
    - name: Remove obsolete stop-nexus drop-in
      ansible.builtin.file:
        path: /etc/systemd/system/keepalived.service.d/stop-nexus.conf
        state: absent
      notify:
        - Reload systemd
        - Restart Keepalived

    - name: Write Keepalived config
      ansible.builtin.copy:
        dest: /etc/keepalived/keepalived.conf
        mode: '0644'
        content: |
          global_defs {
            router_id {{ inventory_hostname }}
            script_user root
            enable_script_security
          }

          vrrp_script check_services {
            script "/etc/keepalived/check_services.sh"
            interval 5
            weight -50
            fall 3
            rise 2
          }

          vrrp_instance PI_VIP {
            state {{ vrrp_state }}
            interface {{ vrrp_interface }}
            virtual_router_id {{ vrrp_router_id }}
            priority {{ vrrp_priority }}
            advert_int 1
            nopreempt

            # Unicast VRRP — multicast may not cross Vagrant/libvirt bridged
            # private networks; unicast explicitly targets the peer IP on the
            # same interface so elections work reliably in both Vagrant and
            # production (where multicast works but unicast is no-cost).
            unicast_src_ip {{ peer_src_ip }}
            unicast_peer {
              {{ peer_other_ip }}
            }

            authentication {
              auth_type PASS
              auth_pass {{ vrrp_password }}
            }

            virtual_ipaddress {
              {{ vip }}/{{ vip_cidr }}
            }

            track_script {
              check_services
            }

            notify_master "/etc/keepalived/active_services_master.sh"
            notify_backup "/etc/keepalived/active_services_backup.sh"
            notify_fault "/etc/keepalived/active_services_backup.sh"
          }
      notify: Restart Keepalived

    - name: Enable and start Keepalived
      ansible.builtin.systemd:
        name: keepalived
        enabled: true
        state: started
        daemon_reload: true

    # Fire any pending keepalived restart NOW, not at end of play — the
    # converge + verify tasks below must assert the post-restart steady
    # state, not a snapshot the restart immediately invalidates.
    - name: Apply pending keepalived restarts before converging
      ansible.builtin.meta: flush_handlers

    # Notify handlers only fire on VRRP transitions, so redeploying the
    # scripts (or a past stale handler leaving a service running on the
    # passive Pi) leaves service state unconverged until the next failover.
    # Each handler self-gates on live VIP ownership under its service lock,
    # so running both per service makes exactly the matching one act.
    - name: Converge active-passive services to current VIP ownership
      ansible.builtin.shell: |
        set -eo pipefail
        . /etc/keepalived/notify_lib.sh
        converge_one() {
          /etc/keepalived/service_master.sh "$@" && /etc/keepalived/service_backup.sh "$@"
        }
        for_each_service converge_one
      changed_when: false

    # Don't trust the converge scripts' exit codes alone — assert the end
    # state: services active exactly on the VIP holder. Budget must cover a
    # cold async start: when converge runs during the post-restart VRRP
    # election (VIP momentarily on neither node), it skips starting, and
    # keepalived's own notify_master does the cold start afterwards — a JVM
    # Nexus can take the full takeover envelope (180s) to report active.
    - name: Verify active-passive services match VIP ownership
      ansible.builtin.shell: |
        set -eo pipefail
        . /etc/keepalived/notify_lib.sh
        if vip_present; then want=active; else want=inactive; fi
        while read -r svc _rest; do
          [ -n "$svc" ] || continue
          systemctl cat "$svc" >/dev/null 2>&1 || { echo "SKIP: $svc not installed"; continue; }
          if systemctl is-active --quiet "$svc"; then got=active; else got=inactive; fi
          if [ "$got" != "$want" ]; then
            echo "MISMATCH: $svc is $got, want $want"
            exit 1
          fi
        done <<< "$SERVICES"
        echo "OK: active-passive services match VIP ownership ($want)"
      register: _ap_state
      changed_when: false
      retries: 36
      delay: 5
      until: _ap_state.rc == 0

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart Keepalived
      ansible.builtin.systemd:
        name: keepalived
        state: restarted

# ─── Verify ─────────────────────────────────────────────────────────────────
- name: Verify Keepalived
  hosts: pi1,pi2
  become: true
  gather_facts: false

  vars:
    vip: "{{ keepalived_vip | default('192.168.11.5') }}"

  tasks:
    - name: Check Keepalived status  # noqa: command-instead-of-module
      ansible.builtin.shell: |
        set -o pipefail
        systemctl is-active keepalived && ip addr show | grep {{ vip }} || echo "VIP not on this node"
      register: keepalived_status
      changed_when: false

    - name: Print status
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }}: {{ keepalived_status.stdout }}

- name: Verify VIP reachable
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    vip: "{{ keepalived_vip | default('192.168.11.5') }}"

  tasks:
    - name: Wait for VRRP election
      ansible.builtin.pause:
        seconds: 5

    - name: Ping VIP
      ansible.builtin.shell: |
        ping -c 2 -W 2 {{ vip }}
      changed_when: false

    # VRRP election + notify_master Nexus bootstrap + Forgejo readiness can
    # all happen concurrently after keepalived restart. 2 min budget.
    - name: Check Forgejo via VIP
      ansible.builtin.uri:
        url: "http://{{ vip }}:3000/api/v1/version"
        status_code: 200
      register: forgejo_vip
      retries: 24
      delay: 5
      until: forgejo_vip.status == 200

    - name: Check Keycloak via VIP
      ansible.builtin.uri:
        url: "http://{{ vip }}:8080/realms/master"
        status_code: 200
      register: keycloak_vip

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Keepalived Setup — Complete
          ============================================
          VIP {{ vip }} is active
          Forgejo:  {{ forgejo_vip.status }}
          Keycloak: {{ keycloak_vip.status }}
          ============================================
