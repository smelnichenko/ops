---
# Setup Keepalived for floating VIP between pi1 and pi2
#
# Provides a single stable IP (192.168.11.5) that floats between Pis.
# All services (Forgejo, Keycloak, MinIO, Postgres) are reached via VIP.
# If the active Pi dies, the other grabs the VIP in ~3 seconds.
#
# Prerequisites:
#   - Both Pis running with services installed
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-keepalived.yml

- name: Setup Keepalived
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    vip: "{{ keepalived_vip | default('192.168.11.5') }}"
    vip_cidr: 24
    vrrp_router_id: 51
    vrrp_password: "{{ keepalived_vrrp_password }}"
    # pi1 is master (higher priority), pi2 is backup
    vrrp_priority: "{{ 150 if inventory_hostname == 'pi1' else 100 }}"
    # Both start as BACKUP — higher priority wins MASTER. nopreempt requires this.
    vrrp_state: BACKUP
    # Unicast VRRP: explicit source + peer on the private-network IPs.
    peer_src_ip: "{{ ansible_host }}"
    peer_other_ip: "{{ hostvars['pi2']['ansible_host'] if inventory_hostname == 'pi1' else hostvars['pi1']['ansible_host'] }}"

  tasks:
    - name: Discover VRRP interface (the one carrying ansible_host)
      ansible.builtin.shell: |
        set -eo pipefail
        ip -o -4 addr show | awk -v ip="{{ ansible_host }}" '$4 ~ "^"ip"/" {print $2; exit}'
      register: _vrrp_iface
      changed_when: false

    - name: Set vrrp_interface fact
      ansible.builtin.set_fact:
        vrrp_interface: "{{ _vrrp_iface.stdout | trim }}"

    - name: Fail if we couldn't find the interface
      ansible.builtin.assert:
        that: vrrp_interface | length > 0
        fail_msg: "Could not find an interface with IP {{ ansible_host }}"

    - name: Install Keepalived
      ansible.builtin.apt:
        name: keepalived
        state: present

    - name: Allow VRRP through UFW
      community.general.ufw:
        rule: allow
        proto: vrrp
        from_ip: 192.168.11.0/24
        comment: "VRRP protocol"

    - name: Create health check script
      ansible.builtin.copy:
        dest: /etc/keepalived/check_services.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Check critical services — if any fails, reduce priority to trigger failover.
          # Nexus and MinIO are intentionally excluded: they're controlled by
          # notify_master / notify_backup scripts below, not by this health probe.
          # (They're stopped on the BACKUP Pi, so probing them there would
          # always fail and pin the VIP to the MASTER incorrectly.)

          # Forgejo
          curl -sf -o /dev/null -m 3 http://localhost:3000/api/v1/version || exit 1

          # Keycloak
          curl -sf -o /dev/null -m 3 http://localhost:8080/realms/master || exit 1

          # Patroni
          curl -sf -o /dev/null -m 3 http://localhost:8008/health || exit 1

          exit 0

    # Active-passive controller scripts (Nexus + MinIO). Same safety
    # model for both:
    #   1. VRRP election: exactly one Pi holds VIP in the common case
    #   2. <data-dir>/.active-on-<hostname> sentinel: informational +
    #      split-brain detector; notify_master logs a warning if another
    #      host's sentinel exists
    #   3. Service-level lock: Nexus's H2 (/mnt/data/nexus/db/nexus.lock.db)
    #      refuses concurrent starts. MinIO's xl-single doesn't have an
    #      equivalent fencing primitive — we rely on layers 1+2 plus the
    #      systemd unit's StartLimitBurst=3 cap as a backstop.
    #   4. Desired-state file + per-service flock: handlers converge to the
    #      LATEST VRRP state. The combined notify script records the new
    #      state in /run/keepalived-active.state before dispatching; every
    #      handler re-reads it under the service lock and yields if it no
    #      longer matches. Without this, a master handler stuck in its
    #      readiness wait can outlive a MASTER->BACKUP flip and start its
    #      service on the now-passive Pi (dual-active MinIO, 2026-06-12).
    # Gluster replica-3-arbiter on ten provides write-quorum: during a true
    # pi1↔pi2 partition, the side that can still reach ten gets writes; the
    # other side gets EROFS and its services crash cleanly — no corruption.
    - name: Create notify protocol library
      ansible.builtin.copy:
        dest: /etc/keepalived/notify_lib.sh
        mode: '0644'
        content: |
          #!/bin/bash
          # Shared protocol for keepalived notify handlers (sourced, not run).
          # The combined notify scripts write the state file BEFORE dispatching
          # handlers; handlers re-read it under their per-service lock, so the
          # LATEST VRRP state always wins even when a slow handler outlives a
          # flip. The VIP fallback is only for an absent file (fresh boot or
          # first deploy of this protocol).
          STATE_FILE=/run/keepalived-active.state

          vip_present() {
            ip -o addr show | grep -qF " {{ vip }}/"
          }

          desired_state() {
            if [ -f "$STATE_FILE" ]; then cat "$STATE_FILE"
            elif vip_present; then echo MASTER
            else echo BACKUP; fi
          }

          # Master handlers require BOTH the recorded state and live VIP
          # ownership: keepalived assigns the VIP before notify_master and
          # removes it before notify_backup, so a legitimate master always
          # sees both. This neutralizes a stale MASTER state value in the
          # dangerous (service-starting) direction.
          is_master_ok() {
            [ "$(desired_state)" = "MASTER" ] && vip_present
          }

          # Unique tmp per writer: concurrent writers sharing one tmp name
          # truncate each other and one rename lands the other's content.
          write_state() {
            local tmp="${STATE_FILE}.$$"
            echo "$1" > "$tmp"
            mv -f "$tmp" "$STATE_FILE"
          }

    - name: Create Nexus notify_master script
      ansible.builtin.copy:
        dest: /etc/keepalived/nexus_master.sh
        mode: '0755'
        content: |
          #!/bin/bash
          set +e
          . /etc/keepalived/notify_lib.sh
          HOSTNAME=$(hostname)
          SENTINEL="/mnt/data/nexus/.active-on-${HOSTNAME}"

          # Serialize against the backup handler for this service; a queued
          # stale handler re-reads desired state under the lock and yields.
          exec 9>/run/lock/keepalived-nexus.lock
          flock 9

          if ! is_master_ok; then
            logger -t nexus-keepalived "skip takeover on $HOSTNAME: not master (state=$(desired_state))"
            exit 0
          fi
          logger -t nexus-keepalived "notify_master: taking over Nexus on $HOSTNAME"

          # Detect stale sentinels from other hosts (they should have been
          # removed by notify_backup; if not, log and continue — Nexus's H2
          # lock will refuse the start if another instance actually has it).
          for stale in $(ls /mnt/data/nexus/.active-on-* 2>/dev/null); do
            case "$stale" in
              "$SENTINEL") ;;
              *) logger -t nexus-keepalived "WARN: stale sentinel $stale" ;;
            esac
          done

          mkdir -p /mnt/data/nexus
          touch "$SENTINEL"
          # --no-block: a Gluster stall can wedge the forking start for up to
          # TimeoutStartSec (300s) while we hold the service lock; the
          # readiness loop below does the gating and stays abortable.
          systemctl start --no-block nexus

          # Bounded readiness wait; recheck mastership every second so the
          # wait never outlives a MASTER->BACKUP flip.
          elapsed=0
          while [ "$elapsed" -lt 180 ]; do
            if ! is_master_ok; then
              logger -t nexus-keepalived "state changed during Nexus takeover on $HOSTNAME — yielding"
              exit 0
            fi
            if [ $((elapsed % 10)) -eq 0 ] && curl -sf -o /dev/null -m 3 http://localhost:8081/service/rest/v1/status; then
              logger -t nexus-keepalived "Nexus on $HOSTNAME is ready"
              exit 0
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          logger -t nexus-keepalived "WARN: Nexus on $HOSTNAME didn't become ready in 180s"

    - name: Create Nexus notify_backup / notify_fault script
      ansible.builtin.copy:
        dest: /etc/keepalived/nexus_backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          set +e
          . /etc/keepalived/notify_lib.sh
          HOSTNAME=$(hostname)

          exec 9>/run/lock/keepalived-nexus.lock
          flock 9

          if [ "$(desired_state)" = "MASTER" ] && vip_present; then
            logger -t nexus-keepalived "skip release on $HOSTNAME: master again"
            exit 0
          fi
          logger -t nexus-keepalived "notify_backup: releasing Nexus on $HOSTNAME"
          systemctl stop nexus
          rm -f "/mnt/data/nexus/.active-on-${HOSTNAME}"
          if systemctl is-active --quiet nexus; then
            logger -t nexus-keepalived "ERROR: Nexus still active after stop on $HOSTNAME"
            exit 1
          fi

    # MinIO active-passive controller scripts (same pattern as Nexus).
    # Safety layers:
    #   1. VRRP election: exactly one Pi holds VIP in the common case
    #   2. /var/lib/minio/data/.active-on-<hostname> sentinel
    #   3. MinIO's xl-single .minio.sys/format.json embeds a unique
    #      cluster ID; concurrent starts on the same data dir would
    #      have to write competing format files, but on shared Gluster
    #      the second writer just sees the first's UUID and proceeds —
    #      we rely on layers (1) + (2) here, plus the StartLimitBurst=3
    #      cap in the systemd unit if something goes wrong.
    - name: Create MinIO notify_master script
      ansible.builtin.copy:
        dest: /etc/keepalived/minio_master.sh
        mode: '0755'
        content: |
          #!/bin/bash
          set +e
          . /etc/keepalived/notify_lib.sh
          HOSTNAME=$(hostname)
          SENTINEL="/var/lib/minio/data/.active-on-${HOSTNAME}"

          exec 9>/run/lock/keepalived-minio.lock
          flock 9

          if ! is_master_ok; then
            logger -t minio-keepalived "skip takeover on $HOSTNAME: not master (state=$(desired_state))"
            exit 0
          fi
          logger -t minio-keepalived "notify_master: taking over MinIO on $HOSTNAME"

          for stale in $(ls /var/lib/minio/data/.active-on-* 2>/dev/null); do
            case "$stale" in
              "$SENTINEL") ;;
              *) logger -t minio-keepalived "WARN: stale sentinel $stale" ;;
            esac
          done

          mkdir -p /var/lib/minio/data
          touch "$SENTINEL"
          systemctl start --no-block minio

          elapsed=0
          while [ "$elapsed" -lt 90 ]; do
            if ! is_master_ok; then
              logger -t minio-keepalived "state changed during MinIO takeover on $HOSTNAME — yielding"
              exit 0
            fi
            if [ $((elapsed % 5)) -eq 0 ] && curl -sf -o /dev/null -m 3 http://localhost:9000/minio/health/cluster; then
              logger -t minio-keepalived "MinIO on $HOSTNAME is ready"
              exit 0
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          logger -t minio-keepalived "WARN: MinIO on $HOSTNAME didn't become ready in 90s"

    - name: Create MinIO notify_backup / notify_fault script
      ansible.builtin.copy:
        dest: /etc/keepalived/minio_backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          set +e
          . /etc/keepalived/notify_lib.sh
          HOSTNAME=$(hostname)

          exec 9>/run/lock/keepalived-minio.lock
          flock 9

          if [ "$(desired_state)" = "MASTER" ] && vip_present; then
            logger -t minio-keepalived "skip release on $HOSTNAME: master again"
            exit 0
          fi
          logger -t minio-keepalived "notify_backup: releasing MinIO on $HOSTNAME"
          systemctl stop minio
          rm -f "/var/lib/minio/data/.active-on-${HOSTNAME}"
          if systemctl is-active --quiet minio; then
            logger -t minio-keepalived "ERROR: MinIO still active after stop on $HOSTNAME"
            exit 1
          fi

    # Combined master/backup helpers — keepalived's notify_* directives
    # take a single script path, but we have multiple active-passive
    # services to coordinate (Nexus + MinIO). Each combined script
    # records the new desired state (atomic rename — handlers re-read it
    # under their service lock), then converges the services in PARALLEL:
    # a slow Nexus takeover must not delay MinIO by up to 180s, which is
    # how the 2026-06-12 stale-takeover happened. Per-service scripts
    # stay independently testable.
    - name: Create combined notify_master script
      ansible.builtin.copy:
        dest: /etc/keepalived/active_services_master.sh
        mode: '0755'
        content: |
          #!/bin/bash
          . /etc/keepalived/notify_lib.sh
          write_state MASTER
          /etc/keepalived/nexus_master.sh & p1=$!
          /etc/keepalived/minio_master.sh & p2=$!
          rc=0
          wait "$p1" || rc=1
          wait "$p2" || rc=1
          exit "$rc"

    - name: Create combined notify_backup script
      ansible.builtin.copy:
        dest: /etc/keepalived/active_services_backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          . /etc/keepalived/notify_lib.sh
          write_state BACKUP
          /etc/keepalived/nexus_backup.sh & p1=$!
          /etc/keepalived/minio_backup.sh & p2=$!
          rc=0
          wait "$p1" || rc=1
          wait "$p2" || rc=1
          exit "$rc"

    # Ensure Nexus + MinIO are stopped whenever Keepalived stops
    # (systemctl stop, daemon crash, OOM, etc.) — notify_backup only
    # fires on VRRP state transitions, not on daemon exit. Without
    # this, stopping keepalived on the active Pi leaves the active
    # services running while the other Pi takes VIP and starts its
    # own copies — both race on cluster locks.
    - name: Systemd drop-in dir for keepalived
      ansible.builtin.file:
        path: /etc/systemd/system/keepalived.service.d
        state: directory
        mode: '0755'

    - name: Drop-in to release active-passive services on keepalived stop
      ansible.builtin.copy:
        dest: /etc/systemd/system/keepalived.service.d/release-active-services.conf
        mode: '0644'
        content: |
          [Service]
          ExecStopPost=/etc/keepalived/active_services_backup.sh
      notify:
        - Reload systemd
        - Restart Keepalived

    # Remove the old Nexus-only drop-in if it's still around — replaced
    # by release-active-services.conf above.
    - name: Remove obsolete stop-nexus drop-in
      ansible.builtin.file:
        path: /etc/systemd/system/keepalived.service.d/stop-nexus.conf
        state: absent
      notify:
        - Reload systemd
        - Restart Keepalived

    - name: Write Keepalived config
      ansible.builtin.copy:
        dest: /etc/keepalived/keepalived.conf
        mode: '0644'
        content: |
          global_defs {
            router_id {{ inventory_hostname }}
            script_user root
            enable_script_security
          }

          vrrp_script check_services {
            script "/etc/keepalived/check_services.sh"
            interval 5
            weight -50
            fall 3
            rise 2
          }

          vrrp_instance PI_VIP {
            state {{ vrrp_state }}
            interface {{ vrrp_interface }}
            virtual_router_id {{ vrrp_router_id }}
            priority {{ vrrp_priority }}
            advert_int 1
            nopreempt

            # Unicast VRRP — multicast may not cross Vagrant/libvirt bridged
            # private networks; unicast explicitly targets the peer IP on the
            # same interface so elections work reliably in both Vagrant and
            # production (where multicast works but unicast is no-cost).
            unicast_src_ip {{ peer_src_ip }}
            unicast_peer {
              {{ peer_other_ip }}
            }

            authentication {
              auth_type PASS
              auth_pass {{ vrrp_password }}
            }

            virtual_ipaddress {
              {{ vip }}/{{ vip_cidr }}
            }

            track_script {
              check_services
            }

            notify_master "/etc/keepalived/active_services_master.sh"
            notify_backup "/etc/keepalived/active_services_backup.sh"
            notify_fault "/etc/keepalived/active_services_backup.sh"
          }
      notify: Restart Keepalived

    - name: Enable and start Keepalived
      ansible.builtin.systemd:
        name: keepalived
        enabled: true
        state: started
        daemon_reload: true

    # Notify handlers only fire on VRRP transitions, so redeploying the
    # scripts (or a past stale handler leaving a service running on the
    # passive Pi) leaves service state unconverged until the next failover.
    # Run each handler pair directly — NOT the combined scripts, which would
    # overwrite the notify-written state file with a snapshot that can go
    # stale mid-deploy. Every handler self-gates on the recorded state under
    # its service lock (VIP fallback only when the file is absent), so the
    # matching one of each pair acts and the other yields.
    - name: Converge active-passive services to current VIP ownership
      ansible.builtin.shell: |
        set -eo pipefail
        /etc/keepalived/nexus_master.sh
        /etc/keepalived/nexus_backup.sh
        /etc/keepalived/minio_master.sh
        /etc/keepalived/minio_backup.sh
      changed_when: false

    # Don't trust the converge scripts' exit codes alone — assert the end
    # state: services active exactly on the VIP holder. Retries cover a
    # Nexus start still in flight (forking unit, up to ~180s readiness).
    - name: Verify active-passive services match VIP ownership
      ansible.builtin.shell: |
        set -eo pipefail
        if ip -o addr show | grep -qF " {{ vip }}/"; then want=active; else want=inactive; fi
        for svc in nexus minio; do
          if systemctl is-active --quiet "$svc"; then got=active; else got=inactive; fi
          if [ "$got" != "$want" ]; then
            echo "MISMATCH: $svc is $got, want $want"
            exit 1
          fi
        done
        echo "OK: nexus and minio are $want, matching VIP ownership"
      register: _ap_state
      changed_when: false
      retries: 40
      delay: 5
      until: _ap_state.rc == 0

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart Keepalived
      ansible.builtin.systemd:
        name: keepalived
        state: restarted

# ─── Verify ─────────────────────────────────────────────────────────────────
- name: Verify Keepalived
  hosts: pi1,pi2
  become: true
  gather_facts: false

  vars:
    vip: "{{ keepalived_vip | default('192.168.11.5') }}"

  tasks:
    - name: Check Keepalived status  # noqa: command-instead-of-module
      ansible.builtin.shell: |
        set -o pipefail
        systemctl is-active keepalived && ip addr show | grep {{ vip }} || echo "VIP not on this node"
      register: keepalived_status
      changed_when: false

    - name: Print status
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }}: {{ keepalived_status.stdout }}

- name: Verify VIP reachable
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    vip: "{{ keepalived_vip | default('192.168.11.5') }}"

  tasks:
    - name: Wait for VRRP election
      ansible.builtin.pause:
        seconds: 5

    - name: Ping VIP
      ansible.builtin.shell: |
        ping -c 2 -W 2 {{ vip }}
      changed_when: false

    # VRRP election + notify_master Nexus bootstrap + Forgejo readiness can
    # all happen concurrently after keepalived restart. 2 min budget.
    - name: Check Forgejo via VIP
      ansible.builtin.uri:
        url: "http://{{ vip }}:3000/api/v1/version"
        status_code: 200
      register: forgejo_vip
      retries: 24
      delay: 5
      until: forgejo_vip.status == 200

    - name: Check Keycloak via VIP
      ansible.builtin.uri:
        url: "http://{{ vip }}:8080/realms/master"
        status_code: 200
      register: keycloak_vip

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Keepalived Setup — Complete
          ============================================
          VIP {{ vip }} is active
          Forgejo:  {{ forgejo_vip.status }}
          Keycloak: {{ keycloak_vip.status }}
          ============================================
