---
# Host-level kernel hardening for crash recovery and forensics.
#
# Background: ten has hard-locked four times in 19 days (Apr 9/11/12/25),
# each time leaving the journal cut off mid-line, the NIC echoing TCP
# SYN+ACK from interrupt context, and userspace dead. Power button
# (short press) goes through the ACPI → logind → systemd path which is
# wedged with the rest of the kernel; only a long-press / hard reset
# recovers, and no panic trace survives.
#
# This playbook installs two passive backstops:
# - efi_pstore: panic kmsg lands in EFI NVRAM, readable next boot via
#   /sys/fs/pstore (systemd-pstore.service then archives it under
#   /var/lib/systemd/pstore/).
# - systemd hardware watchdog: PID 1 pets /dev/watchdog0 (iTCO_wdt in
#   the Intel PCH) every 30s; if the scheduler wedges and PID 1 stops,
#   the chipset hard-resets the box after 60s. Self-recovery without a
#   physical long-press.
#
# Plus, after empirical evidence the watchdog alone wasn't enough
# (May 5-6 hang: systemd kept petting the chip while the rest of the
# kernel was wedged for 32+ hours, pstore empty because no panic ever
# fired):
# - kernel.hung_task_panic=1 + hung_task_timeout_secs=300 — D-state
#   tasks stuck >5min trigger panic. 5 min instead of default 2 min
#   to avoid false-tripping on legit slow I/O (PG checkpoints, scylla
#   compactions, layer extracts).
# - kernel.softlockup_panic=1 — CPU stuck in kernel mode >20s panics.
#
# Not included:
# - kdump / kexec — heavier (reserves a crash kernel at boot); pstore
#   captures enough to debug a recurring same-bug crash.
#
# Usage:
#   task deploy:host-hardening

- name: Host-level crash-recovery hardening
  hosts: target
  become: true
  gather_facts: false

  tasks:
    - name: Persist efi_pstore module load on boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/pstore.conf
        mode: '0644'
        content: |
          efi_pstore
      register: _pstore_conf

    - name: Load efi_pstore now
      community.general.modprobe:
        name: efi_pstore
        state: present
        persistent: present

    - name: Ensure /etc/systemd/system.conf.d exists
      ansible.builtin.file:
        path: /etc/systemd/system.conf.d
        state: directory
        mode: '0755'

    - name: Drop in systemd RuntimeWatchdogSec=60s
      ansible.builtin.copy:
        dest: /etc/systemd/system.conf.d/watchdog.conf
        mode: '0644'
        content: |
          [Manager]
          RuntimeWatchdogSec=60s
          RebootWatchdogSec=10min
      register: _watchdog_conf

    - name: Re-exec systemd to pick up watchdog drop-in
      ansible.builtin.command: systemctl daemon-reexec
      when: _watchdog_conf.changed
      changed_when: true

    - name: Verify watchdog is armed
      ansible.builtin.shell: |
        set -e
        # systemd reports its own perception of the watchdog via show
        ts=$(systemctl show -p RuntimeWatchdogUSec --value)
        echo "RuntimeWatchdogUSec=$ts"
        # iTCO driver also exposes timeout in /sys
        if [ -e /sys/class/watchdog/watchdog0/timeout ]; then
          echo "watchdog0 timeout=$(cat /sys/class/watchdog/watchdog0/timeout)s"
        fi
      register: _wd_verify
      changed_when: false

    - name: Show watchdog state
      ansible.builtin.debug:
        msg: "{{ _wd_verify.stdout_lines }}"

    - name: Verify pstore filesystem mounted
      ansible.builtin.shell: |
        if mountpoint -q /sys/fs/pstore; then
          echo "pstore mounted; backends: $(ls /sys/fs/pstore/ 2>/dev/null | head -5 || echo empty)"
        else
          echo "pstore not mounted"
          exit 1
        fi
      register: _pstore_verify
      changed_when: false

    - name: Show pstore state
      ansible.builtin.debug:
        msg: "{{ _pstore_verify.stdout }}"

    # ================================================================
    # Panic-on-hang sysctls — turn the soft hangs into auto-rebooting
    # panics so pstore captures a trace and the watchdog isn't the
    # only safety net.
    # ================================================================

    - name: Drop in panic-on-hang sysctls
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-panic-on-hang.conf
        mode: '0644'
        content: |
          # Soft-CPU lockup (kernel-mode stuck >20s) → panic
          kernel.softlockup_panic = 1
          # Task in D-state >hung_task_timeout_secs → panic
          kernel.hung_task_panic = 1
          # Conservative threshold (default 120s) — legit slow I/O on
          # PG checkpoints / Scylla compactions / containerd layer
          # extracts can briefly D-state a kworker; 300s gives them
          # headroom while still catching a real wedge well before the
          # 32-hour outage we just had.
          kernel.hung_task_timeout_secs = 300
      register: _panic_sysctl

    - name: Apply panic sysctls now
      ansible.builtin.command: sysctl --system
      when: _panic_sysctl.changed
      changed_when: true

    - name: Verify panic sysctls live
      ansible.builtin.shell: |
        sysctl kernel.softlockup_panic kernel.hung_task_panic kernel.hung_task_timeout_secs kernel.panic kernel.panic_on_oops
      register: _panic_verify
      changed_when: false

    - name: Show panic sysctls
      ansible.builtin.debug:
        msg: "{{ _panic_verify.stdout_lines }}"

    # ================================================================
    # Cleanup: zombie forgejo-runner left behind by Plan 017
    # (Woodpecker CI migration). Unit references a wrapper script that
    # was deleted; systemd has been crash-looping it every 10s ever
    # since (~10k restarts/day, ~56k+ counter). Pure noise that makes
    # the journal hard to read post-crash.
    # ================================================================

    - name: Stop and disable forgejo-runner.service
      ansible.builtin.systemd:
        name: forgejo-runner.service
        state: stopped
        enabled: false
      register: _fr_stop
      failed_when:
        - _fr_stop.failed
        - "'Could not find the requested service' not in (_fr_stop.msg | default(''))"

    - name: Remove forgejo-runner unit file
      ansible.builtin.file:
        path: /etc/systemd/system/forgejo-runner.service
        state: absent
      register: _fr_unit

    - name: Remove forgejo-runner binary
      ansible.builtin.file:
        path: /usr/local/bin/forgejo-runner
        state: absent

    - name: daemon-reload after unit removal
      ansible.builtin.systemd:
        daemon_reload: true
      when: _fr_unit.changed
