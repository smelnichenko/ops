---
# Host-level kernel hardening for crash recovery and forensics.
#
# Background: ten has hard-locked four times in 19 days (Apr 9/11/12/25),
# each time leaving the journal cut off mid-line, the NIC echoing TCP
# SYN+ACK from interrupt context, and userspace dead. Power button
# (short press) goes through the ACPI → logind → systemd path which is
# wedged with the rest of the kernel; only a long-press / hard reset
# recovers, and no panic trace survives.
#
# This playbook installs two passive backstops:
# - efi_pstore: panic kmsg lands in EFI NVRAM, readable next boot via
#   /sys/fs/pstore (systemd-pstore.service then archives it under
#   /var/lib/systemd/pstore/).
# - systemd hardware watchdog: PID 1 pets /dev/watchdog0 (iTCO_wdt in
#   the Intel PCH) every 30s; if the scheduler wedges and PID 1 stops,
#   the chipset hard-resets the box after 60s. Self-recovery without a
#   physical long-press.
#
# Plus, after empirical evidence the watchdog alone wasn't enough
# (May 5-6 hang: systemd kept petting the chip while the rest of the
# kernel was wedged for 32+ hours, pstore empty because no panic ever
# fired):
# - kernel.hung_task_panic=1 + hung_task_timeout_secs=300 — D-state
#   tasks stuck >5min trigger panic. 5 min instead of default 2 min
#   to avoid false-tripping on legit slow I/O (PG checkpoints, scylla
#   compactions, layer extracts).
# - kernel.softlockup_panic=1 — CPU stuck in kernel mode >20s panics.
#
# Storage workaround (decommissioned 2026-05-08):
# Both Samsung 980 PRO 1TB drives were on firmware 1B2QGXA7, whose
# APST/D3 power-state machine deadlocked the controller (823 unsafe
# shutdowns / 1,323 power-on hours on the data drive — one hang every
# ~1.6h). Fix was nvme_core.default_ps_max_latency_us=0 on the kernel
# cmdline. Drives have since been flashed to 5B2QGXA7 (fumagician,
# in place); this playbook now ensures the workaround is REMOVED from
# any host that still has it, so APST returns to default behaviour on
# the next reboot. Kept the removal task so converging an existing
# tenʼs grub config is idempotent.
#
# Not included:
# - kdump / kexec — heavier (reserves a crash kernel at boot); pstore
#   captures enough to debug a recurring same-bug crash.
#
# Usage:
#   task deploy:host-hardening

- name: Host-level crash-recovery hardening
  hosts: target
  become: true
  gather_facts: false

  vars:
    smartctl_exporter_version: "0.14.0"
    smartctl_exporter_port: 9633
    # Bind to the node's LAN IP, not 0.0.0.0; nftables blocks LAN-external
    # access. Cluster Prometheus scrapes via Service + Endpoints (defined
    # in schnappy-observability chart).
    smartctl_exporter_bind: "{{ node_ip_override | default('192.168.11.2') }}"
    smartctl_exporter_release_base: "https://github.com/prometheus-community/smartctl_exporter/releases/download"
    smartctl_exporter_archive_name: "smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64.tar.gz"

  tasks:
    - name: Detect EFI firmware (efi_pstore is a no-op without it)
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: _efi

    - name: Persist efi_pstore module load on boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/pstore.conf
        mode: '0644'
        content: |
          efi_pstore
      when: _efi.stat.exists
      register: _pstore_conf

    - name: Load efi_pstore now
      community.general.modprobe:
        name: efi_pstore
        state: present
        persistent: present
      when: _efi.stat.exists

    - name: Ensure /etc/systemd/system.conf.d exists
      ansible.builtin.file:
        path: /etc/systemd/system.conf.d
        state: directory
        mode: '0755'

    - name: Drop in systemd RuntimeWatchdogSec=60s
      ansible.builtin.copy:
        dest: /etc/systemd/system.conf.d/watchdog.conf
        mode: '0644'
        content: |
          [Manager]
          RuntimeWatchdogSec=60s
          RebootWatchdogSec=10min
      notify: Re-exec systemd

    - name: Verify watchdog is armed
      ansible.builtin.shell: |
        set -e
        # systemd reports its own perception of the watchdog via show
        ts=$(systemctl show -p RuntimeWatchdogUSec --value)
        echo "RuntimeWatchdogUSec=$ts"
        # iTCO driver also exposes timeout in /sys
        if [ -e /sys/class/watchdog/watchdog0/timeout ]; then
          echo "watchdog0 timeout=$(cat /sys/class/watchdog/watchdog0/timeout)s"
        fi
      register: _wd_verify
      changed_when: false

    - name: Show watchdog state
      ansible.builtin.debug:
        msg: "{{ _wd_verify.stdout_lines }}"

    - name: Verify pstore filesystem mounted
      ansible.builtin.shell: |
        set -o pipefail
        if mountpoint -q /sys/fs/pstore; then
          echo "pstore mounted; backends: $(ls /sys/fs/pstore/ 2>/dev/null | head -5 || echo empty)"
        else
          echo "pstore not mounted"
          exit 1
        fi
      args:
        executable: /bin/bash
      when: _efi.stat.exists
      register: _pstore_verify
      changed_when: false

    - name: Show pstore state
      ansible.builtin.debug:
        msg: "{{ _pstore_verify.stdout | default('skipped (no EFI)') }}"

    # ================================================================
    # Panic-on-hang sysctls — turn the soft hangs into auto-rebooting
    # panics so pstore captures a trace and the watchdog isn't the
    # only safety net.
    # ================================================================

    - name: Drop in panic-on-hang sysctls
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-panic-on-hang.conf
        mode: '0644'
        content: |
          # Soft-CPU lockup (kernel-mode stuck >20s) → panic
          kernel.softlockup_panic = 1
          # Task in D-state >hung_task_timeout_secs → panic
          kernel.hung_task_panic = 1
          # Conservative threshold (default 120s) — legit slow I/O on
          # PG checkpoints / Scylla compactions / containerd layer
          # extracts can briefly D-state a kworker; 300s gives them
          # headroom while still catching a real wedge well before the
          # 32-hour outage we just had.
          kernel.hung_task_timeout_secs = 300
      notify: Reload sysctl

    # Force the handler to fire here so the verify task below sees the
    # post-reload values; default behaviour runs handlers at end of play.
    - name: Flush handlers before sysctl verification
      ansible.builtin.meta: flush_handlers

    - name: Verify panic sysctls live
      ansible.builtin.shell: |
        set -o pipefail
        sysctl kernel.softlockup_panic kernel.hung_task_panic kernel.hung_task_timeout_secs kernel.panic kernel.panic_on_oops
      args:
        executable: /bin/bash
      register: _panic_verify
      changed_when: false

    - name: Show panic sysctls
      ansible.builtin.debug:
        msg: "{{ _panic_verify.stdout_lines }}"

    # ================================================================
    # Network + filesystem tunings.
    # Re-codifies /etc/sysctl.d/90-network.conf — previously written
    # by an older playbook (gone since the k3s→kubeadm migration) so the
    # file became orphaned. Original buffers were sized for the 10 GbE
    # x550-T2 NIC; ten now runs an i350-T2 (1 GbE) so the caps are
    # rescaled. Also fixes a typo (`-net.netfilter.nf_conntrack_max`,
    # leading dash made sysctl silently ignore it) and drops K3s-era
    # comments. kubeadm essentials (bridge-nf-call, ip_forward, aio,
    # max_map_count) live separately in /etc/sysctl.d/99-kubernetes.conf
    # via setup-kubeadm.yml — these two files coexist (99 wins on any
    # duplicate key but there are none).
    # ================================================================

    - name: Drop in network + fs tunings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-network.conf
        mode: '0644'
        content: |
          # Managed by ops/deploy/ansible/playbooks/setup-host-hardening.yml
          # Sized for 1 GbE i350 NIC; bump max buffers if upgrading to faster link.

          # Core network buffers — caps, kernel allocates per-socket as needed
          net.core.rmem_max          = 4194304
          net.core.wmem_max          = 4194304
          net.core.rmem_default      = 524288
          net.core.wmem_default      = 524288
          net.core.netdev_max_backlog = 4096
          net.core.somaxconn         = 32768
          net.core.optmem_max        = 524288

          # TCP — BBR congestion control + reasonable buffer ranges (1 GbE BDP
          # over a 50 ms RTT internet path ≈ 6 MiB; cap of 4 MiB covers most
          # sessions, larger isn't useful at this link speed)
          net.ipv4.tcp_rmem                  = 4096 524288 4194304
          net.ipv4.tcp_wmem                  = 4096 524288 4194304
          net.ipv4.tcp_congestion_control    = bbr
          net.ipv4.tcp_slow_start_after_idle = 0
          net.ipv4.tcp_mtu_probing           = 1
          net.ipv4.tcp_tw_reuse              = 1
          net.ipv4.tcp_fin_timeout           = 30
          net.ipv4.tcp_max_syn_backlog       = 16384
          net.ipv4.ip_local_port_range       = 1024 65535

          # Conntrack — kubeadm + Cilium can churn entries on heavy pod turnover
          net.netfilter.nf_conntrack_max = 1048576

          # Filesystem — k8s controllers + watchers
          fs.inotify.max_user_instances = 1024
          fs.inotify.max_user_watches   = 1048576

          # VM
          vm.swappiness = 10
      notify: Reload sysctl

    # ================================================================
    # Strip the legacy NVMe APST workaround
    # (nvme_core.default_ps_max_latency_us=0). It was added to defeat
    # the Samsung 980 PRO 1B2QGXA7 firmware bug; with the drives now on
    # 5B2QGXA7 (fixed) the workaround is harmful in name only — costs
    # a few watts of idle draw. Idempotent: no-op if the param isn't
    # in /etc/default/grub.
    # ================================================================

    - name: Strip nvme_core.default_ps_max_latency_us=0 from GRUB cmdline if present
      ansible.builtin.shell: |
        set -euo pipefail
        if grep -qE 'GRUB_CMDLINE_LINUX="[^"]*nvme_core\.default_ps_max_latency_us=0' /etc/default/grub; then
          sed -i.bak 's| *nvme_core\.default_ps_max_latency_us=0||g' /etc/default/grub
          echo STRIPPED
        else
          echo NOOP
        fi
      args:
        executable: /bin/bash
      register: _grub_strip
      changed_when: "_grub_strip.stdout == 'STRIPPED'"
      notify:
        - Update grub
        - Reboot reminder for cmdline change

    # Regenerate grub.cfg now rather than at end of play: if a later
    # task aborts the play, handlers never fire — and a re-run sees the
    # param already stripped (NOOP), so the notify never re-triggers
    # and grub.cfg stays out of sync with /etc/default/grub.
    - name: Flush handlers after GRUB cmdline strip
      ansible.builtin.meta: flush_handlers

    # ================================================================
    # Cleanup: zombie forgejo-runner left behind by Plan 017
    # (Woodpecker CI migration). Unit references a wrapper script that
    # was deleted; systemd has been crash-looping it every 10s ever
    # since (~10k restarts/day, ~56k+ counter). Pure noise that makes
    # the journal hard to read post-crash.
    # ================================================================

    - name: Stop and disable forgejo-runner.service
      ansible.builtin.systemd:
        name: forgejo-runner.service
        state: stopped
        enabled: false
      register: _fr_stop
      failed_when:
        - _fr_stop.failed
        - "'Could not find the requested service' not in (_fr_stop.msg | default(''))"

    - name: Remove forgejo-runner unit file
      ansible.builtin.file:
        path: /etc/systemd/system/forgejo-runner.service
        state: absent
      notify: Reload systemd daemon

    - name: Remove forgejo-runner binary
      ansible.builtin.file:
        path: /usr/local/bin/forgejo-runner
        state: absent

    # ================================================================
    # Disable unused radios. ten has Intel onboard WiFi (`iwlwifi` /
    # `iwlmvm`, surfaces as `wlo1` — currently link-down, never used)
    # and a full Bluetooth stack (`bluetooth` core + 5 vendor HCI
    # modules). The mt7921u USB dongle (separate hardware, used for
    # the WiFi AP bridge `br0`) shares cfg80211/mac80211 with iwlwifi
    # but doesn't depend on it, so unloading iwlwifi is safe.
    # Saves ~1 W idle, a bit more under load — these subsystems run
    # background timers + hold PCI/USB devices in higher D-states.
    # ================================================================

    - name: Blacklist unused radio modules
      ansible.builtin.copy:
        dest: /etc/modprobe.d/disable-unused-radios.conf
        mode: '0644'
        content: |
          # Managed by ops/deploy/ansible/playbooks/setup-host-hardening.yml
          # ten doesn't use onboard WiFi (wlo1 stays down) or Bluetooth.
          # USB WiFi dongle for AP bridge uses mt7921u + cfg80211/mac80211
          # which are unaffected by these blacklists.
          blacklist iwlmvm
          blacklist iwlwifi
          blacklist btusb
          blacklist btintel
          blacklist btrtl
          blacklist btbcm
          blacklist btmtk
          blacklist bluetooth
          blacklist ecdh_generic

    # Order matters: leaves first, then their dependencies. Each step
    # is idempotent — community.general.modprobe state=absent is a no-op
    # if the module isn't loaded.
    - name: Unload bluetooth HCI leaf modules
      community.general.modprobe:
        name: "{{ item }}"
        state: absent
      loop:
        - btusb
        - btintel
        - btrtl
        - btbcm
        - btmtk
      failed_when: false  # vendor modules may be absent on different kernels

    - name: Unload bluetooth core
      community.general.modprobe:
        name: bluetooth
        state: absent
      failed_when: false

    - name: Unload ecdh_generic (only consumer was bluetooth)
      community.general.modprobe:
        name: ecdh_generic
        state: absent
      failed_when: false

    - name: Unload iwlwifi stack
      community.general.modprobe:
        name: "{{ item }}"
        state: absent
      loop:
        - iwlmvm
        - iwlwifi
      failed_when: false

    # ================================================================
    # smartctl_exporter — surface NVMe SMART (Unsafe Shutdowns,
    # Media Errors, wear, temps) to Prometheus. Without this we had no
    # visibility into the firmware bug on the 980 PROs until the unsafe
    # shutdown counter had ticked 823 times. Cluster scrape config +
    # alert + dashboard live in the schnappy-observability chart.
    # ================================================================

    - name: Ensure smartmontools (provides smartctl binary)
      ansible.builtin.apt:
        name: smartmontools
        state: present
        update_cache: false

    - name: Check installed smartctl_exporter version
      ansible.builtin.shell: |
        set -o pipefail
        /usr/local/bin/smartctl_exporter --version 2>&1 | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1
      args:
        executable: /bin/bash
      register: _smartctl_version
      changed_when: false
      failed_when: false

    - name: Download + install smartctl_exporter
      ansible.builtin.unarchive:
        src: "{{ smartctl_exporter_release_base }}/v{{ smartctl_exporter_version }}/{{ smartctl_exporter_archive_name }}"
        dest: /tmp/
        remote_src: true
        creates: "/tmp/smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64/smartctl_exporter"
      when: _smartctl_version.stdout != smartctl_exporter_version

    - name: Move smartctl_exporter into place
      ansible.builtin.copy:
        src: "/tmp/smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64/smartctl_exporter"
        dest: /usr/local/bin/smartctl_exporter
        remote_src: true
        mode: '0755'
        owner: root
        group: root
      when: _smartctl_version.stdout != smartctl_exporter_version
      register: _smartctl_bin

    # Discover stable per-drive identifiers (model+serial via /dev/disk/by-id)
    # so the exporter's `device` label is invariant across NVMe rename churn.
    # Without this, kernel device names (nvme0/nvme1) swap between physical
    # drives across reboots, which makes PromQL increase() over counters
    # produce huge spurious values when the label re-binds to a different
    # drive (the May 8 fumagician + reboots produced false
    # SmartctlExcessivePowerCycles alerts of ~3800/24h vs the real ~10).
    # Filter:
    #   - prefer model-serial paths (nvme-Samsung_SSD_*, ata-MODEL_*)
    #   - skip partition aliases (-part*)
    #   - skip the duplicate _1 alias
    #   - skip eui.* (cryptic, less useful in alert text)
    - name: Discover stable by-id paths for SMART-capable drives
      ansible.builtin.shell: |
        set -o pipefail
        for f in /dev/disk/by-id/nvme-* /dev/disk/by-id/ata-*; do
          [ -e "$f" ] || continue
          bn=$(basename "$f")
          case "$bn" in
            *-part*|*_1|*_1-*|nvme-eui.*) continue ;;
          esac
          echo "$f"
        done | sort -u
      args:
        executable: /bin/bash
      register: _smartctl_devices
      changed_when: false

    - name: Write smartctl_exporter systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/smartctl_exporter.service
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus smartctl_exporter
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          # Needs root for SMART access; smartctl uses ioctl on /dev/nvme*
          User=root
          Group=root
          # --no-smartctl.scan + explicit per-drive --smartctl.device flags
          # lock the `device` label to /dev/disk/by-id/<model>-<serial>, which
          # is stable across reboots regardless of kernel enumeration order.
          # Auto-scan would (additionally) pick the same drives up under
          # nvme0/nvme1 short names → duplicate metrics; explicit list avoids that.
          ExecStart=/usr/local/bin/smartctl_exporter \
            --web.listen-address={{ smartctl_exporter_bind }}:{{ smartctl_exporter_port }} \
            --smartctl.interval=60s \
            --no-smartctl.scan \
          {% for dev in _smartctl_devices.stdout_lines %}
            --smartctl.device={{ dev }}{% if not loop.last %} \{% endif %}

          {% endfor %}
          Restart=on-failure
          RestartSec=10s
          # Hardening
          NoNewPrivileges=true
          ProtectSystem=strict
          ProtectHome=true
          PrivateTmp=true
          ProtectKernelTunables=true
          ProtectControlGroups=true

          [Install]
          WantedBy=multi-user.target
      register: _smartctl_unit

    - name: Enable + start smartctl_exporter
      ansible.builtin.systemd:
        name: smartctl_exporter
        enabled: true
        state: "{{ 'restarted' if (_smartctl_bin.changed or _smartctl_unit.changed) else 'started' }}"
        daemon_reload: true

    - name: Verify smartctl_exporter is serving metrics
      ansible.builtin.uri:
        url: "http://{{ smartctl_exporter_bind }}:{{ smartctl_exporter_port }}/metrics"
        return_content: true
      register: _smartctl_check
      retries: 5
      delay: 2
      until: _smartctl_check.status == 200

    - name: Show first SMART metric line (proof scrape works)
      ansible.builtin.debug:
        msg: "{{ _smartctl_check.content.split('\n')
              | select('match', '^smartctl_device') | first
              | default('no smartctl_ metrics yet') }}"

  handlers:
    - name: Re-exec systemd
      ansible.builtin.systemd:
        daemon_reexec: true

    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Update grub
      ansible.builtin.command: update-grub
      changed_when: true

    - name: Reboot reminder for cmdline change
      ansible.builtin.debug:
        msg: |
          GRUB cmdline updated — APST workaround removed.
          REBOOT REQUIRED for change to take effect.
          After reboot verify with:  cat /proc/cmdline   (should NOT contain nvme_core.default_ps_max_latency_us)
          And:  sudo nvme get-feature /dev/nvme0 -f 0x0c   # value should be back to 0x1 (APST enabled)

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
