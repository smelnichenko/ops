---
# Setup Velero + Backup MinIO for k8s cluster backups
#
# Prerequisites:
#   - k3s running (setup-k3s.yml)
#   - /mnt/backups mounted (backup partition)
#
# Environment variables required:
#   VELERO_MINIO_ACCESS_KEY, VELERO_MINIO_SECRET_KEY
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml
#
- name: Setup Velero + Backup MinIO
  hosts: target
  become: true
  gather_facts: false

  vars:
    velero_namespace: velero
    velero_chart_version: "11.4.0"
    velero_backup_path: "/mnt/backups/minio"
    velero_minio_storage_size: "100Gi"
    velero_minio_access_key: "{{ lookup('env', 'VELERO_MINIO_ACCESS_KEY') | default('velero-admin', true) }}"
    velero_minio_secret_key: "{{ lookup('env', 'VELERO_MINIO_SECRET_KEY') }}"
    minio_image: "quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z"
    # Git mirror: push repo to Pi as additional backup
    git_mirror_enabled: true
    git_mirror_host: "git.pmon.dev"
    git_mirror_repo: "{{ lookup('env', 'FORGEJO_ADMIN_USER') | default('admin', true) }}/monitor"
    git_mirror_user: "{{ lookup('env', 'FORGEJO_ADMIN_USER') | default('admin', true) }}"
    git_mirror_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') | default('', true) }}"
    git_mirror_local_path: "/var/lib/git-mirror/monitor.git"

  tasks:
    # ================================================================
    # Phase 1: Create namespace and backup directory
    # ================================================================

    - name: Create velero namespace
      ansible.builtin.shell: |
        cat <<'EOF' | k3s kubectl apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ velero_namespace }}
          labels:
            pod-security.kubernetes.io/enforce: privileged
            pod-security.kubernetes.io/audit: privileged
            pod-security.kubernetes.io/warn: privileged
        EOF
      changed_when: false

    - name: Create backup directory on host
      ansible.builtin.file:
        path: "{{ velero_backup_path }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    # ================================================================
    # Phase 2: Deploy Backup MinIO (HostPath for predictable location)
    # ================================================================

    - name: Deploy backup MinIO
      ansible.builtin.shell: |
        cat <<'EOF' | k3s kubectl apply -f -
        ---
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: minio-backup-pv
          labels:
            app: minio-backup
        spec:
          capacity:
            storage: {{ velero_minio_storage_size }}
          accessModes:
            - ReadWriteOnce
          storageClassName: manual
          hostPath:
            path: {{ velero_backup_path }}
            type: DirectoryOrCreate
          persistentVolumeReclaimPolicy: Retain
        ---
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: minio-backup-pvc
          namespace: {{ velero_namespace }}
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: manual
          resources:
            requests:
              storage: {{ velero_minio_storage_size }}
          selector:
            matchLabels:
              app: minio-backup
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: minio-backup-secret
          namespace: {{ velero_namespace }}
        type: Opaque
        stringData:
          MINIO_ROOT_USER: "{{ velero_minio_access_key }}"
          MINIO_ROOT_PASSWORD: "{{ velero_minio_secret_key }}"
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: minio-backup
          namespace: {{ velero_namespace }}
          labels:
            app: minio-backup
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: minio-backup
          template:
            metadata:
              labels:
                app: minio-backup
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                fsGroupChangePolicy: OnRootMismatch
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: minio
                  image: {{ minio_image }}
                  command: ["minio", "server", "/data", "--console-address", ":9001"]
                  envFrom:
                    - secretRef:
                        name: minio-backup-secret
                  ports:
                    - containerPort: 9000
                      name: api
                    - containerPort: 9001
                      name: console
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                  resources:
                    requests:
                      cpu: 50m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 1Gi
                  volumeMounts:
                    - name: data
                      mountPath: /data
                  livenessProbe:
                    httpGet:
                      path: /minio/health/live
                      port: 9000
                    initialDelaySeconds: 10
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /minio/health/ready
                      port: 9000
                    initialDelaySeconds: 5
                    periodSeconds: 10
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: minio-backup-pvc
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: minio-backup
          namespace: {{ velero_namespace }}
        spec:
          selector:
            app: minio-backup
          ports:
            - name: api
              port: 9000
              targetPort: 9000
            - name: console
              port: 9001
              targetPort: 9001
        EOF
      changed_when: false

    - name: Wait for backup MinIO to be ready
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/minio-backup -n {{ velero_namespace }} --timeout=120s
      changed_when: false

    - name: Create velero bucket in MinIO
      ansible.builtin.shell: |
        # Run mc client as ephemeral pod to create the bucket
        k3s kubectl run minio-setup --rm -i --restart=Never \
          -n {{ velero_namespace }} \
          --image=quay.io/minio/mc:latest \
          --overrides='{
            "spec": {
              "securityContext": {"runAsNonRoot": true, "runAsUser": 1000, "seccompProfile": {"type": "RuntimeDefault"}},
              "containers": [{
                "name": "minio-setup",
                "image": "quay.io/minio/mc:latest",
                "command": ["sh", "-c", "mc alias set backup http://minio-backup.{{ velero_namespace }}.svc:9000 {{ velero_minio_access_key }} {{ velero_minio_secret_key }} && mc mb --ignore-existing backup/velero"],
                "securityContext": {"allowPrivilegeEscalation": false, "capabilities": {"drop": ["ALL"]}}
              }]
            }
          }' 2>&1 || true
      changed_when: false

    # ================================================================
    # Phase 3: Deploy Velero
    # ================================================================

    - name: Add vmware-tanzu Helm repo
      ansible.builtin.shell: |
        helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts 2>/dev/null || true
        helm repo update vmware-tanzu
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Create Velero credentials secret
      ansible.builtin.shell: |
        cat <<EOF | k3s kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: velero-credentials
          namespace: {{ velero_namespace }}
        type: Opaque
        stringData:
          cloud: |
            [default]
            aws_access_key_id={{ velero_minio_access_key }}
            aws_secret_access_key={{ velero_minio_secret_key }}
        EOF
      changed_when: false

    - name: Install Velero CRDs
      ansible.builtin.shell: |
        k3s kubectl apply --server-side -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/backups.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/backupstoragelocations.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/deletebackuprequests.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/downloadrequests.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/podvolumebackups.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/podvolumerestores.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/restores.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/schedules.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/serverstatusrequests.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/volumesnapshotlocations.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/datadownloads.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/datauploads.yaml \
          -f https://raw.githubusercontent.com/vmware-tanzu/helm-charts/main/charts/velero/crds/backuprepositories.yaml
      changed_when: false

    - name: Deploy Velero via Helm
      ansible.builtin.shell: |
        helm upgrade --install velero vmware-tanzu/velero \
          --version {{ velero_chart_version }} \
          --namespace {{ velero_namespace }} \
          --skip-crds \
          --no-hooks \
          --values - <<'HELMEOF'
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.11.1
            volumeMounts:
              - name: plugins
                mountPath: /target
        credentials:
          useSecret: true
          existingSecret: velero-credentials
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero
              config:
                region: us-east-1
                s3ForcePathStyle: "true"
                s3Url: http://minio-backup.{{ velero_namespace }}.svc:9000
          volumeSnapshotLocation: []
          defaultVolumesToFsBackup: true
          features: ""
        deployNodeAgent: true
        snapshotsEnabled: false
        schedules:
          monitor-daily:
            disabled: false
            schedule: "0 2 * * *"
            useOwnerReferencesInBackup: false
            template:
              ttl: 168h
              includedNamespaces:
                - monitor
              defaultVolumesToFsBackup: true
          full-weekly:
            disabled: false
            schedule: "0 3 * * 0"
            useOwnerReferencesInBackup: false
            template:
              ttl: 720h
              includedNamespaces:
                - "*"
              defaultVolumesToFsBackup: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        HELMEOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for Velero deployment to be ready
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/velero -n {{ velero_namespace }} --timeout=120s
      changed_when: false

    # ================================================================
    # Phase 4: Network policies
    # ================================================================

    - name: Apply network policies for velero namespace
      ansible.builtin.shell: |
        cat <<'EOF' | k3s kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: velero-default-deny
          namespace: {{ velero_namespace }}
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
        ---
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: velero-to-minio
          namespace: {{ velero_namespace }}
        spec:
          podSelector:
            matchLabels:
              app: minio-backup
          policyTypes:
            - Ingress
          ingress:
            - from:
                - podSelector: {}
              ports:
                - protocol: TCP
                  port: 9000
        EOF
      changed_when: false

    # ================================================================
    # Phase 5: Offsite backup replication (rsync to Vault Pi)
    # Syncs /mnt/backups/minio → Pi:/mnt/backups/offsite daily at 4 AM
    # Runs after Velero daily (2 AM) and Vault snapshots (every 6h)
    # ================================================================

    - name: Install rsync and git
      ansible.builtin.apt:
        name:
          - rsync
          - git
        state: present
      when: offsite_backup_enabled | default(true) | bool

    - name: Create local git mirror directory
      ansible.builtin.file:
        path: "{{ git_mirror_local_path | dirname }}"
        state: directory
        owner: "{{ offsite_backup_user | default('sm') }}"
        group: "{{ offsite_backup_user | default('sm') }}"
        mode: '0750'
      when: git_mirror_enabled | default(true) | bool

    - name: Initialize local bare mirror from Forgejo
      ansible.builtin.shell: |
        if [ ! -f "{{ git_mirror_local_path }}/HEAD" ]; then
          git clone --mirror \
            "https://{{ git_mirror_user }}:{{ git_mirror_password }}@{{ git_mirror_host }}/{{ git_mirror_repo }}.git" \
            "{{ git_mirror_local_path }}"
          # Add Pi as push target
          git -C "{{ git_mirror_local_path }}" remote add pi \
            "{{ offsite_backup_user | default('sm') }}@{{ offsite_backup_host | default('192.168.11.4') }}:/mnt/backups/git-mirror/monitor.git"
          # Configure SSH key for Pi remote
          git -C "{{ git_mirror_local_path }}" config \
            core.sshCommand "ssh -o StrictHostKeyChecking=no -i {{ offsite_backup_ssh_key | default('/home/sm/.ssh/id_ed25519') }}"
        fi
      become_user: "{{ offsite_backup_user | default('sm') }}"
      register: git_mirror_init
      changed_when: "'Cloning' in git_mirror_init.stdout"
      no_log: true
      when: git_mirror_enabled | default(true) | bool

    - name: Write offsite backup rsync script
      ansible.builtin.copy:
        dest: /usr/local/bin/offsite-backup-sync.sh
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/bin/bash
          # Sync MinIO backup data + git mirror to Vault Pi as offsite copy
          # Runs as root, SSH as {{ offsite_backup_user | default('sm') }}
          set -euo pipefail

          SSH_KEY="{{ offsite_backup_ssh_key | default('/home/sm/.ssh/id_ed25519') }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10 -i $SSH_KEY"
          REMOTE="{{ offsite_backup_user | default('sm') }}@{{ offsite_backup_host | default('192.168.11.4') }}"

          # 1. Rsync MinIO backup data
          logger -t offsite-backup "Starting MinIO rsync to ${REMOTE}"
          rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            "{{ velero_backup_path }}/" "${REMOTE}:/mnt/backups/offsite/" 2>&1 | logger -t offsite-backup
          logger -t offsite-backup "MinIO rsync complete"

          # 2. Git mirror push (fetch from Forgejo, push to Pi)
          # Runs as {{ offsite_backup_user | default('sm') }} who owns the mirror and SSH key
          MIRROR="{{ git_mirror_local_path }}"
          if [ -d "$MIRROR" ]; then
            logger -t offsite-backup "Starting git mirror sync"
            sudo -u {{ offsite_backup_user | default('sm') }} git -C "$MIRROR" fetch --prune origin 2>&1 | logger -t offsite-backup || \
              logger -t offsite-backup "WARNING: git fetch from Forgejo failed (Forgejo down?)"
            sudo -u {{ offsite_backup_user | default('sm') }} git -C "$MIRROR" push --mirror pi 2>&1 | logger -t offsite-backup || \
              logger -t offsite-backup "WARNING: git push to Pi failed"
            logger -t offsite-backup "Git mirror sync complete"
          fi
      when: offsite_backup_enabled | default(true) | bool

    - name: Create offsite backup systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/offsite-backup.service
        mode: '0644'
        content: |
          [Unit]
          Description=Rsync backups to Vault Pi (offsite copy)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/offsite-backup-sync.sh
          TimeoutStartSec=1800
      when: offsite_backup_enabled | default(true) | bool

    - name: Create offsite backup systemd timer (4 AM daily)
      ansible.builtin.copy:
        dest: /etc/systemd/system/offsite-backup.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Daily offsite backup sync

          [Timer]
          OnCalendar=*-*-* 04:00:00
          Persistent=true
          RandomizedDelaySec=300

          [Install]
          WantedBy=timers.target
      when: offsite_backup_enabled | default(true) | bool

    - name: Enable and start offsite backup timer
      ansible.builtin.systemd:
        name: offsite-backup.timer
        enabled: true
        state: started
        daemon_reload: true
      when: offsite_backup_enabled | default(true) | bool

    - name: Display Velero status
      ansible.builtin.debug:
        msg: |
          Velero + Backup MinIO deployed successfully!

          Namespace: {{ velero_namespace }}
          Backup storage: {{ velero_backup_path }}
          MinIO bucket: velero

          Scheduled backups:
            - monitor-daily: 2 AM UTC, monitor namespace, 7-day retention
            - full-weekly: Sunday 3 AM UTC, all namespaces, 30-day retention

          Offsite replication:
            - Target: {{ offsite_backup_host | default('192.168.11.4') }}:/mnt/backups/offsite/
            - Git mirror: {{ offsite_backup_host | default('192.168.11.4') }}:/mnt/backups/git-mirror/monitor.git
            - Schedule: 4 AM daily (systemd timer)
            - Check: systemctl status offsite-backup.timer
            - Manual run: systemctl start offsite-backup.service
            - Logs: journalctl -u offsite-backup.service

          Commands:
            velero backup get
            velero backup create manual-test --include-namespaces monitor
            velero restore create --from-backup manual-test
