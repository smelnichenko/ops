---
# Setup Sonatype Nexus Repository Manager on BOTH Pis (active-passive HA).
#
# Data model:
#   - Binaries at /opt/nexus on both Pis (local, independent installs)
#   - Runtime data at /mnt/data/nexus — a GlusterFS replica-2 volume shared
#     between pi1 + pi2 (blobs + H2 DB live there); see setup-gluster.yml
#   - systemd unit on both Pis, enabled=true but state=stopped
#   - Keepalived's notify_master / notify_backup scripts (see
#     setup-keepalived.yml) arbitrate which Pi runs Nexus — exactly one at a
#     time. A stray concurrent start would corrupt the shared H2 DB.
#
# First-time bootstrap runs on pi1 only: service is started temporarily,
# admin password / EULA / repos are configured via REST, then the service
# is stopped so Keepalived can take over authoritative control.
#
# Requires: nexus_admin_password variable (set in .env or -e flag)
# Idempotent: safe to re-run.
#
# Usage:
#   ansible-playbook -i inventory/vagrant.yml playbooks/setup-nexus.yml
#   ansible-playbook -i inventory/production.yml playbooks/setup-nexus.yml

# ─── Play 1: install binaries + local system state on both Pis ─────────────
- name: Install Nexus on pi1 + pi2
  hosts: pis
  become: true
  gather_facts: true

  vars:
    nexus_version: "3.90.1-01"
    nexus_install_dir: /opt/nexus
    nexus_data_dir: /mnt/data/nexus
    nexus_user: nexus
    # Explicit UID/GID — must match on pi1 + pi2 so the shared Gluster volume's
    # ownership works from either side (same pattern Forgejo uses with 900).
    nexus_uid: 901
    nexus_gid: 901
    nexus_port: 8081
    nexus_docker_port: 8082
    nexus_checksums:
      aarch_64: "sha256:e8aa707821fdf09838b1db5826b21753d926c1f9c692012fe061fba544241ae6"
      x86_64: "sha256:6f3240f34bb46b99d93b2c512333651ea227b4c65248c8154ae275933c320556"

  pre_tasks:
    - name: Wait for SSH to be available
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

  tasks:
    # default-jre-headless pulls JDK 21 on trixie (production pi1) and JDK 17
    # on bookworm (Vagrant box). Nexus 3.90 supports both.
    - name: Install default JRE (headless)
      ansible.builtin.apt:
        name: default-jre-headless
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create nexus group (fixed GID)
      ansible.builtin.group:
        name: "{{ nexus_user }}"
        gid: "{{ nexus_gid }}"
        system: true

    - name: Create nexus user (fixed UID)
      ansible.builtin.user:
        name: "{{ nexus_user }}"
        uid: "{{ nexus_uid }}"
        group: "{{ nexus_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ nexus_data_dir }}"
        create_home: false

    # Align UID/GID if nexus already exists with a different one (same pattern
    # Forgejo uses in setup-gluster.yml).
    - name: Align existing Nexus UID/GID across nodes
      ansible.builtin.shell: |
        CURRENT_UID=$(id -u nexus)
        CURRENT_GID=$(id -g nexus)
        if [ "$CURRENT_UID" != "{{ nexus_uid }}" ] || [ "$CURRENT_GID" != "{{ nexus_gid }}" ]; then
          systemctl stop nexus 2>/dev/null || true
          groupmod -g {{ nexus_gid }} nexus || true
          usermod -u {{ nexus_uid }} -g {{ nexus_gid }} nexus || true
          echo "changed"
        else
          echo "ok"
        fi
      register: nexus_uid_align
      changed_when: "'changed' in nexus_uid_align.stdout"

    - name: Check if Nexus is already installed
      ansible.builtin.stat:
        path: "{{ nexus_install_dir }}/bin/nexus"
      register: nexus_binary

    - name: Check installed Nexus version
      ansible.builtin.slurp:
        src: "{{ nexus_install_dir }}/.version"
      register: nexus_version_file
      failed_when: false
      when: nexus_binary.stat.exists

    - name: Determine architecture for download
      ansible.builtin.set_fact:
        nexus_arch: "{{ 'aarch_64' if ansible_architecture == 'aarch64' else 'x86_64' }}"

    - name: Install Nexus binary
      when: >-
        not nexus_binary.stat.exists or
        nexus_version_file is failed or
        (nexus_version_file.content | default('') | b64decode | trim) != nexus_version
      block:
        - name: Download Nexus tarball
          ansible.builtin.get_url:
            url: "https://download.sonatype.com/nexus/3/nexus-{{ nexus_version }}-linux-{{ nexus_arch }}.tar.gz"
            dest: /tmp/nexus.tar.gz
            checksum: "{{ nexus_checksums[nexus_arch] }}"
            mode: "0644"

        - name: Remove old Nexus install
          ansible.builtin.file:
            path: "{{ nexus_install_dir }}"
            state: absent

        - name: Create install directory
          ansible.builtin.file:
            path: "{{ nexus_install_dir }}"
            state: directory
            owner: "{{ nexus_user }}"
            group: "{{ nexus_user }}"
            mode: "0755"

        - name: Extract Nexus tarball
          ansible.builtin.unarchive:
            src: /tmp/nexus.tar.gz
            dest: /tmp
            remote_src: true

        - name: Move Nexus files to install directory
          ansible.builtin.shell: |
            mv /tmp/nexus-{{ nexus_version }}/* {{ nexus_install_dir }}/
            mv /tmp/nexus-{{ nexus_version }}/.??* {{ nexus_install_dir }}/ 2>/dev/null || true
            rm -rf /tmp/nexus-{{ nexus_version }}
          args:
            removes: /tmp/nexus-{{ nexus_version }}

        - name: Discard extracted sonatype-work (we use shared volume)
          ansible.builtin.file:
            path: /tmp/sonatype-work
            state: absent

        - name: Record installed version
          ansible.builtin.copy:
            dest: "{{ nexus_install_dir }}/.version"
            content: "{{ nexus_version }}"
            owner: "{{ nexus_user }}"
            group: "{{ nexus_user }}"
            mode: "0644"

        - name: Set ownership on install directory
          ansible.builtin.file:
            path: "{{ nexus_install_dir }}"
            state: directory
            owner: "{{ nexus_user }}"
            group: "{{ nexus_user }}"
            recurse: true

        - name: Clean up tarball
          ansible.builtin.file:
            path: /tmp/nexus.tar.gz
            state: absent

    - name: Configure JVM options (karaf data → shared /mnt/data/nexus)
      ansible.builtin.copy:
        dest: "{{ nexus_install_dir }}/bin/nexus.vmoptions"
        owner: "{{ nexus_user }}"
        group: "{{ nexus_user }}"
        mode: "0644"
        content: |
          -Dkaraf.home=.
          -Dkaraf.base=.
          -Dkaraf.etc=etc/karaf
          -Djava.util.logging.config.file=etc/karaf/java.util.logging.properties
          -Dkaraf.data={{ nexus_data_dir }}
          -Dkaraf.log={{ nexus_data_dir }}/log
          -Djava.io.tmpdir={{ nexus_data_dir }}/tmp
          -Dkaraf.startLocalConsole=false
          -Dkaraf.startRemoteShell=false
          -Xms512m
          -Xmx{{ nexus_heap_max | default('4g') }}
          -XX:+UseG1GC
          -XX:MaxDirectMemorySize={{ nexus_direct_memory_max | default('2g') }}

    - name: Create systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/nexus.service
        mode: "0644"
        content: |
          [Unit]
          Description=Sonatype Nexus Repository Manager
          After=network.target
          # RequiresMountsFor delegates the mount-dep chain to systemd's
          # generated mount unit, working whether the mount is in fstab,
          # auto-mounted, or lazily established. More robust than an
          # explicit `Requires=mnt-data-nexus.mount`.
          RequiresMountsFor={{ nexus_data_dir }}
          # Cap the Restart=on-failure loop. If Nexus fails 3 times in
          # 10 minutes, systemd gives up. Prevents an infinite restart
          # storm on the non-VIP Pi if something accidentally starts
          # Nexus there — H2 lock collision would otherwise burn CPU
          # forever. Keepalived's notify_master owns legitimate starts.
          StartLimitIntervalSec=600
          StartLimitBurst=3

          [Service]
          Type=forking
          User={{ nexus_user }}
          Group={{ nexus_user }}
          ExecStart={{ nexus_install_dir }}/bin/nexus start
          # `-` prefix ignores ExecStop's exit status. Nexus's launcher
          # writes an intermediate PID to the pidfile that drifts from
          # the long-running Java Main PID systemd tracks — so when
          # systemd runs `nexus stop`, the wrapper reports "not running"
          # and exits 1 even though the Java process is still there.
          # systemd then SIGTERM-s the Main PID (clean shutdown,
          # exit 143), but marks the unit failed because of the wrapper
          # exit 1. Ignoring the wrapper's exit code lets the unit
          # settle as "inactive" after the Java process terminates.
          ExecStop=-{{ nexus_install_dir }}/bin/nexus stop
          # SIGTERM of the Java process during shutdown is clean.
          SuccessExitStatus=143
          Restart=on-failure
          RestartSec=10
          LimitNOFILE=65536
          TimeoutStartSec=300

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Enable Nexus service (keep stopped — Keepalived drives state)
      ansible.builtin.systemd:
        name: nexus
        enabled: true

    - name: UFW allow Nexus web port IPv4
      community.general.ufw:
        rule: allow
        port: "{{ nexus_port | string }}"
        proto: tcp
        from_ip: 192.168.11.0/24

    - name: UFW allow Nexus docker port IPv4
      community.general.ufw:
        rule: allow
        port: "{{ nexus_docker_port | string }}"
        proto: tcp
        from_ip: 192.168.11.0/24

    - name: UFW allow Nexus web port IPv6
      community.general.ufw:
        rule: allow
        port: "{{ nexus_port | string }}"
        proto: tcp
        from_ip: fd0a:94e6:20b4:9f6b::/64

    - name: UFW allow Nexus docker port IPv6
      community.general.ufw:
        rule: allow
        port: "{{ nexus_docker_port | string }}"
        proto: tcp
        from_ip: fd0a:94e6:20b4:9f6b::/64

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

# ─── Play 2: one-time bootstrap on pi1 only (shared-volume config + REST) ──
# Runs the admin-password reset, EULA acceptance, realm config, and all
# repository provisioning. Data lives in /mnt/data/nexus (Gluster-shared),
# so once pi1 has done it, pi2 sees the same config via the shared volume.
- name: Bootstrap Nexus on pi1 (shared data)
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    nexus_data_dir: /mnt/data/nexus
    nexus_port: 8081
    nexus_docker_port: 8082
    # nexus_admin_password comes from the inventory (vagrant.yml: test default,
    # production.yml: $NEXUS_ADMIN_PASSWORD). One source of truth.

  tasks:
    # On re-runs, the shared volume is already configured. The sentinel
    # is written at the very end of this play, so its presence means the
    # whole bootstrap ran successfully once. We skip to avoid starting
    # Nexus on pi1 here — which would race pi2 for the H2 lock if pi2
    # currently holds the VIP (Keepalived drives who's running).
    - name: Check bootstrap sentinel
      ansible.builtin.stat:
        path: "{{ nexus_data_dir }}/.bootstrap-done"
      register: _bootstrap_sentinel

    - name: Skip bootstrap (already complete on shared volume)
      ansible.builtin.meta: end_play
      when: _bootstrap_sentinel.stat.exists
    # The Gluster mount comes up as root:root by default. Chown the root of
    # the shared volume so nexus can write nexus.pid / lock files in it. This
    # runs from pi1 only because /mnt/data/nexus is shared — pi2 sees the
    # ownership change immediately via Gluster replication.
    - name: Chown Nexus data dir to nexus:nexus (shared via Gluster)
      ansible.builtin.file:
        path: "{{ nexus_data_dir }}"
        state: directory
        owner: nexus
        group: nexus
        mode: "0755"

    - name: Create Nexus data subdirectories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: nexus
        group: nexus
        mode: "0755"
      loop:
        - "{{ nexus_data_dir }}/tmp"
        - "{{ nexus_data_dir }}/etc"
        - "{{ nexus_data_dir }}/log"
        - "{{ nexus_data_dir }}/log/audit"

    - name: Set Nexus port
      ansible.builtin.lineinfile:
        path: "{{ nexus_data_dir }}/etc/nexus.properties"
        regexp: "^application-port="
        line: "application-port={{ nexus_port }}"
        create: true
        owner: nexus
        group: nexus
        mode: "0644"

    - name: Set Nexus context path
      ansible.builtin.lineinfile:
        path: "{{ nexus_data_dir }}/etc/nexus.properties"
        regexp: "^nexus-context-path="
        line: "nexus-context-path=/"
        create: true
        owner: nexus
        group: nexus
        mode: "0644"

    - name: Start Nexus on pi1 for bootstrap (will be stopped after — Keepalived takes over)
      ansible.builtin.systemd:
        name: nexus
        state: started

    - name: Wait for Nexus API
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/status"
        status_code: 200
      register: nexus_health
      until: nexus_health.status == 200
      retries: 60
      delay: 10

    - name: Wait for admin password file or verify configured password works
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          if [ -f "{{ nexus_data_dir }}/admin.password" ]; then
            echo "admin.password file found"
            exit 0
          fi
          HTTP=$(curl -sf -o /dev/null -w '%{http_code}' \
            -u "admin:{{ nexus_admin_password }}" \
            "http://localhost:{{ nexus_port }}/service/rest/v1/status")
          if [ "$HTTP" = "200" ]; then
            echo "auth works with configured password"
            exit 0
          fi
          sleep 5
        done
        echo "FAIL: neither admin.password nor configured password works"
        exit 1
      changed_when: false

    - name: Check initial admin password file
      ansible.builtin.stat:
        path: "{{ nexus_data_dir }}/admin.password"
      register: initial_password_file

    - name: Read initial admin password
      ansible.builtin.slurp:
        src: "{{ nexus_data_dir }}/admin.password"
      register: initial_password
      when: initial_password_file.stat.exists

    - name: Set current password fact
      ansible.builtin.set_fact:
        current_admin_password: "{{ (initial_password.content | b64decode) if initial_password_file.stat.exists else nexus_admin_password }}"

    - name: Change admin password to configured value
      ansible.builtin.shell: |
        HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' \
          -u "admin:{{ current_admin_password }}" \
          -X PUT -H "Content-Type: text/plain" \
          -d "{{ nexus_admin_password }}" \
          "http://localhost:{{ nexus_port }}/service/rest/v1/security/users/admin/change-password")
        echo "Password change HTTP status: $HTTP_CODE"
        [ "$HTTP_CODE" = "204" ]
      register: password_change
      changed_when: "'204' in password_change.stdout"
      when: initial_password_file.stat.exists

    - name: Delete initial admin password file
      ansible.builtin.file:
        path: "{{ nexus_data_dir }}/admin.password"
        state: absent
      when: initial_password_file.stat.exists

    - name: Get EULA status
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/system/eula"
        method: GET
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        return_content: true
      register: eula_status

    - name: Accept EULA
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/system/eula"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          accepted: true
          disclaimer: "{{ eula_status.json.disclaimer }}"
        status_code: [204]
      when: not eula_status.json.accepted

    - name: Enable anonymous read
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/security/anonymous"
        method: PUT
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          enabled: true
          userId: anonymous
          realmName: NexusAuthorizingRealm
        status_code: [200]

    - name: Get active realms
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/security/realms/active"
        method: GET
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        return_content: true
      register: active_realms

    - name: Enable Docker Bearer Token Realm
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/security/realms/active"
        method: PUT
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body: "{{ (active_realms.json + ['DockerToken']) | unique | list }}"
        status_code: [204]
      when: "'DockerToken' not in active_realms.json"

    - name: List existing repositories
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories"
        method: GET
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        return_content: true
      register: existing_repos

    - name: Set existing_repo_names fact
      ansible.builtin.set_fact:
        existing_repo_names: "{{ existing_repos.json | map(attribute='name') | list }}"

    - name: Create docker-hub proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/docker/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: docker-hub
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://registry-1.docker.io", contentMaxAge: 10080, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 60 }
          httpClient: { blocked: false, autoBlock: true }
          docker: { v1Enabled: false, forceBasicAuth: false }
          dockerProxy:
            indexType: HUB
            indexUrl: "https://index.docker.io/"
            cacheForeignLayers: true
            foreignLayerUrlWhitelist: [".*"]
        status_code: [201]
      when: "'docker-hub' not in existing_repo_names"

    - name: Create docker-elastic proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/docker/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: docker-elastic
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://docker.elastic.co", contentMaxAge: 10080, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 1440 }
          httpClient: { blocked: false, autoBlock: true }
          docker: { v1Enabled: false, forceBasicAuth: false }
          dockerProxy: { indexType: REGISTRY }
        status_code: [201]
      when: "'docker-elastic' not in existing_repo_names"

    - name: Create docker-quay proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/docker/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: docker-quay
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://quay.io", contentMaxAge: 10080, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 1440 }
          httpClient: { blocked: false, autoBlock: true }
          docker: { v1Enabled: false, forceBasicAuth: false }
          dockerProxy: { indexType: REGISTRY }
        status_code: [201]
      when: "'docker-quay' not in existing_repo_names"

    - name: Create docker-group
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/docker/group"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: docker-group
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          group: { memberNames: [docker-hub, docker-elastic, docker-quay] }
          docker: { v1Enabled: false, forceBasicAuth: false, httpPort: "{{ nexus_docker_port }}" }
        status_code: [201]
      when: "'docker-group' not in existing_repo_names"

    - name: Create maven-central proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/maven/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: maven-central
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://repo1.maven.org/maven2/", contentMaxAge: 10080, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 1440 }
          httpClient: { blocked: false, autoBlock: true }
          maven: { versionPolicy: RELEASE, layoutPolicy: PERMISSIVE }
        status_code: [201]
      when: "'maven-central' not in existing_repo_names"

    - name: Create maven-public group
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/maven/group"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: maven-public
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          group: { memberNames: [maven-central] }
          maven: { versionPolicy: RELEASE, layoutPolicy: PERMISSIVE }
        status_code: [201]
      when: "'maven-public' not in existing_repo_names"

    - name: Create npm-registry proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/npm/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: npm-registry
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://registry.npmjs.org/", contentMaxAge: 10080, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 1440 }
          httpClient: { blocked: false, autoBlock: true }
        status_code: [201]
      when: "'npm-registry' not in existing_repo_names"

    - name: Create npm-public group
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/npm/group"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: npm-public
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          group: { memberNames: [npm-registry] }
        status_code: [201]
      when: "'npm-public' not in existing_repo_names"

    - name: Create pypi-proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/pypi/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: pypi-proxy
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://pypi.org/", contentMaxAge: 10080, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 1440 }
          httpClient: { blocked: false, autoBlock: true }
        status_code: [201]
      when: "'pypi-proxy' not in existing_repo_names"

    - name: Create pypi-public group
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/pypi/group"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: pypi-public
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          group: { memberNames: [pypi-proxy] }
        status_code: [201]
      when: "'pypi-public' not in existing_repo_names"

    - name: Create gradle-distributions raw proxy
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories/raw/proxy"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: gradle-distributions
          online: true
          storage: { blobStoreName: default, strictContentTypeValidation: true }
          proxy: { remoteUrl: "https://services.gradle.org", contentMaxAge: -1, metadataMaxAge: 1440 }
          negativeCache: { enabled: true, timeToLive: 1440 }
          httpClient: { blocked: false, autoBlock: true }
        status_code: [201]
      when: "'gradle-distributions' not in existing_repo_names"

    - name: Create cleanup policy for cached content
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/cleanup-policies"
        method: POST
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: cleanup-cached-30d
          format: ALL_FORMATS
          notes: "Delete cached content not downloaded in 30 days"
          criteria: { lastDownloaded: 30 }
        status_code: [200, 201, 400, 404]

    - name: Show repository status
      ansible.builtin.uri:
        url: "http://localhost:{{ nexus_port }}/service/rest/v1/repositories"
        method: GET
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: true
        return_content: true
      register: final_repos

    - name: Bootstrap summary
      ansible.builtin.debug:
        msg: "Nexus bootstrap on pi1 complete — {{ final_repos.json | length }} repos provisioned. Stopping service so Keepalived can own start/stop."

    # Clean shutdown so the H2 DB releases locks — Keepalived's notify_master
    # on the VIP-holding Pi will start Nexus next.
    - name: Stop Nexus on pi1 (Keepalived will start it on whichever Pi holds the VIP)
      ansible.builtin.systemd:
        name: nexus
        state: stopped

    - name: Write bootstrap sentinel (shared volume — visible to both Pis)
      ansible.builtin.file:
        path: "{{ nexus_data_dir }}/.bootstrap-done"
        state: touch
        owner: nexus
        group: nexus
        mode: "0644"
