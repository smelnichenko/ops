---
# Setup replication between two Pis
#
# Configures:
#   - Postgres streaming replication (pi1 primary → pi2 replica)
#   - MinIO site replication (bi-directional)
#   - Forgejo mirror (pi1 → pi2 post-receive hook)
#
# Prerequisites:
#   - setup-pi-services.yml completed on both Pis
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-pi-replication.yml

# ─── Postgres: create replication user on pi1 ────────────────────────────────
- name: "Postgres: configure primary (pi1)"
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    peer_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"

  tasks:
    - name: Create replication user
      ansible.builtin.shell: |
        sudo -u postgres psql -c "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'replicator') THEN
              CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD '{{ pg_repl_password | default('changeme') }}';
            END IF;
          END
          \$\$;
        "
      changed_when: true

    - name: Verify primary is accepting connections
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -c "SELECT pg_is_in_recovery();" -t | grep -q f && echo "primary OK"
      changed_when: false

# ─── Postgres: setup streaming replica on pi2 ───────────────────────────────
- name: "Postgres: configure replica (pi2)"
  hosts: pi2
  become: true
  gather_facts: false

  vars:
    primary_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"

  tasks:
    - name: Check if already a replica
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -c "SELECT pg_is_in_recovery();" -t 2>/dev/null | grep -q t && echo "already-replica" || echo "standalone"
      register: pg_mode
      changed_when: false

    - name: Stop Postgres on pi2
      ansible.builtin.systemd:
        name: postgresql
        state: stopped
      when: pg_mode.stdout | trim == "standalone"

    - name: Find Postgres data directory
      ansible.builtin.shell: |
        set -o pipefail
        ls -d /var/lib/postgresql/*/main | head -1
      register: pg_data
      changed_when: false

    - name: Clear data and replicate from pi1
      ansible.builtin.shell: |
        rm -rf {{ pg_data.stdout }}/*
        PGPASSWORD={{ pg_repl_password | default('changeme') }} pg_basebackup \
          -h {{ primary_ip }} \
          -U replicator \
          -D {{ pg_data.stdout }} \
          -Fp -Xs -R -P
        chown -R postgres:postgres {{ pg_data.stdout }}
      when: pg_mode.stdout | trim == "standalone"
      changed_when: true

    - name: Start Postgres replica
      ansible.builtin.systemd:
        name: postgresql
        state: started
      when: pg_mode.stdout | trim == "standalone"

    - name: Wait for replica to catch up
      ansible.builtin.pause:
        seconds: 5

    - name: Verify replica is in recovery mode
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u postgres psql -c "SELECT pg_is_in_recovery();" -t | grep -q t && echo "replica OK"
      register: replica_check
      changed_when: false

    - name: Assert replica works
      ansible.builtin.assert:
        that: "'replica OK' in replica_check.stdout"
        fail_msg: "Postgres replica not in recovery mode"

# ─── MinIO: site replication ─────────────────────────────────────────────────
- name: "MinIO: configure site replication"
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    minio_user: "{{ minio_root_user | default('velero-admin') }}"
    minio_pw: "{{ minio_root_password | default(minio_password | default('changeme')) }}"

  tasks:
    - name: Clean mc config
      ansible.builtin.file:
        path: /tmp/.mc
        state: absent

    - name: Setup mc aliases
      ansible.builtin.shell: |
        HOME=/tmp mc alias set pi1 http://{{ pi1_ip }}:9000 {{ minio_user }} '{{ minio_pw }}'
        HOME=/tmp mc alias set pi2 http://{{ pi2_ip }}:9000 {{ minio_user }} '{{ minio_pw }}'
      changed_when: true
      no_log: true

    - name: Check if site replication already configured
      ansible.builtin.shell: |
        HOME=/tmp mc admin replicate info pi1 2>/dev/null && echo "already-configured" || echo "not-configured"
      register: minio_repl_check
      changed_when: false
      no_log: true

    - name: Clear pi2 MinIO buckets for initial replication
      ansible.builtin.shell: |
        HOME=/tmp mc alias set pi2 http://{{ pi2_ip }}:9000 {{ minio_user }} '{{ minio_pw }}' 2>/dev/null
        HOME=/tmp mc rb --force pi2/velero 2>/dev/null || true
        HOME=/tmp mc rb --force pi2/pg-dump 2>/dev/null || true
      when: "'not-configured' in minio_repl_check.stdout"
      changed_when: true
      no_log: true

    - name: Configure MinIO site replication
      ansible.builtin.shell: |
        HOME=/tmp mc admin replicate add pi1 pi2
      when: "'not-configured' in minio_repl_check.stdout"
      changed_when: true

    - name: Verify site replication
      ansible.builtin.shell: |
        echo "test-replication-$(date +%s)" > /tmp/repl-test.txt
        HOME=/tmp mc cp /tmp/repl-test.txt pi1/velero/repl-test.txt
        sleep 5
        HOME=/tmp mc cat pi2/velero/repl-test.txt
      register: minio_verify
      changed_when: false

    - name: Assert MinIO replication works
      ansible.builtin.assert:
        that: "'test-replication' in minio_verify.stdout"
        fail_msg: "MinIO site replication failed"

    - name: Clean up test file
      ansible.builtin.shell: |
        HOME=/tmp mc rm pi1/velero/repl-test.txt 2>/dev/null || true
      changed_when: false

# ─── Postgres: verify replication end-to-end ─────────────────────────────────
- name: "Postgres: verify replication"
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"

  tasks:
    - name: Insert test data on primary
      ansible.builtin.shell: |
        sudo -u postgres psql -d keycloak -c "
          CREATE TABLE IF NOT EXISTS repl_verify (id serial, data text, ts timestamp DEFAULT now());
          INSERT INTO repl_verify (data) VALUES ('replication-test');
        "
      changed_when: true

    - name: Wait for replication
      ansible.builtin.pause:
        seconds: 3

    - name: Verify data on replica
      ansible.builtin.shell: |
        PGPASSWORD={{ pg_repl_password | default('changeme') }} \
          psql -h {{ pi2_ip }} -U replicator -d keycloak \
          -t -c "SELECT data FROM repl_verify ORDER BY id DESC LIMIT 1;"
      register: repl_data
      changed_when: false

    - name: Assert Postgres replication works
      ansible.builtin.assert:
        that: "'replication-test' in repl_data.stdout"
        fail_msg: "Postgres replication failed: {{ repl_data.stdout }}"

    - name: Clean up test data
      ansible.builtin.shell: |
        sudo -u postgres psql -d keycloak -c "DROP TABLE IF EXISTS repl_verify;"
      changed_when: true

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Pi Replication Setup — COMPLETE
          ============================================
          Postgres:  pi1 (primary) → pi2 (replica) ✓
          MinIO:     site replication (bi-directional) ✓
          ============================================
