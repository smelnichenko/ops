---
# Setup Caddy reverse proxy on both Pis.
#
# Provides HTTPS termination for Pi-hosted services using the cluster's
# *.pmon.dev wildcard cert (issued + auto-renewed by cert-manager via the
# Porkbun webhook), installed here from the pmon-dev-wildcard-tls secret.
# Caddy serves the file cert directly and does NOT obtain per-host certs via
# ACME — the caddy-dns/porkbun plugin mis-detects the zone as "dev" on .dev
# domains, so its DNS-01 renewal is permanently broken. A per-Pi systemd timer
# (caddy-wildcard-sync) re-pulls the wildcard from the cluster daily and restarts
# Caddy if it changed, so the on-Pi copy tracks cert-manager renewals on its own
# (re-running this playbook also refreshes it immediately). It pulls with a
# least-privilege SA token that can GET only the wildcard Secret.
# Caddy runs on both Pis — only the VIP holder serves traffic.
#
# Proxied services:
#   git.pmon.dev     → localhost:3000  (Forgejo)
#   auth.pmon.dev    → localhost:8080  (Keycloak)
#   nexus.pmon.dev   → localhost:8081  (Nexus)
#   s3.pmon.dev      → localhost:9000  (MinIO)
#
# Prerequisites:
#   - PORKBUN_API_KEY and PORKBUN_SECRET_KEY in .env
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-caddy.yml

- name: Setup Caddy
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    caddy_version: "2.10.0"
    porkbun_api_key: "{{ lookup('env', 'PORKBUN_API_KEY') }}"
    porkbun_secret_key: "{{ lookup('env', 'PORKBUN_SECRET_KEY') }}"

  tasks:
    - name: Install xcaddy build dependencies
      ansible.builtin.apt:
        name:
          - golang
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
        state: present

    - name: Check if caddy with porkbun plugin exists
      ansible.builtin.shell: |
        set -o pipefail
        caddy list-modules 2>/dev/null | grep -q porkbun && echo "exists" || echo "missing"
      register: caddy_check
      changed_when: false

    - name: Install xcaddy
      ansible.builtin.shell: |
        go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      environment:
        GOPATH: /usr/local/go
        GOBIN: /usr/local/bin
      when: caddy_check.stdout | trim == 'missing'
      changed_when: true

    - name: Build Caddy with Porkbun DNS plugin
      ansible.builtin.shell: |
        /usr/local/bin/xcaddy build v{{ caddy_version }} \
          --with github.com/caddy-dns/porkbun \
          --output /usr/local/bin/caddy
      environment:
        GOPATH: /usr/local/go
      when: caddy_check.stdout | trim == 'missing'
      changed_when: true
      timeout: 600

    - name: Allow HTTP and HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        comment: "{{ item.name }}"
      loop:
        - { port: "80", name: "Caddy HTTP" }
        - { port: "443", name: "Caddy HTTPS" }

    - name: Create Caddy directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /etc/caddy
        - /etc/caddy/certs
        - /var/lib/caddy
        - /var/log/caddy

    # argv form (not cmd:) so ansible does NOT shlex-split and eat the jsonpath
    # backslash — kubectl needs {.data.tls\.crt} (escaped dot, literal key name).
    - name: Read the *.pmon.dev wildcard cert from the cluster (controller)
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - secret
          - pmon-dev-wildcard-tls
          - -n
          - schnappy-infra
          - -o
          - 'jsonpath={.data.tls\.crt}'
      delegate_to: localhost
      run_once: true
      become: false
      register: _wildcard_crt
      changed_when: false
      failed_when: _wildcard_crt.stdout | length == 0

    - name: Read the *.pmon.dev wildcard key from the cluster (controller)
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - secret
          - pmon-dev-wildcard-tls
          - -n
          - schnappy-infra
          - -o
          - 'jsonpath={.data.tls\.key}'
      delegate_to: localhost
      run_once: true
      become: false
      register: _wildcard_key
      changed_when: false
      no_log: true
      failed_when: _wildcard_key.stdout | length == 0

    - name: Install wildcard cert on the Pi
      ansible.builtin.copy:
        dest: /etc/caddy/certs/wildcard.crt
        content: "{{ _wildcard_crt.stdout | b64decode }}"
        owner: root
        group: root
        mode: '0644'
      notify: Restart Caddy

    - name: Install wildcard key on the Pi
      ansible.builtin.copy:
        dest: /etc/caddy/certs/wildcard.key
        content: "{{ _wildcard_key.stdout | b64decode }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true
      notify: Restart Caddy

    - name: Write Caddyfile
      ansible.builtin.copy:
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: '0640'
        content: |
          {
            email admin@pmon.dev
          }

          (wildcard_tls) {
            tls /etc/caddy/certs/wildcard.crt /etc/caddy/certs/wildcard.key
          }

          git.pmon.dev {
            import wildcard_tls
            reverse_proxy localhost:3000
          }

          nexus.pmon.dev {
            import wildcard_tls
            reverse_proxy localhost:8081
          }

          nexus-docker.pmon.dev {
            import wildcard_tls
            reverse_proxy localhost:8082
          }

          auth.pmon.dev {
            import wildcard_tls
            reverse_proxy localhost:8080
          }
      notify: Restart Caddy

    - name: Create Caddy systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/caddy.service
        mode: '0644'
        content: |
          [Unit]
          Description=Caddy reverse proxy
          After=network-online.target keepalived.service
          Wants=network-online.target

          [Service]
          Type=notify
          ExecStart=/usr/local/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
          ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          TimeoutStopSec=5s
          LimitNOFILE=1048576
          LimitNPROC=512
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          Environment=XDG_DATA_HOME=/var/lib/caddy
          Environment=XDG_CONFIG_HOME=/etc/caddy
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Caddy
      ansible.builtin.systemd_service:
        name: caddy
        enabled: true
        state: started
        daemon_reload: true

    # ── Auto-refresh: pull the renewed wildcard from the cluster on a timer ──
    # cert-manager renews the wildcard in-cluster; without this the on-Pi copy
    # goes stale and HTTPS breaks (it did once). A least-privilege SA that can
    # GET only this one Secret backs a daily per-Pi systemd timer.
    - name: "Cert-sync RBAC — SA + get-only Role + token (controller)"
      kubernetes.core.k8s:
        state: present
        definition:
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: caddy-cert-reader
              namespace: schnappy-infra
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: caddy-cert-reader
              namespace: schnappy-infra
            rules:
              - apiGroups: [""]
                resources: [secrets]
                resourceNames: [pmon-dev-wildcard-tls]
                verbs: [get]
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: caddy-cert-reader
              namespace: schnappy-infra
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: caddy-cert-reader
            subjects:
              - kind: ServiceAccount
                name: caddy-cert-reader
                namespace: schnappy-infra
          # Legacy (non-expiring) SA token: an off-cluster Pi can't refresh a
          # bound/projected token, and this SA can GET only the one public cert
          # Secret, so the on-disk token's blast radius is that public cert.
          - apiVersion: v1
            kind: Secret
            metadata:
              name: caddy-cert-reader-token
              namespace: schnappy-infra
              annotations:
                kubernetes.io/service-account.name: caddy-cert-reader
            type: kubernetes.io/service-account-token
      delegate_to: localhost
      run_once: true
      become: false

    - name: Wait for the cert-reader token to be populated (controller)
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: caddy-cert-reader-token
        namespace: schnappy-infra
      delegate_to: localhost
      run_once: true
      become: false
      register: _cert_reader_token
      until: (_cert_reader_token.resources[0].data.token | default('')) | length > 0
      retries: 15
      delay: 2

    - name: Read the cluster API endpoint for the Pi client (controller)
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - view
          - --minify
          - -o
          - 'jsonpath={.clusters[0].cluster.server}'
      delegate_to: localhost
      run_once: true
      become: false
      register: _cluster_api
      changed_when: false

    - name: Install cluster CA for the cert-sync client
      ansible.builtin.copy:
        dest: /etc/caddy/cluster-ca.crt
        content: "{{ _cert_reader_token.resources[0].data['ca.crt'] | b64decode }}"
        owner: root
        group: root
        mode: '0644'

    - name: Install cluster token for the cert-sync client
      ansible.builtin.copy:
        dest: /etc/caddy/cluster-token
        content: "{{ _cert_reader_token.resources[0].data.token | b64decode }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true

    - name: Install the wildcard cert-sync script
      ansible.builtin.copy:
        dest: /usr/local/bin/caddy-wildcard-sync.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          # Pull the *.pmon.dev wildcard cert from the cluster and restart Caddy
          # if it changed. cert-manager auto-renews the wildcard in-cluster; this
          # keeps the on-Pi file copy fresh without re-running the deploy by hand.
          # The apiserver endpoint is captured at deploy time — a control-plane
          # re-IP needs re-running this playbook. A stalled sync is caught by the
          # CaddyWildcardSyncStalled alert (issued-vs-served cert mismatch).
          set -euo pipefail
          api="{{ _cluster_api.stdout }}"
          ca=/etc/caddy/cluster-ca.crt
          dest=/etc/caddy/certs
          tmp="$(mktemp -d)"; trap 'rm -rf "$tmp"' EXIT
          curl -sf --cacert "$ca" \
            -H "Authorization: Bearer $(cat /etc/caddy/cluster-token)" \
            "$api/api/v1/namespaces/schnappy-infra/secrets/pmon-dev-wildcard-tls" \
            -o "$tmp/secret.json"
          python3 - "$tmp" <<'PY'
          import base64, json, sys
          t = sys.argv[1]
          d = json.load(open(t + "/secret.json"))["data"]
          assert "tls.crt" in d and "tls.key" in d, "secret missing tls.crt/tls.key"
          open(t + "/tls.crt", "wb").write(base64.b64decode(d["tls.crt"]))
          open(t + "/tls.key", "wb").write(base64.b64decode(d["tls.key"]))
          PY
          # restart if EITHER half changed (a re-key may leave the leaf equal)
          if ! cmp -s "$tmp/tls.crt" "$dest/wildcard.crt" \
             || ! cmp -s "$tmp/tls.key" "$dest/wildcard.key"; then
            install -o root -g root -m 0644 "$tmp/tls.crt" "$dest/wildcard.crt"
            install -o root -g root -m 0600 "$tmp/tls.key" "$dest/wildcard.key"
            systemctl restart caddy
            logger -t caddy-wildcard-sync "wildcard cert refreshed from cluster; caddy restarted"
          fi

    - name: Install the cert-sync systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/caddy-wildcard-sync.service
        mode: '0644'
        content: |
          [Unit]
          Description=Sync *.pmon.dev wildcard cert from the cluster to Caddy
          After=network-online.target caddy.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/caddy-wildcard-sync.sh
      notify: Reload systemd

    - name: Install the cert-sync systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/caddy-wildcard-sync.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Daily *.pmon.dev wildcard cert sync for Caddy

          [Timer]
          OnCalendar=daily
          RandomizedDelaySec=1h
          Persistent=true

          [Install]
          WantedBy=timers.target
      notify: Reload systemd

    - name: Enable the cert-sync timer
      ansible.builtin.systemd_service:
        name: caddy-wildcard-sync.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    # Restart (not reload): switching from ACME-managed certs to a file cert
    # leaves orphaned managed certs in certmagic's cache whose maintenance loop
    # then panics; a restart clears the cache and applies the file cert cleanly.
    - name: Restart Caddy
      ansible.builtin.systemd_service:
        name: caddy
        state: restarted

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

# ─── Verify ─────────────────────────────────────────────────────────────────
- name: Verify Caddy
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Wait for cert provisioning
      ansible.builtin.pause:
        seconds: 15

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Check Caddy status
      ansible.builtin.set_fact:
        caddy_status:
          stdout: "{{ ansible_facts.services['caddy.service'].state | default('unknown') }}"

    - name: Test HTTPS Forgejo
      ansible.builtin.uri:
        url: https://git.pmon.dev/api/v1/version
        status_code: 200
        validate_certs: true
      register: forgejo_https
      retries: 12
      delay: 10
      until: forgejo_https.status == 200

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Caddy Setup — Complete
          ============================================
          Status: {{ caddy_status.stdout }}
          Forgejo HTTPS: {{ forgejo_https.status }}
          ============================================
