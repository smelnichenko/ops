---
# Install Patroni for automatic Postgres failover
#
# Uses Consul as DCS. Manages Postgres on pi1 and pi2.
# Replaces the manual streaming replication setup.
#
# Prerequisites:
#   - Consul cluster running (setup-consul.yml)
#   - Postgres installed on both Pis (setup-pi-services.yml)
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-patroni.yml

- name: Install Patroni
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    patroni_scope: "schnappy-postgres"
    node_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"
    # Credentials come from inventory all.vars (postgres_admin_password +
    # postgres_replication_password). No per-play default — missing values
    # are an inventory-configuration bug, not something to paper over.
    pg_password: "{{ postgres_admin_password }}"
    pg_repl_password: "{{ postgres_replication_password }}"

  tasks:
    - name: Install Patroni via pip
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-psycopg2
          - python3-consul
        state: present

    - name: Install Patroni + Consul support
      ansible.builtin.pip:
        name:
          - patroni[consul]
        state: present
        break_system_packages: true

    - name: Find Postgres version
      ansible.builtin.shell: |
        set -o pipefail
        ls -d /usr/lib/postgresql/*/bin | head -1 | grep -oP '\d+'
      register: pg_version
      changed_when: false

    # Compute from pg_version rather than glob the main/ dir — Patroni may
    # have wiped /var/lib/postgresql/{ver}/main during a failed bootstrap
    # loop, which would make the glob fail on re-runs.
    - name: Set Postgres data directory path
      ansible.builtin.set_fact:
        pg_data_dir:
          stdout: "/var/lib/postgresql/{{ pg_version.stdout }}/main"

    - name: Disable system Postgres (Patroni will manage it)
      ansible.builtin.systemd:
        name: postgresql
        enabled: false

    - name: Create Patroni config directory
      ansible.builtin.file:
        path: /etc/patroni
        state: directory
        owner: postgres
        group: postgres
        mode: '0755'

    - name: Write Patroni config
      ansible.builtin.copy:
        dest: /etc/patroni/patroni.yml
        owner: postgres
        group: postgres
        mode: '0640'
        content: |
          scope: {{ patroni_scope }}
          name: {{ inventory_hostname }}

          consul:
            host: 127.0.0.1:8500
            register_service: true

          restapi:
            listen: 0.0.0.0:8008
            connect_address: {{ node_ip }}:8008

          bootstrap:
            dcs:
              ttl: 30
              loop_wait: 10
              retry_timeout: 10
              maximum_lag_on_failover: 1048576
              postgresql:
                use_pg_rewind: true
                parameters:
                  wal_level: replica
                  max_wal_senders: 5
                  max_replication_slots: 5
                  hot_standby: "on"
                  listen_addresses: '*'

            initdb:
              - encoding: UTF8
              - data-checksums

            pg_hba:
              - host replication replicator 0.0.0.0/0 scram-sha-256
              - host all all 0.0.0.0/0 scram-sha-256

            users:
              postgres:
                password: {{ pg_password }}
                options:
                  - superuser
              replicator:
                password: {{ pg_repl_password }}
                options:
                  - replication

          postgresql:
            listen: 0.0.0.0:5432
            connect_address: {{ node_ip }}:5432
            data_dir: {{ pg_data_dir.stdout }}
            config_dir: {{ pg_data_dir.stdout }}
            bin_dir: /usr/lib/postgresql/{{ pg_version.stdout }}/bin
            pgpass: /tmp/pgpass
            use_unix_socket: true
            authentication:
              superuser:
                username: postgres
                password: {{ pg_password }}
              replication:
                username: replicator
                password: {{ pg_repl_password }}
            parameters:
              unix_socket_directories: '/var/run/postgresql'
      notify: Restart Patroni

    - name: Check if Patroni is already managing Postgres (idempotency gate)
      ansible.builtin.systemd:
        name: patroni
      register: patroni_unit_state

    - name: Dump Keycloak DB before Patroni takes over (primary only)
      ansible.builtin.shell: |
        if sudo -u postgres psql -c "SELECT 1" 2>/dev/null; then
          sudo -u postgres pg_dump keycloak > /tmp/keycloak-pre-patroni.sql
          echo "dumped $(wc -l < /tmp/keycloak-pre-patroni.sql) lines"
        else
          echo "postgres not running, skip dump"
        fi
      when:
        - inventory_hostname == 'pi1'
        - patroni_unit_state.status.ActiveState | default('') != 'active'
      register: pg_dump_result
      changed_when: true

    - name: Stop system Postgres if still running (only on first install)
      ansible.builtin.systemd:
        name: postgresql
        state: stopped
      failed_when: false
      when: patroni_unit_state.status.ActiveState | default('') != 'active'

    - name: Clear Postgres data for Patroni init (only on first install)
      ansible.builtin.shell: |
        rm -rf {{ pg_data_dir.stdout }}/*
      changed_when: true
      when: patroni_unit_state.status.ActiveState | default('') != 'active'

    - name: Install Patroni systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/patroni.service
        mode: '0644'
        content: |
          [Unit]
          Description=Patroni Postgres HA
          After=network.target consul.service
          Wants=consul.service
          [Service]
          Type=simple
          User=postgres
          Group=postgres
          ExecStart=/usr/local/bin/patroni /etc/patroni/patroni.yml
          ExecReload=/bin/kill -s HUP $MAINPID
          KillMode=process
          TimeoutSec=30
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
      notify: Restart Patroni

    - name: Allow Patroni REST API through UFW
      community.general.ufw:
        rule: allow
        port: "8008"
        proto: tcp
        comment: "Patroni REST API"

    - name: Enable and start Patroni
      ansible.builtin.systemd:
        name: patroni
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Patroni to be ready
      ansible.builtin.uri:
        url: http://localhost:8008/health
        status_code: [200, 503]
      retries: 15
      delay: 10

    # Replicator role is created by Patroni itself via bootstrap.users above.
    # An explicit `CREATE ROLE` task would run before Patroni has finished
    # pg_basebackup on the non-leader Pi (socket not yet present) and fail.

  handlers:
    - name: Restart Patroni
      ansible.builtin.systemd:
        name: patroni
        state: restarted
        daemon_reload: true

# ─── Restore Keycloak DB ─────────────────────────────────────────────────────
# Must run against the Patroni primary, which is non-deterministic on a
# fresh cluster — either pi1 or pi2 can win the first election. Discover
# the leader first, then delegate_to it.
- name: Discover Patroni primary
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Wait for a Patroni leader to exist (from any node)
      ansible.builtin.shell: |
        set -eo pipefail
        PYEXTRACT='import sys,json
        d=json.load(sys.stdin)
        roles=("leader","master","primary")
        print(next((m["name"] for m in d.get("members",[]) if m.get("role") in roles), ""))'
        for i in $(seq 1 60); do
          LEADER=$(curl -sf http://localhost:8008/cluster 2>/dev/null \
            | python3 -c "$PYEXTRACT" 2>/dev/null) || true
          [ -n "$LEADER" ] && echo "$LEADER" && exit 0
          sleep 5
        done
        exit 1
      register: _leader
      changed_when: false
      run_once: true

    - name: Set patroni_primary fact
      ansible.builtin.set_fact:
        patroni_primary: "{{ _leader.stdout | trim }}"
      run_once: true

    # add_host registers the leader into an in-memory group so the
    # next play can target it with a static `hosts:` pattern (lint
    # can statically resolve the group name; it can't resolve a
    # `hostvars[...][...]` lookup at parse time).
    - name: Register Patroni primary as a dynamic group
      ansible.builtin.add_host:
        name: "{{ patroni_primary }}"
        groups: patroni_primary
      run_once: true
      changed_when: false

- name: Bootstrap users + keycloak DB on the Patroni primary
  hosts: patroni_primary
  become: true
  gather_facts: false

  vars:
    pg_password: "{{ postgres_admin_password }}"
    pg_repl_password: "{{ postgres_replication_password }}"

  tasks:
    # Patroni's bootstrap.users section does NOT reliably create the
    # replicator role on current versions — the non-leader Pi fails
    # pg_basebackup with 'Role "replicator" does not exist'. Create it
    # explicitly on the leader; the replica will then succeed on its
    # next pg_basebackup retry (~5s).
    - name: Create replicator role on leader
      ansible.builtin.shell: |
        sudo -u postgres psql -c "DO \$\$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='replicator') THEN
            CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD '{{ pg_repl_password }}';
          END IF;
        END \$\$;"
      changed_when: true

    - name: Create forgejo + keycloak databases
      ansible.builtin.shell: |
        set -eo pipefail
        EXISTS=$(PGPASSWORD={{ pg_password }} psql -h localhost -U postgres -tAc \
          "SELECT 1 FROM pg_database WHERE datname='{{ item }}'")
        if [ "$EXISTS" != "1" ]; then
          PGPASSWORD={{ pg_password }} psql -h localhost -U postgres \
            -c "CREATE DATABASE {{ item }}"
        fi
      loop: [forgejo, keycloak]
      changed_when: true

    - name: Restore Keycloak dump if exists
      ansible.builtin.shell: |
        if [ -f /tmp/keycloak-pre-patroni.sql ]; then
          PGPASSWORD={{ pg_password }} psql -h localhost -U postgres -d keycloak < /tmp/keycloak-pre-patroni.sql
          echo "restored $(wc -l < /tmp/keycloak-pre-patroni.sql) lines"
        else
          echo "no dump to restore"
        fi
      changed_when: true

# Wait for the replica to finish its pg_basebackup + join the cluster.
# Without this, downstream playbooks (vault, gluster, keepalived) race
# against a half-bootstrapped replica and Forgejo on the replica can't
# reach localhost:5432.
- name: Wait for replica to reach 'streaming' state
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    # 5-min budget — pg_basebackup on a fresh Pi can take 2-3 min to
    # copy the whole cluster; earlier 150s budget timed out right before
    # the replica reached streaming.
    - name: Poll cluster until all members are running
      ansible.builtin.shell: |
        set -eo pipefail
        PYCHECK='import sys,json
        d=json.load(sys.stdin)
        states=[m.get("state") for m in d.get("members",[])]
        ok=all(s in ("running","streaming") for s in states) and len(states) >= 2
        sys.exit(0 if ok else 1)'
        curl -sf http://localhost:8008/cluster 2>/dev/null | python3 -c "$PYCHECK"
      register: _cluster_ready
      retries: 60
      delay: 5
      until: _cluster_ready.rc == 0
      changed_when: false
      run_once: true

# ─── Reconfigure Forgejo + Keycloak to use HAProxy → leader ─────────────────
# During setup-pi-services (which runs before Patroni), these services were
# pointed at raw postgres on localhost:5432. With Patroni owning the data
# plane now, they need to go through HAProxy on localhost:5000 to survive
# leader elections / reach whichever Pi is currently primary.
#
# serial: 1 — serialise the restart so the first Pi's Forgejo finishes its
# fresh-DB migrations before the second Pi's Forgejo boots and races on the
# same shared Postgres. Without this, both instances concurrently CREATE
# TABLE on the fresh DB and hit duplicate-key / already-exists errors in an
# Xorm migration loop that doesn't recover cleanly.
- name: Reconfigure Forgejo + Keycloak to use HAProxy (localhost:5000)
  hosts: pi1,pi2
  serial: 1
  become: true
  gather_facts: false

  tasks:
    - name: Update Forgejo HOST directive
      ansible.builtin.lineinfile:
        path: /var/lib/forgejo/custom/conf/app.ini
        regexp: '^HOST = '
        line: "HOST = 127.0.0.1:5000"
      register: _forgejo_cfg

    - name: Update Keycloak KC_DB_URL
      ansible.builtin.lineinfile:
        path: /etc/systemd/system/keycloak.service
        regexp: 'Environment=KC_DB_URL='
        line: "Environment=KC_DB_URL=jdbc:postgresql://127.0.0.1:5000/keycloak"
      register: _keycloak_cfg

    # Wait for HAProxy to have a healthy Patroni leader backend BEFORE
    # restarting Forgejo/Keycloak. HAProxy takes ~60–90s after first boot to
    # resolve Consul DNS + complete the L7 /primary check. Restarting Forgejo
    # before the backend is ready causes Forgejo's init to crash-loop.
    - name: Wait for HAProxy to have a healthy postgres_primary backend
      ansible.builtin.shell: |
        set -o pipefail
        psql postgresql://postgres@127.0.0.1:5000/postgres -c 'SELECT 1' 2>/dev/null
      environment:
        PGPASSWORD: "{{ postgres_admin_password }}"
      register: _haproxy_check
      retries: 30
      delay: 5
      until: _haproxy_check.rc == 0
      changed_when: false
      when: _forgejo_cfg.changed or _keycloak_cfg.changed

    # These run after rewriting Forgejo/Keycloak DB configs above; the
    # `_forgejo_cfg.changed` / `_keycloak_cfg.changed` registers are the
    # only signal we have, and the writes happen in nearby tasks (not
    # in a notify-handler chain), so a handler refactor would add more
    # plumbing than it saves.
    - name: Daemon-reload if keycloak unit changed  # noqa: no-handler
      ansible.builtin.systemd:
        daemon_reload: true
      when: _keycloak_cfg.changed

    - name: Restart Forgejo if reconfigured  # noqa: no-handler
      ansible.builtin.systemd:
        name: forgejo
        state: restarted
      when: _forgejo_cfg.changed

    - name: Restart Keycloak if reconfigured  # noqa: no-handler
      ansible.builtin.systemd:
        name: keycloak
        state: restarted
      when: _keycloak_cfg.changed

    # Forgejo can crash-loop on DB reconnect until systemd's Restart=on-failure
    # + HAProxy backend becomes stable — give it a generous budget on fresh
    # installs (up to 10 min).
    - name: Wait for Forgejo to come back up
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200
      retries: 60
      delay: 10
      register: _forgejo_check
      until: _forgejo_check.status == 200

    # When Patroni rebuilds Postgres from scratch, the old `forgejo` DB
    # contents (including the admin user we created during setup-pi-services)
    # are wiped. Forgejo migrates the schema on first connect, but no admin
    # user is recreated automatically. Re-create it here on the primary if
    # missing so downstream tests / GUI access works.
    - name: List Forgejo users (post-Patroni)
      ansible.builtin.shell: |
        set -eo pipefail
        su - forgejo -c "forgejo admin user list \
          --config /var/lib/forgejo/custom/conf/app.ini" 2>&1 \
          | awk 'NR>1 { print $2 }'
      register: _forgejo_users_post
      changed_when: false
      run_once: true
      delegate_to: pi1

    - name: Recreate Forgejo admin user post-Patroni (if missing)
      ansible.builtin.shell: |
        su - forgejo -c "forgejo admin user create \
          --admin --username {{ forgejo_admin_user }} \
          --password '{{ forgejo_admin_password }}' \
          --email '{{ forgejo_admin_email }}' \
          --config /var/lib/forgejo/custom/conf/app.ini"
      register: _forgejo_admin_recreate
      retries: 5
      delay: 5
      until: _forgejo_admin_recreate.rc == 0
      when: forgejo_admin_user not in (_forgejo_users_post.stdout_lines | default([]))
      run_once: true
      delegate_to: pi1
      changed_when: true

# ─── Verify cluster ──────────────────────────────────────────────────────────
- name: Verify Patroni cluster
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Check Patroni cluster status
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml list
      register: patroni_status
      changed_when: false
      retries: 6
      delay: 10

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Patroni Cluster — Ready
          ============================================
          {{ patroni_status.stdout }}
          ============================================
