---
# Migrate cluster from Calico to Cilium
#
# Prerequisites:
#   - Pi HA infrastructure running (Vault, Forgejo, Keycloak, MinIO)
#   - All secrets seeded in Vault
#   - bootstrap.sh updated with all Tier 0 components
#
# This playbook:
#   1. Backs up all databases to Pi MinIO
#   2. Resets kubeadm
#   3. Reinitializes with --skip-phases=addon/kube-proxy
#   4. Installs Cilium CNI
#   5. Restarts containerd (picks up CNI config)
#   6. Sets Cilium cni.exclusive=false (Istio coexistence)
#   7. Runs bootstrap.sh (local-path, cert-manager, ESO, vault-eso, Istio, Velero, cluster-config)
#   8. Deploys ArgoCD + root app
#   9. Waits for Postgres pods
#  10. Restores databases from Pi MinIO
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/migrate-cilium.yml

- name: Backup databases to Pi MinIO
  hosts: target
  become: true
  gather_facts: false

  vars:
    minio_vip: "192.168.11.5"
    minio_user: "{{ lookup('env', 'MINIO_ROOT_USER') }}"
    minio_password: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') }}"
    backup_bucket: "cilium-migration"

  tasks:
    - name: Install mc
      ansible.builtin.shell: |
        which mc > /dev/null 2>&1 || { curl -sf https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc; }
      changed_when: true

    - name: Setup mc alias
      ansible.builtin.shell: |
        HOME=/tmp mc alias set pi http://{{ minio_vip }}:9000 "{{ minio_user }}" "{{ minio_password }}"
        HOME=/tmp mc mb pi/{{ backup_bucket }} --ignore-existing
      changed_when: true

    - name: Dump all monitor databases (pg_dumpall)
      ansible.builtin.shell: |
        PG_POD=$(kubectl get pod -n schnappy -l app.kubernetes.io/component=postgres -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$PG_POD" ]; then echo "FAIL: no postgres pod"; exit 1; fi
        kubectl exec -n schnappy $PG_POD -c postgres -- pg_dumpall -U monitor > /tmp/monitor-all.sql
        SIZE=$(wc -c < /tmp/monitor-all.sql)
        echo "pg_dumpall: $SIZE bytes"
        [ "$SIZE" -gt 1000 ] || { echo "FAIL: dump too small ($SIZE bytes)"; exit 1; }
        HOME=/tmp mc cp /tmp/monitor-all.sql pi/{{ backup_bucket }}/monitor-all.sql
      changed_when: true

    - name: Dump sonarqube database
      ansible.builtin.shell: |
        SQ_POD=$(kubectl get pod -n schnappy -l app.kubernetes.io/component=sonarqube-postgres -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$SQ_POD" ]; then echo "FAIL: no sonarqube-postgres pod"; exit 1; fi
        kubectl exec -n schnappy $SQ_POD -c postgres -- pg_dumpall -U sonarqube > /tmp/sonarqube-all.sql
        SIZE=$(wc -c < /tmp/sonarqube-all.sql)
        echo "sonarqube pg_dumpall: $SIZE bytes"
        [ "$SIZE" -gt 1000 ] || { echo "FAIL: sonarqube dump too small"; exit 1; }
        HOME=/tmp mc cp /tmp/sonarqube-all.sql pi/{{ backup_bucket }}/sonarqube-all.sql
      changed_when: true

    - name: Verify backups on Pi MinIO
      ansible.builtin.shell: |
        for f in monitor-all.sql sonarqube-all.sql; do
          HOME=/tmp mc stat pi/{{ backup_bucket }}/$f > /dev/null || { echo "FAIL: $f missing from MinIO"; exit 1; }
        done
        HOME=/tmp mc ls pi/{{ backup_bucket }}/
        echo "all backups verified"
      changed_when: false

- name: Reset and rebuild cluster with Cilium
  hosts: target
  become: true
  gather_facts: false

  vars:
    node_ip: "{{ ansible_host }}"
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    cilium_version: "1.19"

  tasks:
    - name: Reset kubeadm
      ansible.builtin.shell: |
        kubeadm reset -f 2>&1 | tail -3
        rm -rf /etc/cni/net.d /var/lib/etcd
        nft delete table ip calico 2>/dev/null || true
        nft delete table ip6 calico 2>/dev/null || true
        iptables -F && iptables -t nat -F && iptables -t mangle -F
        ip6tables -F && ip6tables -t nat -F && ip6tables -t mangle -F
      changed_when: true

    - name: Initialize kubeadm without kube-proxy
      ansible.builtin.shell: |
        kubeadm init \
          --pod-network-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --apiserver-advertise-address={{ node_ip }} \
          --skip-phases=addon/kube-proxy 2>&1 | tail -5
      changed_when: true

    - name: Setup kubeconfig
      ansible.builtin.shell: |
        mkdir -p /root/.kube /home/sm/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        cp /etc/kubernetes/admin.conf /home/sm/.kube/config
        chown sm:sm /home/sm/.kube/config
      changed_when: true

    - name: Untaint control-plane
      ansible.builtin.shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: false

    - name: Install Cilium
      ansible.builtin.shell: |
        cilium install \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{ node_ip }} \
          --set k8sServicePort=6443 \
          --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_cidr }} \
          --set cni.exclusive=false \
          --set socketLB.enabled=true \
          --set socketLB.hostNamespaceOnly=true \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=false 2>&1 | tail -5
      changed_when: true

    - name: Restart containerd to pick up CNI
      ansible.builtin.systemd:
        name: containerd
        state: restarted

    - name: Wait for node Ready
      ansible.builtin.shell: |
        kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=300s
      changed_when: false
      retries: 3
      delay: 10

    - name: Fetch kubeconfig to controller
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: ~/.kube/config
        flat: true

- name: Run bootstrap and ArgoCD
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Run bootstrap
      ansible.builtin.shell: |
        cd {{ playbook_dir }}/../../../
        export KUBECONFIG=~/.kube/config
        ./bootstrap.sh all 2>&1 | tail -10
      changed_when: true
      environment:
        PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

    - name: Deploy ArgoCD
      ansible.builtin.shell: |
        cd {{ playbook_dir }}/../../
        source {{ playbook_dir }}/../../../.env
        venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-argocd.yml \
          -e vault_root_token=$VAULT_ROOT_TOKEN 2>&1 | tail -10
      changed_when: true

    - name: Wait for apps to sync
      ansible.builtin.shell: |
        export KUBECONFIG=~/.kube/config
        for i in $(seq 1 60); do
          SYNCED=$(kubectl get applications -n argocd --no-headers 2>/dev/null | grep -c 'Synced' || echo 0)
          TOTAL=$(kubectl get applications -n argocd --no-headers 2>/dev/null | wc -l || echo 0)
          echo "Apps: $SYNCED/$TOTAL synced"
          [ "$SYNCED" -ge 15 ] && exit 0
          sleep 10
        done
        exit 1
      changed_when: false
      environment:
        PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

- name: Restore databases
  hosts: target
  become: true
  gather_facts: false

  vars:
    minio_vip: "192.168.11.5"
    minio_user: "{{ lookup('env', 'MINIO_ROOT_USER') }}"
    minio_password: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') }}"
    backup_bucket: "cilium-migration"

  tasks:
    - name: Wait for Postgres pods
      ansible.builtin.shell: |
        kubectl wait --for=condition=Ready pod -n schnappy -l app.kubernetes.io/component=postgres --timeout=300s
      changed_when: false
      retries: 3
      delay: 30

    - name: Download and restore all monitor databases
      ansible.builtin.shell: |
        HOME=/tmp mc alias set pi http://{{ minio_vip }}:9000 "{{ minio_user }}" "{{ minio_password }}" 2>/dev/null
        HOME=/tmp mc cp pi/{{ backup_bucket }}/monitor-all.sql /tmp/monitor-all.sql
        SIZE=$(wc -c < /tmp/monitor-all.sql)
        echo "downloaded monitor-all.sql: $SIZE bytes"
        [ "$SIZE" -gt 1000 ] || { echo "FAIL: dump too small ($SIZE bytes)"; exit 1; }
        PG_POD=$(kubectl get pod -n schnappy -l app.kubernetes.io/component=postgres -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -i -n schnappy $PG_POD -c postgres -- psql -U monitor < /tmp/monitor-all.sql
        echo "all monitor databases restored"
      changed_when: true

    - name: Wait for SonarQube Postgres
      ansible.builtin.shell: |
        kubectl wait --for=condition=Ready pod -n schnappy -l app.kubernetes.io/component=sonarqube-postgres --timeout=300s
      changed_when: false
      retries: 3
      delay: 30

    - name: Download and restore sonarqube database
      ansible.builtin.shell: |
        HOME=/tmp mc alias set pi http://{{ minio_vip }}:9000 "{{ minio_user }}" "{{ minio_password }}" 2>/dev/null
        HOME=/tmp mc cp pi/{{ backup_bucket }}/sonarqube-all.sql /tmp/sonarqube-all.sql
        SIZE=$(wc -c < /tmp/sonarqube-all.sql)
        echo "downloaded sonarqube-all.sql: $SIZE bytes"
        [ "$SIZE" -gt 1000 ] || { echo "FAIL: dump too small ($SIZE bytes)"; exit 1; }
        SQ_POD=$(kubectl get pod -n schnappy -l app.kubernetes.io/component=sonarqube-postgres -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -i -n schnappy $SQ_POD -c postgres -- psql -U sonarqube < /tmp/sonarqube-all.sql
        echo "sonarqube restored"
      changed_when: true

    - name: Restart app services to pick up restored data
      ansible.builtin.shell: |
        kubectl rollout restart deploy/schnappy-monitor deploy/schnappy-admin deploy/schnappy-chat deploy/schnappy-chess -n schnappy 2>/dev/null || true
        kubectl rollout restart deploy/schnappy-sonarqube -n schnappy 2>/dev/null || true
      changed_when: true

    - name: Verify restored data
      ansible.builtin.shell: |
        PG_POD=$(kubectl get pod -n schnappy -l app.kubernetes.io/component=postgres -o jsonpath='{.items[0].metadata.name}')
        ERRORS=0
        for db in monitor monitor_admin monitor_chat monitor_chess; do
          TABLES=$(kubectl exec -n schnappy $PG_POD -c postgres -- psql -U monitor -d $db -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';")
          TABLES=$(echo "$TABLES" | tr -d ' ')
          echo "$db: $TABLES tables"
          [ "$TABLES" -gt 0 ] || { echo "FAIL: $db has no tables"; ERRORS=$((ERRORS+1)); }
        done
        [ "$ERRORS" -eq 0 ] || { echo "FAIL: $ERRORS databases have no tables"; exit 1; }
        echo "all databases verified"
      changed_when: false

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          Cilium Migration — Complete
          ============================================
          Cluster rebuilt with Cilium CNI
          All databases restored from Pi MinIO
          ArgoCD syncing apps from Pi Forgejo
          ============================================
