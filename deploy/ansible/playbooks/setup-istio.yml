---
# Setup Istio sidecar mesh on kubeadm cluster
#
# Installs:
#   - Istio sidecar (base, istiod, cni)
#   - Enables sidecar injection for schnappy namespace
#
# Gateway uses ClusterIP + externalIPs (192.168.11.2) — no LB controller needed.
#
# Prerequisites:
#   - kubeadm cluster running (setup-kubeadm.yml)
#   - Gateway API CRDs installed (setup-kubeadm.yml)
#   - schnappy-mesh Argo CD app deployed (gateway + routes)
#
# Usage:
#   task deploy:istio

- name: Setup Istio sidecar mesh
  hosts: target
  become: true
  gather_facts: false

  vars:
    istio_version: "1.25.2"
    ns: schnappy

  tasks:
    # ================================================================
    # Phase 1: Install Istio Helm charts
    # ================================================================

    - name: Add Istio Helm repo
      kubernetes.core.helm_repository:
        name: istio
        repo_url: https://istio-release.storage.googleapis.com/charts

    - name: Check if Istio is already installed
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: apps/v1
        kind: Deployment
        name: istiod
        namespace: istio-system
      register: istio_exists

    - name: Install Istio base (CRDs)
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: istio-base
        chart_ref: istio/base
        chart_version: "{{ istio_version }}"
        release_namespace: istio-system
        create_namespace: true
        wait: true
        wait_timeout: 60s
      when: istio_exists.resources | length == 0

    - name: Install istiod
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: istiod
        chart_ref: istio/istiod
        chart_version: "{{ istio_version }}"
        release_namespace: istio-system
        wait: true
        wait_timeout: 120s
        values:
          meshConfig:
            accessLogFile: /dev/stdout
            defaultConfig:
              holdApplicationUntilProxyStarts: true
      when: istio_exists.resources | length == 0

    - name: Install Istio CNI
      kubernetes.core.helm:
        kubeconfig: /etc/kubernetes/admin.conf
        name: istio-cni
        chart_ref: istio/cni
        chart_version: "{{ istio_version }}"
        release_namespace: istio-system
        wait: true
        wait_timeout: 120s
        values:
          cni:
            cniConfDir: /etc/cni/net.d
            cniBinDir: /opt/cni/bin
      when: istio_exists.resources | length == 0

    - name: Verify Istio pods
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get pods -n istio-system --no-headers | grep -v Running | grep -v Completed
      args:
        executable: /bin/bash
      register: istio_check
      failed_when: istio_check.stdout | length > 0
      changed_when: false

    - name: "PHASE 1: Istio installed"
      ansible.builtin.debug:
        msg: "istiod and CNI running"

    # ================================================================
    # Phase 2: Enable sidecar injection for schnappy namespace
    # ================================================================

    - name: Label schnappy namespace for sidecar injection
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: patched
        api_version: v1
        kind: Namespace
        name: "{{ ns }}"
        definition:
          metadata:
            labels:
              istio-injection: enabled

    - name: "PHASE 2: schnappy namespace sidecar injection enabled"
      ansible.builtin.debug:
        msg: "New/restarted pods in {{ ns }} will get Envoy sidecar"

    # ================================================================
    # Phase 3: Verify
    # ================================================================

    - name: Wait for Istio gateway service
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        api_version: v1
        kind: Service
        name: schnappy-gateway-istio
        namespace: "{{ ns }}"
      register: gateway_svc
      retries: 30
      delay: 10
      until:
        - gateway_svc.resources | length > 0
        - gateway_svc.resources[0].spec.externalIPs is defined
        - gateway_svc.resources[0].spec.externalIPs | length > 0

    - name: Set gateway VIP fact
      ansible.builtin.set_fact:
        gateway_vip_addr: "{{ gateway_svc.resources[0].spec.externalIPs[0] }}"

    - name: Test Istio gateway  # noqa: command-instead-of-module
      # curl --resolve pins pmon.dev to the gateway VIP; uri module has no equivalent.
      ansible.builtin.shell: |
        curl -sk -o /dev/null -w '%{http_code}' --resolve pmon.dev:443:{{ gateway_vip_addr }} https://pmon.dev/api/health
      register: gateway_test
      changed_when: false
      failed_when: false

    - name: "RESULT"
      ansible.builtin.debug:
        msg: |
          Istio sidecar mesh: RUNNING
          Gateway VIP: {{ gateway_vip_addr }}
          Health check: {{ 'OK' if gateway_test.stdout == '200' else 'NOT YET (app pods may still be starting)' }}
          PeerAuth: STRICT mTLS
