---
# Setup Istio sidecar mesh on kubeadm cluster
#
# Installs:
#   - Istio sidecar (base, istiod, cni)
#   - Enables sidecar injection for schnappy namespace
#
# kube-proxy handles LoadBalancer VIP (192.168.11.2:80/443) → gateway pods.
# No HAProxy needed.
#
# Prerequisites:
#   - kubeadm cluster running (setup-kubeadm.yml)
#   - Gateway API CRDs installed (setup-kubeadm.yml)
#   - schnappy-mesh Argo CD app deployed (gateway + routes)
#
# Usage:
#   task deploy:istio

- name: Setup Istio sidecar mesh
  hosts: target
  become: true
  gather_facts: false

  vars:
    istio_version: "1.25.2"
    ns: schnappy

  tasks:
    # ================================================================
    # Phase 1: Install Istio Helm charts
    # ================================================================

    - name: Add Istio Helm repo
      ansible.builtin.shell: |
        helm repo add istio https://istio-release.storage.googleapis.com/charts
        helm repo update istio
      changed_when: true

    - name: Check if Istio is already installed
      ansible.builtin.shell: |
        kubectl get deployment istiod -n istio-system -o name 2>/dev/null
      register: istio_exists
      changed_when: false
      failed_when: false

    - name: Install Istio base (CRDs)
      ansible.builtin.shell: |
        helm upgrade --install istio-base istio/base \
          --namespace istio-system --create-namespace \
          --version {{ istio_version }} \
          --wait --timeout 60s
      when: istio_exists.rc != 0
      changed_when: true

    - name: Install istiod
      ansible.builtin.shell: |
        helm upgrade --install istiod istio/istiod \
          --namespace istio-system \
          --version {{ istio_version }} \
          --set meshConfig.accessLogFile=/dev/stdout \
          --set meshConfig.defaultConfig.holdApplicationUntilProxyStarts=true \
          --wait --timeout 120s
      when: istio_exists.rc != 0
      changed_when: true

    - name: Install Istio CNI
      ansible.builtin.shell: |
        helm upgrade --install istio-cni istio/cni \
          --namespace istio-system \
          --version {{ istio_version }} \
          --set cni.cniConfDir=/etc/cni/net.d \
          --set cni.cniBinDir=/opt/cni/bin \
          --wait --timeout 120s
      when: istio_exists.rc != 0
      changed_when: true

    - name: Verify Istio pods
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get pods -n istio-system --no-headers | grep -v Running | grep -v Completed
      args:
        executable: /bin/bash
      register: istio_check
      failed_when: istio_check.stdout | length > 0
      changed_when: false

    - name: "PHASE 1: Istio installed"
      ansible.builtin.debug:
        msg: "istiod and CNI running"

    # ================================================================
    # Phase 2: Enable sidecar injection for schnappy namespace
    # ================================================================

    - name: Label schnappy namespace for sidecar injection
      ansible.builtin.shell: |
        kubectl label namespace {{ ns }} istio-injection=enabled --overwrite
      changed_when: true

    - name: "PHASE 2: schnappy namespace sidecar injection enabled"
      ansible.builtin.debug:
        msg: "New/restarted pods in {{ ns }} will get Envoy sidecar"

    # ================================================================
    # Phase 3: Verify
    # ================================================================

    - name: Wait for Istio gateway service
      ansible.builtin.shell: |
        kubectl get svc schnappy-gateway-istio -n {{ ns }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: gateway_vip
      retries: 30
      delay: 10
      until: gateway_vip.stdout | length > 0
      changed_when: false

    - name: Test Istio gateway  # noqa: command-instead-of-module
      ansible.builtin.shell: |
        curl -sk -o /dev/null -w '%{http_code}' --resolve pmon.dev:443:{{ gateway_vip.stdout }} https://pmon.dev/api/health
      register: gateway_test
      changed_when: false
      failed_when: false

    - name: "RESULT"
      ansible.builtin.debug:
        msg: |
          Istio sidecar mesh: RUNNING
          Gateway VIP: {{ gateway_vip.stdout }}
          Health check: {{ 'OK' if gateway_test.stdout == '200' else 'NOT YET (app pods may still be starting)' }}
          PeerAuth: STRICT mTLS
