---
# Setup Pi Services (Forgejo, MinIO, Keycloak, Postgres)
#
# Installs the shared service stack on a Pi. Run on pi1 or pi2.
# Vault and Nexus are set up separately (existing playbooks).
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-pi-services.yml \
#     --limit pi2 -e @vars/pi-services.yml
#
# For both Pis:
#   ansible-playbook -i inventory/production.yml playbooks/setup-pi-services.yml \
#     -e @vars/pi-services.yml

- name: Setup Pi Services
  hosts: pis
  become: true
  gather_facts: true

  vars:
    forgejo_version: "14.0.3"
    keycloak_version: "26.5.7"
    pi_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    pi_postgres_password: "{{ pi_pg_pw | default(kc_db_pw) | default('changeme') }}"
    forgejo_db_password: "{{ pi_postgres_password }}"
    forgejo_admin_user: forgejo_admin
    forgejo_admin_password: "{{ forgejo_admin_pw | default('changeme') }}"
    forgejo_admin_email: "{{ forgejo_admin_mail | default('admin@pmon.dev') }}"
    keycloak_admin_password: "{{ kc_admin_pw | default('changeme') }}"
    keycloak_db_password: "{{ pi_postgres_password }}"
    minio_root_user: "{{ minio_user | default('velero-admin') }}"
    minio_root_password: "{{ minio_password | default('changeme') }}"

  tasks:
    # ================================================================
    # Phase 1: System dependencies
    # ================================================================

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - curl
          - unzip
          - jq
          - git
          - ufw
          - openssl
          - python3
          - postgresql
          - postgresql-client
          - default-jre-headless
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Configure UFW rules
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        comment: "{{ item.name }}"
      loop:
        - { port: "22", name: "SSH" }
        - { port: "3000", name: "Forgejo" }
        - { port: "8080", name: "Keycloak" }
        - { port: "9000", name: "MinIO" }
        - { port: "5432", name: "Postgres" }
        - { port: "8200", name: "Vault" }

    # ================================================================
    # Phase 2: Postgres
    # ================================================================

    - name: Set Postgres password (shared by Forgejo + Keycloak)
      ansible.builtin.shell: |
        sudo -u postgres psql -c "ALTER USER postgres PASSWORD '{{ pi_postgres_password }}';" 2>/dev/null || true
      changed_when: true
      no_log: true

    - name: Create Forgejo and Keycloak databases
      ansible.builtin.shell: |
        sudo -u postgres createdb forgejo 2>/dev/null || true
        sudo -u postgres createdb keycloak 2>/dev/null || true
      changed_when: true

    - name: Find Postgres config directory
      ansible.builtin.shell: |
        set -o pipefail
        ls -d /etc/postgresql/*/main | head -1
      register: pg_conf_dir
      changed_when: false

    - name: Configure Postgres for network access + replication
      ansible.builtin.blockinfile:
        path: "{{ pg_conf_dir.stdout }}/pg_hba.conf"
        block: |
          host all all 0.0.0.0/0 scram-sha-256
          host replication all 0.0.0.0/0 scram-sha-256
        marker: "# {mark} ANSIBLE MANAGED - network access"
      notify: Restart Postgres

    - name: Configure Postgres listen addresses and WAL
      ansible.builtin.lineinfile:
        path: "{{ pg_conf_dir.stdout }}/postgresql.conf"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - regexp: "^#?listen_addresses"
          line: "listen_addresses = '*'"
        - regexp: "^#?wal_level"
          line: "wal_level = replica"
        - regexp: "^#?max_wal_senders"
          line: "max_wal_senders = 3"
      notify: Restart Postgres

    # ================================================================
    # Phase 3: Forgejo
    # ================================================================

    - name: Determine architecture
      ansible.builtin.set_fact:
        forgejo_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Download Forgejo
      ansible.builtin.get_url:
        url: "https://code.forgejo.org/forgejo/forgejo/releases/download/v{{ forgejo_version }}/forgejo-{{ forgejo_version }}-linux-{{ forgejo_arch }}"
        dest: /usr/local/bin/forgejo
        mode: '0755'

    - name: Create Forgejo user
      ansible.builtin.user:
        name: forgejo
        system: true
        shell: /bin/bash
        home: /var/lib/forgejo
        create_home: true

    - name: Create Forgejo directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: forgejo
        group: forgejo
        mode: '0755'
      loop:
        - /var/lib/forgejo/data
        - /var/lib/forgejo/repos
        - /var/lib/forgejo/log
        - /var/lib/forgejo/custom/conf

    - name: Write Forgejo config
      ansible.builtin.copy:
        dest: /var/lib/forgejo/custom/conf/app.ini
        owner: forgejo
        group: forgejo
        mode: '0644'
        content: |
          APP_NAME = Forgejo
          RUN_USER = forgejo

          [server]
          HTTP_PORT = 3000
          HTTP_ADDR = 0.0.0.0
          DOMAIN = git.pmon.dev
          ROOT_URL = https://git.pmon.dev/
          APP_DATA_PATH = /var/lib/forgejo/data
          LFS_START_SERVER = false

          [database]
          DB_TYPE = postgres
          HOST = {{ forgejo_db_host | default(pi1_ip + ':5432,' + pi2_ip + ':5432') }}
          NAME = forgejo
          USER = postgres
          PASSWD = {{ forgejo_db_password }}
          SSL_MODE = disable
          TARGET_SESSION_ATTRS = read-write

          [repository]
          ROOT = /var/lib/forgejo/repos

          [log]
          ROOT_PATH = /var/lib/forgejo/log
          LEVEL = Warn

          [security]
          INSTALL_LOCK = true
      notify: Restart Forgejo

    - name: Install Forgejo systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/forgejo.service
        mode: '0644'
        content: |
          [Unit]
          Description=Forgejo Git Forge
          After=network-online.target var-lib-forgejo-repos.mount patroni.service
          Wants=network-online.target
          RequiresMountsFor=/var/lib/forgejo/repos
          [Service]
          Type=simple
          User=forgejo
          Group=forgejo
          WorkingDirectory=/var/lib/forgejo
          ExecStart=/usr/local/bin/forgejo web --config /var/lib/forgejo/custom/conf/app.ini
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
      notify: Restart Forgejo

    - name: Enable and start Forgejo (keepalived stops on backup Pi)
      ansible.builtin.systemd:
        name: forgejo
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Forgejo
      ansible.builtin.uri:
        url: http://localhost:3000/
        status_code: 200
      retries: 30
      delay: 5
      until: forgejo_wait.status | default(0) == 200
      register: forgejo_wait

    - name: Create Forgejo admin user
      ansible.builtin.shell: |
        su - forgejo -c "forgejo admin user create \
          --admin --username {{ forgejo_admin_user }} \
          --password '{{ forgejo_admin_password }}' \
          --email '{{ forgejo_admin_email }}' \
          --config /var/lib/forgejo/custom/conf/app.ini" 2>/dev/null || true
      changed_when: true
      no_log: true

    # ================================================================
    # Phase 4: MinIO
    # ================================================================

    - name: Download MinIO
      ansible.builtin.get_url:
        url: "https://dl.min.io/server/minio/release/linux-{{ forgejo_arch }}/minio"
        dest: /usr/local/bin/minio
        mode: '0755'

    - name: Download MinIO client
      ansible.builtin.get_url:
        url: "https://dl.min.io/client/mc/release/linux-{{ forgejo_arch }}/mc"
        dest: /usr/local/bin/mc
        mode: '0755'

    - name: Create MinIO group (fixed GID for Gluster-neutral ownership)
      ansible.builtin.group:
        name: minio
        gid: 9000
        system: true

    - name: Create MinIO user (fixed UID)
      ansible.builtin.user:
        name: minio
        uid: 9000
        group: minio
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/minio
        create_home: true

    - name: Create MinIO local data drives (distributed, no Gluster)
      ansible.builtin.file:
        path: "/var/lib/minio/data/{{ item }}"
        state: directory
        owner: minio
        group: minio
        mode: '0750'
      loop:
        - drive1
        - drive2

    - name: Write MinIO environment file (credentials, 0400 minio:minio)
      ansible.builtin.copy:
        dest: /etc/minio/env
        owner: minio
        group: minio
        mode: '0400'
        content: |
          MINIO_ROOT_USER={{ minio_root_user }}
          MINIO_ROOT_PASSWORD={{ minio_root_password }}
          MINIO_CI_CD=on
      notify: Restart MinIO
      no_log: true

    - name: Install MinIO systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/minio.service
        mode: '0644'
        content: |
          [Unit]
          Description=MinIO Object Storage (distributed)
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=simple
          User=minio
          Group=minio
          EnvironmentFile=/etc/minio/env
          ExecStart=/usr/local/bin/minio server \
            http://{{ hostvars['pi1']['ansible_host'] }}:9000/var/lib/minio/data/drive{1...2} \
            http://{{ hostvars['pi2']['ansible_host'] }}:9000/var/lib/minio/data/drive{1...2} \
            --address :9000
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
      notify: Restart MinIO

    - name: Enable and start MinIO (distributed, runs on both Pis)
      ansible.builtin.systemd:
        name: minio
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for MinIO cluster quorum
      ansible.builtin.uri:
        url: http://localhost:9000/minio/health/cluster
        status_code: 200
      retries: 30
      delay: 5

    - name: Create MinIO buckets (runs once; mc loads creds from env file)
      ansible.builtin.shell: |
        set -a; . /etc/minio/env; set +a
        HOME=/tmp mc alias set local http://localhost:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
        HOME=/tmp mc mb local/velero --ignore-existing
        HOME=/tmp mc mb local/pg-dump --ignore-existing
        HOME=/tmp mc mb local/postgres-backups --ignore-existing
        HOME=/tmp mc mb local/scylla-backups --ignore-existing
      run_once: true
      changed_when: true
      no_log: true

    # ================================================================
    # Phase 5: Keycloak
    # ================================================================

    - name: Download and extract Keycloak
      ansible.builtin.unarchive:
        src: "https://github.com/keycloak/keycloak/releases/download/{{ keycloak_version }}/keycloak-{{ keycloak_version }}.tar.gz"
        dest: /opt
        remote_src: true
        creates: "/opt/keycloak-{{ keycloak_version }}"

    - name: Symlink Keycloak
      ansible.builtin.file:
        src: "/opt/keycloak-{{ keycloak_version }}"
        dest: /opt/keycloak
        state: link

    - name: Create Keycloak user
      ansible.builtin.user:
        name: keycloak
        system: true
        shell: /bin/false
        home: /opt/keycloak

    - name: Set Keycloak ownership
      ansible.builtin.file:
        path: "/opt/keycloak-{{ keycloak_version }}"
        owner: keycloak
        group: keycloak
        recurse: true

    - name: Install Keycloak systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/keycloak.service
        mode: '0644'
        content: |
          [Unit]
          Description=Keycloak SSO
          After=network-online.target patroni.service
          Wants=network-online.target
          Requires=patroni.service
          [Service]
          Type=exec
          User=keycloak
          Group=keycloak
          Environment=KC_DB=postgres
          Environment=KC_DB_URL=jdbc:postgresql://{{ keycloak_db_host | default(pi1_ip + ':5432,' + pi2_ip + ':5432') }}/keycloak?targetServerType=primary
          Environment=KC_DB_USERNAME=postgres
          Environment=KC_DB_PASSWORD={{ keycloak_db_password }}
          Environment=KC_HOSTNAME=auth.pmon.dev
          Environment=KC_PROXY_HEADERS=xforwarded
          Environment=KC_HTTP_ENABLED=true
          Environment=KC_HTTP_PORT=8080
          Environment=KC_BOOTSTRAP_ADMIN_USERNAME=admin
          Environment=KC_BOOTSTRAP_ADMIN_PASSWORD={{ keycloak_admin_password }}
          ExecStart=/opt/keycloak/bin/kc.sh start-dev
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
      notify: Restart Keycloak
      no_log: true

    - name: Enable and start Keycloak (keepalived stops on backup Pi)
      ansible.builtin.systemd:
        name: keycloak
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Keycloak
      ansible.builtin.uri:
        url: http://localhost:8080/realms/master
        status_code: 200
      retries: 30
      delay: 10

    # ================================================================
    # Verification
    # ================================================================

    - name: Verify all services
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} setup complete:
            Forgejo:  http://{{ pi_ip }}:3000/
            MinIO:    http://{{ pi_ip }}:9000/
            Keycloak: http://{{ pi_ip }}:8080/
            Postgres: {{ pi_ip }}:5432

  handlers:
    - name: Restart Postgres
      ansible.builtin.systemd:
        name: postgresql
        state: restarted

    - name: Restart Forgejo
      ansible.builtin.systemd:
        name: forgejo
        state: restarted

    - name: Restart MinIO
      ansible.builtin.systemd:
        name: minio
        state: restarted
        daemon_reload: true

    - name: Restart Keycloak
      ansible.builtin.systemd:
        name: keycloak
        state: restarted
        daemon_reload: true
