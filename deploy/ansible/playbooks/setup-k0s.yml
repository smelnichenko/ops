---
# Setup k0s on a fresh Raspberry Pi 5
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-k0s.yml
#
- name: Setup k0s on Raspberry Pi 5
  hosts: all
  become: true
  gather_facts: true

  vars:
    k0s_version: "v1.29.1+k0s.0"
    # Install Traefik as ingress controller
    install_traefik: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Install Docker
      block:
        - name: Check if Docker is installed
          ansible.builtin.stat:
            path: /usr/bin/docker
          register: docker_binary

        - name: Install Docker via convenience script
          ansible.builtin.shell: |
            curl -fsSL https://get.docker.com | sh
          args:
            creates: /usr/bin/docker
          when: not docker_binary.stat.exists

        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: true

    - name: Enable cgroups for Raspberry Pi
      ansible.builtin.lineinfile:
        path: /boot/firmware/cmdline.txt
        regexp: '^(.*)$'
        line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
        backrefs: true
      register: cgroups_enabled
      when: ansible_architecture == "aarch64"

    - name: Reboot if cgroups were enabled
      ansible.builtin.reboot:
        msg: "Rebooting to enable cgroups"
        reboot_timeout: 300
      when: cgroups_enabled.changed

    - name: Check if k0s is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k0s
      register: k0s_binary

    - name: Download k0s installer
      ansible.builtin.shell: |
        curl -sSLf https://get.k0s.sh -o /tmp/k0s-install.sh
        chmod 755 /tmp/k0s-install.sh
      args:
        creates: /tmp/k0s-install.sh
      when: not k0s_binary.stat.exists

    - name: Install k0s binary
      ansible.builtin.shell: |
        /tmp/k0s-install.sh
      args:
        creates: /usr/local/bin/k0s
      environment:
        K0S_VERSION: "{{ k0s_version }}"
      when: not k0s_binary.stat.exists

    - name: Create k0s config directory
      ansible.builtin.file:
        path: /etc/k0s
        state: directory
        mode: '0755'

    - name: Generate default k0s config
      ansible.builtin.shell: k0s config create > /etc/k0s/k0s.yaml
      args:
        creates: /etc/k0s/k0s.yaml

    - name: Install k0s controller with worker
      ansible.builtin.shell: |
        k0s install controller --single -c /etc/k0s/k0s.yaml
      args:
        creates: /etc/systemd/system/k0scontroller.service

    - name: Start k0s service
      ansible.builtin.systemd:
        name: k0scontroller
        state: started
        enabled: true

    - name: Wait for k0s to be ready
      ansible.builtin.shell: k0s kubectl get nodes
      register: k0s_ready
      until: k0s_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for node to be Ready
      ansible.builtin.shell: |
        k0s kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      until: node_ready.stdout == "True"
      retries: 30
      delay: 10
      changed_when: false

    - name: Install Helm
      block:
        - name: Download and install Helm
          ansible.builtin.shell: |
            curl -sSLf https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          args:
            creates: /usr/local/bin/helm
          environment:
            KUBECONFIG: /var/lib/k0s/pki/admin.conf

    - name: Install Traefik ingress controller
      when: install_traefik
      block:
        - name: Add Traefik Helm repo
          ansible.builtin.shell: |
            helm repo add traefik https://traefik.github.io/charts
            helm repo update
          environment:
            KUBECONFIG: /var/lib/k0s/pki/admin.conf
          changed_when: false

        - name: Create traefik namespace
          ansible.builtin.shell: |
            k0s kubectl create namespace traefik --dry-run=client -o yaml | k0s kubectl apply -f -
          changed_when: false

        - name: Install Traefik via Helm
          ansible.builtin.shell: |
            helm upgrade --install traefik traefik/traefik \
              --namespace traefik \
              --set ports.web.hostPort=80 \
              --set ports.websecure.hostPort=443 \
              --set ingressClass.enabled=true \
              --set ingressClass.isDefaultClass=true
          environment:
            KUBECONFIG: /var/lib/k0s/pki/admin.conf
          changed_when: false

        - name: Wait for Traefik to be ready
          ansible.builtin.shell: |
            k0s kubectl get deployment traefik -n traefik -o jsonpath='{.status.availableReplicas}'
          register: traefik_ready
          until: traefik_ready.stdout | default('0') | int >= 1
          retries: 30
          delay: 10
          changed_when: false

    - name: Install local-path-provisioner for PVC support
      block:
        - name: Install local-path-provisioner
          ansible.builtin.shell: |
            k0s kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.26/deploy/local-path-storage.yaml
          changed_when: false

        - name: Wait for local-path-provisioner namespace
          ansible.builtin.shell: |
            k0s kubectl get namespace local-path-storage
          register: lpp_namespace
          until: lpp_namespace.rc == 0
          retries: 10
          delay: 5
          changed_when: false

        - name: Configure local-path-provisioner to use /mnt/nvme
          ansible.builtin.shell: |
            k0s kubectl apply -f - <<'EOF'
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: local-path-config
              namespace: local-path-storage
            data:
              config.json: |-
                {
                  "nodePathMap": [
                    {
                      "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
                      "paths": ["/mnt/nvme"]
                    }
                  ]
                }
              setup: |-
                #!/bin/sh
                set -eu
                mkdir -m 0777 -p "$VOL_DIR"
              teardown: |-
                #!/bin/sh
                set -eu
                rm -rf "$VOL_DIR"
              helperPod.yaml: |-
                apiVersion: v1
                kind: Pod
                metadata:
                  name: helper-pod
                spec:
                  containers:
                  - name: helper-pod
                    image: busybox:1.36
            EOF
          changed_when: false

        - name: Set local-path as default StorageClass
          ansible.builtin.shell: |
            k0s kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
          changed_when: false

        - name: Restart local-path-provisioner to pick up config
          ansible.builtin.shell: |
            k0s kubectl rollout restart deployment local-path-provisioner -n local-path-storage
          changed_when: false

        - name: Wait for local-path-provisioner to be ready
          ansible.builtin.shell: |
            k0s kubectl get deployment local-path-provisioner -n local-path-storage -o jsonpath='{.status.availableReplicas}'
          register: lpp_ready
          until: lpp_ready.stdout | default('0') | int >= 1
          retries: 30
          delay: 5
          changed_when: false

    - name: Create .kube directory for user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy kubeconfig for user
      ansible.builtin.copy:
        src: /var/lib/k0s/pki/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
        remote_src: true

    - name: Update kubeconfig server address
      ansible.builtin.replace:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: 'https://localhost:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: Fetch kubeconfig to local machine
      ansible.builtin.fetch:
        src: "/home/{{ ansible_user }}/.kube/config"
        dest: "{{ playbook_dir }}/../kubeconfig-{{ inventory_hostname }}"
        flat: true

    - name: Display k0s status
      ansible.builtin.debug:
        msg: |
          k0s installed successfully!

          Traefik ingress controller is ready.

          To use kubectl locally:
            export KUBECONFIG={{ playbook_dir }}/../kubeconfig-{{ inventory_hostname }}
            kubectl get nodes

          Traefik dashboard:
            kubectl port-forward -n traefik deployment/traefik 9000:9000
            Open http://localhost:9000/dashboard/
