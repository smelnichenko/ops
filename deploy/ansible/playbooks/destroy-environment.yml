---
# Destroy a schnappy environment
#
# Usage:
#   task env:destroy ENV_NAME=staging
#
# Removes: ApplicationSet entries, cluster-config, values files,
# Keycloak redirect URI, gateway ReferenceGrant entry.
# Commits and pushes. ArgoCD deletes the Applications.
# Namespace deletion is manual (safety).

- name: "Destroy environment: schnappy-{{ env_name }}"
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    env_name: "{{ env_name }}"
    namespace: "schnappy-{{ env_name }}"
    infra_dir: "{{ playbook_dir }}/../../../../infra"
    cluster_dir: "{{ infra_dir }}/clusters/production"
    vault_addr: "https://127.0.0.1:8200"
    keycloak_url: "http://localhost:8080"

  pre_tasks:
    - name: Validate env_name
      ansible.builtin.assert:
        that:
          - env_name is defined
          - env_name | length > 0
          - env_name != "production"
        fail_msg: "Cannot destroy production (got: '{{ env_name | default('undefined') }}')"

    - name: Check environment exists
      ansible.builtin.stat:
        path: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
      register: env_exists
      delegate_to: localhost
      become: false

    - name: Fail if environment doesn't exist
      ansible.builtin.fail:
        msg: "Environment {{ namespace }} not found"
      when: not env_exists.stat.exists

    - name: Read Vault root token
      ansible.builtin.slurp:
        src: /etc/vault-unseal/root-token
      register: vault_token_raw

    - name: Set vault env
      ansible.builtin.set_fact:
        vault_env: "VAULT_ADDR={{ vault_addr }} VAULT_SKIP_VERIFY=1 VAULT_TOKEN={{ vault_token_raw.content | b64decode | trim }}"

  tasks:
    # ================================================================
    # Phase 1: Remove Keycloak redirect URI
    # ================================================================

    - name: Get Keycloak admin password
      ansible.builtin.shell: |
        {{ vault_env }} vault kv get -field=admin_password secret/schnappy/keycloak
      register: kc_password
      changed_when: false

    - name: Get Keycloak admin token
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: admin-cli
          username: admin
          password: "{{ kc_password.stdout }}"
          grant_type: password
        validate_certs: false
      register: kc_token

    - name: Get app client config
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/admin/realms/schnappy/clients?clientId=app&first=0&max=1"
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
        validate_certs: false
      register: kc_app_client

    - name: Remove redirect URI
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/admin/realms/schnappy/clients/{{ kc_app_client.json[0].id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          clientId: app
          redirectUris: "{{ kc_app_client.json[0].redirectUris | reject('search', env_name + '.pmon.dev') | list }}"
          webOrigins: "{{ kc_app_client.json[0].webOrigins }}"
        validate_certs: false
        status_code: 204

    - name: "PHASE 1: Keycloak redirect URI removed"
      ansible.builtin.debug:
        msg: "Removed https://{{ env_name }}.pmon.dev/* from Keycloak"

    # ================================================================
    # Phase 2: Remove from ApplicationSets + gateway
    # ================================================================

    - name: Remove env from ApplicationSets
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        import yaml

        appsets = {
            'data': '{{ cluster_dir }}/argocd/apps/schnappy-data-envs.yaml',
            'apps': '{{ cluster_dir }}/argocd/apps/schnappy-apps-envs.yaml',
            'mesh': '{{ cluster_dir }}/argocd/apps/schnappy-mesh-envs.yaml',
        }
        for chart, path in appsets.items():
            with open(path) as f:
                doc = yaml.safe_load(f)
            doc['spec']['generators'][0]['list']['elements'] = [
                e for e in doc['spec']['generators'][0]['list']['elements']
                if e.get('env') != '{{ env_name }}'
            ]
            with open(path, 'w') as f:
                yaml.dump(doc, f, default_flow_style=False, sort_keys=False)
        PYEOF
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Remove namespace from gateway allowedNamespaces
      ansible.builtin.lineinfile:
        path: "{{ cluster_dir }}/schnappy-mesh/values.yaml"
        line: "    - {{ namespace }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: "PHASE 2: ApplicationSets and gateway updated"
      ansible.builtin.debug:
        msg: "Removed {{ env_name }} from ApplicationSets"

    # ================================================================
    # Phase 3: Remove infra files
    # ================================================================

    - name: Remove values directories
      ansible.builtin.file:
        path: "{{ cluster_dir }}/{{ namespace }}-{{ item }}"
        state: absent
      loop: [data, apps, mesh]
      delegate_to: localhost
      become: false

    - name: Remove namespace manifest
      ansible.builtin.file:
        path: "{{ cluster_dir }}/cluster-config/{{ namespace }}-namespace.yaml"
        state: absent
      delegate_to: localhost
      become: false

    - name: Remove default-deny + quota
      ansible.builtin.file:
        path: "{{ cluster_dir }}/cluster-config/{{ namespace }}-default-deny.yaml"
        state: absent
      delegate_to: localhost
      become: false

    - name: Remove forgejo-registry block
      ansible.builtin.blockinfile:
        path: "{{ cluster_dir }}/cluster-config/forgejo-registry-secret.yaml"
        marker: "# {mark} {{ namespace }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: "PHASE 3: Infra files removed"
      ansible.builtin.debug:
        msg: "Removed all {{ namespace }} files"

    # ================================================================
    # Phase 4: Commit and push
    # ================================================================

    - name: Commit and push infra
      ansible.builtin.shell: |
        cd {{ infra_dir }}
        git add -A
        git diff --cached --quiet && echo "no changes" && exit 0
        git commit -m "env: destroy {{ namespace }}"
        git push origin main
      delegate_to: localhost
      become: false
      changed_when: true
      environment:
        GIT_AUTHOR_NAME: "env-automation"
        GIT_AUTHOR_EMAIL: "automation@pmon.dev"
        GIT_COMMITTER_NAME: "env-automation"
        GIT_COMMITTER_EMAIL: "automation@pmon.dev"

    - name: "DONE"
      ansible.builtin.debug:
        msg: |
          Environment {{ namespace }} removed from ArgoCD.
          To delete the namespace: kubectl delete namespace {{ namespace }}
