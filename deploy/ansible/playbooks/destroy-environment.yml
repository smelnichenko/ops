---
# Destroy a schnappy environment
#
# Usage:
#   task env:destroy ENV_NAME=staging
#
# Removes: ApplicationSet entries, cluster-config, values files,
# Keycloak redirect URI, gateway ReferenceGrant entry.
# Commits and pushes. ArgoCD deletes the Applications.
# Namespace deletion is manual (safety).

- name: Destroy schnappy environment  # env_name passed via -e
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    env_ns: "schnappy-{{ env_name }}"
    infra_dir: "{{ infra_dir_override | default(playbook_dir + '/../../../../infra') }}"
    cluster_dir: "{{ infra_dir }}/clusters/production"
    vault_addr: "https://127.0.0.1:8200"
    keycloak_url: "http://localhost:8080"
    infra_git_url: "{{ infra_git_url_override | default('') }}"

  pre_tasks:
    - name: Validate env_name
      ansible.builtin.assert:
        that:
          - env_name is defined
          - env_name | length > 0
          - env_name != "production"
        fail_msg: "Cannot destroy production (got: '{{ env_name | default('undefined') }}')"

    - name: Check environment exists
      ansible.builtin.stat:
        path: "{{ cluster_dir }}/{{ env_ns }}-data/values.yaml"
      register: env_exists
      delegate_to: localhost
      become: false

    - name: Fail if environment doesn't exist
      ansible.builtin.fail:
        msg: "Environment {{ env_ns }} not found"
      when: not env_exists.stat.exists

    - name: Read Vault root token (production path)
      ansible.builtin.slurp:
        src: /etc/vault-unseal/root-token
      register: vault_token_prod
      failed_when: false

    - name: Read Vault root token (vagrant path)
      ansible.builtin.shell: |
        jq -r .root_token /tmp/vault-init.json
      register: vault_token_vagrant
      changed_when: false
      failed_when: false
      when: vault_token_prod.content is not defined

    - name: Set vault env
      ansible.builtin.set_fact:
        vault_env: >-
          VAULT_ADDR={{ vault_addr }} VAULT_SKIP_VERIFY=1 VAULT_TOKEN={{
          (vault_token_prod.content | b64decode | trim)
          if vault_token_prod.content is defined
          else vault_token_vagrant.stdout | trim
          }}

  tasks:
    # ================================================================
    # Phase 1: Remove Keycloak redirect URI
    # ================================================================

    - name: Check if Keycloak schnappy realm exists
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/schnappy/.well-known/openid-configuration"
        validate_certs: false
        status_code: [200, 404]
      register: kc_realm_check
      failed_when: false

    - name: Get Keycloak admin password
      ansible.builtin.shell: |
        {{ vault_env }} vault kv get -field=admin_password secret/schnappy/keycloak
      register: kc_password
      changed_when: false
      when: kc_realm_check.status == 200

    - name: Get Keycloak admin token
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: admin-cli
          username: admin
          password: "{{ kc_password.stdout }}"
          grant_type: password
        validate_certs: false
      register: kc_token
      when: kc_realm_check.status == 200

    - name: Get app client config
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/admin/realms/schnappy/clients?clientId=app&first=0&max=1"
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
        validate_certs: false
      register: kc_app_client
      when: kc_realm_check.status == 200

    - name: Remove redirect URI
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/admin/realms/schnappy/clients/{{ kc_app_client.json[0].id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          clientId: app
          redirectUris: "{{ kc_app_client.json[0].redirectUris | reject('search', env_name + '.pmon.dev') | list }}"
          webOrigins: "{{ kc_app_client.json[0].webOrigins }}"
        validate_certs: false
        status_code: 204
      when: kc_realm_check.status == 200

    - name: "PHASE 1: Keycloak redirect URI removed"
      ansible.builtin.debug:
        msg: "{{ 'Removed redirect URI' if kc_realm_check.status == 200 else 'Skipped (no schnappy realm)' }}"

    # ================================================================
    # Phase 2: Remove from ApplicationSets + gateway
    # ================================================================

    - name: Remove env from ApplicationSets
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        import yaml

        appsets = {
            'data': '{{ cluster_dir }}/argocd/apps/schnappy-data-envs.yaml',
            'apps': '{{ cluster_dir }}/argocd/apps/schnappy-apps-envs.yaml',
            'mesh': '{{ cluster_dir }}/argocd/apps/schnappy-mesh-envs.yaml',
        }
        for chart, path in appsets.items():
            with open(path) as f:
                doc = yaml.safe_load(f)
            doc['spec']['generators'][0]['list']['elements'] = [
                e for e in doc['spec']['generators'][0]['list']['elements']
                if e.get('env') != '{{ env_name }}'
            ]
            with open(path, 'w') as f:
                yaml.dump(doc, f, default_flow_style=False, sort_keys=False)
        PYEOF
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Remove namespace from gateway allowedNamespaces
      ansible.builtin.lineinfile:
        path: "{{ cluster_dir }}/schnappy-mesh/values.yaml"
        line: "    - {{ env_ns }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: "PHASE 2: ApplicationSets and gateway updated"
      ansible.builtin.debug:
        msg: "Removed {{ env_name }} from ApplicationSets"

    # ================================================================
    # Phase 3: Remove infra files
    # ================================================================

    - name: Remove values directories
      ansible.builtin.file:
        path: "{{ cluster_dir }}/{{ env_ns }}-{{ item }}"
        state: absent
      loop: [data, apps, mesh]
      delegate_to: localhost
      become: false

    - name: Remove namespace manifest
      ansible.builtin.file:
        path: "{{ cluster_dir }}/cluster-config/{{ env_ns }}-namespace.yaml"
        state: absent
      delegate_to: localhost
      become: false

    - name: Remove default-deny + quota
      ansible.builtin.file:
        path: "{{ cluster_dir }}/cluster-config/{{ env_ns }}-default-deny.yaml"
        state: absent
      delegate_to: localhost
      become: false

    - name: Remove forgejo-registry block
      ansible.builtin.blockinfile:
        path: "{{ cluster_dir }}/cluster-config/forgejo-registry-secret.yaml"
        marker: "# {mark} {{ env_ns }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: "PHASE 3: Infra files removed"
      ansible.builtin.debug:
        msg: "Removed all {{ env_ns }} files"

    # ================================================================
    # Phase 4: Commit and push
    # ================================================================

    - name: Commit and push infra changes
      ansible.builtin.script:
        cmd: "{{ playbook_dir }}/scripts/git-commit-push.sh '{{ infra_dir }}' 'env: destroy {{ env_ns }}' '{{ infra_git_url }}'"
      delegate_to: localhost
      become: false
      changed_when: true
      environment:
        GIT_AUTHOR_NAME: "env-automation"
        GIT_AUTHOR_EMAIL: "automation@pmon.dev"
        GIT_COMMITTER_NAME: "env-automation"
        GIT_COMMITTER_EMAIL: "automation@pmon.dev"

    - name: "DONE"
      ansible.builtin.debug:
        msg: |
          Environment {{ env_ns }} removed from ArgoCD.
          To delete the namespace: kubectl delete namespace {{ env_ns }}
