---
# Verify a Velero restore by running k6 smoke tests
#
# Run after a Velero restore to validate all endpoints respond correctly.
# Uses the existing k6-smoke CronJob as the Job template.
#
# Usage:
#   task deploy:restore:verify
#
# Prerequisites:
#   - Velero restore completed
#   - All pods running in schnappy namespace
#   - k6-smoke CronJob exists (smokeTest.enabled: true)

- name: Verify restore with k6 smoke tests
  hosts: target
  become: true
  gather_facts: false

  vars:
    ns: schnappy
    job_name: k6-restore-verify

  tasks:
    - name: Check all pods are running
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Pod
        namespace: "{{ ns }}"
      register: pods_check
      retries: 30
      delay: 10
      until: >-
        pods_check.resources
        | rejectattr('status.phase', 'in', ['Running', 'Succeeded'])
        | list | length == 0

    - name: Check k6-smoke CronJob exists
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: CronJob
        name: schnappy-k6-smoke
        namespace: "{{ ns }}"
      register: k6_cronjob
      failed_when: k6_cronjob.resources | length == 0

    - name: Delete previous verify job if exists
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: absent
        kind: Job
        name: "{{ job_name }}"
        namespace: "{{ ns }}"
        wait: true

    - name: Create k6 smoke test Job from CronJob
      ansible.builtin.command: kubectl create job {{ job_name }} --from=cronjob/schnappy-k6-smoke -n {{ ns }}
      changed_when: false

    - name: Wait for k6 Job to complete
      kubernetes.core.k8s_info:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Job
        name: "{{ job_name }}"
        namespace: "{{ ns }}"
      register: k6_result
      retries: 24
      delay: 5
      until: >-
        k6_result.resources | length > 0
        and (
          (k6_result.resources[0].status.conditions | default([])
            | selectattr('type', 'equalto', 'Complete')
            | selectattr('status', 'equalto', 'True') | list | length > 0)
          or
          (k6_result.resources[0].status.conditions | default([])
            | selectattr('type', 'equalto', 'Failed')
            | selectattr('status', 'equalto', 'True') | list | length > 0)
        )

    - name: Get k6 Job logs
      kubernetes.core.k8s_log:
        kubeconfig: /etc/kubernetes/admin.conf
        kind: Job
        name: "{{ job_name }}"
        namespace: "{{ ns }}"
      register: k6_logs
      changed_when: false

    - name: Display k6 results
      ansible.builtin.debug:
        msg: "{{ k6_logs.stdout }}"

    - name: Verify all checks passed
      ansible.builtin.assert:
        that: >-
          k6_result.resources[0].status.conditions | default([])
          | selectattr('type', 'equalto', 'Complete')
          | selectattr('status', 'equalto', 'True') | list | length > 0
        fail_msg: |
          POST-RESTORE SMOKE TEST FAILED
          One or more endpoints are not responding correctly after restore.
          Review the k6 logs above for details.
        success_msg: |
          POST-RESTORE SMOKE TEST PASSED
          All endpoints are healthy after restore.

    - name: Clean up verify job
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: absent
        kind: Job
        name: "{{ job_name }}"
        namespace: "{{ ns }}"
