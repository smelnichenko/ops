---
# Seed all Vault secrets from .env values
#
# Talks directly to Pi Vault via HTTPS (loopback on pi1).
# Reads root token from Pi init file.
#
# Usage:
#   task deploy:seed-secrets                                         # seeds secret/{{ vault_prefix }}/*
#   task deploy:seed-secrets -- -e vault_prefix=schnappy-test        # seeds secret/schnappy-test/*

- name: Seed Vault secrets from .env
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    vault_prefix: schnappy
    vault_addr: "https://127.0.0.1:8200"

  tasks:
    - name: Read Vault root token
      ansible.builtin.slurp:
        src: /etc/vault-unseal/root-token
      register: vault_token_raw

    - name: Set token fact
      ansible.builtin.set_fact:
        vault_token_value: "{{ vault_token_raw.content | b64decode | trim }}"
      no_log: true

    - name: Seed postgres secret (shared superuser)
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/postgres"
        data:
          database: monitor
          username: monitor
          password: "{{ lookup('env', 'MONITOR_DB_PASSWORD') }}"

    - name: Seed per-service postgres secrets
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/postgres-{{ item.name }}"
        data:
          database: "{{ item.name }}"
          username: "{{ item.name }}"
          password: "{{ item.password }}"
      loop:
        - { name: monitor, password: "{{ lookup('env', 'MONITOR_DB_PASSWORD') }}" }
        - { name: admin, password: "{{ lookup('env', 'ADMIN_DB_PASSWORD') }}" }
        - { name: chat, password: "{{ lookup('env', 'CHAT_DB_PASSWORD') }}" }
        - { name: chess, password: "{{ lookup('env', 'CHESS_DB_PASSWORD') }}" }

    - name: Seed valkey secret (cache; was 'redis' pre-Plan-064)
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/valkey"
        data:
          password: "{{ lookup('env', 'VALKEY_PASSWORD') | default(lookup('env', 'REDIS_PASSWORD'), true) }}"

    - name: Seed auth secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/auth"
        data:
          jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"

    - name: Seed mail secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/mail"
        data:
          password: "{{ lookup('env', 'MAIL_PASSWORD') }}"

    - name: Seed AI secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/ai"
        data:
          api_key: "{{ lookup('env', 'ANTHROPIC_API_KEY') }}"

    - name: Seed webhook secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/webhook"
        data:
          signing_secret: "{{ lookup('env', 'RESEND_WEBHOOK_SECRET') | default('', true) }}"
          api_key: "{{ lookup('env', 'RESEND_API_KEY') | default('', true) }}"

    - name: Seed minio secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/minio"
        data:
          access_key: "{{ lookup('env', 'MINIO_ROOT_USER') }}"
          secret_key: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') }}"

    - name: Seed minio-backup secret (Pi MinIO for CNPG off-site backups)
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/minio-backup"
        data:
          access_key: "{{ lookup('env', 'VELERO_MINIO_ACCESS_KEY') }}"
          secret_key: "{{ lookup('env', 'VELERO_MINIO_SECRET_KEY') }}"

    - name: Seed clickhouse secret (logs backend; replaces ELK — Plan 065)
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/clickhouse"
        data:
          password: "{{ lookup('env', 'CLICKHOUSE_PASSWORD') }}"

    - name: Seed grafana secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/grafana"
        data:
          admin_user: admin
          admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}"
          oauth_client_id: "{{ lookup('env', 'GRAFANA_OAUTH_CLIENT_ID') | default('grafana', true) }}"
          oauth_client_secret: "{{ lookup('env', 'GRAFANA_OAUTH_CLIENT_SECRET') }}"

    - name: Seed kafka secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/kafka"
        data:
          cluster_id: "{{ lookup('env', 'KAFKA_CLUSTER_ID') }}"

    - name: Seed forgejo secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/forgejo"
        data:
          admin_username: "{{ lookup('env', 'FORGEJO_ADMIN_USER') }}"
          admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') }}"
          admin_email: "{{ lookup('env', 'FORGEJO_ADMIN_EMAIL') }}"

    - name: Seed keycloak secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/keycloak"
        data:
          admin_password: "{{ lookup('env', 'KEYCLOAK_ADMIN_PASSWORD') }}"
          db_password: "{{ lookup('env', 'KEYCLOAK_DB_PASSWORD') }}"
          forgejo_client_secret: "{{ lookup('env', 'KEYCLOAK_FORGEJO_CLIENT_SECRET') }}"
          argocd_client_secret: "{{ lookup('env', 'KEYCLOAK_ARGOCD_CLIENT_SECRET') }}"
          admin_service_client_secret: "{{ lookup('env', 'KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET') }}"
          k6_smoke_client_secret: "{{ lookup('env', 'KEYCLOAK_K6_SMOKE_CLIENT_SECRET') }}"

    - name: Seed alertmanager secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/alertmanager"
        data:
          webhook_secret: "{{ lookup('env', 'ALERTMANAGER_WEBHOOK_SECRET') | default('unused', true) }}"

    - name: Seed velero secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/velero"
        data:
          minio_access_key: "{{ lookup('env', 'VELERO_MINIO_ACCESS_KEY') }}"
          minio_secret_key: "{{ lookup('env', 'VELERO_MINIO_SECRET_KEY') }}"

    - name: Seed sonarqube secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/sonarqube"
        data:
          admin_password: "{{ lookup('env', 'SONARQUBE_ADMIN_PASSWORD') }}"
          postgres_password: "{{ lookup('env', 'SONARQUBE_POSTGRES_PASSWORD') }}"
          token: "{{ lookup('env', 'SONARQUBE_TOKEN') }}"

    - name: Seed woodpecker-forgejo secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/woodpecker-forgejo"
        data:
          client_id: "{{ lookup('env', 'WOODPECKER_FORGEJO_CLIENT') }}"
          client_secret: "{{ lookup('env', 'WOODPECKER_FORGEJO_SECRET') }}"

    - name: Seed woodpecker agent secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/woodpecker"
        data:
          agent-secret: "{{ lookup('env', 'WOODPECKER_AGENT_SECRET') | default(lookup('password', '/dev/null chars=hexdigits length=64'), true) }}"

    - name: Seed woodpecker-ci secrets
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/woodpecker-ci"
        data:
          sonar_token: "{{ lookup('env', 'SONARQUBE_TOKEN') }}"
          sonar_host_url: "https://sonar.pmon.dev"
          infra_repo_token: "{{ lookup('env', 'WOODPECKER_INFRA_REPO_TOKEN') }}"
          nexus_url: "http://192.168.11.5:8081"
          nexus_npm_registry: "http://192.168.11.5:8081/repository/npm-public/"
          nvd_api_key: "{{ lookup('env', 'NVD_API_KEY') }}"
          prometheus_auth_token: "{{ lookup('env', 'PROMETHEUS_AUTH_TOKEN') }}"
          clone_token: "{{ lookup('env', 'WOODPECKER_CLONE_TOKEN') }}"

    - name: Seed porkbun secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/porkbun"
        data:
          api_key: "{{ lookup('env', 'PORKBUN_API_KEY') }}"
          secret_api_key: "{{ lookup('env', 'PORKBUN_SECRET_KEY') }}"

    - name: Seed k6-smoke secret
      community.hashi_vault.vault_kv2_write:
        url: "{{ vault_addr }}"
        token: "{{ vault_token_value }}"
        validate_certs: false
        path: "{{ vault_prefix }}/k6-smoke"
        data:
          keycloak_url: "https://auth.pmon.dev"
          keycloak_realm: "schnappy"
          client_id: "k6-smoke"
          client_secret: "{{ lookup('env', 'K6_SMOKE_CLIENT_SECRET') }}"
          app_url: "https://pmon.dev"

    - name: Secrets seeded
      ansible.builtin.debug:
        msg: "All secrets seeded into Pi Vault"
