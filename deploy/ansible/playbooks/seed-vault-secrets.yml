---
# Seed all Vault secrets from .env values
#
# Reads .env from the controller (localhost) and seeds into Vault on the target.
# Handles special characters in passwords safely.
#
# Usage:
#   task deploy:seed-secrets

- name: Seed Vault secrets from .env
  hosts: target
  become: true
  gather_facts: false

  vars:
    vault_ns: vault

  tasks:
    - name: Get Vault root token
      ansible.builtin.shell: |
        kubectl get secret vault-root-token -n {{ vault_ns }} -o jsonpath='{.data.token}' 2>/dev/null | base64 -d || python3 -c "import json; print(json.load(open('/home/sm/src/ops/deploy/ansible/vars/vault-k3s-init.json'))['root_token'])"
      register: vault_token
      changed_when: false
      no_log: true

    - name: Seed postgres secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/postgres \
            database=monitor \
            username=monitor \
            password="{{ MONITOR_DB_PASSWORD }}"
      no_log: true

    - name: Seed redis secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/redis \
            password="{{ REDIS_PASSWORD }}"
      no_log: true

    - name: Seed auth secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/auth \
            jwt_secret="{{ JWT_SECRET }}"
      no_log: true

    - name: Seed mail secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/mail \
            password="{{ MAIL_PASSWORD }}"
      no_log: true

    - name: Seed AI secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/ai \
            api_key="{{ ANTHROPIC_API_KEY }}"
      no_log: true

    - name: Seed webhook secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/webhook \
            signing_secret="{{ RESEND_WEBHOOK_SECRET | default('') }}" \
            api_key="{{ RESEND_API_KEY | default('') }}"
      no_log: true

    - name: Seed minio secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/minio \
            access_key="{{ MINIO_ROOT_USER }}" \
            secret_key="{{ MINIO_ROOT_PASSWORD }}"
      no_log: true

    - name: Seed elasticsearch secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/elasticsearch \
            password="{{ ELASTICSEARCH_PASSWORD }}" \
            kibana_password="{{ KIBANA_PASSWORD }}"
      no_log: true

    - name: Seed grafana secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/grafana \
            admin_user=admin \
            admin_password="{{ GRAFANA_ADMIN_PASSWORD }}"
      no_log: true

    - name: Seed kafka secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/kafka \
            cluster_id="{{ KAFKA_CLUSTER_ID }}"
      no_log: true

    - name: Seed forgejo secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/forgejo \
            admin_username="{{ FORGEJO_ADMIN_USER }}" \
            admin_password="{{ FORGEJO_ADMIN_PASSWORD }}" \
            admin_email="{{ FORGEJO_ADMIN_EMAIL }}"
      no_log: true

    - name: Seed keycloak secret
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_ns }} vault-0 -- env \
          VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
          VAULT_TOKEN="{{ vault_token.stdout }}" \
          vault kv put secret/schnappy/keycloak \
            admin_password="{{ MONITOR_DB_PASSWORD }}" \
            db_password="{{ MONITOR_DB_PASSWORD }}" \
            forgejo_client_secret="{{ KEYCLOAK_FORGEJO_CLIENT_SECRET }}"
      no_log: true

    - name: Secrets seeded
      ansible.builtin.debug:
        msg: "All secrets seeded from {{ env_file }}"
