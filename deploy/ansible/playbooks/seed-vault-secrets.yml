---
# Seed all Vault secrets from .env values
#
# Talks directly to Pi Vault via HTTPS (VIP or pi1).
# Reads root token from Pi init file.
#
# Usage:
#   task deploy:seed-secrets

- name: Seed Vault secrets from .env
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    vault_addr: "https://127.0.0.1:8200"
    vault_env: "VAULT_ADDR={{ vault_addr }} VAULT_SKIP_VERIFY=1 VAULT_TOKEN={{ vault_token_value }}"

  tasks:
    - name: Read Vault root token
      ansible.builtin.slurp:
        src: /etc/vault-unseal/root-token
      register: vault_token_raw

    - name: Set token fact
      ansible.builtin.set_fact:
        vault_token_value: "{{ vault_token_raw.content | b64decode | trim }}"

    - name: Seed postgres secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/postgres \
          database=monitor username=monitor password="{{ MONITOR_DB_PASSWORD }}"
      changed_when: false

    - name: Seed redis secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/redis \
          password="{{ REDIS_PASSWORD }}"
      changed_when: false

    - name: Seed auth secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/auth \
          jwt_secret="{{ JWT_SECRET }}"
      changed_when: false

    - name: Seed mail secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/mail \
          password="{{ MAIL_PASSWORD }}"
      changed_when: false

    - name: Seed AI secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/ai \
          api_key="{{ ANTHROPIC_API_KEY }}"
      changed_when: false

    - name: Seed webhook secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/webhook \
          signing_secret="{{ RESEND_WEBHOOK_SECRET | default('') }}" \
          api_key="{{ RESEND_API_KEY | default('') }}"
      changed_when: false

    - name: Seed minio secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/minio \
          access_key="{{ MINIO_ROOT_USER }}" \
          secret_key="{{ MINIO_ROOT_PASSWORD }}"
      changed_when: false

    - name: Seed elasticsearch secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/elasticsearch \
          password="{{ ELASTICSEARCH_PASSWORD }}" \
          kibana_password="{{ KIBANA_PASSWORD }}"
      changed_when: false

    - name: Seed grafana secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/grafana \
          admin_user=admin \
          admin_password="{{ GRAFANA_ADMIN_PASSWORD }}" \
          oauth_client_id="{{ GRAFANA_OAUTH_CLIENT_ID | default('grafana') }}" \
          oauth_client_secret="{{ GRAFANA_OAUTH_CLIENT_SECRET | default('changeme') }}"
      changed_when: false

    - name: Seed kafka secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/kafka \
          cluster_id="{{ KAFKA_CLUSTER_ID }}"
      changed_when: false

    - name: Seed forgejo secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/forgejo \
          admin_username="{{ FORGEJO_ADMIN_USER }}" \
          admin_password="{{ FORGEJO_ADMIN_PASSWORD }}" \
          admin_email="{{ FORGEJO_ADMIN_EMAIL }}"
      changed_when: false

    - name: Seed keycloak secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/keycloak \
          admin_password="{{ KEYCLOAK_ADMIN_PASSWORD | default('changeme') }}" \
          db_password="{{ KEYCLOAK_DB_PASSWORD | default('changeme') }}" \
          forgejo_client_secret="{{ KEYCLOAK_FORGEJO_CLIENT_SECRET }}" \
          argocd_client_secret="{{ KEYCLOAK_ARGOCD_CLIENT_SECRET | default('changeme') }}" \
          admin_service_client_secret="{{ KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET | default('changeme') }}" \
          k6_smoke_client_secret="{{ KEYCLOAK_K6_SMOKE_CLIENT_SECRET | default('changeme') }}"
      changed_when: false

    - name: Seed alertmanager secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/alertmanager \
          webhook_secret="{{ ALERTMANAGER_WEBHOOK_SECRET | default('unused') }}"
      changed_when: false

    - name: Seed velero secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/velero \
          minio_access_key="{{ VELERO_MINIO_ACCESS_KEY }}" \
          minio_secret_key="{{ VELERO_MINIO_SECRET_KEY }}"
      changed_when: false

    - name: Seed sonarqube secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/sonarqube \
          admin_password="{{ SONARQUBE_ADMIN_PASSWORD | default('changeme') }}" \
          postgres_password="{{ SONARQUBE_POSTGRES_PASSWORD | default('changeme') }}" \
          token="{{ SONARQUBE_TOKEN | default('changeme') }}"
      changed_when: false

    - name: Seed woodpecker-forgejo secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/woodpecker-forgejo \
          client_id="{{ WOODPECKER_FORGEJO_CLIENT | default('changeme') }}" \
          client_secret="{{ WOODPECKER_FORGEJO_SECRET | default('changeme') }}"
      changed_when: false

    - name: Seed woodpecker agent secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/woodpecker \
          agent-secret="{{ WOODPECKER_AGENT_SECRET | default(lookup('password', '/dev/null chars=hexdigits length=64')) }}"
      changed_when: false

    - name: Seed woodpecker-ci secrets
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/woodpecker-ci \
          sonar_token="{{ SONARQUBE_TOKEN | default('changeme') }}" \
          sonar_host_url="https://sonar.pmon.dev" \
          infra_repo_token="{{ WOODPECKER_INFRA_REPO_TOKEN | default('changeme') }}" \
          nexus_url="http://192.168.11.5:8081" \
          nexus_npm_registry="http://192.168.11.5:8081/repository/npm-public/" \
          nvd_api_key="{{ NVD_API_KEY | default('changeme') }}" \
          prometheus_auth_token="{{ PROMETHEUS_AUTH_TOKEN | default('changeme') }}" \
          clone_token="{{ WOODPECKER_CLONE_TOKEN | default('changeme') }}"
      changed_when: false

    - name: Seed porkbun secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/porkbun \
          api_key="{{ PORKBUN_API_KEY }}" \
          secret_api_key="{{ PORKBUN_SECRET_KEY }}"
      changed_when: false

    - name: Seed k6-smoke secret
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/schnappy/k6-smoke \
          keycloak_url="https://auth.pmon.dev" \
          keycloak_realm="schnappy" \
          client_id="k6-smoke" \
          client_secret="{{ K6_SMOKE_CLIENT_SECRET | default('changeme') }}" \
          app_url="https://pmon.dev"
      changed_when: false

    - name: Secrets seeded
      ansible.builtin.debug:
        msg: "All secrets seeded into Pi Vault"
