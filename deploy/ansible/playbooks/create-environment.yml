---
# Create a new schnappy environment (namespace, values, secrets, ArgoCD apps)
#
# Usage:
#   task env:create ENV_NAME=staging
#   task env:create ENV_NAME=pr-123
#
# Prerequisites:
#   - Vault secrets seeded for the environment
#   - Wildcard DNS *.pmon.dev → 192.168.11.2 (already configured)
#
# What it does:
#   1. Creates infra values files (data, apps, mesh) from test template
#   2. Creates cluster-config (namespace, default-deny, quota, forgejo-registry)
#   3. Adds environment to ArgoCD ApplicationSets
#   4. Seeds Vault secrets
#   5. Commits and pushes infra repo
#   6. ArgoCD auto-syncs the new environment

- name: "Create environment: schnappy-{{ env_name }}"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    env_name: "{{ env_name }}"
    namespace: "schnappy-{{ env_name }}"
    release_name: "schnappy-{{ env_name }}"
    infra_dir: "{{ playbook_dir }}/../../../../infra"
    cluster_dir: "{{ infra_dir }}/clusters/production"

  pre_tasks:
    - name: Validate env_name
      ansible.builtin.assert:
        that:
          - env_name is defined
          - env_name | length > 0
          - env_name != "production"
          - env_name is match("^[a-z0-9-]+$")
        fail_msg: "env_name must be a lowercase alphanumeric string (got: '{{ env_name | default('undefined') }}')"

    - name: Check environment doesn't already exist
      ansible.builtin.stat:
        path: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
      register: env_exists

    - name: Fail if environment exists
      ansible.builtin.fail:
        msg: "Environment {{ namespace }} already exists at {{ cluster_dir }}/{{ namespace }}-data/"
      when: env_exists.stat.exists

  tasks:
    # ================================================================
    # Phase 1: Create values files from test template
    # ================================================================

    - name: Create values directories
      ansible.builtin.file:
        path: "{{ cluster_dir }}/{{ namespace }}-{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - data
        - apps
        - mesh

    - name: Copy test data values as template
      ansible.builtin.copy:
        src: "{{ cluster_dir }}/schnappy-test-data/values.yaml"
        dest: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
        mode: '0644'

    - name: Update data values vault prefix
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
        regexp: 'secret/data/schnappy-test'
        replace: "secret/data/{{ namespace }}"

    - name: Update data values existing secrets
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
        regexp: 'schnappy-test-'
        replace: "{{ namespace }}-"

    - name: Copy test apps values as template
      ansible.builtin.copy:
        src: "{{ cluster_dir }}/schnappy-test-apps/values.yaml"
        dest: "{{ cluster_dir }}/{{ namespace }}-apps/values.yaml"
        mode: '0644'

    - name: Update apps values vault prefix
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/{{ namespace }}-apps/values.yaml"
        regexp: 'secret/data/schnappy-test'
        replace: "secret/data/{{ namespace }}"

    - name: Update apps values existing secrets
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/{{ namespace }}-apps/values.yaml"
        regexp: 'schnappy-test-'
        replace: "{{ namespace }}-"

    - name: Copy test mesh values as template
      ansible.builtin.copy:
        src: "{{ cluster_dir }}/schnappy-test-mesh/values.yaml"
        dest: "{{ cluster_dir }}/{{ namespace }}-mesh/values.yaml"
        mode: '0644'

    - name: "Phase 1 complete: values files created"
      ansible.builtin.debug:
        msg: "Created {{ namespace }}-{data,apps,mesh}/values.yaml"

    # ================================================================
    # Phase 2: Create cluster-config resources
    # ================================================================

    - name: Create namespace manifest
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/cluster-config/{{ namespace }}-namespace.yaml"
        mode: '0644'
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ namespace }}
            labels:
              istio.io/rev: default
              environment: {{ env_name }}

    - name: Create default-deny + quota
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/cluster-config/{{ namespace }}-default-deny.yaml"
        mode: '0644'
        content: |
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: {{ namespace }}-default-deny
            namespace: {{ namespace }}
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
            ingress:
              - from:
                  - podSelector: {}
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: argocd
                ports:
                  - protocol: TCP
                    port: 8080
              # Gateway ingress (cross-namespace routing from prod gateway)
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: schnappy
                    podSelector:
                      matchLabels:
                        gateway.networking.k8s.io/gateway-name: schnappy-gateway
                ports:
                  - protocol: TCP
                    port: 8080
              # Kubelet probes
              - ports:
                  - protocol: TCP
                    port: 15021
            egress:
              # DNS
              - ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53
              # Intra-namespace
              - to:
                  - podSelector: {}
              # Istio control plane
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: istio-system
                ports:
                  - protocol: TCP
                    port: 15012
                  - protocol: TCP
                    port: 15010
                  - protocol: TCP
                    port: 15014
                  - protocol: TCP
                    port: 443
              # Kubernetes API
              - ports:
                  - protocol: TCP
                    port: 443
                  - protocol: TCP
                    port: 6443
              # Pi services (Vault for ESO)
              - to:
                  - ipBlock:
                      cidr: 192.168.11.5/32
                ports:
                  - protocol: TCP
                    port: 8200
              # Observability (traces to prod Tempo)
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: schnappy
                ports:
                  - protocol: TCP
                    port: 4318
          ---
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: {{ namespace }}-quota
            namespace: {{ namespace }}
          spec:
            hard:
              requests.cpu: "4"
              requests.memory: 8Gi
              limits.cpu: "32"
              limits.memory: 24Gi

    - name: Add forgejo-registry secret for new namespace
      ansible.builtin.blockinfile:
        path: "{{ cluster_dir }}/cluster-config/forgejo-registry-secret.yaml"
        marker: "# {mark} {{ namespace }}"
        insertbefore: EOF
        block: |
          ---
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: forgejo-registry-es
            namespace: {{ namespace }}
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            target:
              name: forgejo-registry
              template:
                type: kubernetes.io/dockerconfigjson
                data:
                  .dockerconfigjson: |
                    {"auths":{"git.pmon.dev":{"username":"{{ '{{' }} .registry_user {{ '}}' }}","password":"{{ '{{' }} .registry_token {{ '}}' }}"}}}
            data:
              - secretKey: registry_user
                remoteRef:
                  key: secret/data/schnappy/forgejo
                  property: admin_username
              - secretKey: registry_token
                remoteRef:
                  key: secret/data/schnappy/forgejo
                  property: admin_password

    - name: "Phase 2 complete: cluster-config created"
      ansible.builtin.debug:
        msg: "Created namespace, default-deny, quota, forgejo-registry for {{ namespace }}"

    # ================================================================
    # Phase 3: Add to ApplicationSets
    # ================================================================

    - name: Add env to data ApplicationSet
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/argocd/apps/schnappy-data-envs.yaml"
        regexp: '(  template:)'
        replace: |4
                    - env: {{ env_name }}
                      namespace: {{ namespace }}
                      releaseName: {{ release_name }}
                      valuesPath: clusters/production/{{ namespace }}-data/values.yaml
                      syncWave: "0"
            \1

    - name: Add env to apps ApplicationSet
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/argocd/apps/schnappy-apps-envs.yaml"
        regexp: '(  template:)'
        replace: |4
                    - env: {{ env_name }}
                      namespace: {{ namespace }}
                      releaseName: {{ release_name }}
                      valuesPath: clusters/production/{{ namespace }}-apps/values.yaml
                      syncWave: "0"
            \1

    - name: Add env to mesh ApplicationSet
      ansible.builtin.replace:
        path: "{{ cluster_dir }}/argocd/apps/schnappy-mesh-envs.yaml"
        regexp: '(  template:)'
        replace: |4
                    - env: {{ env_name }}
                      namespace: {{ namespace }}
                      releaseName: {{ release_name }}
                      valuesPath: clusters/production/{{ namespace }}-mesh/values.yaml
                      syncWave: "0"
            \1

    - name: "Phase 3 complete: ApplicationSets updated"
      ansible.builtin.debug:
        msg: "Added {{ env_name }} to all 3 ApplicationSets"

    # ================================================================
    # Phase 4: Seed Vault secrets
    # ================================================================

    - name: Generate passwords for new environment
      ansible.builtin.set_fact:
        env_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        env_redis_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        env_minio_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        env_kafka_cluster_id: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=22') }}"

    - name: Seed Vault secrets for {{ namespace }}
      ansible.builtin.include_tasks: seed-vault-secrets.yml
      vars:
        vault_prefix: "{{ namespace }}"
        MONITOR_DB_PASSWORD: "{{ env_db_password }}"
        REDIS_PASSWORD: "{{ env_redis_password }}"
        MINIO_ROOT_USER: "admin"
        MINIO_ROOT_PASSWORD: "{{ env_minio_password }}"
        KAFKA_CLUSTER_ID: "{{ env_kafka_cluster_id }}"
        JWT_SECRET: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
        MAIL_PASSWORD: "{{ MAIL_PASSWORD | default('') }}"
        ANTHROPIC_API_KEY: "{{ ANTHROPIC_API_KEY | default('') }}"
        RESEND_WEBHOOK_SECRET: "{{ RESEND_WEBHOOK_SECRET | default('') }}"
        RESEND_API_KEY: "{{ RESEND_API_KEY | default('') }}"
        ELASTICSEARCH_PASSWORD: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        KIBANA_PASSWORD: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        GRAFANA_ADMIN_PASSWORD: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
      when: seed_vault | default(true) | bool

    # ================================================================
    # Phase 5: Commit and push
    # ================================================================

    - name: Commit and push infra changes
      ansible.builtin.shell: |
        cd {{ infra_dir }}
        git add -A
        git commit -m "env: create {{ namespace }} environment"
        git push
      register: git_push
      changed_when: git_push.rc == 0

    - name: "DONE: Environment {{ namespace }} created"
      ansible.builtin.debug:
        msg: |
          Environment {{ namespace }} created successfully.
          ArgoCD will auto-sync within 3 minutes.
          Access at: https://{{ env_name }}.pmon.dev (once apps are running)
