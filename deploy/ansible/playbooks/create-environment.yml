---
# Create a new schnappy environment
#
# Usage:
#   task env:create ENV_NAME=staging
#
# Creates: namespace, values files, cluster-config, ApplicationSet entries,
# Vault secrets, Keycloak redirect URI, gateway ReferenceGrant entry.
# Commits and pushes infra repo. ArgoCD auto-syncs.
#
# Prerequisites:
#   - Wildcard DNS *.pmon.dev → 192.168.11.2
#   - Vault running on Pi
#   - ArgoCD running with ApplicationSets

- name: "Create environment: schnappy-{{ env_name }}"
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    env_name: "{{ env_name }}"
    namespace: "schnappy-{{ env_name }}"
    release_name: "schnappy-{{ env_name }}"
    infra_dir: "{{ infra_dir_override | default(playbook_dir + '/../../../../infra') }}"
    cluster_dir: "{{ infra_dir }}/clusters/production"
    vault_addr: "https://127.0.0.1:8200"
    forgejo_url: "http://localhost:3000"
    keycloak_url: "http://localhost:8080"
    infra_git_url: "{{ infra_git_url_override | default('') }}"

  pre_tasks:
    - name: Validate env_name
      ansible.builtin.assert:
        that:
          - env_name is defined
          - env_name | length > 0
          - env_name != "production"
          - env_name is match("^[a-z0-9-]+$")
        fail_msg: "env_name must be lowercase alphanumeric (got: '{{ env_name | default('undefined') }}')"

    - name: Check environment doesn't already exist
      ansible.builtin.stat:
        path: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
      register: env_exists
      delegate_to: localhost
      become: false

    - name: Fail if environment exists
      ansible.builtin.fail:
        msg: "Environment {{ namespace }} already exists"
      when: env_exists.stat.exists

    - name: Read Vault root token (production path)
      ansible.builtin.slurp:
        src: /etc/vault-unseal/root-token
      register: vault_token_prod
      failed_when: false

    - name: Read Vault root token (vagrant path)
      ansible.builtin.shell: |
        jq -r .root_token /tmp/vault-init.json
      register: vault_token_vagrant
      changed_when: false
      failed_when: false
      when: vault_token_prod.content is not defined

    - name: Set vault env
      ansible.builtin.set_fact:
        vault_env: >-
          VAULT_ADDR={{ vault_addr }} VAULT_SKIP_VERIFY=1 VAULT_TOKEN={{
          (vault_token_prod.content | b64decode | trim)
          if vault_token_prod.content is defined
          else vault_token_vagrant.stdout | trim
          }}

    - name: Generate passwords
      ansible.builtin.set_fact:
        gen_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        gen_redis_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        gen_minio_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
        gen_jwt_secret: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
        gen_kafka_cluster_id: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=22') }}"
      delegate_to: localhost
      become: false

  tasks:
    # ================================================================
    # Phase 1: Seed Vault secrets
    # ================================================================

    - name: Ensure KV secrets engine is mounted
      ansible.builtin.shell: |
        {{ vault_env }} vault secrets list -format=json | grep -q '"secret/"' || \
        {{ vault_env }} vault secrets enable -path=secret kv-v2
      changed_when: false
      failed_when: false

    - name: Seed Vault secrets for {{ namespace }}
      ansible.builtin.shell: |
        {{ vault_env }} vault kv put secret/{{ namespace }}/postgres \
          database=monitor username=monitor password="{{ gen_db_password }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/redis \
          password="{{ gen_redis_password }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/auth \
          jwt_secret="{{ gen_jwt_secret }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/minio \
          access_key=admin secret_key="{{ gen_minio_password }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/kafka \
          cluster_id="{{ gen_kafka_cluster_id }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/ai \
          api_key="{{ ANTHROPIC_API_KEY | default('placeholder') }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/mail \
          password="{{ MAIL_PASSWORD | default('placeholder') }}"
        {{ vault_env }} vault kv put secret/{{ namespace }}/webhook \
          signing_secret="{{ RESEND_WEBHOOK_SECRET | default('') }}" \
          api_key="{{ RESEND_API_KEY | default('') }}"
      changed_when: true

    - name: "PHASE 1: Vault secrets seeded"
      ansible.builtin.debug:
        msg: "Seeded secrets at secret/{{ namespace }}/*"

    # ================================================================
    # Phase 2: Add Keycloak redirect URI
    # ================================================================

    - name: Check if Keycloak schnappy realm exists
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/schnappy/.well-known/openid-configuration"
        validate_certs: false
        status_code: [200, 404]
      register: kc_realm_check
      failed_when: false

    - name: Get Keycloak admin password
      ansible.builtin.shell: |
        {{ vault_env }} vault kv get -field=admin_password secret/schnappy/keycloak
      register: kc_password
      changed_when: false
      when: kc_realm_check.status == 200

    - name: Get Keycloak admin token
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: admin-cli
          username: admin
          password: "{{ kc_password.stdout }}"
          grant_type: password
        validate_certs: false
      register: kc_token
      when: kc_realm_check.status == 200

    - name: Get app client config
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/admin/realms/schnappy/clients?clientId=app&first=0&max=1"
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
        validate_certs: false
      register: kc_app_client
      when: kc_realm_check.status == 200

    - name: Add redirect URI
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/admin/realms/schnappy/clients/{{ kc_app_client.json[0].id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          clientId: app
          redirectUris: "{{ kc_app_client.json[0].redirectUris + ['https://' + env_name + '.pmon.dev/*'] | unique }}"
          webOrigins: "{{ kc_app_client.json[0].webOrigins }}"
        validate_certs: false
        status_code: 204
      when: kc_realm_check.status == 200

    - name: "PHASE 2: Keycloak redirect URI added"
      ansible.builtin.debug:
        msg: "{{ 'Added https://' + env_name + '.pmon.dev/* to Keycloak' if kc_realm_check.status == 200 else 'Skipped (no schnappy realm)' }}"

    # ================================================================
    # Phase 3: Create infra files (runs on localhost)
    # ================================================================

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ cluster_dir }}/{{ namespace }}-data"
        - "{{ cluster_dir }}/{{ namespace }}-apps"
        - "{{ cluster_dir }}/{{ namespace }}-mesh"
        - "{{ cluster_dir }}/cluster-config"
        - "{{ cluster_dir }}/argocd/apps"
      delegate_to: localhost
      become: false

    - name: Create data values
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/{{ namespace }}-data/values.yaml"
        mode: '0644'
        content: |
          vault:
            secretsEnabled: true
            secretPathPrefix: "secret/data/{{ namespace }}"

          networkPolicies:
            enabled: true

          postgres:
            enabled: false

          redis:
            enabled: true
            existingSecret: {{ namespace }}-redis
            image: redis:7-alpine
            resources:
              requests: { cpu: 10m, memory: 32Mi }
              limits: { cpu: 100m, memory: 128Mi }

          kafka:
            enabled: false
            existingSecret: {{ namespace }}-kafka
            resources:
              requests: { cpu: 50m, memory: 512Mi }
              limits: { cpu: 1000m, memory: 1536Mi }
            retention:
              hours: 24
              bytes: "2147483648"
            storage:
              size: 2Gi
              storageClass: local-path

          scylla:
            enabled: false
            resources:
              requests: { cpu: 50m, memory: 256Mi }
              limits: { cpu: 1000m, memory: 512Mi }

          scyllaOperator:
            enabled: true
            version: "6.2.3"
            agentVersion: "3.9.0"
            developerMode: true

          minio:
            enabled: true
            existingSecret: {{ namespace }}-minio
            bucket: email-attachments
            buckets:
              - email-attachments
            image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
            storage:
              size: 5Gi
              storageClass: local-path
            resources:
              requests: { cpu: 25m, memory: 128Mi }
              limits: { cpu: 500m, memory: 512Mi }

          strimzi:
            enabled: true

          cnpg:
            enabled: true
            import: false
            backup: false

          aptCache:
            enabled: false
      delegate_to: localhost
      become: false

    - name: Create apps values
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/{{ namespace }}-apps/values.yaml"
        mode: '0644'
        content: |
          vault:
            secretsEnabled: true
            secretPathPrefix: "secret/data/{{ namespace }}"

          app:
            replicas: 1
            javaOpts: -Xmx1g -XX:+UseZGC
            image:
              pullPolicy: IfNotPresent
              repository: git.pmon.dev/schnappy/monitor
              tag: "latest"
            ingress:
              enabled: false
            resources:
              requests: { cpu: 50m, memory: 512Mi }
              limits: { cpu: 2000m, memory: 2Gi }

          site:
            enabled: true
            replicas: 1
            image:
              pullPolicy: IfNotPresent
              repository: git.pmon.dev/schnappy/site
              tag: "latest"
            resources:
              requests: { cpu: 10m, memory: 32Mi }
              limits: { cpu: 500m, memory: 128Mi }

          games: []

          auth:
            existingSecret: {{ namespace }}-auth
            registrationEnabled: true
            secureCookies: true
            tokenExpiration: 1h

          captcha:
            enabled: false

          chess:
            enabled: true

          chat:
            e2eEnabled: false

          monitor:
            enabled: true

          networkPolicies:
            enabled: true

          strimzi:
            enabled: true

          cnpg:
            enabled: true

          scyllaOperator:
            enabled: true

          ai:
            enabled: false

          mail:
            enabled: false

          webhook:
            enabled: false

          admin:
            enabled: true
            image:
              repository: git.pmon.dev/schnappy/admin
              pullPolicy: IfNotPresent
              tag: "latest"
            replicas: 1
            javaOpts: -Xmx512m -XX:+UseZGC
            resources:
              requests: { cpu: 50m, memory: 256Mi }
              limits: { cpu: 1000m, memory: 1Gi }

          chatService:
            enabled: true
            image:
              repository: git.pmon.dev/schnappy/chat
              pullPolicy: IfNotPresent
              tag: "latest"
            replicas: 1
            javaOpts: -Xmx512m -XX:+UseZGC
            resources:
              requests: { cpu: 50m, memory: 256Mi }
              limits: { cpu: 1000m, memory: 1Gi }

          chessService:
            enabled: true
            image:
              repository: git.pmon.dev/schnappy/chess
              pullPolicy: IfNotPresent
              tag: "latest"
            replicas: 1
            javaOpts: -Xmx512m -XX:+UseZGC
            resources:
              requests: { cpu: 50m, memory: 256Mi }
              limits: { cpu: 1000m, memory: 1Gi }

          tracing:
            enabled: false

          smokeTest:
            enabled: false

          hyperfoil:
            enabled: false

          postgres:
            database: monitor
            existingSecret: {{ namespace }}-postgres
          redis:
            existingSecret: {{ namespace }}-redis
          minio:
            existingSecret: {{ namespace }}-minio
          alertmanager:
            enabled: false
          keycloak:
            enabled: false
      delegate_to: localhost
      become: false

    - name: Create mesh values
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/{{ namespace }}-mesh/values.yaml"
        mode: '0644'
        content: |
          scyllaOperator:
            enabled: true

          peerAuthentication:
            enabled: true
            mode: STRICT

          authorizationPolicies:
            enabled: true

          gateway:
            enabled: false
            external:
              enabled: true
              gatewayName: schnappy-gateway
              gatewayNamespace: schnappy
              hostname: {{ env_name }}.pmon.dev

          jwt:
            enabled: false
      delegate_to: localhost
      become: false

    - name: Create namespace manifest
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/cluster-config/{{ namespace }}-namespace.yaml"
        mode: '0644'
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ namespace }}
            labels:
              istio.io/rev: default
              environment: {{ env_name }}
      delegate_to: localhost
      become: false

    - name: Create default-deny + quota
      ansible.builtin.copy:
        dest: "{{ cluster_dir }}/cluster-config/{{ namespace }}-default-deny.yaml"
        mode: '0644'
        content: |
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: {{ namespace }}-default-deny
            namespace: {{ namespace }}
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
            ingress:
              - from:
                  - podSelector: {}
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: argocd
                ports:
                  - protocol: TCP
                    port: 8080
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: schnappy
                    podSelector:
                      matchLabels:
                        gateway.networking.k8s.io/gateway-name: schnappy-gateway
              - ports:
                  - protocol: TCP
                    port: 15021
            egress:
              - ports:
                  - { protocol: UDP, port: 53 }
                  - { protocol: TCP, port: 53 }
              - to:
                  - podSelector: {}
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: istio-system
                ports:
                  - { protocol: TCP, port: 15012 }
                  - { protocol: TCP, port: 15010 }
                  - { protocol: TCP, port: 15014 }
                  - { protocol: TCP, port: 443 }
              - ports:
                  - { protocol: TCP, port: 443 }
                  - { protocol: TCP, port: 6443 }
              - to:
                  - ipBlock:
                      cidr: 192.168.11.5/32
                ports:
                  - { protocol: TCP, port: 8200 }
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: schnappy
                ports:
                  - { protocol: TCP, port: 4318 }
          ---
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: {{ namespace }}-quota
            namespace: {{ namespace }}
          spec:
            hard:
              requests.cpu: "4"
              requests.memory: 8Gi
              limits.cpu: "32"
              limits.memory: 24Gi
      delegate_to: localhost
      become: false

    - name: Add forgejo-registry secret
      ansible.builtin.blockinfile:
        path: "{{ cluster_dir }}/cluster-config/forgejo-registry-secret.yaml"
        marker: "# {mark} {{ namespace }}"
        create: true
        insertbefore: EOF
        block: |
          ---
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: forgejo-registry-es
            namespace: {{ namespace }}
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            target:
              name: forgejo-registry
              template:
                type: kubernetes.io/dockerconfigjson
                data:
                  .dockerconfigjson: |
                    {"auths":{"git.pmon.dev":{"username":"{{ '{{' }} .registry_user {{ '}}' }}","password":"{{ '{{' }} .registry_token {{ '}}' }}"}}}
            data:
              - secretKey: registry_user
                remoteRef:
                  key: secret/data/schnappy/forgejo
                  property: admin_username
              - secretKey: registry_token
                remoteRef:
                  key: secret/data/schnappy/forgejo
                  property: admin_password
      delegate_to: localhost
      become: false

    - name: "PHASE 3: Infra files created"
      ansible.builtin.debug:
        msg: "Created values, namespace, NP, quota, forgejo-registry"

    # ================================================================
    # Phase 4: Update ApplicationSets + gateway ReferenceGrant
    # ================================================================

    - name: Add env to ApplicationSets
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        import yaml, os

        appsets = {
            'data': '{{ cluster_dir }}/argocd/apps/schnappy-data-envs.yaml',
            'apps': '{{ cluster_dir }}/argocd/apps/schnappy-apps-envs.yaml',
            'mesh': '{{ cluster_dir }}/argocd/apps/schnappy-mesh-envs.yaml',
        }
        for chart, path in appsets.items():
            if os.path.exists(path):
                with open(path) as f:
                    doc = yaml.safe_load(f)
                elements = doc['spec']['generators'][0]['list']['elements']
            else:
                # Create minimal ApplicationSet structure
                doc = {
                    'apiVersion': 'argoproj.io/v1alpha1',
                    'kind': 'ApplicationSet',
                    'metadata': {'name': f'schnappy-{chart}-envs', 'namespace': 'argocd'},
                    'spec': {
                        'generators': [{'list': {'elements': []}}],
                        'template': {
                            'metadata': {'name': f'schnappy-{"{{"}{chart}{"}}"}', 'namespace': 'argocd'},
                            'spec': {
                                'project': 'default',
                                'sources': [
                                    {'repoURL': 'http://{{ hostvars["pi1"]["ansible_host"] | default("192.168.11.5") }}:3000/schnappy/platform.git',
                                     'targetRevision': 'main', 'path': f'helm/schnappy-{chart}',
                                     'helm': {'releaseName': '{{"{{releaseName}}"}}', 'valueFiles': ['$values/{{"{{valuesPath}}"}}']}},
                                    {'repoURL': 'http://{{ hostvars["pi1"]["ansible_host"] | default("192.168.11.5") }}:3000/schnappy/infra.git',
                                     'targetRevision': 'main', 'ref': 'values'}
                                ],
                                'destination': {'server': 'https://kubernetes.default.svc', 'namespace': '{{"{{namespace}}"}}'},
                                'syncPolicy': {'automated': {'selfHeal': True, 'prune': False}, 'syncOptions': ['CreateNamespace=true', 'RespectIgnoreDifferences=true']}
                            }
                        }
                    }
                }
                elements = doc['spec']['generators'][0]['list']['elements']

            if not any(e['env'] == '{{ env_name }}' for e in elements):
                elements.append({
                    'env': '{{ env_name }}',
                    'namespace': '{{ namespace }}',
                    'releaseName': '{{ release_name }}',
                    'valuesPath': f'clusters/production/{{ namespace }}-{chart}/values.yaml',
                    'syncWave': '0',
                })
            with open(path, 'w') as f:
                yaml.dump(doc, f, default_flow_style=False, sort_keys=False)
        PYEOF
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Add namespace to gateway allowedNamespaces
      ansible.builtin.lineinfile:
        path: "{{ cluster_dir }}/schnappy-mesh/values.yaml"
        insertafter: 'allowedNamespaces:'
        line: "    - {{ namespace }}"
        create: true
      delegate_to: localhost
      become: false

    - name: "PHASE 4: ApplicationSets and gateway updated"
      ansible.builtin.debug:
        msg: "Added {{ env_name }} to ApplicationSets and gateway ReferenceGrant"

    # ================================================================
    # Phase 5: Commit and push
    # ================================================================

    - name: Commit and push infra
      ansible.builtin.shell: |
        cd {{ infra_dir }}
        git add -A
        git diff --cached --quiet && echo "no changes" && exit 0
        git commit -m "env: create {{ namespace }}"
        {% if infra_git_url %}
        git push {{ infra_git_url }} main
        {% else %}
        git push origin main
        {% endif %}
      delegate_to: localhost
      become: false
      changed_when: true
      environment:
        GIT_AUTHOR_NAME: "env-automation"
        GIT_AUTHOR_EMAIL: "automation@pmon.dev"
        GIT_COMMITTER_NAME: "env-automation"
        GIT_COMMITTER_EMAIL: "automation@pmon.dev"

    - name: "DONE"
      ansible.builtin.debug:
        msg: |
          Environment {{ namespace }} created.
          ArgoCD will sync within 3 minutes.
          URL: https://{{ env_name }}.pmon.dev
