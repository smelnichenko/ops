---
# Setup GlusterFS for Forgejo repo replication between pi1 and pi2
#
# Creates a replicated GlusterFS volume for /var/lib/forgejo/repos
# Both nodes serve the same data — FUSE-based, no kernel module dependency
#
# Prerequisites:
#   - Both Pis running with Forgejo installed
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-gluster.yml

# ─── Install and configure GlusterFS on both Pis ────────────────────────────
- name: Setup GlusterFS
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    gluster_brick: /var/lib/gluster/forgejo-brick
    forgejo_uid: 900
    forgejo_gid: 900

  tasks:
    - name: Install GlusterFS
      ansible.builtin.apt:
        name: glusterfs-server
        state: present

    - name: Allow GlusterFS ports through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.name }}"
      loop:
        - { port: "24007", proto: "tcp", name: "GlusterFS daemon" }
        - { port: "24008", proto: "tcp", name: "GlusterFS management" }
        - { port: "49152:61000", proto: "tcp", name: "GlusterFS bricks" }

    - name: Enable and start GlusterFS
      ansible.builtin.systemd:
        name: glusterd
        enabled: true
        state: started

    - name: Align Forgejo UID/GID across nodes
      ansible.builtin.shell: |
        CURRENT_UID=$(id -u forgejo)
        if [ "$CURRENT_UID" != "{{ forgejo_uid }}" ]; then
          systemctl stop forgejo 2>/dev/null || true
          groupmod -g {{ forgejo_gid }} forgejo
          usermod -u {{ forgejo_uid }} -g {{ forgejo_gid }} forgejo
          find /var/lib/forgejo -not -path '/var/lib/forgejo/repos/*' -exec chown -h {{ forgejo_uid }}:{{ forgejo_gid }} {} +
          echo "changed"
        else
          echo "ok"
        fi
      register: uid_result
      changed_when: "'changed' in uid_result.stdout"

    - name: Create brick directory
      ansible.builtin.file:
        path: "{{ gluster_brick }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

# ─── Probe peers and create volume from pi1 ─────────────────────────────────
- name: Create GlusterFS volume
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    gluster_brick: /var/lib/gluster/forgejo-brick
    gluster_mount: /var/lib/forgejo/repos
    forgejo_uid: 900
    forgejo_gid: 900

  tasks:
    - name: Probe pi2
      ansible.builtin.shell: |
        gluster peer probe {{ hostvars['pi2']['ansible_host'] }} 2>&1
      register: peer_probe
      changed_when: "'already in peer list' not in peer_probe.stdout"

    - name: Wait for peer to connect
      ansible.builtin.shell: |
        set -o pipefail
        gluster peer status | grep -c 'State: Peer in Cluster (Connected)'
      register: peer_status
      until: peer_status.stdout | trim | int >= 1
      retries: 12
      delay: 5
      changed_when: false

    - name: Check if volume exists
      ansible.builtin.shell: |
        gluster volume info forgejo-repos 2>/dev/null && echo "exists" || echo "not-found"
      register: vol_info
      changed_when: false

    - name: Stop Forgejo on pi1
      ansible.builtin.systemd:
        name: forgejo
        state: stopped
      when: "'not-found' in vol_info.stdout"

    - name: Stop Forgejo on pi2
      ansible.builtin.systemd:
        name: forgejo
        state: stopped
      delegate_to: pi2
      when: "'not-found' in vol_info.stdout"

    - name: Copy existing repos to brick on pi1
      ansible.builtin.shell: |
        if [ -d {{ gluster_mount }}/schnappy ]; then
          cp -a {{ gluster_mount }}/schnappy {{ gluster_brick }}/
          chown -R {{ forgejo_uid }}:{{ forgejo_gid }} {{ gluster_brick }}/
        fi
      when: "'not-found' in vol_info.stdout"
      changed_when: true

    - name: Create replicated volume
      ansible.builtin.shell: |
        gluster volume create forgejo-repos replica 2 \
          {{ hostvars['pi1']['ansible_host'] }}:{{ gluster_brick }} \
          {{ hostvars['pi2']['ansible_host'] }}:{{ gluster_brick }} \
          force 2>&1
      when: "'not-found' in vol_info.stdout"
      changed_when: true

    - name: Set volume options
      ansible.builtin.shell: |
        gluster volume set forgejo-repos auth.allow {{ hostvars['pi1']['ansible_host'] }},{{ hostvars['pi2']['ansible_host'] }},127.0.0.1
        gluster volume set forgejo-repos performance.cache-size 256MB
        gluster volume set forgejo-repos server.allow-insecure on
      when: "'not-found' in vol_info.stdout"
      changed_when: true

    - name: Start volume
      ansible.builtin.shell: |
        gluster volume start forgejo-repos 2>&1
      when: "'not-found' in vol_info.stdout"
      changed_when: true

# ─── Mount GlusterFS on both Pis ────────────────────────────────────────────
- name: Mount GlusterFS volume
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    gluster_mount: /var/lib/forgejo/repos
    node_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"

  tasks:
    - name: Stop Forgejo
      ansible.builtin.systemd:
        name: forgejo
        state: stopped

    - name: Unmount if already mounted  # noqa: syntax-check[unknown-module]
      ansible.builtin.mount:
        path: "{{ gluster_mount }}"
        state: unmounted

    - name: Mount GlusterFS volume
      ansible.builtin.mount:
        path: "{{ gluster_mount }}"
        src: "{{ node_ip }}:/forgejo-repos"
        fstype: glusterfs
        opts: "defaults,_netdev,backup-volfile-servers={{ pi2_ip if inventory_hostname == 'pi1' else pi1_ip }}"
        state: mounted

    - name: Fix ownership
      ansible.builtin.file:
        path: "{{ gluster_mount }}"
        owner: forgejo
        group: forgejo
        mode: '0700'

    - name: Start Forgejo
      ansible.builtin.systemd:
        name: forgejo
        state: started

# ─── Verify ─────────────────────────────────────────────────────────────────
- name: Verify GlusterFS
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Check volume status
      ansible.builtin.shell: |
        gluster volume status forgejo-repos
      register: vol_status
      changed_when: false

    - name: Check replication
      ansible.builtin.shell: |
        gluster volume heal forgejo-repos info
      register: heal_info
      changed_when: false

    - name: Check mount on both nodes
      ansible.builtin.shell: |
        set -o pipefail
        mount | grep forgejo-repos
      register: mount_check
      changed_when: false
      delegate_to: "{{ item }}"
      loop:
        - pi1
        - pi2

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          GlusterFS Setup — forgejo-repos Complete
          ============================================
          {{ vol_status.stdout }}
          ============================================
          Heal status:
          {{ heal_info.stdout }}
          ============================================

# ─── Remove old monolithic backups volume if present ───────────────────────
- name: Remove old backups volume
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Unmount old /mnt/backups if GlusterFS
      ansible.builtin.shell: |
        if mount | grep -q 'backups on /mnt/backups.*glusterfs'; then
          umount /mnt/backups
          sed -i '/\/backups/d' /etc/fstab
          echo "unmounted"
        else
          echo "skip"
        fi
      register: unmount_old
      changed_when: "'unmounted' in unmount_old.stdout"

- name: Stop old backups volume
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Stop and delete old backups volume
      ansible.builtin.shell: |
        if gluster volume info backups >/dev/null 2>&1; then
          gluster volume stop backups force --mode=script
          gluster volume delete backups --mode=script
          echo "deleted"
        else
          echo "skip"
        fi
      register: delete_old
      changed_when: "'deleted' in delete_old.stdout"

# ─── Backup GlusterFS volumes (scylla, postgres, velero) ───────────────────
- name: Create backup GlusterFS volumes
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    backup_volumes:
      - name: backup-scylla
        brick: /var/lib/gluster/backup-scylla-brick
        mount: /mnt/backups/scylla
        minio_bucket: scylla-backups
      - name: backup-postgres
        brick: /var/lib/gluster/backup-postgres-brick
        mount: /mnt/backups/postgres
        minio_bucket: postgres-backups
      - name: backup-velero
        brick: /var/lib/gluster/backup-velero-brick
        mount: /mnt/backups/velero
        minio_bucket: ""

  tasks:
    - name: Create brick directories on both nodes
      ansible.builtin.file:
        path: "{{ item.1.brick }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      delegate_to: "{{ item.0 }}"
      loop: "{{ ['pi1', 'pi2'] | product(backup_volumes) | list }}"

    - name: Create replicated volumes
      ansible.builtin.shell: |
        if gluster volume info {{ item.name }} >/dev/null 2>&1; then
          echo "exists"
        else
          gluster volume create {{ item.name }} replica 2 \
            {{ pi1_ip }}:{{ item.brick }} \
            {{ pi2_ip }}:{{ item.brick }} \
            force
          gluster volume set {{ item.name }} auth.allow {{ pi1_ip }},{{ pi2_ip }},127.0.0.1
          gluster volume set {{ item.name }} server.allow-insecure on
          gluster volume start {{ item.name }}
          echo "created"
        fi
      register: vol_create
      changed_when: "'created' in vol_create.stdout"
      loop: "{{ backup_volumes }}"

    - name: Migrate existing MinIO data to bricks
      ansible.builtin.shell: |
        SRC=/var/lib/minio/data/{{ item.minio_bucket }}
        if [ -d "$SRC" ] && [ "$(ls -A {{ item.brick }}/ 2>/dev/null | head -1)" = "" ]; then
          cp -a "$SRC"/* {{ item.brick }}/ 2>/dev/null || true
          echo "migrated"
        else
          echo "skip"
        fi
      register: migrate
      changed_when: "'migrated' in migrate.stdout"
      loop: "{{ backup_volumes }}"
      when: item.minio_bucket | length > 0

    - name: Migrate existing Velero offsite data to brick
      ansible.builtin.shell: |
        SRC=/mnt/backups/offsite
        BRICK=/var/lib/gluster/backup-velero-brick
        if [ -d "$SRC" ] && [ "$(ls -A $BRICK/ 2>/dev/null | head -1)" = "" ]; then
          cp -a "$SRC"/* $BRICK/ 2>/dev/null || true
          echo "migrated"
        else
          echo "skip"
        fi
      register: velero_migrate
      changed_when: "'migrated' in velero_migrate.stdout"

- name: Mount backup GlusterFS volumes
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    node_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    backup_volumes:
      - { name: backup-scylla, mount: /mnt/backups/scylla }
      - { name: backup-postgres, mount: /mnt/backups/postgres }
      - { name: backup-velero, mount: /mnt/backups/velero }

  tasks:
    - name: Create mount points
      ansible.builtin.file:
        path: "{{ item.mount }}"
        state: directory
        mode: '0755'
      loop: "{{ backup_volumes }}"

    - name: Mount backup volumes
      ansible.builtin.mount:
        path: "{{ item.mount }}"
        src: "{{ node_ip }}:/{{ item.name }}"
        fstype: glusterfs
        opts: "defaults,_netdev,backup-volfile-servers={{ pi2_ip if inventory_hostname == 'pi1' else pi1_ip }}"
        state: mounted
      loop: "{{ backup_volumes }}"

- name: Reconfigure Pi MinIO to use GlusterFS-backed paths
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Stop MinIO
      ansible.builtin.systemd:
        name: minio
        state: stopped
      failed_when: false

    - name: Replace MinIO bucket dirs with symlinks to GlusterFS
      ansible.builtin.shell: |
        for pair in "postgres-backups:/mnt/backups/postgres" "scylla-backups:/mnt/backups/scylla"; do
          BUCKET="${pair%%:*}"
          MOUNT="${pair##*:}"
          DIR="/var/lib/minio/data/$BUCKET"
          if [ -d "$DIR" ] && [ ! -L "$DIR" ]; then
            # Move any remaining data to GlusterFS
            cp -an "$DIR"/* "$MOUNT/" 2>/dev/null || true
            rm -rf "$DIR"
            ln -s "$MOUNT" "$DIR"
            echo "linked $BUCKET"
          elif [ ! -e "$DIR" ]; then
            ln -s "$MOUNT" "$DIR"
            echo "linked $BUCKET"
          else
            echo "skip $BUCKET"
          fi
        done
      register: symlink_result
      changed_when: "'linked' in symlink_result.stdout"

    - name: Fix MinIO data ownership
      ansible.builtin.file:
        path: "/var/lib/minio/data"
        owner: minio
        group: minio
        recurse: true
      failed_when: false

    - name: Start MinIO
      ansible.builtin.systemd:
        name: minio
        state: started
      failed_when: false

- name: Verify backup volumes
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Check all backup volume statuses
      ansible.builtin.shell: |
        for vol in backup-scylla backup-postgres backup-velero; do
          echo "=== $vol ==="
          gluster volume status $vol 2>/dev/null | head -8
        done
      register: backup_status
      changed_when: false

    - name: Verify mounts on both nodes
      ansible.builtin.shell: |
        mount | grep backup-
      register: mount_check
      changed_when: false
      delegate_to: "{{ item }}"
      loop: [pi1, pi2]

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          GlusterFS Backup Volumes — Complete
          ============================================
          {{ backup_status.stdout }}
          ============================================
