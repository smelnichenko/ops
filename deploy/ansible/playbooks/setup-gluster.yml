---
# Setup GlusterFS for Forgejo repo replication between pi1 and pi2
#
# Creates a replicated GlusterFS volume for /var/lib/forgejo/repos
# Both nodes serve the same data — FUSE-based, no kernel module dependency
#
# Prerequisites:
#   - Both Pis running with Forgejo installed
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-gluster.yml

# ─── Install GlusterFS on pi1, pi2, ten ────────────────────────────────────
# ten joins as a replica-3 arbiter node: it stores only metadata (filenames,
# timestamps, permissions), no file content. Provides quorum to prevent
# split-brain during pi1↔pi2 network partitions. Same tie-breaker role ten
# already plays for Consul / Patroni / Vault.
- name: Install GlusterFS
  hosts: pi1,pi2,target
  become: true
  gather_facts: true

  vars:
    gluster_brick: /var/lib/gluster/forgejo-brick
    gluster_arbiter_brick: /var/lib/gluster/forgejo-arbiter-brick
    forgejo_uid: 900
    forgejo_gid: 900

  tasks:
    - name: Install GlusterFS
      ansible.builtin.apt:
        name: glusterfs-server
        state: present

    - name: Allow GlusterFS ports through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.name }}"
      loop:
        - { port: "24007", proto: "tcp", name: "GlusterFS daemon" }
        - { port: "24008", proto: "tcp", name: "GlusterFS management" }
        - { port: "49152:61000", proto: "tcp", name: "GlusterFS bricks" }
      failed_when: false  # ten may not have UFW active

    - name: Enable and start GlusterFS
      ansible.builtin.systemd:
        name: glusterd
        enabled: true
        state: started

    # Forgejo UID alignment only on the data nodes — ten doesn't run Forgejo
    # and doesn't need the local user.
    - name: Align Forgejo UID/GID across nodes
      ansible.builtin.shell: |
        CURRENT_UID=$(id -u forgejo)
        if [ "$CURRENT_UID" != "{{ forgejo_uid }}" ]; then
          systemctl stop forgejo 2>/dev/null || true
          groupmod -g {{ forgejo_gid }} forgejo
          usermod -u {{ forgejo_uid }} -g {{ forgejo_gid }} forgejo
          find /var/lib/forgejo -not -path '/var/lib/forgejo/repos/*' -exec chown -h {{ forgejo_uid }}:{{ forgejo_gid }} {} +
          echo "changed"
        else
          echo "ok"
        fi
      register: uid_result
      changed_when: "'changed' in uid_result.stdout"
      when: inventory_hostname in ['pi1', 'pi2']

    - name: Create brick directory (data on pi1+pi2)
      ansible.builtin.file:
        path: "{{ gluster_brick }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: inventory_hostname in ['pi1', 'pi2']

    - name: Create arbiter brick directory (metadata-only, on ten)
      ansible.builtin.file:
        path: "{{ gluster_arbiter_brick }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: inventory_hostname == 'target'

# ─── Probe peers and create/migrate forgejo-repos volume ──────────────────
- name: Create GlusterFS forgejo-repos volume (replica 3 arbiter 1)
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    gluster_brick: /var/lib/gluster/forgejo-brick
    gluster_arbiter_brick: /var/lib/gluster/forgejo-arbiter-brick
    gluster_mount: /var/lib/forgejo/repos
    forgejo_uid: 900
    forgejo_gid: 900
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] }}"
    ten_ip: "{{ hostvars['target']['ansible_host'] }}"

    # Three peers: pi2 (data) and ten (arbiter). Probed from pi1.
    gluster_peers:
      - "{{ pi2_ip }}"
      - "{{ ten_ip }}"

  tasks:
    - name: Probe peers (pi2 + ten)
      gluster.gluster.gluster_peer:
        state: present
        nodes: "{{ gluster_peers }}"

    - name: Wait for 2 peers connected (pi2 + ten)
      ansible.builtin.shell: |
        set -o pipefail
        gluster peer status | grep -c 'State: Peer in Cluster (Connected)'
      register: peer_status
      until: peer_status.stdout | trim | int >= 2
      retries: 12
      delay: 5
      changed_when: false

    - name: Count existing forgejo-repos bricks
      ansible.builtin.shell: |
        gluster volume info forgejo-repos 2>/dev/null | grep -c "^Brick[0-9]" || echo 0
      register: brick_count
      changed_when: false

    - name: Stop Forgejo on pi1 (new install — need to migrate existing data)
      ansible.builtin.systemd:
        name: forgejo
        state: stopped
      when: brick_count.stdout | trim | int == 0
      failed_when: false

    - name: Stop Forgejo on pi2 (new install)
      ansible.builtin.systemd:
        name: forgejo
        state: stopped
      delegate_to: pi2
      when: brick_count.stdout | trim | int == 0
      failed_when: false

    - name: Copy existing repos to data brick on pi1 (new install)
      ansible.builtin.shell: |
        if [ -d {{ gluster_mount }}/schnappy ]; then
          cp -a {{ gluster_mount }}/schnappy {{ gluster_brick }}/
          chown -R {{ forgejo_uid }}:{{ forgejo_gid }} {{ gluster_brick }}/
        fi
      when: brick_count.stdout | trim | int == 0
      changed_when: true

    - name: Create replica-3-arbiter volume (new install)
      ansible.builtin.shell: |
        gluster volume create forgejo-repos replica 3 arbiter 1 \
          {{ pi1_ip }}:{{ gluster_brick }} \
          {{ pi2_ip }}:{{ gluster_brick }} \
          {{ ten_ip }}:{{ gluster_arbiter_brick }} \
          force 2>&1
      when: brick_count.stdout | trim | int == 0
      changed_when: true

    - name: Migrate replica-2 → replica-3-arbiter (production migration)
      ansible.builtin.shell: |
        gluster volume add-brick forgejo-repos replica 3 arbiter 1 \
          {{ ten_ip }}:{{ gluster_arbiter_brick }} \
          force 2>&1
      when: brick_count.stdout | trim | int == 2
      changed_when: true

    - name: Set volume options
      ansible.builtin.shell: |
        gluster volume set forgejo-repos auth.allow {{ pi1_ip }},{{ pi2_ip }},{{ ten_ip }},127.0.0.1
        gluster volume set forgejo-repos performance.cache-size 256MB
        gluster volume set forgejo-repos server.allow-insecure on
      changed_when: brick_count.stdout | trim | int != 3

    - name: Ensure volume is started (idempotent)
      ansible.builtin.shell: |
        STATE=$(gluster volume info forgejo-repos | awk '/^Status:/ {print $2}')
        if [ "$STATE" != "Started" ]; then
          gluster volume start forgejo-repos
          echo "started"
        else
          echo "already-started"
        fi
      register: vol_start
      changed_when: "'started' in vol_start.stdout and 'already' not in vol_start.stdout"

# ─── Mount GlusterFS on both Pis ────────────────────────────────────────────
- name: Mount GlusterFS volume
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    gluster_mount: /var/lib/forgejo/repos
    node_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"

  tasks:
    - name: Stop Forgejo
      ansible.builtin.systemd:
        name: forgejo
        state: stopped

    - name: Unmount if already mounted  # noqa: syntax-check[unknown-module]
      ansible.builtin.mount:
        path: "{{ gluster_mount }}"
        state: unmounted

    - name: Mount GlusterFS volume
      ansible.builtin.mount:
        path: "{{ gluster_mount }}"
        src: "{{ node_ip }}:/forgejo-repos"
        fstype: glusterfs
        opts: "defaults,_netdev,backup-volfile-servers={{ pi2_ip if inventory_hostname == 'pi1' else pi1_ip }}"
        state: mounted

    - name: Fix ownership
      ansible.builtin.file:
        path: "{{ gluster_mount }}"
        owner: forgejo
        group: forgejo
        mode: '0700'

    - name: Start Forgejo
      ansible.builtin.systemd:
        name: forgejo
        state: started

# ─── Verify ─────────────────────────────────────────────────────────────────
- name: Verify GlusterFS
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Check volume status
      ansible.builtin.shell: |
        gluster volume status forgejo-repos
      register: vol_status
      changed_when: false

    - name: Check replication
      ansible.builtin.shell: |
        gluster volume heal forgejo-repos info
      register: heal_info
      changed_when: false

    - name: Check mount on both nodes
      ansible.builtin.shell: |
        set -o pipefail
        mount | grep forgejo-repos
      register: mount_check
      changed_when: false
      delegate_to: "{{ item }}"
      loop:
        - pi1
        - pi2

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          GlusterFS Setup — forgejo-repos Complete
          ============================================
          {{ vol_status.stdout }}
          ============================================
          Heal status:
          {{ heal_info.stdout }}
          ============================================

# ─── Remove old monolithic backups volume if present ───────────────────────
- name: Remove old backups volume
  hosts: pi1,pi2
  become: true
  gather_facts: false

  tasks:
    - name: Unmount old GlusterFS backup mounts
      ansible.builtin.shell: |
        for mnt in /mnt/backups /mnt/backups/scylla /mnt/backups/postgres /mnt/backups/velero; do
          if mount | grep -q "$mnt.*glusterfs"; then
            umount "$mnt" 2>/dev/null || true
            sed -i "\|$mnt|d" /etc/fstab
            echo "unmounted $mnt"
          fi
        done
      register: unmount_old
      changed_when: "'unmounted' in unmount_old.stdout"

    - name: Remove MinIO symlinks (replaced by GlusterFS mount)
      ansible.builtin.shell: |
        for link in /var/lib/minio/data/postgres-backups /var/lib/minio/data/scylla-backups /var/lib/minio/data/velero; do
          if [ -L "$link" ]; then
            rm "$link"
            echo "removed $link"
          fi
        done
      register: remove_symlinks
      changed_when: "'removed' in remove_symlinks.stdout"

- name: Stop old backups volume
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Stop and delete old backup volumes
      ansible.builtin.shell: |
        for vol in backups backup-scylla backup-postgres backup-velero; do
          if gluster volume info $vol >/dev/null 2>&1; then
            gluster volume stop $vol force --mode=script 2>/dev/null || true
            gluster volume delete $vol --mode=script 2>/dev/null || true
            echo "deleted $vol"
          fi
        done
      register: delete_old
      changed_when: "'deleted' in delete_old.stdout"

# ─── Backup GlusterFS volumes (scylla, postgres, velero) ───────────────────
- name: Create backup GlusterFS volumes
  hosts: pi1
  become: true
  gather_facts: false

  vars:
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    ten_ip: "{{ hostvars['target']['ansible_host'] | default('192.168.11.2') }}"
    backup_volumes:
      - name: backup-minio
        brick: /var/lib/gluster/backup-minio-brick
        arbiter_brick: /var/lib/gluster/backup-minio-arbiter-brick
        mount: /var/lib/minio/data
        minio_data: true
      - name: backup-git-mirror
        brick: /var/lib/gluster/backup-git-mirror-brick
        arbiter_brick: /var/lib/gluster/backup-git-mirror-arbiter-brick
        mount: /mnt/backups/git-mirror
        minio_data: false
      - name: nexus-data
        brick: /var/lib/gluster/nexus-brick
        arbiter_brick: /var/lib/gluster/nexus-arbiter-brick
        mount: /mnt/data/nexus
        minio_data: false

  tasks:
    - name: Create data brick directories on pi1 + pi2
      ansible.builtin.file:
        path: "{{ item.1.brick }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      delegate_to: "{{ item.0 }}"
      loop: "{{ ['pi1', 'pi2'] | product(backup_volumes) | list }}"

    - name: Create arbiter brick directories on ten
      ansible.builtin.file:
        path: "{{ item.arbiter_brick }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      delegate_to: target
      loop: "{{ backup_volumes }}"

    - name: Count existing bricks per volume
      ansible.builtin.shell: |
        gluster volume info {{ item.name }} 2>/dev/null | grep -c "^Brick[0-9]" || echo 0
      register: backup_brick_count
      changed_when: false
      loop: "{{ backup_volumes }}"

    - name: Create replica-3-arbiter volume (new install)
      ansible.builtin.shell: |
        gluster volume create {{ item.item.name }} replica 3 arbiter 1 \
          {{ pi1_ip }}:{{ item.item.brick }} \
          {{ pi2_ip }}:{{ item.item.brick }} \
          {{ ten_ip }}:{{ item.item.arbiter_brick }} \
          force
        gluster volume set {{ item.item.name }} auth.allow {{ pi1_ip }},{{ pi2_ip }},{{ ten_ip }},127.0.0.1
        gluster volume set {{ item.item.name }} server.allow-insecure on
        echo "created"
      register: vol_create
      when: item.stdout | trim | int == 0
      changed_when: "'created' in vol_create.stdout | default('')"
      loop: "{{ backup_brick_count.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # Gluster re-asserts brick ownership from arbiter metadata on every
    # mount / peer-reconnect / self-heal. Setting `storage.owner-*` options
    # makes Gluster itself enforce the ownership, so client-side chown stays
    # durable. nexus runs as uid/gid 901/901 (see setup-nexus.yml).
    - name: Set nexus-data volume ownership (durable across heals)
      ansible.builtin.shell: |
        gluster volume set nexus-data storage.owner-uid 901
        gluster volume set nexus-data storage.owner-gid 901
      changed_when: true
      failed_when: false  # volume may not exist yet on fresh install — next play creates it

    - name: Migrate existing replica-2 → replica-3-arbiter
      ansible.builtin.shell: |
        gluster volume add-brick {{ item.item.name }} replica 3 arbiter 1 \
          {{ ten_ip }}:{{ item.item.arbiter_brick }} \
          force
        gluster volume set {{ item.item.name }} auth.allow {{ pi1_ip }},{{ pi2_ip }},{{ ten_ip }},127.0.0.1
        echo "migrated"
      register: vol_migrate
      when: item.stdout | trim | int == 2
      changed_when: "'migrated' in vol_migrate.stdout | default('')"
      loop: "{{ backup_brick_count.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # Idempotent start: gluster's 'start' refuses if already running.
    # Check status first so reruns don't error and stopped volumes recover.
    - name: Ensure volumes are started
      ansible.builtin.shell: |
        STATE=$(gluster volume info {{ item.name }} | awk '/^Status:/ {print $2}')
        if [ "$STATE" != "Started" ]; then
          gluster volume start {{ item.name }}
          echo "started"
        else
          echo "already-started"
        fi
      register: vol_start
      changed_when: "'started' in vol_start.stdout and 'already' not in vol_start.stdout"
      loop: "{{ backup_volumes }}"

    - name: Migrate existing data to bricks
      ansible.builtin.shell: |
        if [ -d "{{ item.mount }}" ] && [ ! -L "{{ item.mount }}" ] && [ "$(ls -A {{ item.brick }}/ 2>/dev/null | head -1)" = "" ]; then
          cp -a "{{ item.mount }}"/* {{ item.brick }}/ 2>/dev/null || true
          echo "migrated"
        else
          echo "skip"
        fi
      register: migrate
      changed_when: "'migrated' in migrate.stdout"
      loop: "{{ backup_volumes }}"

- name: Mount backup GlusterFS volumes
  hosts: pi1,pi2
  become: true
  gather_facts: true

  vars:
    node_ip: "{{ node_ip_override | default(ansible_default_ipv4.address) }}"
    pi1_ip: "{{ hostvars['pi1']['ansible_host'] | default('192.168.11.4') }}"
    pi2_ip: "{{ hostvars['pi2']['ansible_host'] | default('192.168.11.6') }}"
    backup_volumes:
      - { name: backup-minio, mount: /var/lib/minio/data, stop_service: minio }
      - { name: backup-git-mirror, mount: /mnt/backups/git-mirror, stop_service: "" }
      - { name: nexus-data, mount: /mnt/data/nexus, stop_service: nexus }

  tasks:
    - name: Stop services before mounting
      ansible.builtin.systemd:
        name: "{{ item.stop_service }}"
        state: stopped
      loop: "{{ backup_volumes }}"
      when: item.stop_service | length > 0
      failed_when: false

    - name: Create mount points
      ansible.builtin.file:
        path: "{{ item.mount }}"
        state: directory
        mode: '0755'
      loop: "{{ backup_volumes }}"

    - name: Unmount if already mounted with different source
      ansible.builtin.mount:
        path: "{{ item.mount }}"
        state: unmounted
      loop: "{{ backup_volumes }}"

    - name: Mount backup volumes
      ansible.builtin.mount:
        path: "{{ item.mount }}"
        src: "{{ node_ip }}:/{{ item.name }}"
        fstype: glusterfs
        opts: "defaults,_netdev,backup-volfile-servers={{ pi2_ip if inventory_hostname == 'pi1' else pi1_ip }}"
        state: mounted
      loop: "{{ backup_volumes }}"

    - name: Fix MinIO data ownership
      ansible.builtin.file:
        path: /var/lib/minio/data
        owner: minio
        group: minio
        mode: '0755'

    # Nexus ownership is handled by setup-nexus.yml (which runs after and
    # creates the nexus user with a fixed UID first).

    - name: Start services after mounting
      ansible.builtin.systemd:
        name: "{{ item.stop_service }}"
        state: started
      loop: "{{ backup_volumes }}"
      when: item.stop_service | length > 0
      failed_when: false

- name: Verify backup volumes
  hosts: pi1
  become: true
  gather_facts: false

  tasks:
    - name: Check all backup volume statuses
      ansible.builtin.shell: |
        for vol in backup-minio backup-git-mirror nexus-data; do
          echo "=== $vol ==="
          gluster volume status $vol 2>/dev/null | head -8
        done
      register: backup_status
      changed_when: false

    - name: Verify mounts on both nodes
      ansible.builtin.shell: |
        mount | grep -E "backup-|nexus-data"
      register: mount_check
      changed_when: false
      delegate_to: "{{ item }}"
      loop: [pi1, pi2]

    - name: Print results
      ansible.builtin.debug:
        msg: |
          ============================================
          GlusterFS Backup Volumes — Complete
          ============================================
          {{ backup_status.stdout }}
          ============================================
