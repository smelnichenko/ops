---
# Setup Forgejo (self-hosted Git forge) + Forgejo Runner for CI/CD
#
# Prerequisites:
#   - k3s running (setup-k3s.yml)
#   - cert-manager installed
#   - DNS: git.pmon.dev -> 192.168.11.2
#
# Environment variables required:
#   FORGEJO_ADMIN_USER, FORGEJO_ADMIN_PASSWORD, FORGEJO_ADMIN_EMAIL
#   FORGEJO_RUNNER_SECRET (openssl rand -hex 20)
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml
#
- name: Setup Forgejo + Runner
  hosts: all
  become: true
  gather_facts: true

  vars:
    forgejo_namespace: forgejo
    forgejo_host: "git.pmon.dev"
    forgejo_chart_version: "16.2.0"
    forgejo_storage_size: "20Gi"
    forgejo_admin_user: "{{ lookup('env', 'FORGEJO_ADMIN_USER') | default('forgejo_admin', true) }}"
    forgejo_admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') }}"
    forgejo_admin_email: "{{ lookup('env', 'FORGEJO_ADMIN_EMAIL') | default('admin@pmon.dev', true) }}"
    forgejo_runner_secret: "{{ lookup('env', 'FORGEJO_RUNNER_SECRET') }}"
    forgejo_runner_version: "12.7.1"
    runner_user: "{{ ansible_user }}"

  tasks:
    # ================================================================
    # Phase 1: Deploy Forgejo via Helm
    # ================================================================

    - name: Create forgejo namespace with Pod Security Standards
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'EOF' | k3s kubectl apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ forgejo_namespace }}
          labels:
            pod-security.kubernetes.io/enforce: baseline
            pod-security.kubernetes.io/audit: restricted
            pod-security.kubernetes.io/warn: restricted
        EOF
      args:
        executable: /bin/bash
      changed_when: false

    - name: Deploy Forgejo via Helm
      ansible.builtin.shell: |
        helm upgrade --install forgejo \
          oci://code.forgejo.org/forgejo-helm/forgejo \
          --version {{ forgejo_chart_version }} \
          --namespace {{ forgejo_namespace }} \
          --values - <<'HELMEOF'
        gitea:
          admin:
            username: "{{ forgejo_admin_user }}"
            password: "{{ forgejo_admin_password }}"
            email: "{{ forgejo_admin_email }}"
          config:
            server:
              DOMAIN: "{{ forgejo_host }}"
              ROOT_URL: "https://{{ forgejo_host }}/"
              SSH_DOMAIN: "{{ forgejo_host }}"
              DISABLE_SSH: true
              LFS_START_SERVER: true
            database:
              DB_TYPE: sqlite3
            service:
              DISABLE_REGISTRATION: true
            actions:
              ENABLED: false
            webhook:
              ALLOWED_HOST_LIST: private
            repository:
              DEFAULT_BRANCH: master
            log:
              LEVEL: Warn
        image:
          rootless: true
        ingress:
          enabled: true
          className: traefik
          hosts:
            - host: "{{ forgejo_host }}"
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: forgejo-tls
              hosts:
                - "{{ forgejo_host }}"
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-dns
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        persistence:
          enabled: true
          size: "{{ forgejo_storage_size }}"
          storageClass: local-path
        redis-cluster:
          enabled: false
        postgresql:
          enabled: false
        postgresql-ha:
          enabled: false
        HELMEOF
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for Forgejo deployment to be ready
      ansible.builtin.shell: |
        k3s kubectl rollout status deployment/forgejo -n {{ forgejo_namespace }} --timeout=180s
      changed_when: false

    - name: Apply network policies for Forgejo
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'EOF' | k3s kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: forgejo-default-deny
          namespace: {{ forgejo_namespace }}
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
        ---
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: forgejo-allow-ingress
          namespace: {{ forgejo_namespace }}
        spec:
          podSelector:
            matchLabels:
              app.kubernetes.io/name: forgejo
          policyTypes:
            - Ingress
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
              ports:
                - protocol: TCP
                  port: 3000
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: woodpecker
              ports:
                - protocol: TCP
                  port: 3000
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitor
              ports:
                - protocol: TCP
                  port: 3000
        EOF
      args:
        executable: /bin/bash
      changed_when: false

    # ============== GRAFANA OAUTH2 APP ==============
    - name: Check if Grafana OAuth2 app exists
      ansible.builtin.uri:
        url: "https://{{ forgejo_host }}/api/v1/user/applications/oauth2"
        method: GET
        user: "{{ forgejo_admin_user }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ forgejo_validate_certs | default(true) }}"
      register: oauth_apps
      changed_when: false

    - name: Create Grafana OAuth2 app
      ansible.builtin.uri:
        url: "https://{{ forgejo_host }}/api/v1/user/applications/oauth2"
        method: POST
        user: "{{ forgejo_admin_user }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ forgejo_validate_certs | default(true) }}"
        body_format: json
        body:
          name: "Grafana"
          confidential_client: true
          redirect_uris:
            - "https://{{ grafana_host | default('grafana.pmon.dev') }}/login/generic_oauth"
        status_code: [200, 201]
      register: oauth_app_result
      when: oauth_apps.json | selectattr('name', 'equalto', 'Grafana') | list | length == 0

    - name: Display Grafana OAuth2 credentials
      ansible.builtin.debug:
        msg: |
          Grafana OAuth2 app created!
          Client ID: {{ oauth_app_result.json.client_id }}
          Client Secret: {{ oauth_app_result.json.client_secret }}
          Store these in Vault at secret/monitor/grafana (oauth_client_id, oauth_client_secret)
      when: oauth_app_result is changed

    - name: Display Forgejo status
      ansible.builtin.debug:
        msg: |
          Forgejo deployed successfully!

          URL: https://{{ forgejo_host }}/
          Admin user: {{ forgejo_admin_user }}

          CI/CD: Woodpecker CI (separate deployment via setup-woodpecker.yml)

          Next steps:
            1. Add DNS A record: {{ forgejo_host }} -> 192.168.11.2
            2. Create repository: git remote add forgejo https://{{ forgejo_host }}/{{ forgejo_admin_user }}/monitor.git
            3. Push: git push forgejo master --all --tags
