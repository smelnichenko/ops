---
# Monitor Application Deployment Playbook
#
# Usage:
#   ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml
#
- name: Deploy Monitor Application
  hosts: target
  become: true
  gather_facts: false

  pre_tasks:
    - name: Verify Helm is installed
      ansible.builtin.command: helm version --short
      register: helm_version
      changed_when: false
      failed_when: helm_version.rc != 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Helm version
      ansible.builtin.debug:
        msg: "Using Helm {{ helm_version.stdout }}"

    - name: Verify kubectl connectivity
      ansible.builtin.command: k3s kubectl cluster-info
      register: kubectl_info
      changed_when: false
      failed_when: kubectl_info.rc != 0

  roles:
    - monitor

  post_tasks:
    - name: Display access information
      ansible.builtin.debug:
        msg: |

          Monitor application deployed successfully!

          Namespace: {{ monitor_namespace }}
          Release: {{ monitor_release_name }}

          Access the application:
            kubectl port-forward svc/{{ monitor_release_name }}-schnappy-app 8080:8080 -n {{ monitor_namespace }}
            Then open: http://localhost:8080/api/actuator/health

          Access Grafana:
            kubectl port-forward svc/{{ monitor_release_name }}-schnappy-grafana 3000:3000 -n {{ monitor_namespace }}
            Then open: http://localhost:3000 (admin/admin)
