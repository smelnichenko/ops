---
# Monitor Helm chart deployment tasks
# NOTE: Build machine and k3s target are the same host — no remote transfers needed

- name: Create namespace with Pod Security Standards
  ansible.builtin.shell: |
    cat <<EOF | k3s kubectl apply -f -
    apiVersion: v1
    kind: Namespace
    metadata:
      name: {{ monitor_namespace }}
      labels:
        pod-security.kubernetes.io/enforce: baseline
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/warn: restricted
    EOF
  when: monitor_create_namespace
  changed_when: false

- name: Build and import images
  when: monitor_build_locally | default(true)
  vars:
    project_root: "{{ playbook_dir }}/../.."
  block:
    - name: Get build environment
      ansible.builtin.shell: |
        . "$HOME/.nvm/nvm.sh" 2>/dev/null || true
        . "$HOME/.sdkman/bin/sdkman-init.sh" 2>/dev/null || true
        echo "PATH=$PATH"
        echo "JAVA_HOME=$JAVA_HOME"
        echo "GIT_HASH=$(git -C {{ project_root }} rev-parse --short HEAD)"
        echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      args:
        executable: /bin/bash
      register: build_env_result
      changed_when: false
      become: false

    - name: Set build facts
      ansible.builtin.set_fact:
        build_path: "{{ (build_env_result.stdout_lines | select('match', '^PATH=') | first).split('=', 1)[1] }}"
        build_java_home: "{{ (build_env_result.stdout_lines | select('match', '^JAVA_HOME=') | first).split('=', 1)[1] }}"
        build_git_hash: "{{ (build_env_result.stdout_lines | select('match', '^GIT_HASH=') | first).split('=', 1)[1] }}"
        build_time: "{{ (build_env_result.stdout_lines | select('match', '^BUILD_TIME=') | first).split('=', 1)[1] }}"
        project_root: "{{ project_root }}"

    - name: Get last deployed commit
      ansible.builtin.slurp:
        src: /var/lib/monitor-deploy-commit
      register: last_commit_file
      failed_when: false

    - name: Set last deployed commit
      ansible.builtin.set_fact:
        last_deployed_commit: "{{ (last_commit_file.content | default('') | b64decode | trim) if last_commit_file.content is defined else '' }}"

    - name: Detect changes
      ansible.builtin.shell: |
        cd {{ project_root }}
        last="{{ last_deployed_commit }}"
        for component in backend frontend game; do
          if [ -z "$last" ] || ! git diff --quiet "$last" HEAD -- "$component/"; then
            echo "$component"
          fi
        done
      register: changes_result
      changed_when: false
      become: false

    - name: Set change detection facts
      ansible.builtin.set_fact:
        backend_changed: "{{ 'backend' in changes_result.stdout_lines }}"
        game_changed: "{{ 'game' in changes_result.stdout_lines }}"
        frontend_changed: "{{ 'frontend' in changes_result.stdout_lines or 'game' in changes_result.stdout_lines }}"

    - name: Display what will be built
      ansible.builtin.debug:
        msg: "Building - Backend: {{ backend_changed }}, Frontend: {{ frontend_changed }}, Game: {{ game_changed }} (last deploy: {{ last_deployed_commit | default('never') }})"

    - name: Export Godot game
      ansible.builtin.shell: cd {{ project_root }} && task game:export --force
      become: false
      when: game_changed

    - name: Build artifacts in parallel
      ansible.builtin.shell: |
        set -e
        cd {{ project_root }}
        pids=""

        {% if backend_changed %}
        (cd backend && ./gradlew bootJar --no-daemon -x test) &
        pids="$pids $!"
        {% endif %}

        {% if frontend_changed %}
        (cd frontend && npm ci --silent && VITE_GIT_HASH={{ build_git_hash }} VITE_BUILD_TIME={{ build_time }} npm run build) &
        pids="$pids $!"
        {% endif %}

        for pid in $pids; do
          wait $pid || exit 1
        done
      environment:
        PATH: "{{ build_path }}"
        JAVA_HOME: "{{ build_java_home }}"
      become: false
      when: backend_changed or frontend_changed

    - name: Find backend JAR
      ansible.builtin.find:
        paths: "{{ project_root }}/backend/build/libs"
        patterns: "*.jar"
        excludes: "*-plain.jar"
      register: jar_files
      when: backend_changed
      become: false

    - name: Set JAR path
      ansible.builtin.set_fact:
        backend_jar_path: "{{ jar_files.files[0].path }}"
      when: backend_changed and jar_files.files | length > 0

    # Build Docker images (as user — sm is in docker group), then import to k3s (needs root)
    - name: Build backend image
      ansible.builtin.shell: |
        set -e
        staging=$(mktemp -d)
        cp "{{ backend_jar_path }}" "$staging/app.jar"
        cp {{ project_root }}/backend/Dockerfile.runtime "$staging/Dockerfile"
        docker build -t {{ monitor_values.app.image.repository }}:{{ monitor_values.app.image.tag }} "$staging"
        rm -rf "$staging"
      become: false
      when: backend_changed

    - name: Build frontend image
      ansible.builtin.shell: |
        set -e
        staging=$(mktemp -d)
        cp -r {{ project_root }}/frontend/dist "$staging/"
        cp {{ project_root }}/frontend/Dockerfile.runtime "$staging/Dockerfile"
        cp {{ project_root }}/frontend/nginx.conf.template "$staging/"
        cp {{ project_root }}/frontend/security-headers.conf "$staging/"
        cp {{ project_root }}/frontend/docker-entrypoint.sh "$staging/"
        docker build -t {{ monitor_values.frontend.image.repository }}:{{ monitor_values.frontend.image.tag }} "$staging"
        rm -rf "$staging"
      become: false
      when: frontend_changed

    - name: Import images to k3s
      ansible.builtin.shell: |
        {% if backend_changed %}
        docker save {{ monitor_values.app.image.repository }}:{{ monitor_values.app.image.tag }} | k3s ctr images import -
        {% endif %}
        {% if frontend_changed %}
        docker save {{ monitor_values.frontend.image.repository }}:{{ monitor_values.frontend.image.tag }} | k3s ctr images import -
        {% endif %}
      when: backend_changed or frontend_changed

    - name: Save deployed commit
      ansible.builtin.copy:
        content: "{{ build_git_hash }}"
        dest: /var/lib/monitor-deploy-commit
        mode: '0644'

- name: Generate Helm values file
  ansible.builtin.template:
    src: values.yml.j2
    dest: "/tmp/monitor-values-{{ monitor_release_name }}.yml"
    mode: '0600'
  changed_when: false

- name: Deploy Monitor Helm chart
  ansible.builtin.shell: |
    helm upgrade --install {{ monitor_release_name }} {{ playbook_dir }}/../../backend/helm/monitor \
      --namespace {{ monitor_namespace }} \
      --create-namespace \
      --values /tmp/monitor-values-{{ monitor_release_name }}.yml \
      --set "app.gitHash={{ build_git_hash | default('unknown') }}" \
      --set "app.buildTime={{ build_time | default('') }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Restart changed deployments
  ansible.builtin.shell: |
    {% if backend_changed | default(false) %}
    k3s kubectl rollout restart deployment/{{ monitor_release_name }}-app -n {{ monitor_namespace }}
    {% endif %}
    {% if frontend_changed | default(false) %}
    k3s kubectl rollout restart deployment/{{ monitor_release_name }}-frontend -n {{ monitor_namespace }}
    {% endif %}
    echo "done"
  when: (backend_changed | default(false)) or (frontend_changed | default(false))

- name: Clean up
  ansible.builtin.file:
    path: "/tmp/monitor-values-{{ monitor_release_name }}.yml"
    state: absent
  changed_when: false

- name: Display deployment status
  ansible.builtin.debug:
    msg: "Deployment complete. Check pods with: kubectl get pods -n {{ monitor_namespace }}"
