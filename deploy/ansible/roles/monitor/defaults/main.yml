---
# Monitor Helm chart deployment defaults

# Helm release settings
monitor_release_name: monitor
monitor_namespace: monitor
monitor_create_namespace: true

# Chart location (relative to playbook or absolute path)
monitor_chart_path: "{{ playbook_dir }}/../../backend/helm/monitor"

# Helm chart values
monitor_values:
  app:
    image:
      repository: ghcr.io/schnappy/monitor
      tag: latest
      pullPolicy: Always
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
    ingress:
      enabled: true
      # className: 'traefik' for k3s (default), 'nginx' for nginx-ingress
      className: traefik
      host: monitor.local

  monitor:
    enabled: true
    pages:
      - name: cv.ee
        url: "https://cv.ee/et/search?limit=20&offset=0&categories%5B0%5D=INFORMATION_TECHNOLOGY&towns%5B0%5D=312"
        pattern: '"total":([0-9]+)'
        cron: "0 0 * * * *"
    http:
      connectTimeout: 10s
      readTimeout: 30s
      userAgent: "MonitorBot/1.0"

  postgres:
    enabled: true
    image: postgres:17
    database: monitor
    username: postgres
    password: postgres
    storage:
      size: 1Gi
      storageClass: ""

  prometheus:
    enabled: true
    image: prom/prometheus:latest
    retention: 15d
    scrapeInterval: 15s
    storage:
      size: 2Gi
      storageClass: ""

  grafana:
    enabled: true
    image: grafana/grafana:latest
    adminUser: admin
    adminPassword: admin
    storage:
      size: 1Gi
      storageClass: ""
    service:
      type: NodePort

# Wait for deployment to be ready
monitor_wait: true
monitor_wait_timeout: 600s
