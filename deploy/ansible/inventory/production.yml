---
# Production inventory
#
# Configure the target address before deploying:
#   Option 1: Edit this file directly
#   Option 2: Set environment variables:
#     export TARGET_HOST=192.168.1.100
#     export TARGET_USER=pi
#
all:
  hosts:
    target:
      ansible_host: "{{ lookup('env', 'TARGET_HOST') | default('192.168.11.2', true) }}"
      ansible_user: "{{ lookup('env', 'TARGET_USER') | default('sm', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'TARGET_SSH_KEY') | default('~/.ssh/id_ed25519', true) }}"
      ansible_python_interpreter: /usr/bin/python3
