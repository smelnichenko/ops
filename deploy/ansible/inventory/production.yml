---
# Production inventory - Raspberry Pi 5
#
# Configure the Pi 5 address before deploying:
#   Option 1: Edit this file directly
#   Option 2: Set environment variables:
#     export PI5_HOST=192.168.1.100
#     export PI5_USER=pi
#
all:
  hosts:
    pi5:
      ansible_host: "{{ lookup('env', 'PI5_HOST') | default('192.168.1.100', true) }}"
      ansible_user: "{{ lookup('env', 'PI5_USER') | default('pi', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'PI5_SSH_KEY') | default('~/.ssh/id_rsa', true) }}"
      ansible_python_interpreter: /usr/bin/python3
