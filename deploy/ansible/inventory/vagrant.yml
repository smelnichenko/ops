---
# Vagrant inventory — three-VM test environment
#
# VMs:
#   kubeadm   192.168.56.10  — kubeadm node (Calico/Cilium, full stack)
#   pi1       192.168.56.20  — Pi services primary (Vault, Forgejo, MinIO, Keycloak, Postgres)
#   pi2       192.168.56.21  — Pi services mirror (same stack, Postgres replica)

all:
  vars:
    ansible_user: vagrant
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    # Override default IP (Vagrant NAT) with private network IP for service binding
    node_ip_override: "{{ ansible_host }}"
    # setup-pi-services runs BEFORE Patroni, so Forgejo/Keycloak talk to raw
    # postgres at localhost:5432 during initial bring-up. setup-patroni's
    # final play reconfigures them to localhost:5000 (HAProxy → leader) once
    # the cluster is up.
    forgejo_db_host: "localhost:5432"
    keycloak_db_host: "localhost:5432"
    keepalived_vip: "192.168.56.50"

    # ── Test-only credential fixtures ──────────────────────────────────────
    # Production inventory maps each of these to a lookup('env', ...). All
    # playbooks and tests reference these names directly — no per-play
    # `| default('changeme', true)` wrappers.
    forgejo_admin_user: "forgejo_admin"
    forgejo_admin_password: "vagrant-forgejo-pw"
    forgejo_admin_email: "admin@pmon.dev"
    # Vagrant: Forgejo binds to a Pi static IP, no DNS / TLS in front.
    # Override the hardcoded prod URLs from setup-pi-services.yml so the
    # registry's WWW-Authenticate redirect points back at the same host.
    forgejo_domain: "192.168.56.20"
    forgejo_root_url: "http://192.168.56.20:3000/"
    keycloak_admin_password: "vagrant-keycloak-pw"
    postgres_admin_password: "vagrant-pg-pw"
    postgres_replication_password: "vagrant-pg-repl-pw"
    minio_root_user: "velero-admin"
    minio_root_password: "vagrant-minio-pw"
    nexus_admin_password: "vagrant-nexus-pw"
    keepalived_vrrp_password: "k33p4l1v"
    argocd_keycloak_client_secret: "vagrant-argocd-oidc-secret"

    # scylla-manager is production-only (backup schedules for ScyllaDB). No
    # vagrant test depends on it, and its helm install times out reliably
    # in resource-constrained VMs. Skip.
    install_scylla_manager: false

  hosts:
    target:
      ansible_host: 192.168.56.10
      ansible_ssh_private_key_file: "{{ inventory_dir }}/../../../.vagrant/machines/kubeadm/libvirt/private_key"
      ansible_python_interpreter: /usr/bin/python3

    pi1:
      ansible_host: 192.168.56.20
      ansible_ssh_private_key_file: "{{ inventory_dir }}/../../../.vagrant/machines/pi1/libvirt/private_key"
      ansible_python_interpreter: /usr/bin/python3
      vault_arch: amd64
      vault_pi_ip: "192.168.56.20"
      vault_pi_dns: "vault.schnappy.io"
      vault_pi_ssh_allow_ipv4: "192.168.56.0/24"
      vault_pi_ssh_allow_ipv6: ""
      vault_pi_ssh_allow_extra_ipv4: "192.168.121.0/24"
      vault_cluster_ip: "192.168.56.10"
      vault_cluster_ipv6: ""

    pi2:
      ansible_host: 192.168.56.21
      ansible_ssh_private_key_file: "{{ inventory_dir }}/../../../.vagrant/machines/pi2/libvirt/private_key"
      ansible_python_interpreter: /usr/bin/python3
      vault_arch: amd64
      vault_pi_ip: "192.168.56.21"

  children:
    pis:
      hosts:
        pi1:
        pi2:

    # Legacy alias for existing playbooks
    vault_pi:
      hosts:
        pi1:
