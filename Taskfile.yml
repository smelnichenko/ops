  # ============== DEPLOY ==============
  deploy:promote:
    desc: "Promote image tags from test to production (SERVICE=monitor|admin|chat|chess|site|game-scp|all)"
    vars:
      INFRA_DIR: '{{.SRC_DIR}}/infra'
      TEST_VALUES: '{{.INFRA_DIR}}/clusters/production/schnappy-test-apps/values.yaml'
      PROD_VALUES: '{{.INFRA_DIR}}/clusters/production/schnappy-production-apps/values.yaml'
      SERVICE: '{{.SERVICE | default "all"}}'
    cmds:
      - |
        cd "{{.INFRA_DIR}}" && git pull --rebase

        SERVICES="{{.SERVICE}}"
        if [ "$SERVICES" = "all" ]; then
          SERVICES="monitor admin chat chess site game-scp"
        fi

        PROMOTED=""
        for svc in $SERVICES; do
          test_tag=$(grep "# $svc" "{{.TEST_VALUES}}" | grep -o 'tag: "[^"]*"' | head -1 | cut -d'"' -f2)
          prod_tag=$(grep "# $svc" "{{.PROD_VALUES}}" | grep -o 'tag: "[^"]*"' | head -1 | cut -d'"' -f2)

          if [ -z "$test_tag" ]; then
            echo "SKIP $svc: no tag in test values"
            continue
          fi
          if [ "$test_tag" = "$prod_tag" ]; then
            echo "SKIP $svc: already at $test_tag"
            continue
          fi

          echo "PROMOTE $svc: $prod_tag -> $test_tag"
          sed -i "s|tag: \".*\"  # $svc|tag: \"$test_tag\"  # $svc|" "{{.PROD_VALUES}}"
          PROMOTED="$PROMOTED $svc=$test_tag"
        done

        if [ -z "$PROMOTED" ]; then
          echo "Nothing to promote"
          exit 0
        fi

        cd "{{.INFRA_DIR}}"
        git add clusters/production/schnappy-production-apps/values.yaml
        git commit -m "deploy(prod):$PROMOTED"
        git push
        echo "Promoted:$PROMOTED"

  # ============== VAGRANT ==============
  vagrant:up:
    desc: Start Vagrant VMs
    cmds:
      - vagrant up

  vagrant:halt:
    desc: Stop Vagrant VMs
    cmds:
      - vagrant halt

  vagrant:destroy:
    desc: Destroy Vagrant VMs
    cmds:
      - vagrant destroy -f

  # ============== CLEAN ==============
  clean:
    desc: Clean all build artifacts
    cmds:
      - docker compose down -v --remove-orphans 2>/dev/null || true
