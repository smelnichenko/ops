version: '3'

dotenv: ['.env']

vars:
  TARGET_HOST: '{{.TARGET_HOST | default "192.168.11.2"}}'
  TARGET_USER: '{{.TARGET_USER | default "sm"}}'
  SRC_DIR: '{{.SRC_DIR | default "../"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ============== BUILD ==============
  build:backend:
    desc: Build backend JAR
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew bootJar -x test

  # ============== LOCAL DEV ==============
  dev:
    desc: Start local development environment
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose up -d --build
      - echo ""
      - echo "=== Development Environment Started ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"

  dev:infra:
    desc: Start only infrastructure (postgres, valkey, kafka, scylla, minio) for IDE debugging
    cmds:
      - docker compose up -d postgres valkey kafka scylla minio
      - docker compose up scylla-init
      - echo ""
      - echo "=== Infrastructure Started ==="
      - echo "PostgreSQL localhost:5432"
      - echo "Valkey     localhost:6379"
      - echo "Kafka      localhost:9092"
      - echo "ScyllaDB   localhost:9042"
      - echo "MinIO      localhost:9000"
      - echo ""
      - echo "Run backend from IDE with ./gradlew bootRun"

  dev:monitoring:
    desc: Start with Prometheus and Grafana
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose --profile monitoring up -d --build
      - echo ""
      - echo "=== Development Environment with Monitoring ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"
      - echo "Prometheus http://localhost:9090"
      - echo "Grafana http://localhost:3001 (admin/admin)"

  dev:logs:
    desc: Tail logs from all containers
    cmds:
      - docker compose logs -f

  dev:stop:
    desc: Stop local development environment
    cmds:
      - docker compose down

  dev:clean:
    desc: Stop and remove all data
    cmds:
      - docker compose down -v

  # ============== TEST ==============
  test:
    desc: Run all tests
    cmds:
      - task: test:backend

  test:backend:
    desc: Run backend tests
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew test

  test:e2e:install:
    desc: Install Playwright browsers (run once after npm install or Playwright version bump)
    dir: '{{.SRC_DIR}}/site'
    cmds:
      - npx playwright install chromium

  test:e2e:
    desc: Run E2E tests with Playwright (requires running app)
    dir: '{{.SRC_DIR}}/site'
    deps: [test:e2e:install]
    cmds:
      - npx playwright test

  test:e2e:ui:
    desc: Run E2E tests with Playwright UI
    dir: '{{.SRC_DIR}}/site'
    deps: [test:e2e:install]
    cmds:
      - npx playwright test --ui

  # ============== HYPERFOIL (production load/stress tests) ==============
  # k6 is no longer used for load testing — only post-sync smoke tests
  # (see schnappy-test/templates/k6-smoke-*). All load/stress/spike/soak
  # work runs through Hyperfoil, which reports to MinIO + reports.pmon.dev.
  test:hyperfoil:load:
    desc: Run Hyperfoil load test in production (5min, reports to MinIO)
    cmds:
      - ssh ten 'kubectl delete job hf-load -n schnappy-production 2>/dev/null; kubectl create job hf-load --from=cronjob/schnappy-production-hyperfoil-load -n schnappy-production'
      - echo "Waiting for completion (~5min)..."
      - ssh ten 'kubectl wait --for=condition=complete job/hf-load -n schnappy-production --timeout=600s'
      - ssh ten 'kubectl logs job/hf-load -n schnappy-production 2>/dev/null | tail -10'

  # The stress / spike / soak tasks share one chart-templated Job spec
  # (cm/schnappy-production-hyperfoil-jobspec) so all the in-cluster
  # values — image, hostnames, secrets — stay under GitOps. The task
  # seds the scenario filename + report prefix into the spec, then
  # `kubectl create -f`s it. CronJobs aren't used: stress and spike
  # are operator-driven, soak is too long for a regular schedule.
  test:hyperfoil:_run:
    internal: true
    requires: { vars: [BENCHMARK_FILE, REPORT_PREFIX, TIMEOUT] }
    cmds:
      - |
        ssh ten "kubectl -n schnappy-production get cm schnappy-production-hyperfoil-jobspec \
          -o jsonpath='{.data.job\.yaml}' \
          | sed -e 's|__BENCHMARK_FILE__|{{.BENCHMARK_FILE}}|g' \
                -e 's|__REPORT_PREFIX__|{{.REPORT_PREFIX}}|g' \
          | kubectl create -f -"
      - echo "Started, waiting (timeout {{.TIMEOUT}})..."
      - |
        ssh ten "kubectl -n schnappy-production wait --for=condition=complete \
          --timeout={{.TIMEOUT}} \
          job -l app.kubernetes.io/component=hyperfoil-stress \
          --field-selector=status.successful=0 || true; \
          kubectl -n schnappy-production logs --tail=10 \
          job -l app.kubernetes.io/component=hyperfoil-stress \
          --max-log-requests=10 2>/dev/null | tail -15"

  test:hyperfoil:stress:
    desc: Hyperfoil stress test (10min ramp 100→1000 users/sec)
    cmds:
      - task: test:hyperfoil:_run
        vars: { BENCHMARK_FILE: stress-test.hf.yaml, REPORT_PREFIX: stress, TIMEOUT: 900s }

  test:hyperfoil:spike:
    desc: Hyperfoil spike test (60s baseline → 30s burst @ 1000/s → 90s recovery)
    cmds:
      - task: test:hyperfoil:_run
        vars: { BENCHMARK_FILE: spike-test.hf.yaml, REPORT_PREFIX: spike, TIMEOUT: 300s }

  test:hyperfoil:soak:
    desc: Hyperfoil soak test (30min sustained @ 200 users/sec — surfaces leaks)
    cmds:
      - task: test:hyperfoil:_run
        vars: { BENCHMARK_FILE: soak-test.hf.yaml, REPORT_PREFIX: soak, TIMEOUT: 2400s }

  # ============== JOOQ ==============
  jooq:generate:
    desc: Generate jOOQ classes from database (requires running postgres)
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew jooqCodegen

  # ============== DEPLOY ==============
  deploy:install:
    desc: Create project-local Ansible venv and install dependencies
    dir: deploy/ansible
    status:
      - test -f venv/bin/ansible-playbook
    cmds:
      - python3 -m venv venv
      - venv/bin/pip install -q -r requirements.txt
      - venv/bin/ansible-galaxy collection install -r requirements.yml

  deploy:bootstrap:
    desc: "Tier 0: Install pre-GitOps infrastructure (cert-manager, ESO, Istio, Velero)"
    cmds:
      - ./bootstrap.sh all

  deploy:full:
    desc: Full deployment - kubeadm + consul + pi services + patroni + vault + argocd
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-nexus.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-kubeadm.yml
      - cd ../.. && ./bootstrap.sh all
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-consul.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-pi-services.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-patroni.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/seed-vault-secrets.yml -e @vars/vault.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-argocd.yml -e @vars/vault.yml

  deploy:vault-pi:
    desc: Deploy Pi Vault (Consul backend + Shamir + vault-unseal.service on both Pis)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml

  deploy:keycloak-clients:
    desc: Configure Keycloak service account roles (k6-smoke PLAY role)
    dir: deploy/ansible
    deps: [deploy:install]
    dotenv: ['../../.env']
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-keycloak-clients.yml

  deploy:gluster:
    desc: Setup GlusterFS replication for Forgejo repos between pi1 and pi2
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-gluster.yml

  deploy:caddy:
    desc: Setup Caddy TLS reverse proxy for Pi-hosted services (git, auth, nexus)
    dir: deploy/ansible
    deps: [deploy:install]
    dotenv: ['../../.env']
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-caddy.yml

  deploy:keepalived:
    desc: Setup Keepalived VIP (192.168.11.5) between pi1 and pi2
    dir: deploy/ansible
    deps: [deploy:install]
    dotenv: ['../../.env']
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-keepalived.yml

  promote:prod:
    desc: Promote all test image tags to production
    cmds:
      - |
        cd {{.SRC_DIR}}/infra
        TEST=clusters/production/schnappy-test-apps/values.yaml
        PROD=clusters/production/schnappy/values.yaml
        CHANGED=0
        for svc in monitor admin chat chess site game-scp; do
          TAG=$(grep "# schnappy-${svc}\b" "$TEST" | grep -oP 'tag: "\K[^"]+' || true)
          if [ -n "$TAG" ]; then
            CURRENT=$(grep "# schnappy-${svc}\b" "$PROD" | grep -oP 'tag: "\K[^"]+' || true)
            if [ "$TAG" != "$CURRENT" ]; then
              sed -i "s|tag: \".*\"  # schnappy-${svc}|tag: \"${TAG}\"  # schnappy-${svc}|" "$PROD"
              echo "  ${svc}: ${CURRENT} -> ${TAG}"
              CHANGED=1
            fi
          fi
        done
        if [ "$CHANGED" -eq 0 ]; then
          echo "No changes to promote"
          exit 0
        fi
        git add "$PROD"
        git commit -m "promote: test -> prod"
        git push

  deploy:seed-test-secrets:
    desc: Seed test environment secrets into Vault (overrides from .env.test)
    dir: deploy/ansible
    deps: [deploy:install]
    dotenv: ['../../.env', '../../.env.test']
    cmds:
      - >-
        venv/bin/ansible-playbook -i inventory/production.yml playbooks/seed-vault-secrets.yml
        -e vault_prefix=schnappy-test
        -e "MONITOR_DB_PASSWORD=$MONITOR_DB_PASSWORD"
        -e "VALKEY_PASSWORD=$VALKEY_PASSWORD"
        -e "JWT_SECRET=$JWT_SECRET"
        -e "MAIL_PASSWORD=${MAIL_PASSWORD:-unused}"
        -e "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-unused}"
        -e "RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET:-unused}"
        -e "RESEND_API_KEY=${RESEND_API_KEY:-unused}"
        -e "MINIO_ROOT_USER=$MINIO_ROOT_USER"
        -e "MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD"
        -e "ELASTICSEARCH_PASSWORD=$ELASTICSEARCH_PASSWORD"
        -e "KIBANA_PASSWORD=$KIBANA_PASSWORD"
        -e "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-unused}"
        -e "KAFKA_CLUSTER_ID=$KAFKA_CLUSTER_ID"
        -e "FORGEJO_ADMIN_USER=${FORGEJO_ADMIN_USER:-forgejo_admin}"
        -e "FORGEJO_ADMIN_PASSWORD=${FORGEJO_ADMIN_PASSWORD:-unused}"
        -e "FORGEJO_ADMIN_EMAIL=${FORGEJO_ADMIN_EMAIL:-admin@pmon.dev}"
        -e "KEYCLOAK_FORGEJO_CLIENT_SECRET=${KEYCLOAK_FORGEJO_CLIENT_SECRET:-unused}"
        -e "SONARQUBE_ADMIN_PASSWORD=${SONARQUBE_ADMIN_PASSWORD:-unused}"
        -e "SONARQUBE_POSTGRES_PASSWORD=${SONARQUBE_POSTGRES_PASSWORD:-unused}"
        -e "SONARQUBE_TOKEN=${SONARQUBE_TOKEN:-unused}"
        -e "VELERO_MINIO_ACCESS_KEY=${VELERO_MINIO_ACCESS_KEY:-unused}"
        -e "VELERO_MINIO_SECRET_KEY=${VELERO_MINIO_SECRET_KEY:-unused}"
        -e "WOODPECKER_FORGEJO_CLIENT=${WOODPECKER_FORGEJO_CLIENT:-unused}"
        -e "WOODPECKER_FORGEJO_SECRET=${WOODPECKER_FORGEJO_SECRET:-unused}"
        -e "WOODPECKER_CLONE_TOKEN=${WOODPECKER_CLONE_TOKEN:-unused}"
        -e "WOODPECKER_INFRA_REPO_TOKEN=${WOODPECKER_INFRA_REPO_TOKEN:-unused}"
        -e "KEYCLOAK_ARGOCD_CLIENT_SECRET=${KEYCLOAK_ARGOCD_CLIENT_SECRET:-unused}"
        -e "KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET=${KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET:-unused}"
        -e "KEYCLOAK_K6_SMOKE_CLIENT_SECRET=${KEYCLOAK_K6_SMOKE_CLIENT_SECRET:-unused}"
        -e "K6_SMOKE_CLIENT_SECRET=${KEYCLOAK_K6_SMOKE_CLIENT_SECRET:-unused}"
        -e "KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-unused}"
        -e "KEYCLOAK_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-unused}"
        -e "GRAFANA_OAUTH_CLIENT_ID=${GRAFANA_OAUTH_CLIENT_ID:-unused}"
        -e "GRAFANA_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET:-unused}"
        -e "PORKBUN_API_KEY=${PORKBUN_API_KEY:-unused}"
        -e "PORKBUN_SECRET_KEY=${PORKBUN_SECRET_KEY:-unused}"
        -e "ALERTMANAGER_WEBHOOK_SECRET=${ALERTMANAGER_WEBHOOK_SECRET:-unused}"
        -e "NVD_API_KEY=${NVD_API_KEY:-unused}"
        -e "PROMETHEUS_AUTH_TOKEN=${PROMETHEUS_AUTH_TOKEN:-unused}"

  # ============== VAGRANT DEPLOY HELPERS (internal) ==============
  # Shared deploy chain used by every k8s-cluster Vagrant test. Assumes
  # VMs are already up (pi1 + pi2 + kubeadm); brings up the Pi data plane
  # (consul → pi-services → patroni → vault-pi) and then the kubeadm
  # cluster. Each test:FOO just re-uses this and adds its own assertion
  # playbook on top — same two-phase shape as test:dual-pi-clean.
  _vagrant:pi-stack:
    internal: true
    deps: [deploy:install]
    cmds:
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-consul.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-pi-services.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-patroni.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  _vagrant:k8s-stack:
    internal: true
    deps: [_vagrant:pi-stack]
    cmds:
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-kubeadm.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-host-hardening.yml

  # ============== K8S-CLUSTER TESTS ==============
  test:eso:
    desc: Test ESO ↔ Pi Vault secret sync (ClusterSecretStore + ExternalSecret)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-eso.yml

  test:gateway:
    desc: Test Istio Gateway + HTTPRoute routing (hostname/path/header/404)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-gateway.yml

  test:logs:
    desc: Test ClickHouse + Fluent-bit log pipeline in Vagrant (Plan 065 — replaces test:elk)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-logs.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:realtime:
    desc: Test Centrifugo + Kafka + Valkey realtime chart in Vagrant (Plan 066 Phase 1)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-realtime.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:keycloak:
    desc: Test Keycloak SSO in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-keycloak.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:k6-smoke:
    desc: Test k6 smoke tests + Prometheus remote write in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-k6-smoke.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:hyperfoil-reports:
    desc: Test Hyperfoil report persistence + Nginx serving in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-hyperfoil-reports.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:grafana:
    desc: Test Grafana + Prometheus in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-grafana.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:multi-env:
    desc: Test multi-environment (test + prod) isolation in Vagrant — full stack with ArgoCD
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: ssh -o StrictHostKeyChecking=no -i .vagrant/machines/kubeadm/libvirt/private_key vagrant@192.168.56.10 'for i in $(seq 1 30); do curl -sf http://192.168.56.20:3000/ > /dev/null && echo "Forgejo reachable" && exit 0; echo "Waiting for Forgejo ($i/30)..."; sleep 5; done; echo "FAIL"; exit 1'
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-argocd.yml -e @vars/vault-vagrant.yml -e forgejo_domain=192.168.56.20:3000 -e forgejo_scheme=http -e argocd_validate_certs=false -e argocd_keycloak_enabled=false -e argocd_ingress_enabled=false
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-multi-env.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:kafka-scylla:
    desc: Test Kafka + ScyllaDB infrastructure in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-kafka-scylla.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:sonarqube:
    desc: Test SonarQube in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-sonarqube.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml

  test:argocd:
    desc: Test Argo CD GitOps in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-argocd.yml

  test:cicd:
    desc: Test CI/CD pipeline with Forgejo container registry in Vagrant (image push/pull via registry)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-cicd.yml

  test:woodpecker:
    desc: Test Woodpecker CI pipeline execution in Vagrant (Forgejo + Woodpecker + Kubernetes backend)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - task: _vagrant:k8s-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-woodpecker.yml

  test:nexus:
    desc: Test Nexus HA (active-passive on pi1+pi2, Gluster-shared, Keepalived-controlled, ten arbiter)
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      # Full Pi data-plane stack (consul → pi-services → patroni → vault-pi)
      # needed because setup-gluster runs after consul, and keepalived's
      # check_services.sh probes Forgejo/Keycloak/Patroni.
      - task: _vagrant:pi-stack
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-gluster.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-nexus.yml
