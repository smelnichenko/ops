version: '3'

dotenv: ['.env']

vars:
  TARGET_HOST: '{{.TARGET_HOST | default "192.168.11.2"}}'
  TARGET_USER: '{{.TARGET_USER | default "sm"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ============== BUILD ==============
  build:
    desc: Build everything
    deps: [build:backend, build:frontend]

  build:backend:
    desc: Build backend JAR
    dir: backend
    cmds:
      - ./gradlew bootJar -x test

  build:frontend:
    desc: Build frontend (includes game export)
    deps: [game:export]
    dir: frontend
    cmds:
      - npm ci
      - npm run build

  # ============== GAME ==============
  game:export:
    desc: Export Godot game to frontend public directory
    dir: game
    sources:
      - scripts/**/*.gd
      - scenes/**/*.tscn
      - project.godot
      - export_presets.cfg
    generates:
      - ../frontend/public/game/index.wasm
    cmds:
      - mkdir -p ../frontend/public/game
      - godot --headless --export-release "Web" ../frontend/public/game/index.html
      - sed -i 's/"ensureCrossOriginIsolationHeaders":true/"ensureCrossOriginIsolationHeaders":false/' ../frontend/public/game/index.html
      # Inject bridge: React→Godot (postMessage→_godotReceive) + Godot→React (CustomEvent→parent.postMessage)
      - sed -i 's|<script src="index.js"></script>|<script>window.addEventListener("message",function(e){if(e.data\&\&e.data.type\&\&window._godotReceive){window._godotReceive(JSON.stringify(e.data));}});window.addEventListener("godotMessage",function(e){window.parent.postMessage(e.detail,"*");});</script>\n\t\t<script src="index.js"></script>|' ../frontend/public/game/index.html

  game:clean:
    desc: Clean exported game files
    cmds:
      - rm -rf frontend/public/game

  # ============== LOCAL DEV ==============
  dev:
    desc: Start local development environment
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose up -d --build
      - echo ""
      - echo "=== Development Environment Started ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"

  dev:monitoring:
    desc: Start with Prometheus and Grafana
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose --profile monitoring up -d --build
      - echo ""
      - echo "=== Development Environment with Monitoring ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"
      - echo "Prometheus http://localhost:9090"
      - echo "Grafana http://localhost:3001 (admin/admin)"

  dev:logs:
    desc: Tail logs from all containers
    cmds:
      - docker compose logs -f

  dev:stop:
    desc: Stop local development environment
    cmds:
      - docker compose down

  dev:clean:
    desc: Stop and remove all data
    cmds:
      - docker compose down -v

  # ============== TEST ==============
  test:
    desc: Run all tests
    cmds:
      - task: test:backend
      - task: test:e2e

  test:backend:
    desc: Run backend tests
    dir: backend
    cmds:
      - ./gradlew test

  test:e2e:install:
    desc: Install Playwright browsers (run once after npm install or Playwright version bump)
    dir: frontend
    cmds:
      - npx playwright install chromium

  test:e2e:
    desc: Run E2E tests with Playwright (requires running app)
    dir: frontend
    deps: [test:e2e:install]
    cmds:
      - npx playwright test

  test:e2e:ui:
    desc: Run E2E tests with Playwright UI
    dir: frontend
    deps: [test:e2e:install]
    cmds:
      - npx playwright test --ui

  # ============== LOAD TEST ==============
  test:load:
    desc: Run k6 load test (requires running app)
    cmds:
      - k6 run k6/load-test.js

  test:load:stress:
    desc: Run k6 stress test
    cmds:
      - k6 run k6/stress-test.js

  test:load:spike:
    desc: Run k6 spike test
    cmds:
      - k6 run k6/spike-test.js

  test:load:smoke:
    desc: Quick k6 smoke test
    cmds:
      - k6 run --vus 1 --duration 10s k6/load-test.js

  # ============== JOOQ ==============
  jooq:generate:
    desc: Generate jOOQ classes from database (requires running postgres)
    dir: backend
    cmds:
      - ./gradlew jooqCodegen

  # ============== DEPLOY ==============
  deploy:install:
    desc: Create project-local Ansible venv and install dependencies
    dir: deploy/ansible
    status:
      - test -f venv/bin/ansible-playbook
    cmds:
      - python3 -m venv venv
      - venv/bin/pip install -q -r requirements.txt
      - venv/bin/ansible-galaxy collection install -r requirements.yml

  deploy:prod:
    desc: Deploy to production
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml

  deploy:full:
    desc: Full deployment - setup k3s + forgejo + velero + vault + deploy app
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-registry-mirror.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml -e registry_mirror_ip=192.168.11.4
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-pi-runtime.yml
      - venv/bin/ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml

  deploy:vault-pi:
    desc: Setup Vault unseal Pi (transit engine + autounseal token)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml

  deploy:vault:
    desc: Deploy Vault HA on k3s (+ ESO + Sealed Secrets + backups + Prometheus)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-pi-runtime.yml

  test:vault:
    desc: Test Vault end-to-end in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:eso:
    desc: Test ESO Vault secrets integration in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-eso.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:elk:
    desc: Test ELK stack in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-elk.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:grafana:
    desc: Test Grafana + Prometheus in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-grafana.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:chat:
    desc: Test chat infrastructure (Kafka + ScyllaDB) in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-chat.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:sonarqube:
    desc: Test SonarQube in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-sonarqube.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:cicd:
    desc: Test CI/CD pipeline with Forgejo registry in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up k3s
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-cicd.yml

  test:dr:
    desc: Test pod recovery + disaster recovery in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/test-dr.yml

  deploy:registry-mirror:
    desc: Deploy Docker Hub pull-through cache on Pi
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-registry-mirror.yml

  deploy:k3s:
    desc: Setup k3s only
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml -e registry_mirror_ip=192.168.11.4

  deploy:forgejo:
    desc: Deploy Forgejo (self-hosted Git forge)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml

  deploy:velero:
    desc: Deploy Velero + Backup MinIO
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml

  deploy:backup:
    desc: Trigger a manual Velero backup of monitor namespace
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo k3s kubectl exec deploy/velero -n velero -- velero backup create manual-$(date +%Y%m%d-%H%M) --include-namespaces monitor --default-volumes-to-fs-backup --kubeconfig /etc/rancher/k3s/k3s.yaml"

  deploy:backup:status:
    desc: Check Velero backup status
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo k3s kubectl exec deploy/velero -n velero -- velero backup get --kubeconfig /etc/rancher/k3s/k3s.yaml"

  deploy:undeploy:
    desc: Uninstall monitor from target (keeps PVCs)
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo helm uninstall monitor -n monitor --kubeconfig /etc/rancher/k3s/k3s.yaml"

  deploy:status:
    desc: Check deployment status on target
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo k3s kubectl get pods,svc,ingress -n monitor"

  deploy:ping:
    desc: Test connectivity to target host
    cmds:
      - ssh -o ConnectTimeout=5 {{.TARGET_USER}}@{{.TARGET_HOST}} "hostname && uname -a"

  # ============== VAGRANT ==============
  vagrant:up:
    desc: Start Vagrant VMs
    cmds:
      - vagrant up

  vagrant:halt:
    desc: Stop Vagrant VMs
    cmds:
      - vagrant halt

  vagrant:destroy:
    desc: Destroy Vagrant VMs
    cmds:
      - vagrant destroy -f

  # ============== CLEAN ==============
  clean:
    desc: Clean all build artifacts
    cmds:
      - rm -rf backend/build frontend/dist frontend/node_modules frontend/public/game
      - docker compose down -v --remove-orphans 2>/dev/null || true
