version: '3'

dotenv: ['.env']

vars:
  TARGET_HOST: '{{.TARGET_HOST | default "192.168.11.2"}}'
  TARGET_USER: '{{.TARGET_USER | default "sm"}}'
  SRC_DIR: '{{.SRC_DIR | default "../"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ============== BUILD ==============
  build:backend:
    desc: Build backend JAR
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew bootJar -x test

  # ============== LOCAL DEV ==============
  dev:
    desc: Start local development environment
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose up -d --build
      - echo ""
      - echo "=== Development Environment Started ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"

  dev:infra:
    desc: Start only infrastructure (postgres, redis, kafka, scylla, minio) for IDE debugging
    cmds:
      - docker compose up -d postgres redis kafka scylla minio
      - docker compose up scylla-init
      - echo ""
      - echo "=== Infrastructure Started ==="
      - echo "PostgreSQL localhost:5432"
      - echo "Redis      localhost:6379"
      - echo "Kafka      localhost:9092"
      - echo "ScyllaDB   localhost:9042"
      - echo "MinIO      localhost:9000"
      - echo ""
      - echo "Run backend from IDE with ./gradlew bootRun"

  dev:monitoring:
    desc: Start with Prometheus and Grafana
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose --profile monitoring up -d --build
      - echo ""
      - echo "=== Development Environment with Monitoring ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"
      - echo "Prometheus http://localhost:9090"
      - echo "Grafana http://localhost:3001 (admin/admin)"

  dev:logs:
    desc: Tail logs from all containers
    cmds:
      - docker compose logs -f

  dev:stop:
    desc: Stop local development environment
    cmds:
      - docker compose down

  dev:clean:
    desc: Stop and remove all data
    cmds:
      - docker compose down -v

  # ============== TEST ==============
  test:
    desc: Run all tests
    cmds:
      - task: test:backend

  test:backend:
    desc: Run backend tests
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew test

  test:e2e:install:
    desc: Install Playwright browsers (run once after npm install or Playwright version bump)
    dir: '{{.SRC_DIR}}/site'
    cmds:
      - npx playwright install chromium

  test:e2e:
    desc: Run E2E tests with Playwright (requires running app)
    dir: '{{.SRC_DIR}}/site'
    deps: [test:e2e:install]
    cmds:
      - npx playwright test

  test:e2e:ui:
    desc: Run E2E tests with Playwright UI
    dir: '{{.SRC_DIR}}/site'
    deps: [test:e2e:install]
    cmds:
      - npx playwright test --ui

  # ============== LOAD TEST ==============
  test:load:
    desc: Run k6 load test (requires running app)
    cmds:
      - k6 run tests/k6/load-test.js

  test:load:stress:
    desc: Run k6 stress test
    cmds:
      - k6 run tests/k6/stress-test.js

  test:load:spike:
    desc: Run k6 spike test
    cmds:
      - k6 run tests/k6/spike-test.js

  test:load:smoke:
    desc: Quick k6 smoke test
    cmds:
      - k6 run --vus 1 --duration 10s k6/load-test.js

  # ============== JOOQ ==============
  jooq:generate:
    desc: Generate jOOQ classes from database (requires running postgres)
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew jooqCodegen

  # ============== DEPLOY ==============
  deploy:install:
    desc: Create project-local Ansible venv and install dependencies
    dir: deploy/ansible
    status:
      - test -f venv/bin/ansible-playbook
    cmds:
      - python3 -m venv venv
      - venv/bin/pip install -q -r requirements.txt
      - venv/bin/ansible-galaxy collection install -r requirements.yml

  deploy:prod:
    desc: Deploy to production
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml
  deploy:full:
    desc: Full deployment - setup k3s + forgejo + velero + vault + deploy app
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-nexus.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml -e registry_mirror_ip=192.168.11.4
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-woodpecker.yml -e @vars/production.yml -e @vars/woodpecker.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-pi-runtime.yml
      - venv/bin/ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml
  deploy:vault-pi:
    desc: Setup Vault unseal Pi (transit engine + autounseal token)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml

  deploy:vault:
    desc: Deploy Vault HA on k3s (+ ESO + Sealed Secrets + backups + Prometheus)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-pi-runtime.yml

  test:vault:
    desc: Test Vault end-to-end in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:eso:
    desc: Test ESO Vault secrets integration in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-eso.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:elk:
    desc: Test ELK stack in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-elk.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:keycloak:
    desc: Test Keycloak SSO in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-keycloak.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:grafana:
    desc: Test Grafana + Prometheus in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-grafana.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:kafka-scylla:
    desc: Test Kafka + ScyllaDB infrastructure in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-kafka-scylla.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:sonarqube:
    desc: Test SonarQube in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-sonarqube.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:hashcash:
    desc: Test Hashcash PoW captcha in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-hashcash.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:cicd:
    desc: Test CI/CD pipeline with Forgejo registry in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up k3s
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-cicd.yml

  test:woodpecker:
    desc: Test Woodpecker CI deployment in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up k3s
      - defer: vagrant halt
      - cmd: ssh-keygen -f "$HOME/.ssh/known_hosts" -R 192.168.56.10 2>/dev/null; true
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-woodpecker.yml

  test:flux:
    desc: Test Flux CD GitOps in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up k3s
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-flux.yml

  test:nexus:
    desc: Test Nexus repository manager in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up vault-pi
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-nexus.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-nexus.yml

  test:dr:
    desc: Test pod recovery + disaster recovery in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-dr.yml

  test:gateway:
    desc: Test API Gateway deployment in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-gateway.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:microservices:
    desc: Test full microservice deployment in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-microservices.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:linkerd:
    desc: Test Linkerd service mesh in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-linkerd.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  deploy:apt-cache:
    desc: Build apt-cacher-ng image and import to k3s
    cmds:
      - docker build -t git.pmon.dev/schnappy/apt-cacher-ng:1.0 {{.SRC_DIR}}/platform/apt-cache/
      - docker save git.pmon.dev/schnappy/apt-cacher-ng:1.0 | ssh {{.TARGET_USER}}@{{.TARGET_HOST}} 'sudo k3s ctr images import -'
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} 'sudo k3s kubectl rollout restart deployment/schnappy-apt-cache -n schnappy'

  deploy:nexus:
    desc: Deploy Nexus repository manager on Pi
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-nexus.yml

  deploy:registry-mirror:
    desc: Deploy Docker Hub pull-through cache on Pi (legacy, replaced by deploy:nexus)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-registry-mirror.yml

  deploy:k3s:
    desc: Setup k3s only
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml -e registry_mirror_ip=192.168.11.4

  deploy:forgejo:
    desc: Deploy Forgejo (self-hosted Git forge)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml

  deploy:woodpecker:
    desc: Deploy Woodpecker CI
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-woodpecker.yml -e @vars/production.yml -e @vars/woodpecker.yml

  deploy:flux:
    desc: Install/update Flux CD
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-flux.yml -e @vars/vault.yml

  deploy:linkerd:
    desc: Deploy Linkerd service mesh
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-linkerd.yml

  deploy:velero:
    desc: Deploy Velero + Backup MinIO
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml

  deploy:backup:
    desc: Trigger a manual Velero backup of schnappy namespace
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo k3s kubectl exec deploy/velero -n velero -- velero backup create manual-$(date +%Y%m%d-%H%M) --include-namespaces schnappy --default-volumes-to-fs-backup --kubeconfig /etc/rancher/k3s/k3s.yaml"

  deploy:backup:status:
    desc: Check Velero backup status
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo k3s kubectl exec deploy/velero -n velero -- velero backup get --kubeconfig /etc/rancher/k3s/k3s.yaml"

  deploy:undeploy:
    desc: Uninstall schnappy from target (keeps PVCs)
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo helm uninstall schnappy -n schnappy --kubeconfig /etc/rancher/k3s/k3s.yaml"

  deploy:status:
    desc: Check deployment status on target
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo k3s kubectl get pods,svc,ingress -n schnappy"

  deploy:ping:
    desc: Test connectivity to target host
    cmds:
      - ssh -o ConnectTimeout=5 {{.TARGET_USER}}@{{.TARGET_HOST}} "hostname && uname -a"

  # ============== VAGRANT TESTS (ALL) ==============
  test:vagrant-all:
    desc: Run all Vagrant integration tests sequentially
    deps: [deploy:install]
    cmds:
      - echo "=== [1/11] test:vault ==="
      - task: test:vault
      - echo "=== [2/11] test:eso ==="
      - task: test:eso
      - echo "=== [3/11] test:elk ==="
      - task: test:elk
      - echo "=== [4/11] test:grafana ==="
      - task: test:grafana
      - echo "=== [5/11] test:kafka-scylla ==="
      - task: test:kafka-scylla
      - echo "=== [6/11] test:hashcash ==="
      - task: test:hashcash
      - echo "=== [7/11] test:sonarqube ==="
      - task: test:sonarqube
      - echo "=== [8/10] test:dr ==="
      - task: test:dr
      - echo "=== [9/11] test:cicd ==="
      - task: test:cicd
      - echo "=== [10/11] test:nexus ==="
      - task: test:nexus
      - echo "=== [11/11] test:woodpecker ==="
      - task: test:woodpecker
      - echo "=== [12/14] test:gateway ==="
      - task: test:gateway
      - echo "=== [13/14] test:microservices ==="
      - task: test:microservices
      - echo "=== [14/15] test:linkerd ==="
      - task: test:linkerd
      - echo "=== [15/15] test:flux ==="
      - task: test:flux
      - echo ""
      - echo "=== All Vagrant tests complete ==="

  # ============== VAGRANT ==============
  vagrant:up:
    desc: Start Vagrant VMs
    cmds:
      - vagrant up

  vagrant:halt:
    desc: Stop Vagrant VMs
    cmds:
      - vagrant halt

  vagrant:destroy:
    desc: Destroy Vagrant VMs
    cmds:
      - vagrant destroy -f

  # ============== CLEAN ==============
  clean:
    desc: Clean all build artifacts
    cmds:
      - docker compose down -v --remove-orphans 2>/dev/null || true
