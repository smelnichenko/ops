version: '3'

dotenv: ['.env']

vars:
  TARGET_HOST: '{{.TARGET_HOST | default "192.168.11.2"}}'
  TARGET_USER: '{{.TARGET_USER | default "sm"}}'
  SRC_DIR: '{{.SRC_DIR | default "../"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ============== BUILD ==============
  build:backend:
    desc: Build backend JAR
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew bootJar -x test

  # ============== LOCAL DEV ==============
  dev:
    desc: Start local development environment
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose up -d --build
      - echo ""
      - echo "=== Development Environment Started ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"

  dev:infra:
    desc: Start only infrastructure (postgres, redis, kafka, scylla, minio) for IDE debugging
    cmds:
      - docker compose up -d postgres redis kafka scylla minio
      - docker compose up scylla-init
      - echo ""
      - echo "=== Infrastructure Started ==="
      - echo "PostgreSQL localhost:5432"
      - echo "Redis      localhost:6379"
      - echo "Kafka      localhost:9092"
      - echo "ScyllaDB   localhost:9042"
      - echo "MinIO      localhost:9000"
      - echo ""
      - echo "Run backend from IDE with ./gradlew bootRun"

  dev:monitoring:
    desc: Start with Prometheus and Grafana
    vars:
      GIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - GIT_HASH={{.GIT_HASH}} BUILD_TIME={{.BUILD_TIME}} docker compose --profile monitoring up -d --build
      - echo ""
      - echo "=== Development Environment with Monitoring ==="
      - echo "Frontend http://localhost:3000"
      - echo "Backend API http://localhost:8080/api"
      - echo "Prometheus http://localhost:9090"
      - echo "Grafana http://localhost:3001 (admin/admin)"

  dev:logs:
    desc: Tail logs from all containers
    cmds:
      - docker compose logs -f

  dev:stop:
    desc: Stop local development environment
    cmds:
      - docker compose down

  dev:clean:
    desc: Stop and remove all data
    cmds:
      - docker compose down -v

  # ============== TEST ==============
  test:
    desc: Run all tests
    cmds:
      - task: test:backend

  test:backend:
    desc: Run backend tests
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew test

  test:e2e:install:
    desc: Install Playwright browsers (run once after npm install or Playwright version bump)
    dir: '{{.SRC_DIR}}/site'
    cmds:
      - npx playwright install chromium

  test:e2e:
    desc: Run E2E tests with Playwright (requires running app)
    dir: '{{.SRC_DIR}}/site'
    deps: [test:e2e:install]
    cmds:
      - npx playwright test

  test:e2e:ui:
    desc: Run E2E tests with Playwright UI
    dir: '{{.SRC_DIR}}/site'
    deps: [test:e2e:install]
    cmds:
      - npx playwright test --ui

  # ============== LOAD TEST ==============
  test:load:
    desc: Run k6 load test (requires running app)
    cmds:
      - mkdir -p /tmp/k6-results
      - K6_TEST_NAME=load-test k6 run tests/k6/load-test.js

  test:load:stress:
    desc: Run k6 stress test locally — find breaking point
    cmds:
      - mkdir -p /tmp/k6-results
      - K6_TEST_NAME=stress-test k6 run tests/k6/stress-test.js

  test:load:stress:prod:
    desc: Run distributed k6 stress test in production (4 parallel pods)
    cmds:
      - ssh ten 'kubectl delete job schnappy-k6-stress-manual -n schnappy 2>/dev/null; kubectl create job schnappy-k6-stress-manual --from=cronjob/schnappy-k6-stress -n schnappy'

  test:load:spike:
    desc: Run k6 spike test — sudden traffic surge
    cmds:
      - mkdir -p /tmp/k6-results
      - K6_TEST_NAME=spike-test k6 run tests/k6/spike-test.js

  test:load:soak:
    desc: Run k6 soak test (30 VUs, 30min — detects memory leaks)
    cmds:
      - mkdir -p /tmp/k6-results
      - K6_TEST_NAME=soak-test k6 run tests/k6/soak-test.js

  test:load:baseline:
    desc: Save current load test results as baseline
    cmds:
      - mkdir -p /tmp/k6-results
      - K6_TEST_NAME=load-test K6_SAVE_BASELINE=true k6 run tests/k6/load-test.js

  # ============== HYPERFOIL (production) ==============
  test:hyperfoil:load:
    desc: Run Hyperfoil load test in production (5min, reports to MinIO)
    cmds:
      - ssh ten 'kubectl delete job hf-load -n schnappy 2>/dev/null; kubectl create job hf-load --from=cronjob/schnappy-hyperfoil-load -n schnappy'
      - echo "Waiting for completion (~5min)..."
      - ssh ten 'kubectl wait --for=condition=complete job/hf-load -n schnappy --timeout=600s'
      - ssh ten 'kubectl logs job/hf-load -n schnappy 2>/dev/null | tail -10'

  test:hyperfoil:stress:
    desc: Run Hyperfoil stress test in production (6min, reports to MinIO)
    cmds:
      - ssh ten 'kubectl delete job hf-stress -n schnappy 2>/dev/null; kubectl create job hf-stress --from=cronjob/schnappy-hyperfoil-stress -n schnappy'
      - echo "Waiting for completion (~6min)..."
      - ssh ten 'kubectl wait --for=condition=complete job/hf-stress -n schnappy --timeout=600s'
      - ssh ten 'kubectl logs job/hf-stress -n schnappy 2>/dev/null | tail -10'

  # ============== JOOQ ==============
  jooq:generate:
    desc: Generate jOOQ classes from database (requires running postgres)
    dir: '{{.SRC_DIR}}/monitor/backend'
    cmds:
      - ./gradlew jooqCodegen

  # ============== DEPLOY ==============
  deploy:install:
    desc: Create project-local Ansible venv and install dependencies
    dir: deploy/ansible
    status:
      - test -f venv/bin/ansible-playbook
    cmds:
      - python3 -m venv venv
      - venv/bin/pip install -q -r requirements.txt
      - venv/bin/ansible-galaxy collection install -r requirements.yml

  deploy:prod:
    desc: Deploy to production
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml
  deploy:full:
    desc: Full deployment - setup k3s + forgejo + velero + vault + deploy app
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-nexus.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml -e registry_mirror_ip=192.168.11.4
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-woodpecker.yml -e @vars/production.yml -e @vars/woodpecker.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-pi-runtime.yml
      - venv/bin/ansible-playbook -i inventory/production.yml deploy.yml -e @vars/production.yml
  deploy:vault-pi:
    desc: Setup Vault unseal Pi (transit engine + autounseal token)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml

  deploy:vault:
    desc: Deploy Vault HA on k3s (+ ESO + Sealed Secrets + backups + Prometheus)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-pi-runtime.yml

  test:vault:
    desc: Test Vault end-to-end in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:eso:
    desc: Test ESO Vault secrets integration in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-eso.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:elk:
    desc: Test ELK stack in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-elk.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:keycloak:
    desc: Test Keycloak SSO in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-keycloak.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:k6-smoke:
    desc: Test k6 smoke tests + Prometheus remote write in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-k6-smoke.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:hyperfoil-reports:
    desc: Test Hyperfoil report persistence + Nginx serving in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-hyperfoil-reports.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:grafana:
    desc: Test Grafana + Prometheus in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-grafana.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:kafka-scylla:
    desc: Test Kafka + ScyllaDB infrastructure in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-kafka-scylla.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:sonarqube:
    desc: Test SonarQube in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault-pi.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml playbooks/setup-vault.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-sonarqube.yml -e @vars/vault.yml -e @vars/vault-vagrant.yml -e @vars/vault-pi-runtime.yml

  test:cicd:
    desc: Test CI/CD pipeline with Forgejo registry in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up k3s
      - defer: vagrant halt
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-cicd.yml

  test:woodpecker:
    desc: Test Woodpecker CI deployment in Vagrant
    deps: [deploy:install]
    cmds:
      - cmd: vagrant destroy -f 2>/dev/null; true
      - cmd: vagrant up k3s
      - defer: vagrant halt
      - cmd: ssh-keygen -f "$HOME/.ssh/known_hosts" -R 192.168.56.10 2>/dev/null; true
      - cmd: cd deploy/ansible && venv/bin/ansible-playbook -i inventory/vagrant.yml ../../tests/ansible/test-woodpecker.yml

  test:argocd:
