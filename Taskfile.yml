    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-k3s.yml -e registry_mirror_ip=192.168.11.4

  deploy:forgejo:
    desc: Deploy Forgejo (self-hosted Git forge)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-forgejo.yml

  deploy:woodpecker:
    desc: Deploy Woodpecker CI
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-woodpecker.yml -e @vars/production.yml -e @vars/woodpecker.yml

  deploy:kubeadm:
    desc: Install kubeadm cluster (replaces k3s)
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-kubeadm.yml

  deploy:seed-secrets:
    desc: Seed Vault secrets from .env
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/seed-vault-secrets.yml

  deploy:istio:
    desc: Install Istio ambient mesh + HAProxy
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-istio.yml

  deploy:argocd:
    desc: Install/update Argo CD
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-argocd.yml -e @vars/vault.yml -e vault_root_token=$VAULT_ROOT_TOKEN
    dotenv: ['.env']


  deploy:velero:
    desc: Deploy Velero + Backup MinIO
    dir: deploy/ansible
    deps: [deploy:install]
    cmds:
      - venv/bin/ansible-playbook -i inventory/production.yml playbooks/setup-velero.yml

  deploy:backup:
    desc: Trigger a manual Velero backup of schnappy namespace
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "kubectl exec deploy/velero -n velero -- velero backup create manual-$(date +%Y%m%d-%H%M) --include-namespaces schnappy --default-volumes-to-fs-backup --kubeconfig /etc/kubernetes/admin.conf"

  deploy:restore:verify:
    desc: Run k6 smoke tests to validate a Velero restore
    deps: [deploy:install]
    cmds:
      - cd deploy/ansible && venv/bin/ansible-playbook -i inventory/production.yml playbooks/verify-restore.yml

  deploy:backup:status:
    desc: Check Velero backup status
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "kubectl exec deploy/velero -n velero -- velero backup get --kubeconfig /etc/kubernetes/admin.conf"

  deploy:undeploy:
    desc: Uninstall schnappy from target (keeps PVCs)
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "sudo helm uninstall schnappy -n schnappy --kubeconfig /etc/kubernetes/admin.conf"

  deploy:status:
    desc: Check deployment status on target
    cmds:
      - ssh {{.TARGET_USER}}@{{.TARGET_HOST}} "kubectl get pods,svc,ingress -n schnappy"

  deploy:ping:
    desc: Test connectivity to target host
    cmds:
      - ssh -o ConnectTimeout=5 {{.TARGET_USER}}@{{.TARGET_HOST}} "hostname && uname -a"

  # ============== VAGRANT TESTS (ALL) ==============
  test:vagrant-all:
    desc: Run all Vagrant integration tests sequentially
    deps: [deploy:install]
    cmds:
      - echo "=== [1/14] test:vault ==="
      - task: test:vault
      - echo "=== [2/14] test:eso ==="
      - task: test:eso
      - echo "=== [3/14] test:elk ==="
      - task: test:elk
      - echo "=== [4/14] test:grafana ==="
      - task: test:grafana
      - echo "=== [5/14] test:kafka-scylla ==="
      - task: test:kafka-scylla
      - echo "=== [6/14] test:sonarqube ==="
      - task: test:sonarqube
      - echo "=== [7/14] test:dr ==="
      - task: test:dr
      - echo "=== [8/14] test:cicd ==="
      - task: test:cicd
      - echo "=== [9/14] test:nexus ==="
      - task: test:nexus
      - echo "=== [10/14] test:woodpecker ==="
      - task: test:woodpecker
      - echo "=== [11/14] test:gateway ==="
      - task: test:gateway
      - echo "=== [12/14] test:microservices ==="
      - task: test:microservices
      - echo "=== [13/14] test:argocd ==="
      - task: test:argocd
      - echo "=== [14/14] test:keycloak ==="
      - task: test:keycloak
      - echo ""
      - echo "=== All Vagrant tests complete ==="

  # ============== VAGRANT ==============
  vagrant:up:
    desc: Start Vagrant VMs
    cmds:
      - vagrant up

  vagrant:halt:
    desc: Stop Vagrant VMs
    cmds:
      - vagrant halt

  vagrant:destroy:
    desc: Destroy Vagrant VMs
    cmds:
      - vagrant destroy -f

  # ============== CLEAN ==============
  clean:
    desc: Clean all build artifacts
    cmds:
      - docker compose down -v --remove-orphans 2>/dev/null || true
